  const [trackGroups, setTrackGroups] = useState(() => loadTrackGroups());
  const [accommodations, setAccommodations] = useState(() => loadAccommodations());
  const [applications, setApplications] = useState(() => loadApplications());
  const [invoices, setInvoices] = useState(() => loadInvoices());
  const [partners, setPartners] = useState(() => loadPartners());
  const [invoiceItems, setInvoiceItems] = useState(() => loadInvoiceItems());
  const [pdfAccom, setPdfAccom] = useState(null); // PDF 미리보기 대상
  const [pdfInvoice, setPdfInvoice] = useState(null); // 인보이스 PDF 미리보기
  const [invoiceEditing, setInvoiceEditing] = useState(null); // 인보이스 편집 대상 (app or invoice)
  const [view, setView] = useState('students'); // students | schools | subjects | members | matrix | uniData | accomData | applications | invoices
  const [openId, setOpenId] = useState(null);
  const [showNew, setShowNew] = useState(false);

  useEffect(() => { saveStudents(students); }, [students]);
  useEffect(() => { saveOptions(customOptions); }, [customOptions]);
  useEffect(() => { saveSchools(schools); }, [schools]);
  useEffect(() => { saveSubjects(subjects); }, [subjects]);
  useEffect(() => { saveMembers(members); }, [members]);
  useEffect(() => { saveCurrentUserId(currentUserId); }, [currentUserId]);
  useEffect(() => { saveUniversities(universities); }, [universities]);
  useEffect(() => { savePrograms(programs); }, [programs]);
  useEffect(() => { saveTrackGroups(trackGroups); }, [trackGroups]);
  useEffect(() => { saveAccommodations(accommodations); }, [accommodations]);
  useEffect(() => { saveApplications(applications); }, [applications]);
  useEffect(() => { saveInvoices(invoices); }, [invoices]);
  useEffect(() => { savePartners(partners); }, [partners]);
  useEffect(() => { saveInvoiceItems(invoiceItems); }, [invoiceItems]);

  // 현재 사용자 정보 + 권한
  const currentUser = members.find(m => m.id === currentUserId) || members[0];
  const role = currentUser?.role || 'admin';
  const access = PAGE_ACCESS[role] || PAGE_ACCESS.admin;
  const scope = STUDENT_SCOPE[role] || 'all';

  // 학생 접근 범위 적용
  const visibleStudents = scope === 'all'
    ? students
    : students.filter(s => (currentUser?.linkedStudentIds || []).includes(s.id));

  // 역할이 접근 불가 페이지에 있으면 자동 redirect
  // view → 접근 권한 키 매핑 (별칭 처리)
  const VIEW_ACCESS_KEY = { invoiceItems: 'accounting', accounting: 'accounting' };
  useEffect(() => {
    const accKey = VIEW_ACCESS_KEY[view] || view;
    if (!access[accKey] && view !== 'students') setView('students');
  }, [view, role]);
  // 학생 상세 진입 시 권한 검증
  useEffect(() => {
    if (openId && scope !== 'all' && !visibleStudents.find(s => s.id === openId)) {
      setOpenId(null);
    }
  }, [openId, currentUserId]);

  // 초기 진입 시 기존 학생 데이터에서 사용된 값들을 옵션 목록에 자동 시드
  useEffect(() => {
    setCustomOptions(prev => {
      const next = {
        category: new Set(prev.category || []),
        cohort: new Set(prev.cohort || []),
        currentSchool: new Set(prev.currentSchool || [])
      };
      students.forEach(s => {
        if (s.category) next.category.add(s.category);
        if (s.cohort) next.cohort.add(s.cohort);
        if (s.currentSchool) next.currentSchool.add(s.currentSchool);
      });
      return {
        category: Array.from(next.category),
        cohort: Array.from(next.cohort),
        currentSchool: Array.from(next.currentSchool)
      };
    });
    // eslint-disable-next-line
  }, []);

  const addOption = (field, value) => {
    if (!value || !field) return;
    setCustomOptions(prev => {
      const list = prev[field] || [];
      if (list.includes(value)) return prev;
      return { ...prev, [field]: [...list, value] };
    });
  };
  const removeOption = (field, value) => {
    setCustomOptions(prev => ({
      ...prev,
      [field]: (prev[field] || []).filter(v => v !== value)
    }));
  };

  const updateStudent = (updated) => {
    setStudents(prev => prev.map(s => s.id === updated.id ? updated : s));
  };
  const createStudent = (s) => {
    // 새 학생 생성 시 새로운 값들을 옵션 목록에 자동 등록
    if (s.category) addOption('category', s.category);
    if (s.cohort) addOption('cohort', s.cohort);
    if (s.currentSchool) addOption('currentSchool', s.currentSchool);
    setStudents(prev => [s, ...prev]);
    setShowNew(false);
    setOpenId(s.id);
  };
  const deleteStudent = (id) => {
    setStudents(prev => prev.filter(s => s.id !== id));
    setOpenId(null);
  };

  const opened = visibleStudents.find(s => s.id === openId);

  return (
    <div className="min-h-screen flex flex-col" style={{ background:'#faf7f3' }}>
      {/* 상단 헤더 — 시뮬레이션 모드 + 사용자 전환 */}
      <header className="app-header flex items-center justify-between px-4 py-2">
        <div className="flex items-center gap-3">
          <div className="brand-title">BreakEDU · BUPP</div>
          <span className="badge b-orange text-xs">🔒 시뮬레이션 모드</span>
        </div>
        <CurrentUserSwitcher members={members} currentUserId={currentUserId} onChange={(id) => { setCurrentUserId(id); setOpenId(null); setView('students'); }}/>
      </header>

      <div className="flex flex-1 min-h-0">
      {/* 사이드바 */}
      <aside className="w-60 px-3 py-4 flex flex-col gap-1" style={{ background:'#faf7f3', borderRight:'1px solid var(--border)' }}>
        <div className="px-3 py-2 mb-2">
          <div className="brand-title text-lg">BreakEDU</div>
          <div className="text-xs flex items-center gap-1 mt-1" style={{ color:'var(--text-soft)' }}>
            <Badge value={ROLE_LABEL[role]}/>
            <span className="truncate">{currentUser?.name}</span>
          </div>
        </div>

        <div className="text-xs text-gray-400 px-3 mt-2 mb-1 font-medium">학생</div>
        {access.students && (
          <div className={`sidebar-item ${view === 'students' && !opened ? 'active':''}`}
            onClick={() => { setView('students'); setOpenId(null); }}>📋 학생 목록</div>
        )}
        {access.cohortDash && (
          <div className={`sidebar-item ${view === 'cohortDash' ? 'active':''}`}
            onClick={() => { setView('cohortDash'); setOpenId(null); }}>📅 기수 대시보드</div>
        )}
        {access.applications && (
          <div className={`sidebar-item ${view === 'applications' ? 'active':''}`}
            onClick={() => { setView('applications'); setOpenId(null); }}>📝 신청 접수</div>
        )}
        {access.invoices && (
          <div className={`sidebar-item ${view === 'invoices' ? 'active':''}`}
            onClick={() => { setView('invoices'); setOpenId(null); }}>🧾 인보이스</div>
        )}

        {(access.schools || access.subjects) && (
          <div className="text-xs text-gray-400 px-3 mt-3 mb-1 font-medium">데이터베이스</div>
        )}
        {access.schools && (
          <div className={`sidebar-item ${view === 'schools' ? 'active':''}`}
            onClick={() => { setView('schools'); setOpenId(null); }}>🏫 학교 관리</div>
        )}
        {access.subjects && (
          <div className={`sidebar-item ${view === 'subjects' ? 'active':''}`}
            onClick={() => { setView('subjects'); setOpenId(null); }}>📚 과목 관리</div>
        )}
        {access.uniData && (
          <div className={`sidebar-item ${view === 'uniData' ? 'active':''}`}
            onClick={() => { setView('uniData'); setOpenId(null); }}>🎓 대학 데이터</div>
        )}
        {access.accomData && (
          <div className={`sidebar-item ${view === 'accomData' ? 'active':''}`}
            onClick={() => { setView('accomData'); setOpenId(null); }}>🏠 숙소 데이터</div>
        )}
        {access.partners && (
          <div className={`sidebar-item ${view === 'partners' ? 'active':''}`}
            onClick={() => { setView('partners'); setOpenId(null); }}>🤝 파트너 관리</div>
        )}

        {(access.members || access.matrix) && (
          <div className="text-xs text-gray-400 px-3 mt-3 mb-1 font-medium">권한 관리</div>
        )}
        {access.members && (
          <div className={`sidebar-item ${view === 'members' ? 'active':''}`}
            onClick={() => { setView('members'); setOpenId(null); }}>👤 멤버 관리</div>
        )}
        {access.matrix && (
          <div className={`sidebar-item ${view === 'matrix' ? 'active':''}`}
            onClick={() => { setView('matrix'); setOpenId(null); }}>🔐 권한 매트릭스</div>
        )}

        {access.accounting && (
          <>
            <div className="text-xs text-gray-400 px-3 mt-3 mb-1 font-medium">회계</div>
            <div className={`sidebar-item ${view === 'accounting' ? 'active':''}`}
              onClick={() => { setView('accounting'); setOpenId(null); }}>💰 회계 대시보드</div>
            <div className={`sidebar-item ${view === 'invoiceItems' ? 'active':''}`}
              onClick={() => { setView('invoiceItems'); setOpenId(null); }}>📋 인보이스 항목 관리</div>
          </>
        )}

        <div className="text-xs text-gray-400 px-3 mt-3 mb-1 font-medium">예정 모듈</div>
        {access.parent && <div className="sidebar-item opacity-50 cursor-not-allowed">💬 학부모</div>}
        {role === 'admin' || role === 'bu_staff' ? (
          <>
            <div className="sidebar-item opacity-50 cursor-not-allowed">🎓 대학지원 통합</div>
            <div className="sidebar-item opacity-50 cursor-not-allowed">🌟 EC 통합</div>
            <div className="sidebar-item opacity-50 cursor-not-allowed">🏠 숙소 통합</div>
          </>
        ) : null}

        <div className="mt-auto px-3 py-3 text-xs text-gray-400 border-t border-gray-200">
          3단계: + 멤버십·권한(시뮬레이션)<br/>v1.2 · 2026
        </div>
      </aside>

      {/* 메인 컨텐츠 */}
      <main className="flex-1 overflow-auto">
        {opened ? (
          <StudentDetail
            student={opened}
            onBack={() => setOpenId(null)}
            onUpdate={updateStudent}
            onDelete={deleteStudent}
            customOptions={customOptions}
            addOption={addOption}
            removeOption={removeOption}
            schools={schools}
            subjects={subjects}
            universities={universities}
            programs={programs}
            trackGroups={trackGroups}
            accommodations={accommodations}
            invoices={invoices}
            role={role}
          />
        ) : view === 'schools' && access.schools ? (
          <SchoolList schools={schools} onChange={setSchools}/>
        ) : view === 'subjects' && access.subjects ? (
          <SubjectList subjects={subjects} schools={schools} onChange={setSubjects}/>
        ) : view === 'uniData' && access.uniData ? (
          <UniversityDataPage
            universities={universities} programs={programs} trackGroups={trackGroups}
            onChangeUniversities={setUniversities}
            onChangePrograms={setPrograms}
            onChangeTrackGroups={setTrackGroups}
          />
        ) : view === 'accomData' && access.accomData ? (
          <AccommodationDataPage
            accommodations={accommodations}
            students={students}
            schools={schools}
            onChange={setAccommodations}
            canViewHistory={role === 'admin' || role === 'bu_staff'}
            onOpenPDF={(a) => setPdfAccom(a)}
          />
        ) : view === 'partners' && access.partners ? (
          <PartnersPage partners={partners} onChange={setPartners}/>
        ) : view === 'applications' && access.applications ? (
          <ApplicationsPage
            applications={applications}
            invoices={invoices}
            accommodations={accommodations}
            members={members}
            onChange={setApplications}
            currentUserName={currentUser?.name || ''}
            canInvoice={access.invoices}
            onOpenInvoiceEditor={(app) => setInvoiceEditing({ application: app, invoice: null })}
            onViewInvoice={(inv) => setPdfInvoice(inv)}
          />
        ) : view === 'invoices' && access.invoices ? (
          <div className="max-w-[1400px] mx-auto px-8 py-8">
            <div className="flex items-center justify-between mb-6">
              <div>
                <h1 className="text-2xl font-bold">🧾 인보이스</h1>
                <p className="text-sm text-gray-500 mt-1">전체 {invoices.length}건</p>
              </div>
              <button className="btn-primary" onClick={() => setInvoiceEditing({ application: null, invoice: emptyInvoice() })}>+ 새 인보이스</button>
            </div>
            <div className="notion-card overflow-hidden">
              <table className="w-full">
                <thead><tr>
                  <th className="table-th">번호</th>
                  <th className="table-th">학생</th>
                  <th className="table-th">파트너</th>
                  <th className="table-th">발행일</th>
                  <th className="table-th">납부 기한</th>
                  <th className="table-th">학생 인보이스</th>
                  <th className="table-th">정산 인보이스</th>
                  <th className="table-th">상태</th>
                  <th className="table-th"></th>
                </tr></thead>
                <tbody>
                  {invoices.length === 0 ? (
                    <tr><td colSpan="9" className="text-center py-12 text-gray-400 text-sm">발행된 인보이스가 없습니다.</td></tr>
                  ) : invoices.map(inv => (
                    <tr key={inv.id} className="row-hover">
                      <td className="table-td font-mono text-xs">{inv.invoiceNumber}</td>
                      <td className="table-td font-medium">{inv.studentName}</td>
                      <td className="table-td text-xs">
                        {inv.partnerCompany
                          ? <span>{inv.partnerCompany} <span className="text-gray-500">({inv.commissionType === 'amount' ? `${(parseFloat(inv.commissionAmount)||0).toLocaleString()} ${inv.currency}` : `${inv.commissionRate || 0}%`})</span></span>
                          : <span className="text-gray-300">직접 접수</span>}
                      </td>
                      <td className="table-td text-xs">{inv.issueDate}</td>
                      <td className="table-td text-xs">{inv.dueDate || '—'}</td>
                      <td className="table-td font-semibold" style={{color:'#0b6e99'}}>{(inv.grossTotal||0).toLocaleString()} {inv.currency}</td>
                      <td className="table-td font-semibold" style={{color:'#0f7b6c'}}>{((inv.netTotal!=null?inv.netTotal:(inv.grossTotal||0))).toLocaleString()} {inv.currency}</td>
                      <td className="table-td"><Badge value={inv.status}/></td>
                      <td className="table-td text-right whitespace-nowrap">
                        <button className="btn-ghost text-xs" onClick={() => setPdfInvoice(inv)}>📄 PDF</button>
                        <button className="btn-ghost text-xs" onClick={() => setInvoiceEditing({ application: applications.find(a => a.id === inv.applicationId), invoice: inv })}>수정</button>
                        <button className="btn-danger text-xs" onClick={() => {
                          if (!confirm('이 인보이스를 삭제하시겠습니까?')) return;
                          setInvoices(invoices.filter(i => i.id !== inv.id));
                          // 연결된 신청서의 invoiceId도 제거
                          setApplications(applications.map(a => a.invoiceId === inv.id ? { ...a, invoiceId:'', status: 'approved' } : a));
                        }}>삭제</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        ) : view === 'cohortDash' && access.cohortDash ? (
          <CohortDashboard
            students={students}
            members={members}
            universities={universities}
            programs={programs}
            trackGroups={trackGroups}
            subjects={subjects}
            schools={schools}
            onUpdateStudent={updateStudent}
          />
        ) : view === 'members' && access.members ? (
          <MemberList members={members} students={students} onChange={setMembers}/>
        ) : view === 'matrix' && access.matrix ? (
          <PermissionMatrix/>
        ) : view === 'accounting' && access.accounting ? (
          <AccountingPage invoices={invoices} applications={applications} partners={partners} students={students} members={members} programs={programs} invoiceItems={invoiceItems}/>
        ) : view === 'invoiceItems' && access.accounting ? (
          <InvoiceItemsPage items={invoiceItems} onChange={setInvoiceItems}/>
        ) : (
          <StudentList
            students={visibleStudents}
            onOpen={(id) => { setView('students'); setOpenId(id); }}
            onAdd={() => setShowNew(true)}
            customOptions={customOptions}
            role={role}
          />
        )}
      </main>
      </div>

      <NewStudentModal
        open={showNew}
        onClose={() => setShowNew(false)}
        onCreate={createStudent}
        customOptions={customOptions}
        addOption={addOption}
        removeOption={removeOption}
      />

      {pdfAccom && (
        <HomestayPDFPreview accom={pdfAccom} onClose={() => setPdfAccom(null)}/>
      )}

      {pdfInvoice && (
        <InvoicePDFPreview
          invoice={pdfInvoice}
          application={applications.find(a => a.id === pdfInvoice.applicationId)}
          onClose={() => setPdfInvoice(null)}
        />
      )}

      {invoiceEditing && (
        <div className="modal-backdrop" onClick={() => setInvoiceEditing(null)} style={{ alignItems:'flex-start', overflow:'auto' }}>
          <div className="modal-card" onClick={(e) => e.stopPropagation()} style={{ width:'min(1100px, 95vw)', maxHeight:'95vh' }}>
            <InvoiceEditor
              invoice={invoiceEditing.invoice}
              application={invoiceEditing.application}
              members={members}
              applications={applications}
              students={students}
              partners={partners}
              invoiceItems={invoiceItems}
              onAddInvoiceItem={(newItem) => setInvoiceItems([...invoiceItems, newItem])}
              currentUserName={currentUser?.name || ''}
              onSave={(d) => {
                let saved;
                if (d.id) {
                  saved = d;
                  setInvoices(invoices.map(i => i.id === d.id ? d : i));
                } else {
                  saved = { ...d, id: uid() };
                  setInvoices([...invoices, saved]);
                }
                // 연결된 신청서 업데이트
                if (saved.applicationId) {
                  setApplications(applications.map(a => a.id === saved.applicationId
                    ? { ...a, invoiceId: saved.id, invoiceNumber: saved.invoiceNumber, status: a.status === 'paid' ? 'paid' : 'invoiced' }
                    : a));
                }
                setInvoiceEditing(null);
              }}
              onCancel={() => setInvoiceEditing(null)}
            />
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
