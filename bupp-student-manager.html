const InvoiceItemsPage = ({ items, onChange }) => {
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState({ category: '', active: '' });
  const [editing, setEditing] = useState(null);
  // 사용자 추가 카테고리 (기본 + 항목에 등장 + 사용자 추가) 통합
  const [extraCategories, setExtraCategories] = useState(() => {
    try { return JSON.parse(localStorage.getItem('bupp_invoice_item_extra_categories') || '[]'); } catch { return []; }
  });
  useEffect(() => {
    try { localStorage.setItem('bupp_invoice_item_extra_categories', JSON.stringify(extraCategories)); } catch {}
  }, [extraCategories]);

  // 카테고리 옵션 = 기본 + 항목에 사용된 카테고리 + 사용자 추가 (중복 제거)
  const categoryOptions = (() => {
    const set = new Set([
      ...INVOICE_ITEM_CATEGORIES,
      ...items.map(it => it.category).filter(Boolean),
      ...extraCategories
    ]);
    return Array.from(set);
  })();

  const addCategory = (cat) => {
    const c = (cat || '').trim();
    if (!c) return;
    if (categoryOptions.includes(c)) return;
    setExtraCategories(prev => [...prev, c]);
  };
  const removeCategory = (cat) => {
    // 기본 카테고리는 삭제 불가
    if (INVOICE_ITEM_CATEGORIES.includes(cat)) {
      alert(`"${cat}"은(는) 기본 카테고리라서 삭제할 수 없습니다.`);
      return;
    }
    const inUse = items.some(it => it.category === cat);
    if (inUse) {
      if (!confirm(`"${cat}" 카테고리를 사용하는 항목이 있습니다.\n그래도 옵션에서만 제거하시겠습니까? (기존 항목의 카테고리 값은 유지됩니다)`)) return;
    }
    setExtraCategories(prev => prev.filter(c => c !== cat));
  };

  const filtered = items.filter(it => {
    const q = search.trim().toLowerCase();
    if (q && !(it.name||'').toLowerCase().includes(q) && !(it.code||'').toLowerCase().includes(q)) return false;
    if (filters.category && it.category !== filters.category) return false;
    if (filters.active === 'Y' && !it.active) return false;
    if (filters.active === 'N' && it.active) return false;
    return true;
  }).sort((a, b) => (a.category || '').localeCompare(b.category || '') || (a.name || '').localeCompare(b.name || ''));

  const upsert = (d) => {
    if (!d.name?.trim()) { alert('항목명을 입력해주세요.'); return; }
    const next = d.id ? items.map(x => x.id === d.id ? d : x) : [...items, { ...d, id: uid() }];
    onChange(next);
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 항목을 삭제하시겠습니까?\n(이미 작성된 인보이스의 항목명/금액은 유지되며, 향후 선택 옵션에서만 사라집니다.)')) return;
    onChange(items.filter(x => x.id !== id));
  };

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">📋 인보이스 항목 관리</h1>
          <p className="text-sm text-gray-500 mt-1">전체 {items.length}개 · 필터 결과 {filtered.length}개 · 인보이스 작성 시 드롭다운에서 선택할 수 있는 청구 항목 카탈로그</p>
        </div>
        <div className="flex items-center gap-2">
          <input className="notion-input w-72" placeholder="항목명·코드 검색..." value={search} onChange={(e) => setSearch(e.target.value)}/>
          <button className="btn-primary" onClick={() => setEditing(emptyInvoiceItem())}>+ 새 항목 추가</button>
        </div>
      </div>

      <div className="notion-card p-4 mb-4">
        <div className="grid grid-cols-3 gap-3">
          <Field label="카테고리"><Select value={filters.category} onChange={(v) => setFilters({...filters, category:v})} options={categoryOptions} placeholder="전체"/></Field>
          <Field label="활성 여부"><Select value={filters.active} onChange={(v) => setFilters({...filters, active:v})} options={['Y','N']} placeholder="전체"/></Field>
        </div>
        {/* 카테고리 관리 — 추가/삭제 */}
        <div className="mt-3 pt-3" style={{borderTop:'1px solid var(--border)'}}>
          <div className="text-xs font-semibold text-gray-600 mb-2">📁 카테고리 관리 ({categoryOptions.length}개)</div>
          <div className="flex flex-wrap gap-1.5 items-center">
            {categoryOptions.map(cat => {
              const isDefault = INVOICE_ITEM_CATEGORIES.includes(cat);
              return (
                <span key={cat} className="badge inline-flex items-center gap-1"
                  style={{background: isDefault ? '#e8e0d5' : '#ddedea', color:'#202731', padding:'3px 8px'}}>
                  {cat}
                  {!isDefault && (
                    <button
                      onClick={() => removeCategory(cat)}
                      style={{marginLeft:4, color:'#c20206', fontWeight:'bold', cursor:'pointer'}}
                      title="삭제"
                    >×</button>
                  )}
                </span>
              );
            })}
            <button
              className="btn-ghost text-xs"
              style={{padding:'3px 8px'}}
              onClick={() => {
                const v = prompt('새 카테고리 이름:');
                if (v) addCategory(v);
              }}
            >+ 카테고리 추가</button>
          </div>
          <div className="text-xs text-gray-500 mt-2">💡 회색 칩은 기본 카테고리 (삭제 불가), 초록색 칩은 사용자 추가 (삭제 가능)</div>
        </div>
      </div>

      {editing && (
        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold mb-4">{editing.id ? '항목 수정' : '새 항목 추가'}</h3>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <Field label="항목명 *" span={2}><TextInput value={editing.name} onChange={(v) => setEditing({...editing, name:v})} placeholder="예) 풀가디언 프로그램 (10개월)"/></Field>
            <Field label="코드"><TextInput value={editing.code} onChange={(v) => setEditing({...editing, code:v})} placeholder="예) BUPP-FULL-10M"/></Field>
            <Field label="카테고리">
              <ComboSelect
                value={editing.category}
                onChange={(v) => setEditing({...editing, category:v})}
                options={categoryOptions}
                onAddCustom={(v) => addCategory(v)}
                onRemoveCustom={(v) => removeCategory(v)}
                placeholder="카테고리 선택 또는 추가"
              />
            </Field>
            <Field label="기본 단가"><TextInput type="number" value={editing.defaultAmount} onChange={(v) => setEditing({...editing, defaultAmount: parseFloat(v) || 0})}/></Field>
            <Field label="통화"><Select value={editing.defaultCurrency} onChange={(v) => setEditing({...editing, defaultCurrency:v})} options={['CAD','USD','KRW']}/></Field>
            <Field label="활성 상태"><div className="pt-2"><Toggle value={editing.active} onChange={(v) => setEditing({...editing, active:v})} label="활성"/></div></Field>
            <Field label="등록일"><TextInput type="date" value={editing.createdAt} onChange={(v) => setEditing({...editing, createdAt:v})}/></Field>
            <Field label="기본 설명 (인보이스 줄에 자동 입력)" span={4}><TextArea value={editing.defaultDescription} onChange={(v) => setEditing({...editing, defaultDescription:v})} rows={2}/></Field>
            <Field label="내부 메모" span={4}><TextArea value={editing.memo} onChange={(v) => setEditing({...editing, memo:v})} rows={2}/></Field>
            <div className="col-span-4 flex justify-end gap-2">
              <button className="btn-ghost" onClick={() => setEditing(null)}>취소</button>
              <button className="btn-primary" onClick={() => upsert(editing)}>저장</button>
            </div>
          </div>
        </div>
      )}

      <div className="notion-card overflow-hidden">
        <table className="w-full">
          <thead><tr>
            <th className="table-th">카테고리</th>
            <th className="table-th">항목명</th>
            <th className="table-th">코드</th>
            <th className="table-th text-right">기본 단가</th>
            <th className="table-th">통화</th>
            <th className="table-th">활성</th>
            <th className="table-th">작업</th>
          </tr></thead>
          <tbody>
            {filtered.map(it => (
              <tr key={it.id}>
                <td className="table-td"><Badge value={it.category}/></td>
                <td className="table-td">
                  <div className="font-semibold">{it.name}</div>
                  {it.defaultDescription && <div className="text-xs text-gray-500 mt-1 truncate" style={{maxWidth:400}}>{it.defaultDescription}</div>}
                </td>
                <td className="table-td text-xs text-gray-500">{it.code || '-'}</td>
                <td className="table-td text-right font-semibold">{(it.defaultAmount || 0).toLocaleString()}</td>
                <td className="table-td">{it.defaultCurrency}</td>
                <td className="table-td">{it.active ? <span className="badge b-green">활성</span> : <span className="badge b-gray">비활성</span>}</td>
                <td className="table-td">
                  <button className="btn-ghost text-xs mr-1" onClick={() => setEditing(it)}>수정</button>
                  <button className="btn-danger text-xs" onClick={() => remove(it.id)}>삭제</button>
                </td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan={7} className="table-td text-center text-gray-400 py-8">항목이 없습니다.</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
};

/* ============================================================
   💰 회계 페이지 (Phase 1) — 수익 대시보드 + 파트너 정산 + 프로그램 수익성
   ============================================================ */
const AccountingPage = ({ invoices=[], applications=[], partners=[], students=[], members=[], programs=[], invoiceItems=[] }) => {
  const [tab, setTab] = useState('overview'); // overview | partners | programs | items
  const [periodMonths, setPeriodMonths] = useState(12);
  const [itemGroupBy, setItemGroupBy] = useState('month'); // month | item

  // 인보이스 기준점: paidAt(있으면) → issueDate
  const dateOf = (inv) => (inv.paidAt || inv.issueDate || '').slice(0, 10);
  const monthKey = (s) => (s || '').slice(0, 7);

  // 기간 필터 (최근 N개월)
  const todayD = new Date();
  const cutoff = new Date(todayD.getFullYear(), todayD.getMonth() - periodMonths + 1, 1).toISOString().slice(0, 10);
  const inPeriod = invoices.filter(i => i.status !== 'cancelled' && (dateOf(i) >= cutoff));

  // 핵심 지표
  const paidList = inPeriod.filter(i => i.status === 'paid');
  const pendingList = inPeriod.filter(i => i.status === 'sent');
  const totalGross = paidList.reduce((s, i) => s + (parseFloat(i.grossTotal) || 0), 0);
  const totalCommission = paidList.reduce((s, i) => s + (parseFloat(i.commissionAmount) || 0), 0);
  const totalNet = paidList.reduce((s, i) => s + (parseFloat(i.netTotal) || 0), 0);
  const totalReceivable = pendingList.reduce((s, i) => s + (parseFloat(i.grossTotal) || 0), 0);
  const paidCount = paidList.length;
  const pendingCount = pendingList.length;

  // 월별 매출 시계열
  const monthlyMap = {};
  for (let i = periodMonths - 1; i >= 0; i--) {
    const d = new Date(todayD.getFullYear(), todayD.getMonth() - i, 1);
    const k = d.toISOString().slice(0, 7);
    monthlyMap[k] = { month: k, gross: 0, net: 0, commission: 0, count: 0 };
  }
  paidList.forEach(inv => {
    const k = monthKey(dateOf(inv));
    if (monthlyMap[k]) {
      monthlyMap[k].gross += parseFloat(inv.grossTotal) || 0;
      monthlyMap[k].net += parseFloat(inv.netTotal) || 0;
      monthlyMap[k].commission += parseFloat(inv.commissionAmount) || 0;
      monthlyMap[k].count += 1;
    }
  });
  const monthlySeries = Object.values(monthlyMap);
  const maxMonthly = Math.max(1, ...monthlySeries.map(m => m.gross));

  // 파트너 정산 집계
  const partnerMap = {};
  inPeriod.forEach(inv => {
    const key = (inv.partnerCompany || '직접 접수').trim();
    if (!partnerMap[key]) partnerMap[key] = { name: key, gross: 0, commission: 0, net: 0, paid: 0, pending: 0, count: 0, invoices: [] };
    partnerMap[key].count += 1;
    partnerMap[key].invoices.push(inv);
    if (inv.status === 'paid') {
      partnerMap[key].gross += parseFloat(inv.grossTotal) || 0;
      partnerMap[key].commission += parseFloat(inv.commissionAmount) || 0;
      partnerMap[key].net += parseFloat(inv.netTotal) || 0;
      partnerMap[key].paid += 1;
    } else if (inv.status === 'sent') {
      partnerMap[key].pending += 1;
    }
  });
  const partnerRows = Object.values(partnerMap).sort((a, b) => b.commission - a.commission);

  // 프로그램별 수익성 — 신청서의 program 정보 기반 매칭
  const programMap = {};
  programs.forEach(p => {
    programMap[p.name || p.id] = { name: p.name || p.id, gross: 0, net: 0, commission: 0, count: 0 };
  });
  if (!programMap['기타/미분류']) programMap['기타/미분류'] = { name: '기타/미분류', gross: 0, net: 0, commission: 0, count: 0 };

  paidList.forEach(inv => {
    const app = applications.find(a => a.id === inv.applicationId);
    const stu = students.find(s => s.id === inv.linkedStudentId);
    const progName = stu?.program || app?.program || '기타/미분류';
    if (!programMap[progName]) programMap[progName] = { name: progName, gross: 0, net: 0, commission: 0, count: 0 };
    programMap[progName].gross += parseFloat(inv.grossTotal) || 0;
    programMap[progName].net += parseFloat(inv.netTotal) || 0;
    programMap[progName].commission += parseFloat(inv.commissionAmount) || 0;
    programMap[progName].count += 1;
  });
  const programRows = Object.values(programMap).filter(p => p.count > 0).sort((a, b) => b.gross - a.gross);

  // 통화 (대다수 인보이스의 통화 사용 — 단순화)
  const currency = paidList[0]?.currency || 'CAD';
  const fmt = (n) => `${(n || 0).toLocaleString(undefined, { maximumFractionDigits: 0 })} ${currency}`;
  const fmtShort = (n) => Math.abs(n) >= 1000 ? `${(n/1000).toFixed(1)}K` : String(Math.round(n));

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">💰 회계 대시보드</h1>
          <p className="text-sm text-gray-500 mt-1">최근 {periodMonths}개월 기준 · 관리자 전용 · 인보이스 데이터 기반 자동 집계</p>
        </div>
        <div className="flex items-center gap-2">
          <Select value={String(periodMonths)} onChange={(v) => setPeriodMonths(parseInt(v) || 12)} options={['3','6','12','24']} placeholder="개월"/>
          <span className="text-xs text-gray-500">개월</span>
        </div>
      </div>

      {/* 탭 */}
      <div className="notion-card mb-4 p-2 flex flex-wrap gap-1">
        <button className={`tab-btn ${tab === 'overview' ? 'active':''}`} onClick={() => setTab('overview')}>📊 수익 개요</button>
        <button className={`tab-btn ${tab === 'items' ? 'active':''}`} onClick={() => setTab('items')}>📋 항목별 매출</button>
        <button className={`tab-btn ${tab === 'partners' ? 'active':''}`} onClick={() => setTab('partners')}>🤝 파트너 정산</button>
        <button className={`tab-btn ${tab === 'programs' ? 'active':''}`} onClick={() => setTab('programs')}>🎓 프로그램 수익성</button>
      </div>

      {tab === 'overview' && (
        <Fragment>
          {/* KPI 카드 */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <div className="notion-card p-4" style={{ background:'#ddebf1', borderColor:'#0b6e99' }}>
              <div className="text-xs text-gray-500 mb-1">📄 학생 인보이스 매출</div>
              <div className="text-2xl font-bold" style={{color:'#0b6e99'}}>{fmt(totalGross)}</div>
              <div className="text-xs text-gray-500 mt-1">{paidCount}건 납부 확인</div>
            </div>
            <div className="notion-card p-4" style={{ background:'#ddedea', borderColor:'#0f7b6c' }}>
              <div className="text-xs text-gray-500 mb-1">💵 BUPP 실수령 (Net)</div>
              <div className="text-2xl font-bold" style={{color:'#0f7b6c'}}>{fmt(totalNet)}</div>
              <div className="text-xs text-gray-500 mt-1">커미션 차감 후</div>
            </div>
            <div className="notion-card p-4" style={{ background:'#faf3e3', borderColor:'#cb912f' }}>
              <div className="text-xs text-gray-500 mb-1">🤝 누적 커미션</div>
              <div className="text-2xl font-bold" style={{color:'#a47007'}}>{fmt(totalCommission)}</div>
              <div className="text-xs text-gray-500 mt-1">파트너 지급액</div>
            </div>
            <div className="notion-card p-4" style={{ background:'#fbe0e0', borderColor:'#c20206' }}>
              <div className="text-xs text-gray-500 mb-1">⏳ 미수금 (Sent)</div>
              <div className="text-2xl font-bold" style={{color:'#c20206'}}>{fmt(totalReceivable)}</div>
              <div className="text-xs text-gray-500 mt-1">{pendingCount}건 납부 대기</div>
            </div>
          </div>

          {/* 월별 매출 막대 차트 (SVG) */}
          <div className="notion-card p-4 mb-4">
            <h4 className="font-semibold mb-3" style={{color:'#760305'}}>📈 월별 매출 추이 — Gross vs Net</h4>
            {monthlySeries.every(m => m.gross === 0) ? (
              <div className="text-sm text-gray-400 py-8 text-center">해당 기간에 납부 확인된 인보이스가 없습니다.</div>
            ) : (
              <svg viewBox={`0 0 ${monthlySeries.length * 60 + 40} 200`} style={{width:'100%', height:240}}>
                {/* Y축 라인 */}
                <line x1="30" y1="20" x2="30" y2="170" stroke="#cabaab" strokeWidth="1"/>
                <line x1="30" y1="170" x2={monthlySeries.length * 60 + 30} y2="170" stroke="#cabaab" strokeWidth="1"/>
                {/* 가로 그리드 */}
                {[0.25, 0.5, 0.75, 1].map((p, i) => (
                  <g key={i}>
                    <line x1="30" y1={170 - p * 150} x2={monthlySeries.length * 60 + 30} y2={170 - p * 150} stroke="#eee" strokeDasharray="2,2"/>
                    <text x="28" y={170 - p * 150 + 3} fontSize="9" fill="#787774" textAnchor="end">{fmtShort(maxMonthly * p)}</text>
                  </g>
                ))}
                {monthlySeries.map((m, i) => {
                  const x = 30 + i * 60 + 10;
                  const grossH = (m.gross / maxMonthly) * 150;
                  const netH = (m.net / maxMonthly) * 150;
                  return (
                    <g key={m.month}>
                      <rect x={x} y={170 - grossH} width="18" height={grossH} fill="#0b6e99" opacity="0.85"/>
                      <rect x={x + 22} y={170 - netH} width="18" height={netH} fill="#0f7b6c" opacity="0.85"/>
                      <text x={x + 20} y={185} fontSize="9" fill="#202731" textAnchor="middle">{m.month.slice(2).replace('-', '/')}</text>
                      {m.gross > 0 && <text x={x + 9} y={170 - grossH - 3} fontSize="8" fill="#0b6e99" textAnchor="middle">{fmtShort(m.gross)}</text>}
                    </g>
                  );
                })}
                {/* 범례 */}
                <g transform="translate(40, 5)">
                  <rect x="0" y="0" width="10" height="10" fill="#0b6e99" opacity="0.85"/>
                  <text x="14" y="9" fontSize="10" fill="#202731">학생 인보이스 (Gross)</text>
                  <rect x="140" y="0" width="10" height="10" fill="#0f7b6c" opacity="0.85"/>
                  <text x="154" y="9" fontSize="10" fill="#202731">정산 인보이스 (Net)</text>
                </g>
              </svg>
            )}
          </div>

          {/* 최근 납부 / 미수금 목록 */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div className="notion-card p-4">
              <h4 className="font-semibold mb-3" style={{color:'#0f7b6c'}}>✅ 최근 납부 확인 (Top 10)</h4>
              {paidList.length === 0 ? (
                <div className="text-sm text-gray-400 py-4">없음</div>
              ) : (
                <table className="w-full text-xs">
                  <thead><tr><th className="table-th">학생</th><th className="table-th">발행일</th><th className="table-th">납부일</th><th className="table-th text-right">금액</th></tr></thead>
                  <tbody>
                    {paidList.slice().sort((a, b) => (b.paidAt||'').localeCompare(a.paidAt||'')).slice(0, 10).map(i => (
                      <tr key={i.id}>
                        <td className="table-td">{i.studentName}</td>
                        <td className="table-td">{i.issueDate}</td>
                        <td className="table-td">{i.paidAt || '-'}</td>
                        <td className="table-td text-right font-semibold">{fmt(i.grossTotal)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
            <div className="notion-card p-4">
              <h4 className="font-semibold mb-3" style={{color:'#c20206'}}>⏳ 미수금 — 납부 대기 (Top 10)</h4>
              {pendingList.length === 0 ? (
                <div className="text-sm text-gray-400 py-4">없음 — 전체 납부 완료 🎉</div>
              ) : (
                <table className="w-full text-xs">
                  <thead><tr><th className="table-th">학생</th><th className="table-th">발행일</th><th className="table-th">납부 기한</th><th className="table-th text-right">청구액</th></tr></thead>
                  <tbody>
                    {pendingList.slice().sort((a, b) => (a.dueDate||'').localeCompare(b.dueDate||'')).slice(0, 10).map(i => {
                      const overdue = i.dueDate && i.dueDate < todayD.toISOString().slice(0,10);
                      return (
                        <tr key={i.id} style={overdue ? { background:'#fbe0e0' } : {}}>
                          <td className="table-td">{i.studentName}</td>
                          <td className="table-td">{i.issueDate}</td>
                          <td className="table-td" style={overdue ? {color:'#c20206', fontWeight:'600'} : {}}>{i.dueDate || '-'}{overdue && ' ⚠️'}</td>
                          <td className="table-td text-right font-semibold">{fmt(i.grossTotal)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        </Fragment>
      )}

      {tab === 'partners' && (
        <div className="notion-card p-4">
          <h4 className="font-semibold mb-3" style={{color:'#760305'}}>🤝 파트너별 정산 ({partnerRows.length}개사)</h4>
          {partnerRows.length === 0 ? (
            <div className="text-sm text-gray-400 py-8 text-center">해당 기간에 인보이스가 없습니다.</div>
          ) : (
            <table className="w-full text-sm">
              <thead><tr>
                <th className="table-th">파트너사</th>
                <th className="table-th text-center">인보이스</th>
                <th className="table-th text-right">학생 인보이스 매출</th>
                <th className="table-th text-right">커미션 지급</th>
                <th className="table-th text-right">BUPP 실수령</th>
                <th className="table-th text-center">납부/대기</th>
              </tr></thead>
              <tbody>
                {partnerRows.map(p => (
                  <tr key={p.name}>
                    <td className="table-td font-semibold">{p.name}</td>
                    <td className="table-td text-center">{p.count}건</td>
                    <td className="table-td text-right" style={{color:'#0b6e99'}}>{fmt(p.gross)}</td>
                    <td className="table-td text-right" style={{color:'#a47007', fontWeight:'600'}}>{fmt(p.commission)}</td>
                    <td className="table-td text-right" style={{color:'#0f7b6c'}}>{fmt(p.net)}</td>
                    <td className="table-td text-center text-xs">
                      <span className="badge b-green">✓ {p.paid}</span>
                      {p.pending > 0 && <span className="badge b-yellow ml-1">대기 {p.pending}</span>}
                    </td>
                  </tr>
                ))}
                <tr style={{background:'#faf7f3', fontWeight:'600'}}>
                  <td className="table-td">합계</td>
                  <td className="table-td text-center">{partnerRows.reduce((s,p) => s+p.count, 0)}건</td>
                  <td className="table-td text-right" style={{color:'#0b6e99'}}>{fmt(partnerRows.reduce((s,p) => s+p.gross, 0))}</td>
                  <td className="table-td text-right" style={{color:'#a47007'}}>{fmt(partnerRows.reduce((s,p) => s+p.commission, 0))}</td>
                  <td className="table-td text-right" style={{color:'#0f7b6c'}}>{fmt(partnerRows.reduce((s,p) => s+p.net, 0))}</td>
                  <td className="table-td"></td>
                </tr>
              </tbody>
            </table>
          )}
          <div className="text-xs text-gray-500 mt-3">💡 "직접 접수"는 파트너 없이 BUPP가 직접 모집한 케이스입니다. 파트너사 칼럼은 인보이스에 기록된 파트너 회사명을 기준으로 집계됩니다.</div>
        </div>
      )}

      {tab === 'programs' && (
        <div className="notion-card p-4">
          <h4 className="font-semibold mb-3" style={{color:'#760305'}}>🎓 프로그램별 수익성 ({programRows.length}개)</h4>
          {programRows.length === 0 ? (
            <div className="text-sm text-gray-400 py-8 text-center">납부 확인된 인보이스가 없거나 프로그램 정보가 매칭되지 않습니다.</div>
          ) : (
            <Fragment>
              <table className="w-full text-sm mb-4">
                <thead><tr>
                  <th className="table-th">프로그램</th>
                  <th className="table-th text-center">건수</th>
                  <th className="table-th text-right">Gross 매출</th>
                  <th className="table-th text-right">Net 실수령</th>
                  <th className="table-th text-right">건당 평균 Net</th>
                  <th className="table-th text-right">Net 비중</th>
                </tr></thead>
                <tbody>
                  {programRows.map(p => {
                    const totalNetAll = programRows.reduce((s, x) => s + x.net, 0);
                    const share = totalNetAll > 0 ? (p.net / totalNetAll * 100) : 0;
                    return (
                      <tr key={p.name}>
                        <td className="table-td font-semibold">{p.name}</td>
                        <td className="table-td text-center">{p.count}</td>
                        <td className="table-td text-right" style={{color:'#0b6e99'}}>{fmt(p.gross)}</td>
                        <td className="table-td text-right" style={{color:'#0f7b6c', fontWeight:'600'}}>{fmt(p.net)}</td>
                        <td className="table-td text-right">{fmt(p.count > 0 ? p.net / p.count : 0)}</td>
                        <td className="table-td text-right">
                          <div className="flex items-center justify-end gap-2">
                            <div style={{width:60, height:8, background:'#eee', borderRadius:4, overflow:'hidden'}}>
                              <div style={{width:`${share}%`, height:'100%', background:'#0f7b6c'}}></div>
                            </div>
                            <span style={{minWidth:36}}>{share.toFixed(1)}%</span>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              <div className="text-xs text-gray-500">💡 프로그램은 학생 프로필(연결된 학생 우선) → 신청서 → '기타/미분류' 순으로 매칭됩니다. 학생 프로필의 BUPP 프로그램 필드와 신청서의 프로그램이 동일한 값이어야 정확히 집계됩니다.</div>
            </Fragment>
          )}
        </div>
      )}

      {tab === 'items' && (() => {
        // 인보이스 줄(items)을 풀어서 line items 배열로 변환 — 납부 확인된 것만
        const lines = [];
        paidList.forEach(inv => {
          (inv.items || []).forEach(it => {
            const master = invoiceItems.find(x => x.id === it.itemId);
            const qty = parseFloat(it.quantity) || 0;
            const amt = parseFloat(it.amount) || 0;
            lines.push({
              date: dateOf(inv),
              month: monthKey(dateOf(inv)),
              itemId: it.itemId || '_freeform',
              itemName: master?.name || (it.description ? it.description.slice(0, 30) : '(이름 없음)'),
              category: master?.category || '직접 입력',
              description: it.description,
              quantity: qty,
              amount: amt,
              lineTotal: qty * amt,
              currency: inv.currency,
              invoiceNumber: inv.invoiceNumber,
              studentName: inv.studentName
            });
          });
        });

        // 항목별 집계
        const byItem = {};
        lines.forEach(l => {
          const key = l.itemId + '|' + l.itemName;
          if (!byItem[key]) byItem[key] = { itemName: l.itemName, category: l.category, qty: 0, total: 0, count: 0, months: {} };
          byItem[key].qty += l.quantity;
          byItem[key].total += l.lineTotal;
          byItem[key].count += 1;
          byItem[key].months[l.month] = (byItem[key].months[l.month] || 0) + l.lineTotal;
        });
        const itemRows = Object.values(byItem).sort((a, b) => b.total - a.total);

        // 월별 컬럼 (period에 맞춰)
        const monthCols = monthlySeries.map(m => m.month);
        const monthTotals = {};
        monthCols.forEach(m => { monthTotals[m] = lines.filter(l => l.month === m).reduce((s, l) => s + l.lineTotal, 0); });

        return (
          <div className="space-y-4">
            <div className="notion-card p-4">
              <div className="flex items-center justify-between mb-3">
                <h4 className="font-semibold" style={{color:'#760305'}}>📋 항목별 매출 — {itemRows.length}개 항목 · 총 {lines.length}건</h4>
                <div className="flex gap-2">
                  <button className={`tab-btn ${itemGroupBy === 'month' ? 'active':''}`} onClick={() => setItemGroupBy('month')}>📅 월별 매트릭스</button>
                  <button className={`tab-btn ${itemGroupBy === 'item' ? 'active':''}`} onClick={() => setItemGroupBy('item')}>📋 항목 집계</button>
                </div>
              </div>

              {lines.length === 0 ? (
                <div className="text-sm text-gray-400 py-8 text-center">납부 확인된 인보이스 항목이 없습니다.</div>
              ) : itemGroupBy === 'item' ? (
                <table className="w-full text-sm">
                  <thead><tr>
                    <th className="table-th">항목명</th>
                    <th className="table-th">카테고리</th>
                    <th className="table-th text-center">건수</th>
                    <th className="table-th text-right">총 수량</th>
                    <th className="table-th text-right">총 매출</th>
                    <th className="table-th text-right">매출 비중</th>
                  </tr></thead>
                  <tbody>
                    {itemRows.map((r, i) => {
                      const totalAll = itemRows.reduce((s, x) => s + x.total, 0);
                      const share = totalAll > 0 ? (r.total / totalAll * 100) : 0;
                      return (
                        <tr key={i}>
                          <td className="table-td font-semibold">{r.itemName}</td>
                          <td className="table-td"><Badge value={r.category}/></td>
                          <td className="table-td text-center">{r.count}</td>
                          <td className="table-td text-right">{r.qty.toLocaleString()}</td>
                          <td className="table-td text-right font-semibold" style={{color:'#0b6e99'}}>{fmt(r.total)}</td>
                          <td className="table-td text-right">
                            <div className="flex items-center justify-end gap-2">
                              <div style={{width:60, height:8, background:'#eee', borderRadius:4, overflow:'hidden'}}>
                                <div style={{width:`${share}%`, height:'100%', background:'#0b6e99'}}></div>
                              </div>
                              <span style={{minWidth:36}}>{share.toFixed(1)}%</span>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                    <tr style={{background:'#faf7f3', fontWeight:'600'}}>
                      <td className="table-td">합계</td>
                      <td className="table-td"></td>
                      <td className="table-td text-center">{itemRows.reduce((s, x) => s + x.count, 0)}</td>
                      <td className="table-td text-right">{itemRows.reduce((s, x) => s + x.qty, 0).toLocaleString()}</td>
                      <td className="table-td text-right" style={{color:'#0b6e99'}}>{fmt(itemRows.reduce((s, x) => s + x.total, 0))}</td>
                      <td className="table-td"></td>
                    </tr>
                  </tbody>
                </table>
              ) : (
                <div className="overflow-auto">
                  <table className="w-full text-xs">
                    <thead><tr>
                      <th className="table-th sticky left-0 bg-white" style={{minWidth:180}}>항목명</th>
                      <th className="table-th">카테고리</th>
                      {monthCols.map(m => (
                        <th key={m} className="table-th text-right" style={{minWidth:80}}>{m.slice(2).replace('-', '/')}</th>
                      ))}
                      <th className="table-th text-right" style={{minWidth:100, background:'#faf7f3'}}>합계</th>
                    </tr></thead>
                    <tbody>
                      {itemRows.map((r, i) => (
                        <tr key={i}>
                          <td className="table-td font-semibold sticky left-0 bg-white">{r.itemName}</td>
                          <td className="table-td"><Badge value={r.category}/></td>
                          {monthCols.map(m => (
                            <td key={m} className="table-td text-right" style={(r.months[m]||0) > 0 ? {} : {color:'#ccc'}}>
                              {(r.months[m]||0) > 0 ? fmtShort(r.months[m]) : '-'}
                            </td>
                          ))}
                          <td className="table-td text-right font-semibold" style={{background:'#faf7f3', color:'#0b6e99'}}>{fmt(r.total)}</td>
                        </tr>
                      ))}
                      <tr style={{background:'#e8e0d5', fontWeight:'600'}}>
                        <td className="table-td sticky left-0" style={{background:'#e8e0d5'}}>월별 합계</td>
                        <td className="table-td"></td>
                        {monthCols.map(m => (
                          <td key={m} className="table-td text-right">{monthTotals[m] > 0 ? fmtShort(monthTotals[m]) : '-'}</td>
                        ))}
                        <td className="table-td text-right" style={{color:'#0b6e99'}}>{fmt(Object.values(monthTotals).reduce((s,v) => s+v, 0))}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              )}
            </div>

            {/* 카테고리별 도넛/요약 */}
            <div className="notion-card p-4">
              <h4 className="font-semibold mb-3" style={{color:'#760305'}}>🗂️ 카테고리별 매출 분포</h4>
              {(() => {
                const byCat = {};
                lines.forEach(l => { byCat[l.category] = (byCat[l.category] || 0) + l.lineTotal; });
                const catRows = Object.entries(byCat).map(([k, v]) => ({ name: k, total: v })).sort((a, b) => b.total - a.total);
                const totalAll = catRows.reduce((s, x) => s + x.total, 0);
                if (catRows.length === 0) return <div className="text-sm text-gray-400">데이터 없음</div>;
                return (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    {catRows.map(c => {
                      const share = totalAll > 0 ? (c.total / totalAll * 100) : 0;
                      return (
                        <div key={c.name} className="flex items-center gap-3 p-3 rounded" style={{background:'#faf7f3', border:'1px solid var(--border)'}}>
                          <div className="flex-1">
                            <div className="font-semibold mb-1">{c.name}</div>
                            <div style={{height:8, background:'#eee', borderRadius:4, overflow:'hidden'}}>
                              <div style={{width:`${share}%`, height:'100%', background:'#0f7b6c'}}></div>
                            </div>
                          </div>
                          <div className="text-right">
                            <div className="font-bold" style={{color:'#0f7b6c'}}>{fmt(c.total)}</div>
                            <div className="text-xs text-gray-500">{share.toFixed(1)}%</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
            </div>

            <div className="text-xs text-gray-500">💡 인보이스 줄(line item)에 연결된 마스터 항목을 기준으로 집계합니다. 항목 미선택 라인은 설명을 기준으로 임시 그룹화됩니다 — 정확한 집계를 위해 인보이스 작성 시 항목을 선택해 주세요.</div>
          </div>
        );
      })()}
    </div>
  );
};

/* ============================================================
   🤝 파트너 상세 페이지 — 커미션 정산 모듈
   - 탭: 대시보드 / 회사 정보 / 인보이스
   - 학생별 커미션 자동 집계 (invoices.partnerCompany 매칭)
   - 상태 3종: wait / scheduled / paid / overdue
   - 정산 주기: 1·4·7·10월 15일
   ============================================================ */
const PartnerDetailPage = ({ partner, partners, invoices, students, applications, onBack, onUpdatePartner, onUpdateInvoice, currentUserName }) => {
  const [tab, setTab] = useState('dashboard'); // dashboard | company | invoices
  const [edit, setEdit] = useState(null);       // 회사 정보 편집 draft
  const [payModal, setPayModal] = useState(null); // 정산 처리 모달

  // 이 파트너에게 귀속되는 인보이스 (commissionAmount > 0)
  const partnerInvoices = invoices.filter(inv => {
    return (inv.partnerCompany || '').trim() === partner.name && Number(inv.commissionAmount || 0) > 0;
  }).sort((a, b) => (b.issueDate || '').localeCompare(a.issueDate || ''));

  // 커미션 집계
  const today = new Date().toISOString().slice(0, 10);
  const rows = partnerInvoices.map(inv => {
    const status = getCommissionStatus(inv, today);
    const scheduled = getNextSettlementDate(inv.paidAt || inv.paymentConfirmedAt);
    const stu = students.find(s => s.id === inv.studentId);
    return { inv, status, scheduled, student: stu };
  });

  const totals = rows.reduce((acc, r) => {
    const amt = Number(r.inv.commissionAmount || 0);
    acc.total += amt;
    if (r.status === 'paid') acc.paid += amt;
    else if (r.status === 'scheduled') acc.scheduled += amt;
    else if (r.status === 'overdue') acc.overdue += amt;
    else if (r.status === 'wait') acc.wait += amt;
    return acc;
  }, { total: 0, paid: 0, scheduled: 0, overdue: 0, wait: 0 });

  const fmt = (n) => `$${Number(n || 0).toLocaleString('en-CA', { maximumFractionDigits: 2 })}`;
  const initials = (partner.name || 'P').slice(0, 2).toUpperCase();

  const handlePayConfirm = (inv, fields) => {
    onUpdateInvoice({
      ...inv,
      commissionPaidAt: fields.paidAt,
      commissionPaidBy: fields.paidBy || currentUserName || '',
      commissionPaymentMethod: fields.method || '',
      commissionNote: fields.note || ''
    });
    setPayModal(null);
  };
  const handlePayCancel = (inv) => {
    if (!confirm('이 학생의 커미션 지급 기록을 취소하시겠습니까?')) return;
    onUpdateInvoice({
      ...inv,
      commissionPaidAt: '',
      commissionPaidBy: '',
      commissionPaymentMethod: '',
      commissionNote: ''
    });
  };

  const saveCompanyInfo = () => {
    if (!edit.name?.trim()) { alert('회사명을 입력해주세요.'); return; }
    onUpdatePartner(edit);
    setEdit(null);
  };

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      {/* 뒤로 가기 */}
      <button onClick={onBack} className="text-sm mb-4 inline-flex items-center gap-1" style={{ color: 'var(--muted)' }}>
        ← 파트너 목록
      </button>

      {/* 파트너 프로필 헤더 */}
      <div className="hd-profile mb-4" style={{ borderRadius: 16 }}>
        <div className="hd-pava" style={{ borderRadius: 16, fontSize: 22 }}>{initials}</div>
        <div className="hd-pmain">
          <div className="hd-pname">
            <h1>{partner.name}</h1>
            {partner.country && <span className="en">{partner.country}</span>}
            {partner.active
              ? <span className="hd-chip live"><span className="hd-sdot"></span>운영중</span>
              : <span className="hd-chip" style={{ background:'rgba(255,255,255,0.08)', borderColor:'rgba(255,255,255,0.15)' }}>비활성</span>
            }
          </div>
          <div className="hd-pmeta">
            {partner.contactPerson && <span>담당자 <b>{partner.contactPerson}</b></span>}
            {partner.email && <span>이메일 <b>{partner.email}</b></span>}
            {partner.phone && <span>전화 <b>{partner.phone}</b></span>}
          </div>
        </div>
      </div>

      {/* 탭 */}
      <div className="hd-tabs sticky top-0 z-10 mb-4">
        <button className={`hd-tab ${tab==='dashboard' ? 'on':''}`} onClick={() => setTab('dashboard')}>대시보드</button>
        <button className={`hd-tab ${tab==='company' ? 'on':''}`} onClick={() => setTab('company')}>회사 정보</button>
        <button className={`hd-tab ${tab==='invoices' ? 'on':''}`} onClick={() => setTab('invoices')}>인보이스</button>
      </div>

      {/* === 대시보드 탭 === */}
      {tab === 'dashboard' && (
        <>
          <div className="hd-eyebrow">
            <span className="bar"></span><h2>커미션 정산 현황</h2>
            <span className="note">정산 주기 · 1·4·7·10월 15일</span>
          </div>

          {/* 3 pillars */}
          <div className="hd-pillars">
            <div className="hd-card">
              <div className="hd-plabel">누적 커미션</div>
              <div><span className="hd-val">{fmt(totals.total)}</span><span className="hd-den">CAD</span></div>
              <div className="text-xs mt-2" style={{ color:'var(--muted)' }}>
                {rows.length}건 · 학생별 합산
              </div>
            </div>
            <div className="hd-card">
              <div className="hd-plabel">지급 완료</div>
              <div><span className="hd-val" style={{ color:'var(--good)' }}>{fmt(totals.paid)}</span><span className="hd-den">CAD</span></div>
              <div className="hd-track">
                <div className="hd-fill" style={{
                  width: `${totals.total > 0 ? Math.round(totals.paid/totals.total*100) : 0}%`,
                  background: 'var(--good)'
                }}/>
              </div>
            </div>
            <div className="hd-card">
              <div className="hd-plabel">지급 예정 / 대기</div>
              <div>
                <span className="hd-val" style={{ color: totals.overdue > 0 ? 'var(--alert)' : 'var(--warn)' }}>
                  {fmt(totals.scheduled + totals.overdue + totals.wait)}
                </span>
                <span className="hd-den">CAD</span>
              </div>
              <div className="text-xs mt-2 flex gap-3" style={{ color:'var(--muted)' }}>
                {totals.scheduled > 0 && <span>예정 {fmt(totals.scheduled)}</span>}
                {totals.overdue > 0 && <span style={{ color:'var(--alert)' }}>연체 {fmt(totals.overdue)}</span>}
                {totals.wait > 0 && <span>대기 {fmt(totals.wait)}</span>}
              </div>
            </div>
          </div>

          {/* 학생별 커미션 표 */}
          <div className="hd-eyebrow mt-6">
            <span className="bar"></span><h2>학생별 정산 내역</h2>
            <span className="note">행을 클릭해 지급 처리</span>
          </div>
          <div className="hd-tablecard">
            <table className="w-full" style={{ borderCollapse: 'collapse' }}>
              <thead>
                <tr style={{ background:'var(--line-soft)' }}>
                  <th className="table-th" style={{ textAlign:'left' }}>학생</th>
                  <th className="table-th" style={{ textAlign:'left' }}>인보이스</th>
                  <th className="table-th" style={{ textAlign:'right' }}>커미션 (CAD)</th>
                  <th className="table-th" style={{ textAlign:'left' }}>학생 입금일</th>
                  <th className="table-th" style={{ textAlign:'left' }}>정산 예정일</th>
                  <th className="table-th" style={{ textAlign:'left' }}>상태</th>
                  <th className="table-th" style={{ textAlign:'right' }}></th>
                </tr>
              </thead>
              <tbody>
                {rows.length === 0 ? (
                  <tr><td colSpan="7" className="text-center py-12 text-sm" style={{ color:'var(--faint)' }}>
                    이 파트너에게 귀속된 커미션이 아직 없습니다.
                  </td></tr>
                ) : rows.map(r => (
                  <tr key={r.inv.id} className="row-hover" style={{ borderTop:'1px solid var(--line-soft)' }}>
                    <td className="table-td">
                      <div className="font-medium" style={{ color:'var(--ink)' }}>{r.student?.koreanName || r.inv.studentName || '—'}</div>
                      {r.student?.cohort && <div className="text-xs" style={{ color:'var(--muted)' }}>{r.student.cohort}</div>}
                    </td>
                    <td className="table-td text-sm" style={{ color:'var(--muted)' }}>
                      <div>{r.inv.invoiceNumber || r.inv.id?.slice(0, 8)}</div>
                      <div className="text-xs">{r.inv.issueDate || '—'}</div>
                    </td>
                    <td className="table-td text-right font-medium" style={{ fontVariantNumeric:'tabular-nums' }}>{fmt(r.inv.commissionAmount)}</td>
                    <td className="table-td text-sm">{r.inv.paidAt || <span style={{ color:'var(--faint)' }}>미입금</span>}</td>
                    <td className="table-td text-sm">{r.scheduled || <span style={{ color:'var(--faint)' }}>—</span>}</td>
                    <td className="table-td">
                      {r.status === 'paid' && (
                        <span className="hd-pill" style={{ background:'var(--good-bg)', color:'var(--good)' }}>
                          <span className="dot" style={{ background:'var(--good)' }}></span>지급 완료
                        </span>
                      )}
                      {r.status === 'scheduled' && (
                        <span className="hd-pill" style={{ background:'var(--warn-bg)', color:'var(--warn)' }}>
                          <span className="dot" style={{ background:'var(--warn)' }}></span>정산 예정
                        </span>
                      )}
                      {r.status === 'overdue' && (
                        <span className="hd-pill" style={{ background:'var(--alert-bg)', color:'var(--alert)' }}>
                          <span className="dot" style={{ background:'var(--alert)' }}></span>연체
                        </span>
                      )}
                      {r.status === 'wait' && (
                        <span className="hd-pill" style={{ background:'var(--line-soft)', color:'var(--muted)' }}>
                          <span className="dot" style={{ background:'var(--faint)' }}></span>학생 미입금
                        </span>
                      )}
                    </td>
                    <td className="table-td text-right whitespace-nowrap">
                      {r.status === 'paid' ? (
                        <>
                          <span className="text-xs" style={{ color:'var(--muted)' }}>
                            {r.inv.commissionPaidAt}
                            {r.inv.commissionPaidBy && ` · ${r.inv.commissionPaidBy}`}
                          </span>
                          <button className="btn-ghost text-xs ml-2" onClick={() => handlePayCancel(r.inv)}>취소</button>
                        </>
                      ) : r.status === 'wait' ? (
                        <span className="text-xs" style={{ color:'var(--faint)' }}>학생 입금 대기</span>
                      ) : (
                        <button className="btn-primary text-xs"
                          onClick={() => setPayModal({
                            inv: r.inv,
                            paidAt: today,
                            paidBy: currentUserName || '',
                            method: 'E-transfer',
                            note: ''
                          })}>
                          지급 처리
                        </button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* 정산 안내 */}

/* ============================================================
   💾 데이터 백업/복원 — localStorage 전체 export/import + GitHub의 bupp-data.json 자동 로드
   ============================================================ */
const EXPORT_KEYS = [
  'bupp_students_v1', 'bupp_options_v1', 'bupp_schools_v1', 'bupp_subjects_v1',
  'bupp_members_v1', 'bupp_universities_v1', 'bupp_programs_v1', 'bupp_trackgroups_v1',
  'bupp_accommodations_v1', 'bupp_applications_v1', 'bupp_invoices_v1',
  'bupp_partners_v1', 'bupp_invoice_items_v1', 'bupp_invoice_item_extra_categories',
  'bupp_ec_masters_v1'
];
const AUTO_LOAD_FLAG = 'bupp_data_initialized_v1';
const GITHUB_URL_KEY = 'bupp_github_data_url_v1';
// 기본 경로: HTML과 같은 폴더의 bupp-data.json
const getGithubDataUrl = () => {
  return localStorage.getItem(GITHUB_URL_KEY) || './bupp-data.json';
};
const setGithubDataUrl = (url) => {
  if (url) localStorage.setItem(GITHUB_URL_KEY, url);
  else localStorage.removeItem(GITHUB_URL_KEY);
};

const exportAllData = () => {
  const data = {};
  EXPORT_KEYS.forEach(k => {
    try {
      const raw = localStorage.getItem(k);
      if (raw) data[k] = JSON.parse(raw);
    } catch {}
  });
  const payload = {
    _meta: { app: 'BUPP', version: '1.3', exportedAt: new Date().toISOString() },
    data
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bupp-data-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

// ⏪ 안전 장치 — 어떤 import 작업 전에 현재 상태를 백업
const BACKUP_KEY = 'bupp_backup_before_import_v1';
const backupCurrentData = () => {
  const snapshot = { _meta: { backedUpAt: new Date().toISOString() }, data: {} };
  EXPORT_KEYS.forEach(k => {
    const raw = localStorage.getItem(k);
    if (raw) {
      try { snapshot.data[k] = JSON.parse(raw); } catch {}
    }
  });
  const keyCount = Object.keys(snapshot.data).length;
  if (keyCount > 0) {
    try {
      localStorage.setItem(BACKUP_KEY, JSON.stringify(snapshot));
      console.log('[BUPP] 자동 백업 생성 —', keyCount, '개 키 저장됨 (BACKUP_KEY)');
    } catch (err) {
      console.warn('[BUPP] 백업 실패:', err);
    }
  }
  return keyCount;
};
const restoreFromBackup = () => {
  const raw = localStorage.getItem(BACKUP_KEY);
  if (!raw) { alert('자동 백업이 없습니다.'); return false; }
  try {
    const snapshot = JSON.parse(raw);
    const at = snapshot._meta?.backedUpAt || '시점 미상';
    const keys = Object.keys(snapshot.data || {});
    if (!confirm(`${at} 시점의 자동 백업을 복원하시겠습니까?\n\n복원될 데이터: ${keys.length}개 키\n현재 데이터는 덮어쓰여집니다.`)) return false;
    keys.forEach(k => {
      try { localStorage.setItem(k, JSON.stringify(snapshot.data[k])); } catch {}
    });
    alert('백업 복원 완료! 페이지를 새로고침합니다.');
    window.location.reload();
    return true;
  } catch (err) {
    alert('백업 복원 실패: ' + (err?.message || err));
    return false;
  }
};

const applyImportedData = (json) => {
  const data = (json && json.data) ? json.data : json; // 두 가지 포맷 모두 지원
  // 🛡️ 어떤 변경 전이라도 무조건 현재 데이터를 백업
  backupCurrentData();
  let count = 0;
  EXPORT_KEYS.forEach(k => {
    if (data && data[k] !== undefined) {
      try {
        localStorage.setItem(k, JSON.stringify(data[k]));
        count++;
      } catch {}
    }
  });
  return count;
};

const importAllDataFromFile = (file) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const json = JSON.parse(e.target.result);
      const count = applyImportedData(json);
      if (count === 0) { alert('유효한 BUPP 데이터를 찾을 수 없습니다.'); return; }
      if (!confirm(`${count}개 데이터셋을 불러왔습니다.\n페이지를 새로고침해서 적용하시겠습니까?\n(현재 localStorage 데이터는 덮어쓰여집니다)`)) return;
      window.location.reload();
    } catch (err) {
      alert('JSON 파싱 실패: ' + (err?.message || err));
    }
  };
  reader.readAsText(file);
};

// JSON 로드 시도 — customUrl이 있으면 그 URL 사용, 없으면 저장된 GitHub URL → 기본값 순
const tryAutoLoadFromJson = async (force = false, customUrl = null) => {
  if (!force && localStorage.getItem(AUTO_LOAD_FLAG)) {
    console.log('[BUPP] 자동 로드 건너뜀 — 이미 초기화됨 (강제 재로드는 ↻ GitHub 클릭)');
    return false;
  }
  const rawUrl = customUrl || getGithubDataUrl();
  // 상대 경로면 현재 페이지 기준으로 절대 URL 변환
  const url = rawUrl.match(/^https?:\/\//) ? rawUrl : new URL(rawUrl, window.location.href).toString();
  console.log('[BUPP] JSON 로드 시도:', url);
  try {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) {
      console.warn('[BUPP] JSON 파일 없음 (HTTP ' + res.status + ') —', url);
      if (force) alert(`파일을 찾지 못했습니다 (HTTP ${res.status})\n\n시도한 URL:\n${url}\n\n파일이 정말 그 경로에 있는지 브라우저로 직접 열어보세요.`);
      localStorage.setItem(AUTO_LOAD_FLAG, 'no-file');
      return false;
    }
    const json = await res.json();
    const count = applyImportedData(json);
    console.log('[BUPP] JSON 로드 완료 —', count, '개 데이터셋 적용 —', url);
    localStorage.setItem(AUTO_LOAD_FLAG, count > 0 ? new Date().toISOString() : 'no-file');
    return count > 0;
  } catch (err) {
    console.error('[BUPP] JSON 로드 실패:', err);
    if (force) alert(`GitHub 데이터 로드 실패\n\n에러: ${err?.message || err}\n시도한 URL: ${url}\n\n흔한 원인:\n• 파일 경로 오류 → URL을 새 탭에서 직접 열어 확인\n• CORS 차단 → GitHub raw URL은 raw.githubusercontent.com 형식 사용\n• 네트워크 오류`);
    localStorage.setItem(AUTO_LOAD_FLAG, 'no-file');
    return false;
  }
};

// Firestore에 배열을 한 번에 푸시 (배치 — 최대 500개씩)
const pushArrayToFirestore = async (collectionName, items, onProgress) => {
  if (!Array.isArray(items)) return 0;
  const batchSize = 400;
  let pushed = 0;
  for (let i = 0; i < items.length; i += batchSize) {
    const batch = window.fbDB.batch();
    const chunk = items.slice(i, i + batchSize);
    chunk.forEach(item => {
      const id = item.id || window.fbDB.collection(collectionName).doc().id;
      const ref = window.fbDB.collection(collectionName).doc(id);
      batch.set(ref, { ...item, id });
    });
    await batch.commit();
    pushed += chunk.length;
    if (onProgress) onProgress(pushed, items.length);
  }
  return pushed;
};

// settings 컬렉션의 단일 문서 푸시
const pushObjectToFirestore = async (docId, data) => {
  await window.fbDB.collection('settings').doc(docId).set({ value: data, updatedAt: new Date().toISOString() });
};

  if (!confirm(`Firestore를 빈 상태로 초기화합니다 (멤버 ${SAMPLE_MEMBERS.length}명만 등록).\n\n⚠️ Firestore에 기존 데이터가 있다면 그대로 유지됩니다 (덮어쓰기 X).\n새로 시작하려면 먼저 Firestore Console에서 수동 삭제 후 진행하세요.\n\n계속하시겠습니까?`)) return;

// 현재 localStorage 전체 푸시
const migrateToFirestoreFull = async () => {
  // 현재 데이터 통계
  const stats = {};
  Object.entries(FIRESTORE_COLLECTION_MAP).forEach(([key, conf]) => {
    const raw = localStorage.getItem(key);
    if (raw) {
      try {
        const data = JSON.parse(raw);
        stats[conf.name + (conf.docId ? '/'+conf.docId : '')] = Array.isArray(data) ? `${data.length}건` : '1개';
      } catch {}
    }
  });
  const summary = Object.entries(stats).map(([k, v]) => `• ${k}: ${v}`).join('\n');
  if (!confirm(`현재 localStorage의 모든 데이터를 Firestore로 푸시합니다.\n\n${summary}\n\n⚠️ Firestore에 같은 id가 있으면 덮어쓰기됩니다.\n계속하시겠습니까?`)) return;
  try {
    let total = 0;
    for (const [key, conf] of Object.entries(FIRESTORE_COLLECTION_MAP)) {
      const raw = localStorage.getItem(key);
      if (!raw) continue;
      const data = JSON.parse(raw);
      if (conf.isArray && Array.isArray(data)) {
        const n = await pushArrayToFirestore(conf.name, data, (cur, tot) => {
          console.log(`[Migration] ${conf.name}: ${cur}/${tot}`);
        });
        total += n;
      } else if (conf.isObject) {
        await pushObjectToFirestore(conf.docId, data);
        total += 1;
      }
    }
    alert(`✅ 마이그레이션 완료 — 총 ${total}개 데이터 Firestore 푸시.\n\nFirebase Console에서 확인 가능.`);
  } catch (err) {
    console.error('[BUPP Migration] 전체 마이그레이션 실패:', err);
    alert('마이그레이션 실패: ' + (err?.message || err) + '\n\n콘솔(F12)에서 자세한 로그 확인.');
  }
};

/* ============================================================
   🔥 Firestore 실시간 동기화 훅
   - 컬렉션 onSnapshot으로 다른 사용자 변경 자동 반영
   - 로컬 setState 호출 → Firestore에 자동 write
   - localStorage는 오프라인 캐시 (defaultLoader가 fallback)
   ============================================================ */
const useFirestoreState = (collectionName, defaultLoader, options = {}) => {
  const { isObjectCollection = false, docId = null } = options;
  const [items, setItems] = useState(() => defaultLoader());

  useEffect(() => {
    if (!window.fbDB) return;
    let unsub;
    if (isObjectCollection) {
      unsub = window.fbDB.collection('settings').doc(docId).onSnapshot(
        (snap) => {
          if (snap.exists && snap.data().value !== undefined) {
            setItems(snap.data().value);
          }
        },
        (err) => console.error('[Firestore listen ' + docId + ']', err)
      );
    } else {
      unsub = window.fbDB.collection(collectionName).onSnapshot(
        (snap) => {
          const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          // Firestore에 데이터가 있으면 그것으로 덮어쓰기 (없으면 로컬 default 유지)
          if (docs.length > 0) setItems(docs);
        },
        (err) => console.error('[Firestore listen ' + collectionName + ']', err)
      );
    }
    return () => { if (unsub) unsub(); };
  }, [collectionName, docId, isObjectCollection]);

  // 로컬 변경 + Firestore 자동 write
  const setItemsSync = (updater) => {
    setItems(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      try {
        if (window.fbDB) {
          if (isObjectCollection) {
            window.fbDB.collection('settings').doc(docId).set({
              value: next,
              updatedAt: new Date().toISOString()
            }).catch(err => console.error('[Firestore write ' + docId + ']', err));
          } else {
            const nextIds = new Set();
            next.forEach(item => {
              const id = item.id || window.fbDB.collection(collectionName).doc().id;
              nextIds.add(id);
              window.fbDB.collection(collectionName).doc(id)
                .set({ ...item, id })
                .catch(err => console.error('[Firestore write ' + collectionName + '/' + id + ']', err));
            });
            // 삭제된 항목 처리
            prev.forEach(item => {
              if (item.id && !nextIds.has(item.id)) {
                window.fbDB.collection(collectionName).doc(item.id).delete()
                  .catch(err => console.error('[Firestore delete ' + collectionName + '/' + item.id + ']', err));
              }
            });
          }
        }
      } catch (err) {
        console.error('[Firestore sync ' + collectionName + ']', err);
      }
      return next;
    });
  };

  return [items, setItemsSync];
};
