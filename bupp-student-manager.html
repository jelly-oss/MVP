// 학생 데이터에서 자동 요약 추출
const buildReportAutoSummary = (student, schools, subjects, universities, programs) => {
  const recs = student.academicRecords || [];
  // 진행 중인 과목 (status 없음 시 final 비어있고 endDate 미래 또는 비어있음 → 진행중으로 간주)
  const today = new Date().toISOString().slice(0,10);
  const inProgress = recs.filter(r => !r.isPLE && (!r.final || (r.endDate && r.endDate >= today)));
  const inProgressNames = inProgress.map(r => {
    const sub = subjects.find(x => x.id === r.subjectId);
    return sub ? `${sub.code} (${sub.name})` : '';
  }).filter(Boolean);

  // 누적 학점
  const totalCredits = recs.reduce((sum, r) => sum + (parseFloat(r.credits) || 0), 0);

  // Top 6 평균 — 진행 중인 12학년 과목 대상 (현재 듣고 있는 과목만)
  const top6 = recs.filter(r => r.grade === '12' && r.top6);
  // 1년제(Year) 학기시스템은 midterm1·midterm2 두 개 모두 존재 → 평균을 미드텀 점수로 사용
  const isYearLong = (r) => {
    const school = schools.find(s => s.id === r.schoolId);
    const sys = r.semesterSystem || school?.semesterSystem || '';
    return sys.startsWith('Year');
  };
  // 진행 중인 Top6 12학년 과목 — endDate 미래 또는 final 없음
  const top6InProgress = top6.filter(r => !r.final || (r.endDate && r.endDate >= today));
  // 미드텀 점수: 1년제는 (m1+m2)/2, 학기제는 m1만
  const midtermScores = top6InProgress.map(r => {
    const m1 = parseFloat(r.midterm1);
    const m2 = parseFloat(r.midterm2);
    if (isYearLong(r)) {
      if (!isNaN(m1) && !isNaN(m2)) return (m1 + m2) / 2;
      if (!isNaN(m1)) return m1; // m2 아직 없으면 m1만
      return null;
    }
    return !isNaN(m1) ? m1 : null;
  }).filter(n => n !== null);
  // 파이널 점수 — final 입력된 과목만
  const finalScores = top6InProgress.map(r => {
    const f = parseFloat(r.final);
    return !isNaN(f) ? f : null;
  }).filter(n => n !== null);

  const top6MidtermAvg = midtermScores.length ? (midtermScores.reduce((a,b) => a+b, 0) / midtermScores.length).toFixed(2) : null;
  const top6FinalAvg = finalScores.length ? (finalScores.reduce((a,b) => a+b, 0) / finalScores.length).toFixed(2) : null;

  // 호환용 — 기존 코드가 참조하는 top6Avg (파이널 우선, 없으면 미드텀)
  const top6Avg = top6FinalAvg || top6MidtermAvg;

  // 출석 — 최근 행들의 지각/결석 합산
  const recentLate = recs.reduce((sum, r) => sum + (parseInt(r.late) || 0), 0);
  const recentAbsent = recs.reduce((sum, r) => sum + (parseInt(r.absent) || 0), 0);

  // 대학 지원 진행 중
  const apps = student.universityApplications || [];
  const activeApps = apps.filter(a => a.status === '지원완료' || a.status === '지원예정' || a.status === '대기');
  const accepted = apps.filter(a => a.status === '합격');
  const finalChoice = apps.find(a => a.finalChoice);

  // 진행 중인 EC
  const ecActive = (student.extracurriculars || []).filter(e => e.status === '진행중');

  // 출석률 추정 (지각 0.5 + 결석 1, 학생당 50개 max로 추정)
  const attendanceIssues = (recentLate * 0.5) + recentAbsent;
  const attendanceRate = Math.max(0, Math.min(100, 100 - (attendanceIssues * 2)));

  // EC 카테고리별 카운트
  const ecCounts = { '봉사활동':0, '학교클럽':0, '대회 및 수상':0, '특별 프로그램':0, '개별 특성화 활동':0 };
  let volunteerHours = 0;
  (student.extracurriculars||[]).forEach(e => {
    const cat = e.category || (typeof EC_TYPE_TO_CATEGORY !== 'undefined' ? EC_TYPE_TO_CATEGORY[e.type] : '');
    if (cat && ecCounts[cat] !== undefined) ecCounts[cat]++;
    if (cat === '봉사활동') volunteerHours += parseFloat(e.totalHours) || 0;
  });

  // 출결 — 학교 학기시스템에 따라 학기/학년/쿼터별로 그룹화
  const attendanceGroups = [];
  recs.forEach(r => {
    if (r.isPLE) return;
    const school = schools.find(s => s.id === r.schoolId);
    const sys = r.semesterSystem || school?.semesterSystem || '';
    let periodKey, periodLabel, sysLabel;
    const startYear = (r.startDate || '').substring(0, 4);
    const startMonth = parseInt((r.startDate || '').substring(5, 7)) || 0;
    if (sys.startsWith('Year')) {
      // 학년제 — 학년 + 학년도(9월 시작)
      const yearStart = startMonth >= 9 ? startYear : (parseInt(startYear) - 1).toString();
      periodKey = `${r.schoolId}-Y-G${r.grade}-${yearStart}`;
      periodLabel = `${r.grade}학년`;
      sysLabel = '학년';
    } else if (sys.startsWith('Semester')) {
      // 학기제 — Sem1(9~1월)/Sem2(2~6월)/Summer(7~8월)
      let seasonLabel;
      if (startMonth >= 8 && startMonth <= 12) seasonLabel = 'Sem1';
      else if (startMonth >= 1 && startMonth <= 6) seasonLabel = 'Sem2';
      else seasonLabel = 'Summer';
      periodKey = `${r.schoolId}-S-${startYear}-${seasonLabel}`;
      periodLabel = `${startYear} ${seasonLabel}`;
      sysLabel = '학기';
    } else if (sys.startsWith('Quarter')) {
      const q = Math.floor((startMonth - 1) / 3) + 1;
      periodKey = `${r.schoolId}-Q-${startYear}-Q${q}`;
      periodLabel = `${startYear} Q${q}`;
      sysLabel = '쿼터';
    } else {
      periodKey = `${r.schoolId}-X-${(r.startDate || '').substring(0,7)}`;
      periodLabel = (r.startDate || '').substring(0,7) || '미지정';
      sysLabel = '기간';
    }
    let g = attendanceGroups.find(gg => gg.key === periodKey);
    if (!g) {
      g = {
        key: periodKey, label: periodLabel, sysLabel,
        schoolName: school?.shortName || school?.name || '미지정',
        startDate: r.startDate || '',
        late: 0, absent: 0
      };
      attendanceGroups.push(g);
    }
    g.late += parseInt(r.late) || 0;
    g.absent += parseInt(r.absent) || 0;
  });
  // 시간순 정렬 + 추이 계산
  attendanceGroups.sort((a, b) => (a.startDate || '').localeCompare(b.startDate || ''));
  attendanceGroups.forEach((g, i) => {
    if (i === 0) { g.trend = 'first'; return; }
    const prev = attendanceGroups[i-1];
    const prevTotal = prev.late + prev.absent;
    const currTotal = g.late + g.absent;
    if (currTotal < prevTotal) g.trend = 'better';
    else if (currTotal === prevTotal) g.trend = 'same';
    else g.trend = 'worse';
  });

  // 대학 지원 funnel
  const funnelStages = [
    { label:'관심', count: apps.filter(a => a.status === '관심').length, color:'#cabaab' },
    { label:'지원예정', count: apps.filter(a => a.status === '지원예정').length, color:'#cb912f' },
    { label:'지원완료', count: apps.filter(a => a.status === '지원완료').length, color:'#0b6e99' },
    { label:'합격', count: apps.filter(a => a.status === '합격').length, color:'#0f7b6c' },
    { label:'최종', count: apps.filter(a => a.finalChoice).length, color:'#c20206' }
  ];

  // D-day 마일스톤 — 다음 5개 (today는 함수 상단에서 이미 선언됨)
  const milestoneSet = new Set();
  const milestones = [];
  apps.forEach(a => {
    const prog = programs.find(p => p.id === a.programId);
    const uni = universities.find(u => u.id === a.universityId);
    const uniName = uni?.shortName || uni?.name || '';
    if (prog?.supplementaryDeadline) {
      const key = `${prog.supplementaryDeadline}|${uniName}|sup`;
      if (!milestoneSet.has(key)) {
        milestoneSet.add(key);
        milestones.push({ date: prog.supplementaryDeadline, label: `${uniName} ${prog.supplementaryType || '추가서류'} 마감` });
      }
    }
    if (uni?.englishScoreDeadline) {
      const key = `${uni.englishScoreDeadline}|${uniName}|eng`;
      if (!milestoneSet.has(key)) {
        milestoneSet.add(key);
        milestones.push({ date: uni.englishScoreDeadline, label: `${uniName} 영어점수 마감` });
      }
    }
    if (a.draftDeadline) milestones.push({ date: a.draftDeadline, label: `${uniName} Draft 마감` });
  });
  // 학생 학업 메타에 있는 데드라인 추가
  if (student.passportExpiryDate) milestones.push({ date: student.passportExpiryDate, label: '여권 만료' });
  if (student.visaExpiryDate) milestones.push({ date: student.visaExpiryDate, label: '비자 만료' });
  if (student.insuranceEndDate) milestones.push({ date: student.insuranceEndDate, label: '보험 만료' });
  const sortedMilestones = milestones
    .filter(m => m.date >= today)
    .sort((a, b) => a.date.localeCompare(b.date))
    .slice(0, 5);

  // 이전 리포트들의 Top 6 평균 추적 (current report에 저장된 snapshot이 있다면)
  const reports = (student.reports || []).slice().sort((a,b) => (a.date||'').localeCompare(b.date||''));
  const top6History = reports.map(r => r._top6AvgSnapshot).filter(v => v !== undefined && v !== null && !isNaN(v));

  // 진행 중 과목 상세 (과목 코드·이름 칩용)
  const inProgressDetails = inProgress.map(r => {
    const sub = subjects.find(x => x.id === r.subjectId);
    return sub ? { id: r.id, code: sub.code, name: sub.name } : null;
  }).filter(Boolean);

  // OSSLT — 상태 + 응시 년월
  const ossltStatus = student.academic?.ossltStatus || '해당없음';
  const ossltExamYear = student.academic?.ossltExamYear || '';
  const ossltExamMonth = student.academic?.ossltExamMonth || '';
  const ossltExamLabel = (ossltExamYear && ossltExamMonth) ? `${ossltExamYear}년 ${ossltExamMonth}` : '';

  return {
    inProgressCount: inProgress.length,
    inProgressNames,
    inProgressDetails,
    totalCredits,
    top6Avg,
    top6MidtermAvg,
    top6FinalAvg,
    top6Count: top6.length,
    top6InProgressCount: top6InProgress.length,
    top6MidtermInputCount: midtermScores.length,
    top6FinalInputCount: finalScores.length,
    ossltStatus,
    ossltExamLabel,
    recentLate, recentAbsent,
    activeAppsCount: activeApps.length,
    acceptedCount: accepted.length,
    finalChoice: finalChoice ? (universities.find(u => u.id === finalChoice.universityId)?.shortName || universities.find(u => u.id === finalChoice.universityId)?.name) : null,
    ecActive: ecActive.map(e => e.activityName),
    attendanceRate, ecCounts, funnelStages,
    milestones: sortedMilestones,
    top6History,
    volunteerHours,
    attendanceGroups
  };
};

              <div className="flex flex-wrap gap-1">
                {summary.ecActive.slice(0, 5).map((name, i) => (
                  <span key={i} className="text-xs px-2 py-0.5 rounded" style={{background:'#faf3e3', color:'#760305'}}>{name}</span>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* 🎯 Top 6 — 미드텀/파이널 분리 */}
      <SectionTitle>Top 6 평균 <span className="text-xs font-normal text-gray-500 ml-1">현재 이수 중 12학년 과목 {summary.top6InProgressCount}과목</span></SectionTitle>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div className="notion-card p-4" style={{background:'#fff'}}>
          <div className="flex items-center justify-between mb-2">
            <div className="text-xs font-semibold text-gray-500">미드텀 평균</div>
            <span className="text-xs text-gray-400">{summary.top6MidtermInputCount}/{summary.top6InProgressCount}과목 입력</span>
          </div>
          {summary.top6MidtermAvg != null ? (
            <Fragment>
              <div className="text-3xl font-bold" style={{color:'#0b6e99'}}>{summary.top6MidtermAvg}</div>
              <div className="text-xs text-gray-500 mt-2">💡 1년제 과목은 (Midterm1 + Midterm2) ÷ 2로 평균 계산. 대학 조건부 합격(conditional offer)의 주요 기준이 됩니다.</div>
            </Fragment>
          ) : (
            <div className="text-sm text-gray-400 py-3">아직 미드텀 점수 입력된 과목이 없습니다.</div>
          )}
        </div>
        <div className="notion-card p-4" style={{background:'#fff'}}>
          <div className="flex items-center justify-between mb-2">
            <div className="text-xs font-semibold text-gray-500">파이널 평균</div>
            <span className="text-xs text-gray-400">{summary.top6FinalInputCount}/{summary.top6InProgressCount}과목 입력</span>
          </div>
          {summary.top6FinalAvg != null ? (
            <Fragment>
              <div className="text-3xl font-bold" style={{color:'#0f7b6c'}}>{summary.top6FinalAvg}</div>
              <div className="text-xs text-gray-500 mt-2">최종 입학 확정(unconditional offer) 판정 기준. 모든 과목 final이 입력되면 자동 갱신됩니다.</div>
            </Fragment>
          ) : (
            <div className="text-sm text-gray-400 py-3">아직 파이널 점수 입력된 과목이 없습니다.</div>
          )}
        </div>
      </div>

      {/* 꼬리표 — 최종 선택 학교 */}
      {summary.finalChoice && (
        <div className="text-sm mt-4 p-3 rounded" style={{background:'#faf3e3', border:'1px solid #e8c97a', color:'#760305'}}>
          🎓 최종 선택: <strong>{summary.finalChoice}</strong>
        </div>
      )}
    </div>
  );
};

const TabReport = ({ s, update, schools, subjects, universities=[], programs=[], invoices=[], currentUserName='', canEdit=true }) => {
  // 해당 학생의 인보이스 (linkedStudentId 기준, 발행된 것만 — 학부모용)
  const studentInvoices = invoices
    .filter(i => i.linkedStudentId === s.id && i.status !== 'draft' && i.status !== 'cancelled')
    .sort((a, b) => (b.issueDate||'').localeCompare(a.issueDate||''));
  const todayStr = new Date().toISOString().slice(0, 10);
  const list = s.reports || [];
  const [editing, setEditing] = useState(null); // null | object
  const summary = buildReportAutoSummary(s, schools, subjects, universities, programs);

  const upsert = (d) => {
    // 저장 시점의 Top 6 평균을 스냅샷으로 남김 → 트렌드 차트용
    const withSnapshot = { ...d, _top6AvgSnapshot: summary.top6Avg != null ? parseFloat(summary.top6Avg) : null };
    const next = d.id
      ? list.map(r => r.id === d.id ? withSnapshot : r)
      : [...list, { ...withSnapshot, id: uid() }];
    update({ reports: next });
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 리포트를 삭제하시겠습니까?')) return;
    update({ reports: list.filter(r => r.id !== id) });
  };

  // 최신순 정렬
  const sorted = [...list].sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  return (
    <Section
      title="📝 리포트 (학부모 공유)"
      count={list.length}
      right={canEdit && (
        <button className="btn-primary" onClick={() => setEditing(blankReport())}>+ 새 리포트 작성</button>
      )}
    >
      <div className="text-xs text-gray-500 mb-4 p-3 rounded" style={{background:'#faf7f3', border:'1px solid var(--border)'}}>
        💡 학생 데이터 자동 요약(누적 학점·Top 6·출석·봉사시간·출결 추이·D-day·대학 깔때기·EC 분포)은 <strong>👤 기본 정보 탭 상단</strong>에서 볼 수 있습니다. 여기 리포트 탭에는 인보이스 · 납부 현황과 작성·누적된 리포트 카드만 표시됩니다.
      </div>

      {/* 💰 인보이스 · 납부 현황 (학부모 전용) — 모든 발행된 인보이스 타임라인 */}
      {studentInvoices.length > 0 && (
        <div className="mb-4">
          <div className="font-semibold mb-3 flex items-center gap-2" style={{color:'#202731'}}>
            <span style={{fontSize:18}}>💰</span> 인보이스 · 납부 현황 ({studentInvoices.length}건)
          </div>
          <div className="space-y-3">
            {studentInvoices.map(inv => {
              const isPaid = inv.status === 'paid';
              const isRefunded = inv.status === 'refunded';
              const isSent = inv.status === 'sent';
              const isOverdue = isSent && inv.dueDate && inv.dueDate < todayStr;
              // 카드 색상 분기
              const cardStyle = isPaid ? {bg:'#ddedea', border:'#0f7b6c', accent:'#0f7b6c', label:'✓ 납부 확인 완료'}
                : isRefunded ? {bg:'#f3e8ff', border:'#760305', accent:'#760305', label:'↺ 환불 처리'}
                : isOverdue ? {bg:'#fbe0e0', border:'#c20206', accent:'#c20206', label:'⚠️ 납부 기한 초과'}
                : {bg:'#fff3d9', border:'#cb912f', accent:'#a47007', label:'📨 인보이스 발행 — 납부 대기'};
              const dDays = isSent && inv.dueDate ? Math.ceil((new Date(inv.dueDate) - new Date(todayStr)) / 86400000) : null;
              return (
                <div key={inv.id} className="notion-card p-4" style={{background:cardStyle.bg, borderColor:cardStyle.border, borderWidth:1}}>
                  {/* 상단 — 상태 + 번호 + 금액 */}
                  <div className="flex items-start justify-between gap-3 flex-wrap mb-3">
                    <div>
                      <div className="font-bold text-base" style={{color:cardStyle.accent}}>{cardStyle.label}</div>
                      <div className="text-xs text-gray-600 mt-0.5">

                    </div>
                    <div className="text-right">
                      <div className="text-lg font-bold" style={{color:'#202731'}}>{(inv.grossTotal || 0).toLocaleString()} {inv.currency}</div>
                      <div className="text-xs text-gray-500">세금 포함 청구액</div>
                    </div>
                  </div>

                  {/* 본문 — 상태별 정보 */}
                  {isPaid && (
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm pt-3" style={{borderTop:'1px solid rgba(15,123,108,0.2)'}}>
                      <div><div className="text-gray-500 text-xs mb-1">📅 입금 일자</div><div className="font-semibold">{inv.paidAt || '-'}</div></div>
                      <div><div className="text-gray-500 text-xs mb-1">✅ 확인 일자</div><div className="font-semibold" style={{color:'#0f7b6c'}}>{inv.paymentConfirmedAt || '-'}</div></div>
                      <div><div className="text-gray-500 text-xs mb-1">수령 금액</div><div className="font-semibold">{(inv.paidAmount || inv.grossTotal || 0).toLocaleString()} {inv.currency}</div></div>
                      <div><div className="text-gray-500 text-xs mb-1">수령 방법</div><div className="font-semibold">{inv.paymentReceivedMethod || '-'}</div></div>
                    </div>
                  )}
                  {isSent && (
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-3 text-sm pt-3" style={{borderTop:'1px solid rgba(203,145,47,0.2)'}}>
                      <div>
                        <div className="text-gray-500 text-xs mb-1">📅 납부 기한</div>
                        <div className="font-semibold" style={{color:isOverdue?'#c20206':'#202731'}}>{inv.dueDate || '미지정'}</div>
                      </div>
                      <div>
                        <div className="text-gray-500 text-xs mb-1">남은 일수</div>
                        <div className="font-semibold" style={{color:isOverdue?'#c20206':dDays!=null&&dDays<=7?'#a47007':'#202731'}}>
                          {dDays == null ? '-' : isOverdue ? `${Math.abs(dDays)}일 초과` : dDays === 0 ? '오늘 마감' : `${dDays}일 남음`}
                        </div>
                      </div>
                      <div>
                        <div className="text-gray-500 text-xs mb-1">담당자</div>
                        <div className="font-semibold">{inv.createdBy || '-'}</div>
                      </div>
                    </div>
                  )}
                  {isRefunded && (
                    <div className="text-sm pt-3" style={{borderTop:'1px solid rgba(118,3,5,0.2)', color:'#760305'}}>
                      이 인보이스는 환불 처리되었습니다. 자세한 사항은 BUPP 담당자에게 문의해주세요.
                    </div>
                  )}

                  {/* BUPP 메모 */}
                  {(inv.paymentMemo || inv.publicMemo) && (
                    <div className="mt-3 p-3 rounded" style={{background:'#fff', border:'1px solid #cabaab'}}>
                      <div className="text-xs text-gray-500 mb-1">📝 BUPP 안내</div>
                      <div className="text-sm whitespace-pre-wrap" style={{color:'#202731'}}>{inv.paymentMemo || inv.publicMemo}</div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* (구) 자동 요약 풀세트는 기본정보로 이동됨 */}
      <div style={{display:'none'}}>
        <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4">
          {/* 누적 학점 프로그레스 */}
          <div className="notion-card p-3" style={{ background:'#faf7f3' }}>
            <div className="text-xs text-gray-500 mb-1">🎓 누적 학점</div>
            <div className="text-2xl font-bold" style={{color:'#c20206'}}>{summary.totalCredits}<span className="text-sm text-gray-400"> / 30</span></div>
            <div className="mt-2">
              <ProgressBar value={summary.totalCredits} max={30} color="#c20206" showLabel={false}/>
              <div className="text-xs text-gray-500 mt-1">OSSD 졸업 기준</div>
            </div>
          </div>

          {/* Top 6 평균 게이지 */}
          <div className="notion-card p-3 flex flex-col items-center" style={{ background:'#faf7f3' }}>
            <div className="text-xs text-gray-500 mb-1 self-start">🎯 Top 6 평균</div>
            {summary.top6Avg != null
              ? <Donut percent={parseFloat(summary.top6Avg)} color="#c20206" subLabel={`${summary.top6Count}/6`}/>
              : <div className="text-sm text-gray-400 py-4">미선정</div>}
          </div>

          {/* 출석률 도넛 (전체 합산) */}
          <div className="notion-card p-3 flex flex-col items-center" style={{ background:'#faf7f3' }}>
            <div className="text-xs text-gray-500 mb-1 self-start">📅 출석률 (누적)</div>
            <Donut
              percent={summary.attendanceRate}
              color={summary.attendanceRate >= 95 ? '#0f7b6c' : summary.attendanceRate >= 90 ? '#cb912f' : '#c20206'}
              subLabel={`지각${summary.recentLate}·결석${summary.recentAbsent}`}
            />
          </div>

          {/* 봉사 시간 프로그레스 — 졸업 조건 40h */}
          <div className="notion-card p-3" style={{ background:'#faf7f3' }}>
            <div className="text-xs text-gray-500 mb-1">🤝 봉사 시간</div>
            <div className="text-2xl font-bold" style={{color: summary.volunteerHours >= 40 ? '#0f7b6c' : '#c20206'}}>
              {summary.volunteerHours}<span className="text-sm text-gray-400"> / 40h</span>
            </div>
            <div className="mt-2">
              <ProgressBar
                value={Math.min(summary.volunteerHours, 40)} max={40}
                color={summary.volunteerHours >= 40 ? '#0f7b6c' : summary.volunteerHours >= 20 ? '#cb912f' : '#c20206'}
                showLabel={false}
              />
              <div className="text-xs text-gray-500 mt-1">
                {summary.volunteerHours >= 40 ? '✓ 졸업 조건 충족' : `${40 - summary.volunteerHours}h 부족`}
              </div>
            </div>
          </div>

          {/* 진행 과목 수 + 트렌드 */}
          <div className="notion-card p-3" style={{ background:'#faf7f3' }}>
            <div className="text-xs text-gray-500 mb-1">📚 진행 중 과목</div>
            <div className="text-2xl font-bold" style={{color:'#c20206'}}>{summary.inProgressCount}</div>
            {summary.top6Avg != null && (
              <div className="mt-2">
                <TrendIndicator
                  values={summary.top6History}
                  current={parseFloat(summary.top6Avg)}
                  label="Top6"
                  format={v => Number(v).toFixed(1)}
                />
              </div>
            )}
          </div>
        </div>

        {/* 출결 학기/학년/쿼터별 추이 */}
        {summary.attendanceGroups.length > 0 && (
          <div className="notion-card p-3 mb-4" style={{ background:'#faf7f3' }}>
            <div className="text-xs font-semibold mb-3" style={{color:'#760305'}}>📅 출결 추이 (학교 학기시스템 기준 — 개선/동일/악화)</div>
            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2">
              {summary.attendanceGroups.map(g => {
                const total = g.late + g.absent;
                const trendCfg = {
                  better: { color:'#0f7b6c', bg:'#ddedea', icon:'↗', label:'개선' },
                  worse: { color:'#c20206', bg:'#fbe0e0', icon:'↘', label:'악화' },
                  same: { color:'#787774', bg:'#f5f5f5', icon:'→', label:'동일' },
                  first: { color:'#cabaab', bg:'#fff', icon:'•', label:'시작' }
                }[g.trend];
                return (
                  <div key={g.key} className="notion-card p-2 text-xs" style={{ background: trendCfg.bg, borderColor: trendCfg.color, borderWidth:1 }}>
                    <div className="flex items-start justify-between gap-1">
                      <div>
                        <div className="font-semibold" style={{color:'#202731'}}>{g.label}</div>
                        <div className="text-gray-500 truncate" style={{fontSize:10, maxWidth:120}}>{g.schoolName}</div>
                      </div>
                      <span className="badge b-gray text-xs" style={{padding:'1px 4px', fontSize:9}}>{g.sysLabel}</span>
                    </div>
                    <div className="flex items-center justify-between mt-2 text-xs">
                      <span>지각 <strong style={{color:'#202731'}}>{g.late}</strong></span>
                      <span>결석 <strong style={{color:'#202731'}}>{g.absent}</strong></span>
                    </div>
                    <div className="mt-1 text-center font-semibold" style={{color:trendCfg.color, fontSize:11}}>
                      {trendCfg.icon} {trendCfg.label} {g.trend !== 'first' && `(누계 ${total})`}
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="text-xs text-gray-500 mt-2">💡 학년제 → 학년별 / 학기제 → 학기별(Sem1·Sem2·Summer) / 쿼터제 → Q1~Q4 단위로 자동 그룹화됩니다.</div>
          </div>
        )}

        {/* Row 2: D-day 마일스톤 */}
        {summary.milestones.length > 0 && (
          <div className="mb-4">
            <div className="text-xs font-semibold mb-2" style={{color:'#760305'}}>⏰ 다가오는 마일스톤 (D-day)</div>
            <div className="flex gap-2 flex-wrap">
              {summary.milestones.map((m, i) => (
                <DDayChip key={i} date={m.date} label={m.label}/>
              ))}
            </div>
          </div>
        )}

        {/* Row 3: 대학 지원 깔때기 + EC 카테고리 분포 */}
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-2">
          {(summary.activeAppsCount > 0 || summary.acceptedCount > 0) && (
            <div className="notion-card p-3" style={{ background:'#faf7f3' }}>
              <div className="text-xs font-semibold mb-2" style={{color:'#760305'}}>🎯 대학 지원 단계 (Funnel)</div>
              <UniFunnel stages={summary.funnelStages}/>
            </div>
          )}
          <div className="notion-card p-3" style={{ background:'#faf7f3' }}>
            <div className="text-xs font-semibold mb-2" style={{color:'#760305'}}>🌟 EC 카테고리 분포</div>
            <EcDistribution counts={summary.ecCounts}/>
          </div>
        </div>

        {/* 진행 과목/EC 텍스트 요약 (꼬리표) */}
        <div className="text-xs text-gray-600 pt-3" style={{ borderTop:'1px solid #cabaab' }}>
          {summary.inProgressNames.length > 0 && <div className="mb-1">📚 진행 중: {summary.inProgressNames.slice(0,5).join(', ')}{summary.inProgressNames.length > 5 && ` 외 ${summary.inProgressNames.length - 5}`}</div>}
          {summary.ecActive.length > 0 && <div className="mb-1">🌟 진행 중 EC: {summary.ecActive.join(', ')}</div>}
          {summary.finalChoice && <div>🎓 최종 선택: <strong style={{color:'#c20206'}}>{summary.finalChoice}</strong></div>}
        </div>
      </div>

      {/* 편집 폼 */}
      {editing && (
        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold text-base mb-4">{editing.id ? '리포트 수정' : '새 리포트 작성'}</h3>
          <ReportEditor rep={editing} students={[s]} schools={schools} subjects={subjects} universities={universities} programs={programs}
            currentUserName={currentUserName}
            onSave={upsert} onCancel={() => setEditing(null)}/>
        </div>
      )}

      {/* 리포트 리스트 */}
      {sorted.length === 0 ? (
        <div className="text-sm text-gray-400 p-6 text-center">아직 작성된 리포트가 없습니다.</div>
      ) : sorted.map(r => (
        <ReportCard key={r.id} rep={r} onEdit={setEditing} onRemove={remove}/>
      ))}
    </Section>
  );
};

// G. 내부 메모 (현재 UI에서 제거됨, 데이터 모델은 보존 — 추후 관리자 전용 DB로 분리 예정)

const StudentDetail = ({ student, onBack, onUpdate, onDelete, customOptions, addOption, removeOption, schools, subjects, universities=[], programs=[], trackGroups=[], accommodations=[], invoices=[], ecMasters=[], role='admin' }) => {
  const allTabs = [
    { id:'dashboard', label:'대시보드' },
    { id:'basic', label:'기본 정보' },
    { id:'academic', label:'공인 점수' },
    { id:'roadmap', label:'대입 로드맵' },
    { id:'ec', label:'EC 관리' },
    { id:'accom', label:'숙소' },
    { id:'uni', label:'대학 지원' },
    { id:'report', label:'리포트' },
  ];
  const visibleTabIds = VISIBLE_TABS[role] || allTabs.map(t => t.id);
  const tabs = allTabs.filter(t => visibleTabIds.includes(t.id));
  const [tab, setTab] = useState(tabs[0]?.id || 'basic');
  // 역할이 바뀌어 현재 탭이 비활성화되면 첫 번째 가시 탭으로 fallback
  useEffect(() => { if (!visibleTabIds.includes(tab)) setTab(tabs[0]?.id || 'basic'); }, [role]);
  const canEdit = role === 'admin' || role === 'bu_staff';
  const update = (patch) => { if (canEdit) onUpdate({ ...student, ...patch }); };

  const initials = (student.koreanName || student.englishName || '?').slice(0,2);

  return (
    <div className="max-w-[1300px] mx-auto px-8 py-6">
      {/* 상단 바 */}
      <div className="flex items-center justify-between mb-6">
        <button className="btn-ghost" onClick={onBack}>← 학생 목록</button>
        {canEdit && (
          <button className="btn-danger" onClick={() => { if (confirm(`${student.koreanName} 학생 정보를 삭제하시겠습니까?`)) onDelete(student.id); }}>학생 삭제</button>
        )}
      </div>

      {/* 헤더 — Design Handoff hd-profile */}
      <div className="hd-profile mb-4">
        <div className="hd-pava">{initials}</div>
        <div className="hd-pmain">
          <div className="hd-pname">
            <h1>{student.koreanName || '이름 없음'}</h1>
            {student.englishName && <span className="en">{student.englishName}</span>}
            {student.admissionStatus === '재학중' ? (
              <span className="hd-chip live"><span className="hd-sdot"></span>{student.admissionStatus}</span>
            ) : student.admissionStatus && (
              <span className="hd-chip" style={{color:'#fff', background:'rgba(255,255,255,.12)'}}>{student.admissionStatus}</span>
            )}
            {student.program && <span className="hd-chip tier">{student.program}</span>}
            {student.cohort && <span className="hd-chip edu">{student.cohort}</span>}
          </div>
          <div className="hd-pmeta">
            {student.currentSchool && <span>학교 <b>{student.currentSchool}</b></span>}
            {student.actualGrade && <span>학년 <b>{student.actualGrade}</b></span>}
            {student.accommodation?.type && <span>숙소 <b>{student.accommodation.type}</b></span>}
          </div>
        </div>
      </div>

      {/* 탭 — Design Handoff hd-tabs */}
      <div className="hd-tabs sticky top-0 z-10">
        {tabs.map(t => (
          <button
            key={t.id}
            className={`hd-tab ${tab === t.id ? 'on':''}`}
            onClick={() => setTab(t.id)}
          >{t.label}</button>
        ))}
      </div>

      {tab === 'dashboard' && (
        <div className="px-1 pt-4">
          <StudentDataSummary student={student} schools={schools} subjects={subjects} universities={universities} programs={programs}/>
        </div>
      )}
      {tab === 'basic' && <TabBasic s={student} update={update} customOptions={customOptions} addOption={addOption} removeOption={removeOption} schools={schools} subjects={subjects} universities={universities} programs={programs} role={role}/>}
      {tab === 'academic' && <TabAcademic s={student} update={update} role={role}/>}
      {tab === 'roadmap' && <TabRoadmap s={student} update={update} schools={schools} subjects={subjects} role={role}/>}
      {tab === 'ec' && <TabEC s={student} update={update} ecMasters={ecMasters} role={role}/>}
      {tab === 'accom' && <TabAccommodation s={student} update={update} accommodations={accommodations} role={role}/>}
      {tab === 'uni' && <TabUni s={student} update={update} schools={schools} subjects={subjects} universities={universities} programs={programs} trackGroups={trackGroups}/>}
      {tab === 'report' && <TabReport s={student} update={update} schools={schools} subjects={subjects} universities={universities} programs={programs} invoices={invoices} canEdit={canEdit}/>}

      <div className="text-xs text-gray-400 text-center py-6">
        변경사항은 자동으로 브라우저에 저장됩니다 · BUPP Student Manager v1.0
      </div>
    </div>
  );
};

// 학생 등록 신청 폼 — 7개 섹션
const ApplicationEditor = ({ app, accommodations, members, onSave, onCancel, currentUserName='' }) => {
  const [draft, setDraft] = useState(() => ({ ...emptyApplication(), submittedBy: currentUserName, ...app }));
  // 외부에서 다른 신청서로 전환되면 draft도 따라가도록 (편집 중인 app.id 변경)
  useEffect(() => { setDraft({ ...emptyApplication(), submittedBy: currentUserName, ...app }); }, [app?.id]);
  const set = (k, v) => setDraft(prev => ({ ...prev, [k]: v }));

  // 가족 멤버 다중
  const updateFamily = (idx, k, v) => {
    const arr = [...(draft.familyMembers || [])];
    arr[idx] = { ...arr[idx], [k]: v };
    setDraft({ ...draft, familyMembers: arr });
  };
  const addFamily = () => setDraft({ ...draft, familyMembers: [...(draft.familyMembers||[]), { relationship:'', name:'', dateOfBirth:'', homeAddress:'', city:'', country:'', contactNumber:'', email:'' }] });
  const removeFamily = (idx) => {
    const arr = [...(draft.familyMembers || [])]; arr.splice(idx, 1);
    setDraft({ ...draft, familyMembers: arr });
  };

  // 숙소 캐스케이드
  const subAccomOpts = ACCOM_SUBCATEGORIES[draft.accommodationCategory] || [];
  const matchingAccoms = accommodations.filter(a =>
    a.category === draft.accommodationCategory &&
    (!draft.accommodationSubCategory || a.subCategory === draft.accommodationSubCategory)
  );

  const handleSave = () => {
    try {
      if (!draft.koreanName?.trim()) { alert('학생 한글 이름을 입력해주세요.'); return; }
      // program은 빈 값이어도 저장 허용 (편집 도중 잠시 비울 수 있음)
      const payload = { ...draft, submittedAt: draft.submittedAt || new Date().toISOString().slice(0,10) };
      onSave(payload);
    } catch (err) {
      console.error('[ApplicationEditor handleSave] 실패:', err);
      alert('저장 중 오류가 발생했습니다. 브라우저 콘솔(F12)을 확인해주세요.\n' + (err?.message || err));
    }
  };

  return (
    <div className="space-y-4">
      {/* Office use */}
      <div className="notion-card p-3" style={{ background:'#fbe0e0', border:'1px solid #f3c4c4' }}>
        <div className="text-xs font-semibold mb-2" style={{color:'#c20206'}}>Office use only</div>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          <Field label="Invoice #"><TextInput value={draft.invoiceNumber} onChange={(v) => set('invoiceNumber', v)} placeholder="(인보이스 생성 후 자동)"/></Field>
          <Field label="Student #"><TextInput value={draft.studentNumber} onChange={(v) => set('studentNumber', v)}/></Field>
          <Field label="기수"><Select value={draft.cohort} onChange={(v) => set('cohort', v)} options={BUPP_COHORTS}/></Field>
          <Field label="담당 (브듀쌤)">
            <Select value={draft.assignedManager} onChange={(v) => set('assignedManager', v)}
              options={members.filter(m => m.role === 'admin' || m.role === 'bu_staff').map(m => m.name)}/>
          </Field>
        </div>
      </div>

      {/* Section 1 */}
      <div className="notion-card p-4">
        <h4 className="font-semibold mb-3" style={{color:'#c20206'}}>1. Student Information</h4>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
          <Field label="한글 이름 *"><TextInput value={draft.koreanName} onChange={(v) => set('koreanName', v)} placeholder="예) 김재준"/></Field>
          <Field label="Family Name (English)"><TextInput value={draft.familyName} onChange={(v) => set('familyName', v)} placeholder="예) Kim"/></Field>
          <Field label="Given Name (English)"><TextInput value={draft.givenName} onChange={(v) => set('givenName', v)} placeholder="예) Jaejun"/></Field>
          <Field label="Gender"><Select value={draft.gender} onChange={(v) => set('gender', v)} options={['Male', 'Female']}/></Field>
          <Field label="Date of Birth (yyyy-mm-dd)"><TextInput type="date" value={draft.dateOfBirth} onChange={(v) => set('dateOfBirth', v)}/></Field>
          <Field label="Address" span={2}><TextInput value={draft.address} onChange={(v) => set('address', v)}/></Field>
          <Field label="City"><TextInput value={draft.city} onChange={(v) => set('city', v)}/></Field>
          <Field label="Country"><TextInput value={draft.country} onChange={(v) => set('country', v)}/></Field>
          <Field label="Contact Number"><TextInput value={draft.contactNumber} onChange={(v) => set('contactNumber', v)}/></Field>
          <Field label="Email"><TextInput value={draft.email} onChange={(v) => set('email', v)} type="email"/></Field>
          <Field label="Name of Agency" span={2}><TextInput value={draft.agencyName} onChange={(v) => set('agencyName', v)}/></Field>
        </div>
      </div>

      {/* Section 2 */}
      <div className="notion-card p-4">
        <h4 className="font-semibold mb-3" style={{color:'#c20206'}}>2. Immigration Status of Applicant</h4>

              <Field label="관계"><TextInput value={fm.relationship} onChange={(v) => updateFamily(i, 'relationship', v)} placeholder="부, 모, 가디언, 친척 등"/></Field>

              <Field label="Email" span={2}><TextInput value={fm.email} onChange={(v) => updateFamily(i, 'email', v)} type="email"/></Field>
            </div>
            <div className="text-xs text-gray-400 mt-2">💡 가족 주소는 학생 정보(Section 1)의 주소와 동일합니다 — 별도 입력 불필요.</div>
          </div>

    <div className="space-y-3">
      <div className="flex items-center justify-between">
        <button className="btn-ghost" onClick={onClose}>← 목록</button>
        <div className="flex gap-2">
          {invoice
            ? <button className="btn-primary" onClick={() => onViewInvoice(invoice)}>🧾 인보이스 보기 / 다운로드</button>
            : (canInvoice && <button className="btn-primary" onClick={() => onCreateInvoice(app)}>💰 인보이스 생성</button>)
          }
          <button className="btn-ghost" onClick={() => onEdit(app)}>수정</button>
        </div>
      </div>

      {/* 🔗 연결된 학생 상태 */}
      {linkedStudent ? (
        <div className="notion-card p-3" style={{background:'#ddedea', borderColor:'#0f7b6c'}}>

              ✓ <strong>학생 목록에 연결됨</strong> — {linkedStudent.koreanName}

              <span className="ml-2 text-xs text-gray-500">현재상태: <Badge value={linkedStudent.admissionStatus}/></span>

            <div className="text-xs text-gray-500">신청서를 수정하면 학생 정보도 함께 동기화됩니다.</div>

          <div className="text-sm">⚠️ 학생 목록과 아직 연결되지 않았습니다. 신청서를 한 번 더 저장하면 학생이 자동으로 생성됩니다.</div>

          <Badge value={APPLICATION_STATUS_LABEL[app.status]}/>
          {app.cohort && <Badge value={app.cohort}/>}
          {app.program && <Badge value={app.program}/>}
        </div>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
          {app.studentNumber && <div><strong className="text-gray-500">Student #</strong><div>{app.studentNumber}</div></div>}
          {app.gender && <div><strong className="text-gray-500">Gender</strong><div><Badge value={app.gender}/></div></div>}
          {app.dateOfBirth && <div><strong className="text-gray-500">D.O.B</strong><div>{app.dateOfBirth}</div></div>}
          {app.email && <div><strong className="text-gray-500">Email</strong><div>{app.email}</div></div>}
          {app.contactNumber && <div><strong className="text-gray-500">전화</strong><div>{app.contactNumber}</div></div>}
          {app.assignedManager && <div><strong className="text-gray-500">담당</strong><div>{app.assignedManager}</div></div>}
          {app.agencyName && <div><strong className="text-gray-500">Agency</strong><div>{app.agencyName}</div></div>}

      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
