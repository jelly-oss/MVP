  const [currentUserId, setCurrentUserId] = useState(() => loadCurrentUserId()); // 로컬 전용 (사용자 시뮬레이션)
  const [universities, setUniversities] = useFirestoreState('universities', loadUniversities);
  const [programs, setPrograms] = useFirestoreState('programs', loadPrograms);
  const [trackGroups, setTrackGroups] = useFirestoreState('trackGroups', loadTrackGroups);
  const [accommodations, setAccommodations] = useFirestoreState('accommodations', loadAccommodations);
  const [applications, setApplications] = useFirestoreState('applications', loadApplications);
  const [invoices, setInvoices] = useFirestoreState('invoices', loadInvoices);
  const [partners, setPartners] = useFirestoreState('partners', loadPartners);
  const [invoiceItems, setInvoiceItems] = useFirestoreState('invoiceItems', loadInvoiceItems);
  const [ecMasters, setEcMasters] = useFirestoreState('ecMasters', loadEcMasters);
  const [pdfAccom, setPdfAccom] = useState(null); // PDF 미리보기 대상
  const [pdfInvoice, setPdfInvoice] = useState(null); // 인보이스 PDF 미리보기
  const [invoiceEditing, setInvoiceEditing] = useState(null); // 인보이스 편집 대상 (app or invoice)
  const [view, setView] = useState('students'); // students | schools | subjects | members | matrix | uniData | accomData | applications | invoices | partners
  const [openId, setOpenId] = useState(null);
  const [openPartnerId, setOpenPartnerId] = useState(null);
  const [showNew, setShowNew] = useState(false);

  // 🚀 첫 방문 시 GitHub의 bupp-data.json 자동 시드 (있으면 새로고침)
  useEffect(() => {
    tryAutoLoadFromJson().then(loaded => {
      if (loaded) {
        alert('GitHub의 bupp-data.json 데이터를 불러왔습니다. 페이지를 새로고침합니다.');
        window.location.reload();
      }
    });
  }, []);

  useEffect(() => { saveStudents(students); }, [students]);
  useEffect(() => { saveOptions(customOptions); }, [customOptions]);
  useEffect(() => { saveSchools(schools); }, [schools]);
  useEffect(() => { saveSubjects(subjects); }, [subjects]);
  useEffect(() => { saveMembers(members); }, [members]);
  useEffect(() => { saveCurrentUserId(currentUserId); }, [currentUserId]);
  useEffect(() => { saveUniversities(universities); }, [universities]);
  useEffect(() => { savePrograms(programs); }, [programs]);
  useEffect(() => { saveTrackGroups(trackGroups); }, [trackGroups]);
  useEffect(() => { saveAccommodations(accommodations); }, [accommodations]);
  useEffect(() => { saveApplications(applications); }, [applications]);
  useEffect(() => { saveInvoices(invoices); }, [invoices]);
  useEffect(() => { savePartners(partners); }, [partners]);
  useEffect(() => { saveInvoiceItems(invoiceItems); }, [invoiceItems]);
  useEffect(() => { saveEcMasters(ecMasters); }, [ecMasters]);

  // 현재 사용자 정보 + 권한
  // 🔐 인증된 사용자를 현재 사용자로 사용 (authMember 우선, 없으면 시뮬레이션 기존 방식)
  const currentUser = authMember
    ? (members.find(m => (m.email || '').toLowerCase() === (authMember.email || '').toLowerCase()) || authMember)
    : (members.find(m => m.id === currentUserId) || members[0]);
  const role = currentUser?.role || 'admin';
  const access = PAGE_ACCESS[role] || PAGE_ACCESS.admin;
  const scope = STUDENT_SCOPE[role] || 'all';

  // 학생 접근 범위 적용
  const visibleStudents = scope === 'all'
    ? students
    : students.filter(s => (currentUser?.linkedStudentIds || []).includes(s.id));

  // 역할이 접근 불가 페이지에 있으면 자동 redirect
  // view → 접근 권한 키 매핑 (별칭 처리)
  const VIEW_ACCESS_KEY = { invoiceItems: 'accounting', accounting: 'accounting' };
  useEffect(() => {
    const accKey = VIEW_ACCESS_KEY[view] || view;
    if (!access[accKey] && view !== 'students') setView('students');
  }, [view, role]);
  // 학생 상세 진입 시 권한 검증
  useEffect(() => {
    if (openId && scope !== 'all' && !visibleStudents.find(s => s.id === openId)) {
      setOpenId(null);
    }
  }, [openId, currentUserId]);

  // 콜드스타트 시드 — customOptions가 완전히 비어있을 때만 학생 데이터에서 자동 시드.
  // (한 번이라도 옵션이 있으면, 사용자가 [×]로 삭제한 항목이 부활하지 않도록 자동 시드 건너뜀)
  useEffect(() => {
    const isEmpty = !customOptions?.category?.length
                 && !customOptions?.cohort?.length
                 && !customOptions?.currentSchool?.length;
    if (!isEmpty) return; // 이미 사용자가 정리한 상태 — 건드리지 않음
    if (students.length === 0) return; // 학생도 없으면 시드할 것도 없음
    const next = { category: new Set(), cohort: new Set(), currentSchool: new Set() };
    students.forEach(s => {
      if (s.category) next.category.add(s.category);
      if (s.cohort) next.cohort.add(s.cohort);
      if (s.currentSchool) next.currentSchool.add(s.currentSchool);
    });
    setCustomOptions({
      category: Array.from(next.category),
      cohort: Array.from(next.cohort),
      currentSchool: Array.from(next.currentSchool)
    });
    // eslint-disable-next-line
  }, [students.length]);

  const addOption = (field, value) => {
    if (!value || !field) return;
    setCustomOptions(prev => {
      const list = prev[field] || [];
      if (list.includes(value)) return prev;
      return { ...prev, [field]: [...list, value] };
    });
  };
  const removeOption = (field, value) => {
    setCustomOptions(prev => ({
      ...prev,
      [field]: (prev[field] || []).filter(v => v !== value)
    }));
  };

  const updateStudent = (updated) => {
    setStudents(prev => prev.map(s => s.id === updated.id ? updated : s));
  };
  const createStudent = (s) => {
    // 새 학생 생성 시 새로운 값들을 옵션 목록에 자동 등록
    if (s.category) addOption('category', s.category);
    if (s.cohort) addOption('cohort', s.cohort);
    if (s.currentSchool) addOption('currentSchool', s.currentSchool);
    setStudents(prev => [s, ...prev]);
    setShowNew(false);
    setOpenId(s.id);
  };
  const deleteStudent = (id) => {
    setStudents(prev => prev.filter(s => s.id !== id));
    setOpenId(null);
  };

  // 🔄 신청서 → 학생 자동 동기화
  // 1) 이미 연결된 학생 있으면 → 핵심 필드(이름/기수/연락처/숙소 등) 업데이트
  // 2) 없고 동명이인 매칭되면 → 그 학생에 연결
  // 3) 없고 매칭도 안 되면 → 새 학생 생성 (admissionStatus='신규')
  // 반환: 동기화된 학생 ID
  const syncApplicationStudent = (app) => {
    const koreanFull = (app.koreanName || '').replace(/\s+/g, '');
    const englishFull = `${app.givenName || ''} ${app.familyName || ''}`.trim();
    if (!koreanFull) return null; // 한글 이름 없으면 동기화 스킵
    const buildStudentFromApp = (existing) => ({
      ...(existing || emptyStudent()),
      koreanName: koreanFull || existing?.koreanName || '',
      englishName: englishFull || existing?.englishName || '',
      cohort: app.cohort || existing?.cohort || '',
      category: existing?.category || (app.agencyName ? '외부' : '브듀'),
      currentSchool: app.currentSchoolName || existing?.currentSchool || '',
      birthDate: app.dateOfBirth || existing?.birthDate || '',
      age: calcAge(app.dateOfBirth || existing?.birthDate || '') || existing?.age || '',
      gender: app.gender === 'Male' ? '남' : app.gender === 'Female' ? '여' : (existing?.gender || ''),
      program: app.program || existing?.program || '',
      studentId: app.studentNumber || existing?.studentId || '',
      contact: {
        ...(existing?.contact || {}),
        studentPhone: app.contactNumber || existing?.contact?.studentPhone || '',
        studentEmail: app.email || existing?.contact?.studentEmail || '',
        // 한국 주소는 신청서 학생 정보의 address + city + country 조합
        koreanAddress: existing?.contact?.koreanAddress
          || [app.address, app.city, app.country].filter(Boolean).join(', ')
          || '',
        // 부모 정보는 신청서의 familyMembers[0]에서 가져오기 (이메일/연락처 모두)
        parentEmail: existing?.contact?.parentEmail || app.familyMembers?.[0]?.email || '',
        parentPhone: existing?.contact?.parentPhone || app.familyMembers?.[0]?.contactNumber || ''
      },
      // 신청서가 취소되면 학생도 취소 상태
      admissionStatus: app.status === 'rejected' ? '취소' : (existing?.admissionStatus || '신규'),
      assignedManager: app.assignedManager || existing?.assignedManager || ''
    });

    // 1) 이미 연결된 학생
    if (app.linkedStudentId) {
      const existing = students.find(s => s.id === app.linkedStudentId);
      if (existing) {
        const merged = buildStudentFromApp(existing);
        setStudents(prev => prev.map(s => s.id === existing.id ? merged : s));
        return existing.id;
      }
    }
    // 2) 동명이인 매칭
    const matched = students.find(s => (s.koreanName || '').replace(/\s+/g, '') === koreanFull && koreanFull);
    if (matched) {
      const merged = buildStudentFromApp(matched);
      setStudents(prev => prev.map(s => s.id === matched.id ? merged : s));
      return matched.id;
    }
    // 3) 신규 학생 생성
    const newStudent = { ...buildStudentFromApp(null), id: uid() };
    setStudents(prev => [newStudent, ...prev]);
    if (newStudent.category) addOption('category', newStudent.category);
    if (newStudent.cohort) addOption('cohort', newStudent.cohort);
    if (newStudent.currentSchool) addOption('currentSchool', newStudent.currentSchool);
    return newStudent.id;
  };

  const opened = visibleStudents.find(s => s.id === openId);

  return (
    <div className="min-h-screen flex flex-col" style={{ background:'#f7f5f1' }}>
      {/* 상단 헤더 — 시뮬레이션 모드 + 사용자 전환 */}
      <header className="app-header flex items-center justify-between px-4 py-2">
        <div className="flex items-center gap-3">
          <div className="brand-title">BreakEDU · BUPP</div>
          <span className="badge b-orange text-xs">시뮬레이션 모드</span>
        </div>
        <div className="flex items-center gap-2">
          {role === 'admin' && <FirestoreMigrationMenu/>}
          {access.accounting && <DataIOMenu/>}
          {authMember ? (
            <div className="flex items-center gap-2">
              <div className="flex items-center gap-2 px-3 py-1 rounded" style={{background:'#faf7f3', border:'1px solid var(--border)'}}>
                {firebaseUser?.photoURL && <img src={firebaseUser.photoURL} alt="" style={{width:24, height:24, borderRadius:'50%'}}/>}
                <div className="text-xs">
                  <div className="font-semibold" style={{color:'#202731'}}>{currentUser?.name}</div>
                  <div style={{color:'#787774', fontSize:10}}>{currentUser?.email} · <Badge value={ROLE_LABEL[role]}/></div>
                </div>
              </div>
              <button className="btn-ghost text-xs" onClick={signOut} title="로그아웃">↪ 로그아웃</button>
            </div>
          ) : (
            <CurrentUserSwitcher members={members} currentUserId={currentUserId} onChange={(id) => { setCurrentUserId(id); setOpenId(null); setView('students'); }}/>
          )}
        </div>
      </header>

      <div className="flex flex-1 min-h-0">
      {/* 사이드바 — 다크 네이비 + 골드 강조 */}
      <aside className="app-sidebar w-60 px-3 py-4 flex flex-col gap-1">
        <div className="px-3 py-2 mb-2" style={{borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
          <div className="text-lg font-bold" style={{color:'#F0B429', letterSpacing:'-0.01em'}}>BreakEDU</div>
          <div className="text-xs flex items-center gap-1 mt-1" style={{ color:'#cabaab' }}>
            <Badge value={ROLE_LABEL[role]}/>
            <span className="truncate">{currentUser?.name}</span>
          </div>
        </div>

        <div className="sidebar-section-label">학생</div>
        {access.students && (
          <div className={`sidebar-item ${view === 'students' && !opened ? 'active':''}`}
            onClick={() => { setView('students'); setOpenId(null); }}><NavIcon name="users"/>학생 목록</div>
        )}
        {access.cohortDash && (
          <div className={`sidebar-item ${view === 'cohortDash' ? 'active':''}`}
            onClick={() => { setView('cohortDash'); setOpenId(null); }}><NavIcon name="calendar"/>기수 대시보드</div>
        )}
        {access.applications && (
          <div className={`sidebar-item ${view === 'applications' ? 'active':''}`}
            onClick={() => { setView('applications'); setOpenId(null); }}><NavIcon name="edit"/>신청 접수</div>
        )}
        {access.invoices && (
          <div className={`sidebar-item ${view === 'invoices' ? 'active':''}`}
            onClick={() => { setView('invoices'); setOpenId(null); }}><NavIcon name="receipt"/>인보이스</div>
        )}

        {(access.schools || access.subjects) && (
          <div className="sidebar-section-label">데이터베이스</div>
        )}
        {access.schools && (
          <div className={`sidebar-item ${view === 'schools' ? 'active':''}`}
            onClick={() => { setView('schools'); setOpenId(null); }}><NavIcon name="school"/>학교 관리</div>
        )}
        {access.subjects && (
          <div className={`sidebar-item ${view === 'subjects' ? 'active':''}`}
            onClick={() => { setView('subjects'); setOpenId(null); }}><NavIcon name="book"/>과목 관리</div>
        )}
        {access.uniData && (
          <div className={`sidebar-item ${view === 'uniData' ? 'active':''}`}
            onClick={() => { setView('uniData'); setOpenId(null); }}><NavIcon name="cap"/>대학 데이터</div>
        )}
        {access.accomData && (
          <div className={`sidebar-item ${view === 'accomData' ? 'active':''}`}
            onClick={() => { setView('accomData'); setOpenId(null); }}><NavIcon name="home"/>숙소 데이터</div>
        )}
        {access.ecData && (
          <div className={`sidebar-item ${view === 'ecData' ? 'active':''}`}
            onClick={() => { setView('ecData'); setOpenId(null); }}><NavIcon name="book"/>EC 데이터</div>
        )}
        {access.partners && (
          <div className={`sidebar-item ${view === 'partners' ? 'active':''}`}
            onClick={() => { setView('partners'); setOpenId(null); setOpenPartnerId(null); }}><NavIcon name="handshake"/>파트너</div>
        )}
        {access.rideSchedule && (
          <div className={`sidebar-item ${view === 'rideSchedule' ? 'active':''}`}
            onClick={() => { setView('rideSchedule'); setOpenId(null); }}><NavIcon name="calendar"/>라이드 스케줄</div>
        )}

        {(access.members || access.matrix) && (
          <div className="sidebar-section-label">권한 관리</div>
        )}
        {access.members && (
          <div className={`sidebar-item ${view === 'members' ? 'active':''}`}
            onClick={() => { setView('members'); setOpenId(null); }}><NavIcon name="user"/>멤버 관리</div>
        )}
        {access.matrix && (
          <div className={`sidebar-item ${view === 'matrix' ? 'active':''}`}
            onClick={() => { setView('matrix'); setOpenId(null); }}><NavIcon name="shield"/>권한 매트릭스</div>
        )}

        {access.accounting && (
          <>
            <div className="sidebar-section-label">회계</div>
            <div className={`sidebar-item ${view === 'accounting' ? 'active':''}`}
              onClick={() => { setView('accounting'); setOpenId(null); }}><NavIcon name="dollar"/>회계 대시보드</div>
            <div className={`sidebar-item ${view === 'invoiceItems' ? 'active':''}`}
              onClick={() => { setView('invoiceItems'); setOpenId(null); }}><NavIcon name="list"/>인보이스 항목 관리</div>
          </>
        )}

        {/* 예정 모듈 — 추후 필요 시 여기 추가 */}

        <div className="mt-auto px-3 py-3 text-xs" style={{color:'#8a8e94', borderTop:'1px solid rgba(255,255,255,0.06)'}}>
          BUPP v1.3 · 2026
        </div>
      </aside>

      {/* 메인 컨텐츠 */}
      <main className="flex-1 overflow-auto" style={{background:'#f7f5f1'}}>
        {opened ? (
          <StudentDetail
            student={opened}
            onBack={() => setOpenId(null)}
            onUpdate={updateStudent}
            onDelete={deleteStudent}
            customOptions={customOptions}
            addOption={addOption}
            removeOption={removeOption}
            schools={schools}
            subjects={subjects}
            universities={universities}
            programs={programs}
            trackGroups={trackGroups}
            accommodations={accommodations}
            invoices={invoices}
            ecMasters={ecMasters}
            role={role}
          />
        ) : view === 'schools' && access.schools ? (
          <SchoolList schools={schools} onChange={setSchools}/>
        ) : view === 'subjects' && access.subjects ? (
          <SubjectList subjects={subjects} schools={schools} onChange={setSubjects}/>
        ) : view === 'uniData' && access.uniData ? (
          <UniversityDataPage
            universities={universities} programs={programs} trackGroups={trackGroups}
            onChangeUniversities={setUniversities}
            onChangePrograms={setPrograms}
            onChangeTrackGroups={setTrackGroups}
          />
        ) : view === 'accomData' && access.accomData ? (
          <AccommodationDataPage
            accommodations={accommodations}
            students={students}
            schools={schools}
            onChange={setAccommodations}
            canViewHistory={role === 'admin' || role === 'bu_staff'}
            onOpenPDF={(a) => setPdfAccom(a)}
          />
        ) : view === 'rideSchedule' && access.rideSchedule ? (
          <RideSchedulePage students={students} onUpdateStudent={updateStudent}/>
        ) : view === 'partners' && access.partners ? (
          openPartnerId && partners.find(p => p.id === openPartnerId) ? (
            <PartnerDetailPage
              partner={partners.find(p => p.id === openPartnerId)}
              partners={partners}
              invoices={invoices}
              students={students}
              applications={applications}
              currentUserName={currentUser?.name || ''}
              onBack={() => setOpenPartnerId(null)}
              onUpdatePartner={(updated) => setPartners(partners.map(p => p.id === updated.id ? updated : p))}
              onUpdateInvoice={(updated) => setInvoices(invoices.map(i => i.id === updated.id ? updated : i))}
            />
          ) : (
            <PartnersPage partners={partners} onChange={setPartners} onOpen={(id) => setOpenPartnerId(id)}/>
          )
        ) : view === 'ecData' && access.ecData ? (
          <EcMasterPage ecMasters={ecMasters} onChange={setEcMasters} students={students}/>
        ) : view === 'applications' && access.applications ? (
          <ApplicationsPage
            applications={applications}
            invoices={invoices}
            accommodations={accommodations}
            members={members}
            students={students}
            onSyncStudent={syncApplicationStudent}
            onChange={setApplications}
            currentUser={currentUser}
            currentUserName={currentUser?.name || ''}
            canInvoice={access.invoices}
            onOpenInvoiceEditor={(app) => setInvoiceEditing({ application: app, invoice: null })}
            onViewInvoice={(inv) => setPdfInvoice(inv)}
          />
        ) : view === 'invoices' && access.invoices ? (
          <InvoicesPage
            invoices={invoices}
            applications={applications}
            students={students}
            currentUser={currentUser}
            onChangeInvoices={setInvoices}
            onChangeApplications={setApplications}
            onOpenEditor={(inv) => setInvoiceEditing({ application: applications.find(a => a.id === inv.applicationId), invoice: inv })}
            onOpenPDF={(inv) => setPdfInvoice(inv)}
            onNew={() => setInvoiceEditing({ application: null, invoice: emptyInvoice() })}
          />
        ) : view === 'cohortDash' && access.cohortDash ? (
          <CohortDashboard
            students={students}
            members={members}
            universities={universities}
            programs={programs}
            trackGroups={trackGroups}
            subjects={subjects}
            schools={schools}
            onUpdateStudent={updateStudent}
          />
        ) : view === 'members' && access.members ? (
          <MemberList members={members} students={students} onChange={setMembers}/>
        ) : view === 'matrix' && access.matrix ? (
          <PermissionMatrix/>
        ) : view === 'accounting' && access.accounting ? (
          <AccountingPage invoices={invoices} applications={applications} partners={partners} students={students} members={members} programs={programs} invoiceItems={invoiceItems}/>
        ) : view === 'invoiceItems' && access.accounting ? (
          <InvoiceItemsPage items={invoiceItems} onChange={setInvoiceItems}/>
        ) : (
          <StudentList
            students={visibleStudents}
            onOpen={(id) => { setView('students'); setOpenId(id); }}
            onAdd={() => setShowNew(true)}
            customOptions={customOptions}
            role={role}
          />
        )}
      </main>
      </div>

      <NewStudentModal
        open={showNew}
        onClose={() => setShowNew(false)}
        onCreate={createStudent}
        customOptions={customOptions}
        addOption={addOption}
        removeOption={removeOption}
      />

      {pdfAccom && (
        <HomestayPDFPreview accom={pdfAccom} onClose={() => setPdfAccom(null)}/>
      )}

      {pdfInvoice && (
        <InvoicePDFPreview
          invoice={pdfInvoice}
          application={applications.find(a => a.id === pdfInvoice.applicationId)}
          invoiceItems={invoiceItems}
          onClose={() => setPdfInvoice(null)}
        />
      )}

      {invoiceEditing && (
        <div className="modal-backdrop" onClick={() => setInvoiceEditing(null)} style={{ alignItems:'flex-start', overflow:'auto' }}>
          <div className="modal-card" onClick={(e) => e.stopPropagation()} style={{ width:'min(1100px, 95vw)', maxHeight:'95vh' }}>
            <InvoiceEditor
              invoice={invoiceEditing.invoice}
              application={invoiceEditing.application}
              members={members}
              applications={applications}
              students={students}
              partners={partners}
              invoiceItems={invoiceItems}
              onAddInvoiceItem={(newItem) => setInvoiceItems([...invoiceItems, newItem])}
              currentUserName={currentUser?.name || ''}
              onSave={(d) => {
                let saved;
                if (d.id) {
                  saved = d;
                  setInvoices(invoices.map(i => i.id === d.id ? d : i));
                } else {
                  saved = { ...d, id: uid() };
                  setInvoices([...invoices, saved]);
                }
                // 연결된 신청서 업데이트
                if (saved.applicationId) {
                  setApplications(applications.map(a => a.id === saved.applicationId
                    ? { ...a, invoiceId: saved.id, invoiceNumber: saved.invoiceNumber, status: a.status === 'paid' ? 'paid' : 'invoiced' }
                    : a));
                }
                setInvoiceEditing(null);
              }}
              onCancel={() => setInvoiceEditing(null)}
            />
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <AuthGate>
    {({ firebaseUser, member, signOut }) => (
      <App authMember={member} firebaseUser={firebaseUser} signOut={signOut}/>
    )}
  </AuthGate>
);
</script>
</body>
</html>
