// C. 학업 메타 — 공인영어점수(IELTS/TOEFL/Duolingo) + OSSLT + 학교 메타
// 테스트별 영역 라벨 + 점수 범위
const ENGLISH_TEST_TYPES = ['IELTS', 'TOEFL', 'Duolingo'];
const ENGLISH_TEST_LABELS = {
  IELTS:    { listening:'Listening (L)', reading:'Reading (R)', writing:'Writing (W)', speaking:'Speaking (S)', overall:'Overall (0~9)', range:'각 영역 0~9' },
  TOEFL:    { listening:'Listening', reading:'Reading', writing:'Writing', speaking:'Speaking', overall:'Total (0~120)', range:'각 영역 0~30' },
  Duolingo: { listening:'Comprehension', reading:'Literacy', writing:'Production', speaking:'Conversation', overall:'Overall (10~160)', range:'각 영역 10~160' }
};
const ENGLISH_TEST_MAX = {
  IELTS:    { overall: 9,   section: 9 },
  TOEFL:    { overall: 120, section: 30 },
  Duolingo: { overall: 160, section: 160 }
};

// 영어 점수 트렌드 차트 (멀티 라인 SVG)
const EnglishTestTrendChart = ({ history }) => {
  const sorted = [...(history || [])].sort((a, b) => (a.testDate||'').localeCompare(b.testDate||''));
  if (sorted.length === 0) {
    return <div className="text-sm text-gray-400 text-center py-8">아직 응시 기록이 없습니다. 아래 이력 표에서 + 새 기록 추가로 시작하세요.</div>;
  }

  const allSameType = new Set(sorted.map(h => h.type).filter(Boolean)).size === 1;
  const onlyType = sorted[0].type;
  const W = 720, H = 280;
  const pad = { top: 16, right: 100, bottom: 50, left: 50 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;

  const xScale = (i) => sorted.length === 1
    ? pad.left + chartW / 2
    : pad.left + (i / (sorted.length - 1)) * chartW;

  // 모든 점수를 %로 정규화 (다른 시험 종류 혼합 가능)
  const normalize = (v, type, isSection) => {
    const max = (ENGLISH_TEST_MAX[type] || ENGLISH_TEST_MAX.IELTS)[isSection ? 'section' : 'overall'];
    const n = parseFloat(v);
    if (isNaN(n) || !max) return null;
    return Math.max(0, Math.min(100, (n / max) * 100));
  };
  const yScale = (pct) => pad.top + chartH - (pct / 100) * chartH;

  const metrics = [
    { key:'overall',   label:'Overall',   color:'#c20206', section:false, width:3 },
    { key:'listening', label:'Listening', color:'#0b6e99', section:true,  width:1.5 },
    { key:'reading',   label:'Reading',   color:'#0f7b6c', section:true,  width:1.5 },
    { key:'writing',   label:'Writing',   color:'#cb912f', section:true,  width:1.5 },
    { key:'speaking',  label:'Speaking',  color:'#6940a5', section:true,  width:1.5 }
  ];

  return (
    <div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMinYMin meet" style={{ maxWidth:'100%', height:'auto' }}>
        {/* Y-axis grid */}
        {[0, 25, 50, 75, 100].map(pct => (
          <g key={pct}>
            <line x1={pad.left} x2={pad.left + chartW} y1={yScale(pct)} y2={yScale(pct)} stroke="#e8e0d5" strokeDasharray="3,3"/>
            <text x={pad.left - 8} y={yScale(pct) + 4} textAnchor="end" fontSize="10" fill="#787774">{pct}%</text>
          </g>
        ))}

        {/* X-axis dates + type */}
        {sorted.map((p, i) => (
          <g key={i}>
            <line x1={xScale(i)} x2={xScale(i)} y1={pad.top} y2={pad.top + chartH} stroke="#f5f5f5"/>
            <text x={xScale(i)} y={H - pad.bottom + 16} textAnchor="middle" fontSize="10" fill="#4a4a4a">{p.testDate || '-'}</text>
            <text x={xScale(i)} y={H - pad.bottom + 30} textAnchor="middle" fontSize="9" fill="#787774">{p.type}</text>
          </g>
        ))}

        {/* Lines per metric */}
        {metrics.map(m => {
          const points = sorted.map((p, i) => {
            const pct = normalize(p[m.key], p.type, m.section);
            return pct == null ? null : { x: xScale(i), y: yScale(pct), value: p[m.key], i };
          });
          const valid = points.filter(Boolean);
          if (valid.length === 0) return null;
          // path with breaks where data missing
          let d = '';
          let started = false;
          points.forEach(pt => {
            if (pt) {
              d += (started ? ' L' : 'M') + ` ${pt.x} ${pt.y}`;
              started = true;
            } else {
              started = false;
            }
          });
          return (
            <g key={m.key}>
              <path d={d} fill="none" stroke={m.color} strokeWidth={m.width} strokeLinejoin="round"/>
              {valid.map(pt => (
                <g key={pt.i}>
                  <circle cx={pt.x} cy={pt.y} r={m.key === 'overall' ? 4 : 3} fill={m.color}>
                    <title>{m.label}: {pt.value}</title>
                  </circle>
                  {m.key === 'overall' && (
                    <text x={pt.x} y={pt.y - 8} textAnchor="middle" fontSize="11" fontWeight="700" fill={m.color}>{pt.value}</text>
                  )}
                </g>
              ))}
            </g>
          );
        })}

        {/* 범례 (우측) */}
        {metrics.map((m, i) => (
          <g key={m.key}>
            <line x1={W - pad.right + 10} x2={W - pad.right + 30} y1={pad.top + 8 + i * 18} y2={pad.top + 8 + i * 18} stroke={m.color} strokeWidth={m.width}/>
            <text x={W - pad.right + 36} y={pad.top + 11 + i * 18} fontSize="11" fill={m.color} fontWeight={m.key === 'overall' ? 700 : 500}>{m.label}</text>
          </g>
        ))}
      </svg>
      <div className="text-xs text-gray-500 mt-2">
        📊 모든 점수는 %로 정규화 표시. {allSameType
          ? `현재 ${onlyType} 시험만 기록됨 (Overall ${ENGLISH_TEST_MAX[onlyType]?.overall} 기준)`
          : '여러 종류 시험이 혼합되어 있습니다.'} · 점에 마우스를 올리면 실제 점수 표시.
      </div>
    </div>
  );
};

// 영어 점수 이력 표 + 추가/수정 폼
const EnglishTestHistoryTable = ({ history, onChange, canEdit = true }) => {
  const [editing, setEditing] = useState(null);
  const upsert = (rec) => {
    if (!rec.type) { alert('시험 종류를 선택해주세요.'); return; }
    const next = rec.id ? (history || []).map(h => h.id === rec.id ? rec : h)
                        : [...(history || []), { ...rec, id: uid() }];
    onChange(next);
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 응시 기록을 삭제할까요?')) return;
    onChange((history || []).filter(h => h.id !== id));
  };
  const sorted = [...(history || [])].sort((a, b) => (b.testDate||'').localeCompare(a.testDate||''));

  const blank = { id:'', type:'IELTS', testDate:'', overall:'', listening:'', reading:'', writing:'', speaking:'', memo:'' };

  return (
    <div>
      <div className="flex items-center justify-between mb-2">
        <div className="text-sm font-semibold" style={{color:'#c20206'}}>📋 응시 이력 ({(history||[]).length}건)</div>
        {canEdit && <button className="btn-ghost text-xs" onClick={() => setEditing({ ...blank })}>+ 새 응시 기록</button>}
      </div>

      {editing && (
        <div className="notion-card p-3 mb-3" style={{ background:'#faf7f3' }}>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <Field label="시험 종류 *"><Select value={editing.type} onChange={(v) => setEditing({...editing, type:v})} options={ENGLISH_TEST_TYPES}/></Field>
            <Field label="응시일"><TextInput type="date" value={editing.testDate} onChange={(v) => setEditing({...editing, testDate:v})}/></Field>
            <Field label="Overall"><TextInput value={editing.overall} onChange={(v) => setEditing({...editing, overall:v})}/></Field>
            <Field label={(ENGLISH_TEST_LABELS[editing.type] || ENGLISH_TEST_LABELS.IELTS).listening}><TextInput value={editing.listening} onChange={(v) => setEditing({...editing, listening:v})}/></Field>
            <Field label={(ENGLISH_TEST_LABELS[editing.type] || ENGLISH_TEST_LABELS.IELTS).reading}><TextInput value={editing.reading} onChange={(v) => setEditing({...editing, reading:v})}/></Field>
            <Field label={(ENGLISH_TEST_LABELS[editing.type] || ENGLISH_TEST_LABELS.IELTS).writing}><TextInput value={editing.writing} onChange={(v) => setEditing({...editing, writing:v})}/></Field>
            <Field label={(ENGLISH_TEST_LABELS[editing.type] || ENGLISH_TEST_LABELS.IELTS).speaking}><TextInput value={editing.speaking} onChange={(v) => setEditing({...editing, speaking:v})}/></Field>
            <Field label="메모" span={4}><TextInput value={editing.memo} onChange={(v) => setEditing({...editing, memo:v})}/></Field>
            <div className="col-span-4 flex justify-end gap-2">
              <button className="btn-ghost text-xs" onClick={() => setEditing(null)}>취소</button>
              <button className="btn-primary text-xs" onClick={() => upsert(editing)}>저장</button>
            </div>
          </div>
        </div>
      )}

      <div className="notion-card overflow-hidden">
        <table className="w-full text-sm">
          <thead><tr>
            <th className="table-th">응시일</th>
            <th className="table-th">종류</th>
            <th className="table-th">Overall</th>
            <th className="table-th">L</th>
            <th className="table-th">R</th>
            <th className="table-th">W</th>
            <th className="table-th">S</th>
            <th className="table-th">메모</th>
            <th className="table-th"></th>
          </tr></thead>
          <tbody>
            {sorted.length === 0 ? (
              <tr><td colSpan="9" className="text-center py-6 text-gray-400 text-xs">기록 없음</td></tr>
            ) : sorted.map(h => (
              <tr key={h.id} className="row-hover">
                <td className="table-td text-xs">{h.testDate || '—'}</td>
                <td className="table-td"><Badge value={h.type}/></td>
                <td className="table-td font-semibold" style={{color:'#c20206'}}>{h.overall || '—'}</td>
                <td className="table-td">{h.listening || '—'}</td>
                <td className="table-td">{h.reading || '—'}</td>

  const setAcademic = (k, v) => update({ academic: { ...a, [k]: v } });
  const setTest = (k, v) => update({ academic: { ...a, englishTest: { ...et, [k]: v } } });
  // 학생용 read-only 표시
  const Ro = ({ value, fallback = '—' }) => (
    <div className="notion-input flex items-center" style={{background:'#faf7f3', color:'#202731', height:34, padding:'4px 10px'}}>
      {value ? value : <span className="text-gray-400">{fallback}</span>}
    </div>
  );
  const setHistory = (next) => {
    // 이력 변경 시 최신 기록을 englishTest snapshot으로 자동 반영
    const sorted = [...next].sort((a, b) => (b.testDate||'').localeCompare(a.testDate||''));
    const latest = sorted[0];
    update({
      academic: {
        ...a,
        englishTestHistory: next,
        englishTest: latest
          ? { ...et, type: latest.type, overall: latest.overall, listening: latest.listening, reading: latest.reading, writing: latest.writing, speaking: latest.speaking, testDate: latest.testDate }
          : et
      }
    });
  };

  // 최신 기록 요약
  const latestHistory = [...history].sort((a, b) => (b.testDate||'').localeCompare(a.testDate||''))[0];

  return (
    <Section title="공인 영어 점수">
      {/* 공인영어점수 */}
      <div className="notion-card p-4 mb-4" style={{ background:'#faf7f3' }}>
        <h4 className="font-semibold mb-3" style={{color:'#c20206'}}>🌐 공인 영어 점수</h4>

        {/* 현재 상태 (요약) */}
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
          <Field label="준비 상태">{canEdit ? <Select value={et.status} onChange={(v) => setTest('status', v)} options={IELTS_STATUSES}/> : <Ro value={et.status}/>}</Field>
          <Field label="다음 응시 예정일">{canEdit ? <TextInput type="date" value={et.testDate} onChange={(v) => setTest('testDate', v)}/> : <Ro value={et.testDate}/>}</Field>
          <Field label="현재 시험 종류" span={2}>
            {latestHistory ? (
              <div className="pt-2 text-sm">
                <Badge value={latestHistory.type}/>
                <span className="ml-2" style={{color:'#c20206', fontWeight:700}}>Overall {latestHistory.overall || '—'}</span>
                <span className="ml-2 text-xs text-gray-500">(최근 응시 {latestHistory.testDate || '—'})</span>
              </div>
            ) : (
              <div className="pt-2 text-xs text-gray-400">아직 응시 기록이 없습니다.</div>
            )}
          </Field>
          <Field label="시험 메모" span={4}>{canEdit ? <TextArea value={et.memo} onChange={(v) => setTest('memo', v)} rows={2} placeholder="재시험 예정, 대학 제출 현황 등"/> : <Ro value={et.memo}/>}</Field>
        </div>

        {/* 트렌드 차트 */}
        <div className="notion-card p-3 mb-4 bg-white">
          <div className="text-xs font-semibold mb-2" style={{color:'#760305'}}>📈 점수 추이 (응시 이력)</div>
          <EnglishTestTrendChart history={history}/>
        </div>

        {/* 이력 표 */}
        <EnglishTestHistoryTable history={history} onChange={setHistory} canEdit={canEdit}/>
      </div>
    </Section>
  );
};

// 대입로드맵 (학업/성적)
// 학년 레이블 (ESL은 그대로, 9~12는 G 접두)
const gradeLabel = (g) => !g ? '' : (g === 'ESL' ? 'ESL' : `G${g}`);

// 일괄 등록기 — 학교/학기/기간 공통, 과목은 여러 개 일괄 추가
const BulkRoadmapEditor = ({ schools, subjects, onSave, onCancel }) => {
  const [shared, setShared] = useState({
    grade: '', schoolId: '', semesterSystem: '',
    startDate: '', endDate: '',
    selection: '정규수업', province: 'ON'
  });
  const blankRow = (defaultGrade = '') => ({
    grade: defaultGrade,  // 행별 학년 — 헤더의 기본 학년이 초기값
    subjectId: '', credits: '', required: false,
    targetScore: '', midterm1: '', midterm2: '', final: '',
    late: '', absent: '', top6: false, memo: ''
  });
  // 학기시스템에 따른 기본 행 수
  const defaultRowCount = (sys) => sys?.startsWith('Year') ? 8 : sys?.startsWith('Semester') ? 4 : sys?.startsWith('Quarter') ? 2 : 4;
  const [rows, setRows] = useState([blankRow()]);

  const school = schools.find(s => s.id === shared.schoolId);
  const sys = shared.semesterSystem || school?.semesterSystem || '';
  const isYear = sys.startsWith('Year');

  // 주(province) 기반 + 행별 학년 기반 과목 필터
  const filterSubjectsForRow = (rowGrade) => {
    return subjects.filter(s => {
      if (shared.province && s.province !== shared.province) return false;
      if (rowGrade && s.grade !== rowGrade) return false;
      return true;
    });
  };

  const updateRow = (idx, patch) => setRows(rows.map((r, i) => i === idx ? { ...r, ...patch } : r));
  const addRow = () => {
    if (rows.length >= 10) { alert('한 번에 최대 10개까지 추가 가능합니다.'); return; }
    setRows([...rows, blankRow(shared.grade)]);
  };
  const removeRow = (idx) => {
    if (rows.length === 1) return;
    setRows(rows.filter((_, i) => i !== idx));
  };

  // 헤더의 기본 학년이 바뀌면 빈 행들의 학년도 자동 갱신 (이미 학년 선택된 행은 유지)
  const updateSharedGrade = (v) => {
    setShared({ ...shared, grade: v });
    setRows(rows.map(r => (!r.grade || !r.subjectId) ? { ...r, grade: v } : r));
  };

  // 학교 선택 시 자동으로 학기시스템 기준 권장 행 수 채움
  const onPickSchool = (v) => {
    const sc = schools.find(s => s.id === v);
    const newSys = sc?.semesterSystem || '';
    setShared({ ...shared, schoolId: v, semesterSystem: '' });
    if (rows.length === 1 && !rows[0].subjectId) {
      const n = defaultRowCount(newSys);
      setRows(Array.from({ length: n }, () => blankRow(shared.grade)));
    }
  };

  const pickSubject = (idx, subId) => {
    const sub = subjects.find(s => s.id === subId);
    updateRow(idx, {
      subjectId: subId,
      credits: rows[idx].credits || (sub ? sub.credits : '')
    });
  };

  // 행별 학년 변경 시 — 다른 학년 과목이 선택되어 있었다면 클리어
  const pickRowGrade = (idx, newGrade) => {
    const row = rows[idx];
    const currentSub = subjects.find(s => s.id === row.subjectId);
    const shouldClearSubject = currentSub && newGrade && currentSub.grade !== newGrade;
    updateRow(idx, {
      grade: newGrade,
      ...(shouldClearSubject ? { subjectId: '', credits: '' } : {})
    });
  };

  const validCount = rows.filter(r => r.subjectId).length;

  const handleSave = () => {
    if (!shared.schoolId) { alert('학교를 선택해주세요.'); return; }
    const valid = rows.filter(r => r.subjectId);
    if (valid.length === 0) { alert('과목을 1개 이상 선택해주세요.'); return; }
    const records = valid.map(r => ({
      id: uid(),
      grade: r.grade || shared.grade,  // 행별 학년 우선, 없으면 헤더 기본값
      schoolId: shared.schoolId,
      semesterSystem: shared.semesterSystem,
      startDate: shared.startDate,
      endDate: shared.endDate,
      selection: shared.selection,
      ...r
    }));
    onSave(records);
  };

  return (
    <div>
      {/* 공통 헤더 */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5 pb-5 border-b border-gray-200">
        <Field label="기본 학년">
          <Select value={shared.grade} onChange={updateSharedGrade} options={GRADE_LEVELS} placeholder="새 행 자동 채움"/>
          <div className="text-xs text-gray-400 mt-1">행마다 다르게 지정 가능</div>
        </Field>
        <Field label="학교" span={2}>
          <RefSelect
            value={shared.schoolId}
            onChange={onPickSchool}
            options={schools.map(s => ({ id: s.id, label: `${s.name} · ${s.type || ''}` }))}
            placeholder="학교 선택"
          />
          {school && (
            <div className="text-xs text-gray-500 mt-1">
              <Badge value={school.semesterSystem}/>
              <span className="ml-2">권장 {defaultRowCount(school.semesterSystem)}과목</span>
            </div>
          )}
        </Field>
        <Field label="학기 시스템 (override)">
          <Select value={shared.semesterSystem} onChange={(v) => setShared({...shared, semesterSystem:v})} options={SEMESTER_SYSTEMS} placeholder="학교 기준 자동"/>
        </Field>

        <Field label="시작일"><TextInput type="date" value={shared.startDate} onChange={(v) => setShared({...shared, startDate:v})}/></Field>
        <Field label="종료일"><TextInput type="date" value={shared.endDate} onChange={(v) => setShared({...shared, endDate:v})}/></Field>
        <Field label="수업 형태"><Select value={shared.selection} onChange={(v) => setShared({...shared, selection:v})} options={COURSE_SELECTIONS}/></Field>
        <Field label="교육과정 (과목 필터)">
          <Select value={shared.province} onChange={(v) => setShared({...shared, province:v})} options={PROVINCES} placeholder="전체"/>
        </Field>
      </div>

      {/* 과목 행들 */}
      <div className="mb-3 flex items-center justify-between">
        <h4 className="font-semibold text-sm">과목 ({validCount}/{rows.length} · 최대 10)</h4>
        <div className="flex items-center gap-2">
          <span className="text-xs text-gray-500">전체 {subjects.filter(s => !shared.province || s.province === shared.province).length}개 과목</span>
          <button className="btn-ghost" onClick={addRow} disabled={rows.length >= 10}>+ 행 추가</button>
        </div>
      </div>

      <div className="space-y-2">
        {rows.map((row, idx) => {
          const sub = subjects.find(s => s.id === row.subjectId);
          const rowSubjectOpts = filterSubjectsForRow(row.grade);
          return (
            <div key={idx} className="notion-card p-3" style={{ background:'#fafaf9' }}>
              <div className="flex items-center gap-2 mb-2">
                <span className="font-semibold text-sm text-gray-500">#{idx+1}</span>
                {row.grade && <span className="badge b-blue">{gradeLabel(row.grade)}</span>}
                {sub && <span className="badge b-gray font-mono">{sub.code}</span>}
                {sub && <span className="text-sm text-gray-600">{sub.name}</span>}
                {rows.length > 1 && (
                  <button className="btn-danger ml-auto text-xs" onClick={() => removeRow(idx)}>행 삭제</button>
                )}
              </div>
              <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2">
                <div>
                  <div className="field-label">학년</div>
                  <Select value={row.grade} onChange={(v) => pickRowGrade(idx, v)} options={GRADE_LEVELS} placeholder="전체"/>
                </div>
                <div className="col-span-2">
                  <div className="field-label">과목</div>
                  <RefSelect
                    value={row.subjectId}
                    onChange={(v) => pickSubject(idx, v)}
                    options={rowSubjectOpts.map(s => ({ id: s.id, label: `${s.code} — ${s.name}${s.grade ? ` (${gradeLabel(s.grade)})` : ''}` }))}
                    placeholder={row.grade ? `${gradeLabel(row.grade)} ${rowSubjectOpts.length}개 중 선택` : `전체 ${rowSubjectOpts.length}개 중 선택`}
                  />
                </div>
                <div>
                  <div className="field-label">학점</div>
                  <TextInput type="number" value={row.credits} onChange={(v) => updateRow(idx, {credits: parseFloat(v)||0})}/>
                </div>
                <div>
                  <div className="field-label">필수</div>
                  <div className="pt-2"><Toggle value={row.required} onChange={(v) => updateRow(idx, {required:v})} label=""/></div>
                </div>
                <div>
                  <div className="field-label">목표 점수</div>
                  <TextInput value={row.targetScore} onChange={(v) => updateRow(idx, {targetScore:v})}/>
                </div>
                <div>
                  <div className="field-label">미드텀 1</div>
                  <TextInput value={row.midterm1} onChange={(v) => updateRow(idx, {midterm1:v})}/>
                </div>
                {isYear ? (
                  <div>
                    <div className="field-label">미드텀 2</div>
                    <TextInput value={row.midterm2} onChange={(v) => updateRow(idx, {midterm2:v})}/>
                  </div>
                ) : null}
                <div>
                  <div className="field-label">파이널</div>
                  <TextInput value={row.final} onChange={(v) => updateRow(idx, {final:v})}/>
                </div>
                <div>
                  <div className="field-label">지각</div>
                  <TextInput type="number" value={row.late} onChange={(v) => updateRow(idx, {late:v})}/>
                </div>
                <div>
                  <div className="field-label">결석</div>
                  <TextInput type="number" value={row.absent} onChange={(v) => updateRow(idx, {absent:v})}/>
                </div>
                <div className={isYear ? "col-span-2 lg:col-span-4" : "col-span-2 lg:col-span-5"}>
                  <div className="field-label">메모</div>
                  <TextInput value={row.memo} onChange={(v) => updateRow(idx, {memo:v})}/>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      <div className="flex justify-end gap-2 mt-5">
        <button className="btn-ghost" onClick={onCancel}>취소</button>
        <button className="btn-primary" onClick={handleSave} disabled={validCount === 0}>
          {validCount > 0 ? `${validCount}개 일괄 저장` : '과목을 선택하세요'}
        </button>
      </div>
    </div>
  );
};

// PLE (Prior Learning Equivalency) 에디터 — OSSD 외부 이수분 학점 인정
// 일반적 예: 한국 중3 마침 = 8학점
const PLE_PRESETS = [
  { label: '한국 중3 마침', region: '한국', credits: 8, memo: '중3 마침' },
  { label: '한국 고1 마침', region: '한국', credits: 12, memo: '고1 마침' },
  { label: '한국 고2 마침', region: '한국', credits: 16, memo: '고2 마침' },
  { label: '미국 Grade 9', region: '미국', credits: 8, memo: 'Grade 9 완료' },
  { label: 'BC Grade 10', region: 'BC', credits: 16, memo: 'BC Grade 10 완료' },
  { label: '기타 (직접 입력)', region: '', credits: '', memo: '' }
];

const PLEEditor = ({ rec, onSave, onCancel }) => {
  const [draft, setDraft] = useState(() => ({
    isPLE: true,
    pleRegion: '',
    credits: '',
    memo: '',
    grade: 'PLE',
    selection: '대체수업',
    startDate: '',
    endDate: '',
    midterm1: '', midterm2: '', final: '',
    late: '', absent: '',
    required: false,
    schoolId: '', subjectId: '', semesterSystem: '',
    top6: false, targetScore: '',
    ...rec
  }));
  const set = (k, v) => setDraft({ ...draft, [k]: v });
  const applyPreset = (label) => {
    const p = PLE_PRESETS.find(x => x.label === label);
    if (!p) return;
    setDraft({ ...draft, pleRegion: p.region, credits: p.credits, memo: p.memo });
  };
  const handleSave = () => {
    if (!draft.pleRegion?.trim()) { alert('지역(출처)을 입력해주세요.'); return; }
    if (!draft.credits) { alert('인정 학점을 입력해주세요.'); return; }
    onSave(draft);
  };
  return (
    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
      <Field label="빠른 시작 (선택)" span={3}>
        <Select value="" onChange={applyPreset} options={PLE_PRESETS.map(p => p.label)} placeholder="자주 쓰는 PLE 선택 시 아래 필드 자동 채움"/>
      </Field>
      <Field label="지역 / 출처 *">
        <TextInput value={draft.pleRegion} onChange={(v) => set('pleRegion', v)} placeholder="예) 한국, 미국, BC"/>
      </Field>
      <Field label="인정 학점 *">
        <TextInput type="number" value={draft.credits} onChange={(v) => set('credits', parseFloat(v) || '')} placeholder="예) 8"/>
      </Field>
      <Field label="인정 일자 (선택)">
        <TextInput type="date" value={draft.startDate} onChange={(v) => set('startDate', v)}/>
      </Field>
      <Field label="설명 / 인정 사유" span={3}>
        <TextArea value={draft.memo} onChange={(v) => set('memo', v)} placeholder="예) 중3 마침, Grade 9 완료, 학교 발급 transcript 제출" rows={2}/>
      </Field>
      <div className="col-span-3 flex justify-end gap-2">
        <button className="btn-ghost" onClick={onCancel}>취소</button>
        <button className="btn-primary" onClick={handleSave}>저장</button>
      </div>
    </div>
  );
};

const RoadmapEditor = ({ rec, schools, subjects, onSave, onCancel }) => {
  const [draft, setDraft] = useState(rec);
  const [province, setProvince] = useState('');
  const set = (k, v) => setDraft({ ...draft, [k]: v });
  const school = schools.find(s => s.id === draft.schoolId);
  const subject = subjects.find(s => s.id === draft.subjectId);
  const sysFromSchool = school?.semesterSystem || draft.semesterSystem || '';
  const isYear = sysFromSchool.startsWith('Year');

  // 과목 선택 시 학점/학년 자동 채우기 옵션
  const pickSubject = (id) => {
    const sub = subjects.find(s => s.id === id);
    setDraft({
      ...draft,
      subjectId: id,
      credits: draft.credits || (sub ? sub.credits : ''),
      grade: draft.grade || (sub ? sub.grade : '')
    });
  };

  // 주(province) 기반 과목 필터
  const subjectOpts = subjects.filter(s => !province || s.province === province);

  return (
    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
      <Field label="학년"><Select value={draft.grade} onChange={(v) => set('grade', v)} options={GRADE_LEVELS}/></Field>
      <Field label="학교" span={2}>
        <RefSelect
          value={draft.schoolId}
          onChange={(v) => {
            const sc = schools.find(s => s.id === v);
            setDraft({ ...draft, schoolId: v, semesterSystem: sc?.semesterSystem || '' });
          }}
          options={schools.map(s => ({ id: s.id, label: `${s.name} · ${s.type || ''}` }))}
          placeholder="학교 선택"
        />
        {draft.schoolId && school && (
          <div className="text-xs text-gray-500 mt-1">
            <Badge value={school.semesterSystem}/>
          </div>
        )}
      </Field>
      <Field label="학기 시스템 (override)">
        <Select value={draft.semesterSystem} onChange={(v) => set('semesterSystem', v)} options={SEMESTER_SYSTEMS} placeholder="학교 기준 자동"/>
      </Field>

      <Field label="시작일"><TextInput type="date" value={draft.startDate} onChange={(v) => set('startDate', v)}/></Field>
      <Field label="종료일"><TextInput type="date" value={draft.endDate} onChange={(v) => set('endDate', v)}/></Field>
      <Field label="수업 형태"><Select value={draft.selection} onChange={(v) => set('selection', v)} options={COURSE_SELECTIONS}/></Field>

      <Field label="과목" span={2}>
        <div className="flex gap-2 items-start">
          <div className="flex-1">
            <RefSelect
              value={draft.subjectId}
              onChange={pickSubject}
              options={subjectOpts.map(s => ({ id: s.id, label: `${s.code} — ${s.name}${s.grade ? ` (${gradeLabel(s.grade)})` : ''}` }))}
              placeholder={`${subjectOpts.length}개 과목 중 선택`}
            />
          </div>
          <div style={{ width: 90 }}>
            <Select value={province} onChange={setProvince} options={PROVINCES} placeholder="교육과정 필터"/>
          </div>
        </div>
        {subject && (
          <div className="text-xs text-gray-500 mt-1">
            <span className="font-mono">{subject.code}</span> · {subject.name} · {gradeLabel(subject.grade)} · {subject.credits} credit
          </div>
        )}
      </Field>
      <Field label="학점"><TextInput type="number" value={draft.credits} onChange={(v) => set('credits', parseFloat(v)||0)}/></Field>
      <Field label="필수 여부">
        <div className="pt-2"><Toggle value={draft.required} onChange={(v) => set('required', v)} label="필수 과목"/></div>
      </Field>

      {/* 학기 시스템에 따라 동적 필드 */}
      <Field label="목표 점수">
        <TextInput value={draft.targetScore} onChange={(v) => set('targetScore', v)} placeholder="예) 95"/>
      </Field>
      <Field label="미드텀 1"><TextInput value={draft.midterm1} onChange={(v) => set('midterm1', v)} placeholder="확정 점수"/></Field>
      {isYear && (
        <Field label="미드텀 2"><TextInput value={draft.midterm2} onChange={(v) => set('midterm2', v)} placeholder="확정 점수"/></Field>
      )}
      <Field label="파이널"><TextInput value={draft.final} onChange={(v) => set('final', v)} placeholder="확정 점수"/></Field>
      {!isYear && <Field label=""><span className="text-xs text-gray-400 pt-2 block">학기제/4학기제 — 미드텀 1번</span></Field>}

      <Field label="지각 (회)"><TextInput type="number" value={draft.late} onChange={(v) => set('late', v)}/></Field>
      <Field label="결석 (회)"><TextInput type="number" value={draft.absent} onChange={(v) => set('absent', v)}/></Field>
      <Field label="기타 메모" span={2}><TextInput value={draft.memo} onChange={(v) => set('memo', v)}/></Field>

      <div className="col-span-4 flex justify-end gap-2">
        <button className="btn-ghost" onClick={onCancel}>취소</button>
        <button className="btn-primary" onClick={() => onSave(draft)}>저장</button>
      </div>
    </div>
  );
};

const TabRoadmap = ({ s, update, schools, subjects, role = 'admin' }) => {
  const list = s.academicRecords || [];
  const isStudent = role === 'student';
  const canEdit = !isStudent; // 학생은 과목 추가·수정·삭제 불가 (브듀쌤 이상만)
  const [editing, setEditing] = useState(null);   // 단일 수정
  const [bulkAdding, setBulkAdding] = useState(false); // 일괄 등록
  const [pleAdding, setPleAdding] = useState(false);   // PLE 추가
  const [pleEditing, setPleEditing] = useState(null);  // PLE 수정
  const [filters, setFilters] = useState({ schoolId:'', grade:'', selection:'' });

  // OSSLT 정보 (학업메타에서 이동) — 대입 로드맵 상단에 표시
  const academic = s.academic || {};
  const setAcademic = (k, v) => update({ academic: { ...academic, [k]: v } });
  const ossltYears = (() => {
    const y = new Date().getFullYear();
    return [String(y-2), String(y-1), String(y), String(y+1), String(y+2)];
  })();

  const filtered = list.filter(r => {
    if (filters.schoolId && r.schoolId !== filters.schoolId) return false;
    if (filters.grade && r.grade !== filters.grade) return false;
    if (filters.selection && r.selection !== filters.selection) return false;
    return true;
  });

  const upsert = (d) => {
    const next = list.map(r => r.id === d.id ? d : r);
    update({ academicRecords: next });
    setEditing(null);
  };
  const bulkSave = (records) => {
    update({ academicRecords: [...list, ...records] });
    setBulkAdding(false);
  };
  const pleSave = (d) => {
    if (d.id) {
      update({ academicRecords: list.map(r => r.id === d.id ? d : r) });
    } else {
      update({ academicRecords: [...list, { ...d, id: uid() }] });
    }
    setPleAdding(false); setPleEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 항목을 삭제하시겠습니까?')) return;
    update({ academicRecords: list.filter(r => r.id !== id) });
  };

  // 정렬: PLE → 시작일 오름차순(과거→미래). 동일 기간이면 종료일·학교 순.
  // PLE 행들은 시간보다 앞이라 startDate 비어있어도 맨 위에.
  const FAR_FUTURE = '9999-12-31';
  const FAR_PAST = '0000-01-01';
  const sorted = [...filtered].sort((a, b) => {
    const sa = a.isPLE ? (a.startDate || FAR_PAST) : (a.startDate || FAR_FUTURE);
    const sb = b.isPLE ? (b.startDate || FAR_PAST) : (b.startDate || FAR_FUTURE);
    if (sa !== sb) return sa.localeCompare(sb);
    const ea = a.endDate || FAR_FUTURE;
    const eb = b.endDate || FAR_FUTURE;
    if (ea !== eb) return ea.localeCompare(eb);
    return (a.schoolId || '').localeCompare(b.schoolId || '');
  });

  const totalCredits = list.reduce((sum, r) => sum + (parseFloat(r.credits) || 0), 0);

  return (
    <Section
      title="대입로드맵 (학업/성적)"
      count={list.length}
      right={canEdit && (
        <div className="flex items-center gap-2">
          <button className="btn-ghost" onClick={() => setPleAdding(true)}>📜 PLE 인정 학점</button>
          <button className="btn-primary" onClick={() => setBulkAdding(true)}>+ 과목 일괄 추가</button>
        </div>
      )}
    >
      {/* 📋 OSSLT 응시 정보 — 학적 진행 상태 (학업메타에서 이동) */}
      <div className="notion-card p-4 mb-4" style={{ background:'#faf7f3' }}>
        <div className="flex items-center justify-between mb-3">
          <h4 className="font-semibold" style={{color:'#c20206'}}>📋 OSSLT (Ontario 영어 평가)</h4>
          <span className="text-xs text-gray-500">매년 4월·11월 실시</span>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
          <Field label="OSSLT 상태">
            {canEdit
              ? <Select value={academic.ossltStatus} onChange={(v) => setAcademic('ossltStatus', v)} options={OSSLT_STATUSES} placeholder="선택"/>
              : <div className="notion-input flex items-center" style={{background:'#fff', color:'#202731', height:34, padding:'4px 10px'}}>{academic.ossltStatus || <span className="text-gray-400">—</span>}</div>}
          </Field>
          <Field label="응시 년도">
            {canEdit
              ? <Select value={academic.ossltExamYear || ''} onChange={(v) => setAcademic('ossltExamYear', v)} options={ossltYears} placeholder="선택"/>
              : <div className="notion-input flex items-center" style={{background:'#fff', color:'#202731', height:34, padding:'4px 10px'}}>{academic.ossltExamYear || <span className="text-gray-400">—</span>}</div>}
          </Field>
          <Field label="응시 월">
            {canEdit
              ? <Select value={academic.ossltExamMonth || ''} onChange={(v) => setAcademic('ossltExamMonth', v)} options={['4월', '11월']} placeholder="선택"/>
              : <div className="notion-input flex items-center" style={{background:'#fff', color:'#202731', height:34, padding:'4px 10px'}}>{academic.ossltExamMonth || <span className="text-gray-400">—</span>}</div>}
          </Field>
        </div>
      </div>

      {/* 요약 */}
      <div className="grid grid-cols-2 gap-4 mb-4">
        <div className="notion-card p-3 text-center">
          <div className="text-xs text-gray-500">총 수강 과목</div>
          <div className="text-2xl font-bold mt-1">{list.length}</div>
        </div>
        <div className="notion-card p-3 text-center">
          <div className="text-xs text-gray-500">누적 학점</div>
          <div className="text-2xl font-bold mt-1">{totalCredits}</div>
        </div>
      </div>

      {/* 필터 */}
      <div className="flex flex-wrap gap-3 mb-4">
        <div className="w-56"><Field label="학교"><RefSelect value={filters.schoolId} onChange={(v) => setFilters({...filters, schoolId:v})} options={schools.map(s => ({ id: s.id, label: s.name }))} placeholder="전체"/></Field></div>
        <div className="w-32"><Field label="학년"><Select value={filters.grade} onChange={(v) => setFilters({...filters, grade:v})} options={GRADE_LEVELS} placeholder="전체"/></Field></div>
        <div className="w-44"><Field label="수업 형태"><Select value={filters.selection} onChange={(v) => setFilters({...filters, selection:v})} options={COURSE_SELECTIONS} placeholder="전체"/></Field></div>
      </div>

      {bulkAdding && (
        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold text-base mb-4">과목 일괄 등록 — 학교/학기/기간을 한번만 입력</h3>
          <BulkRoadmapEditor schools={schools} subjects={subjects} onSave={bulkSave} onCancel={() => setBulkAdding(false)}/>
        </div>
      )}

      {(pleAdding || pleEditing) && (
        <div className="notion-card p-5 mb-4" style={{ background:'#faf3e3', borderColor:'#e8c97a' }}>
          <h3 className="font-semibold text-base mb-2" style={{color:'#a67800'}}>📜 PLE 인정 학점 {pleEditing ? '수정' : '추가'}</h3>
          <div className="text-xs text-gray-600 mb-4">OSSD 외부 이수분 (한국 중3, 미국 Grade 9 등)을 온타리오 학점으로 인정받은 기록입니다. 학교·과목 선택 없이 학점만 등록됩니다.</div>
          <PLEEditor rec={pleEditing || {}} onSave={pleSave} onCancel={() => { setPleAdding(false); setPleEditing(null); }}/>
        </div>
      )}

      {editing && (
        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold text-base mb-4">과목 수정</h3>
          <RoadmapEditor rec={editing} schools={schools} subjects={subjects} onSave={upsert} onCancel={() => setEditing(null)}/>
        </div>
      )}

      <div className="notion-card overflow-hidden">
        <div className="overflow-auto">
          <table className="w-full">
            <thead><tr>
              <th className="table-th">학년</th>
              <th className="table-th">학교</th>
              <th className="table-th">학기</th>
              <th className="table-th">기간</th>
              <th className="table-th">코드</th>
              <th className="table-th">과목명</th>
              <th className="table-th">M1</th>
              <th className="table-th">M2</th>
              <th className="table-th">Final</th>
              <th className="table-th">지각</th>
              <th className="table-th">결석</th>
              <th className="table-th">필수</th>
              <th className="table-th">학점</th>
              <th className="table-th">수업형태</th>
              <th className="table-th">기타</th>
              <th className="table-th"></th>
            </tr></thead>
            <tbody>
              {sorted.length === 0 ? (
                <tr><td colSpan="16" className="text-center py-8 text-gray-400 text-sm">등록된 수강 기록이 없습니다.</td></tr>
              ) : (() => {
                // 그룹핑: PLE는 행 단위 독립, 일반 행은 학교+학기+학년+기간으로 묶어 rowSpan
                const groupKey = (x) => x.isPLE
                  ? `PLE|${x.id}`  // PLE는 매 행 독립
                  : `${x.schoolId}|${x.semesterSystem || ''}|${x.grade || ''}|${x.startDate || ''}|${x.endDate || ''}`;
                const groupSpans = {};
                const firstIndexOfGroup = {};
                sorted.forEach((x, i) => {
                  const k = groupKey(x);
                  if (firstIndexOfGroup[k] === undefined) firstIndexOfGroup[k] = i;
                  groupSpans[k] = (groupSpans[k] || 0) + 1;
                });
                return sorted.map((r, i) => {
                  const school = schools.find(s => s.id === r.schoolId);
                  const subject = subjects.find(s => s.id === r.subjectId);
                  const sys = r.semesterSystem || school?.semesterSystem || '';
                  const isYear = sys.startsWith('Year');
                  const k = groupKey(r);
                  const isFirst = firstIndexOfGroup[k] === i;
                  const span = groupSpans[k];
                  const rowBorderStyle = isFirst && i !== 0 ? { borderTop: '2px solid var(--border)' } : {};
                  // PLE 행: 골드 톤 배경
                  if (r.isPLE) {
                    return (
                      <tr key={r.id} className="row-hover" style={{ ...rowBorderStyle, background:'#faf3e3' }}>
                        <td className="table-td" style={{verticalAlign:'top'}}><span className="badge b-orange">📜 PLE</span></td>
                        <td className="table-td text-sm font-medium" colSpan="3" style={{verticalAlign:'top'}}>
                          <div style={{color:'#760305', fontWeight:600}}>지역: {r.pleRegion || '—'}</div>
                          {r.startDate && <div className="text-xs mt-0.5" style={{color:'#4a4a4a'}}>인정일: {r.startDate}</div>}
                        </td>
                        <td className="table-td font-mono text-xs" style={{color:'#a67800'}}>PLE</td>
                        <td className="table-td text-sm font-medium" style={{color:'#760305'}}>PLE 학점 인정</td>
                        <td className="table-td text-xs italic" colSpan="5" style={{color:'#8a7a55'}}>OSSD 외부 이수분 — 평가 항목 해당 없음</td>
                        <td className="table-td">
                          <input type="checkbox" readOnly className="accent-gray-300"/>
                        </td>
                        <td className="table-td text-base font-bold" style={{color:'#c20206'}}>{r.credits || '—'}</td>
                        <td className="table-td"><Badge value={r.selection}/></td>
                        <td className="table-td text-xs" style={{color:'#202731'}}>{r.memo || '—'}</td>
                        <td className="table-td text-right whitespace-nowrap">
                          {canEdit && <Fragment>
                            <button className="btn-ghost" onClick={() => setPleEditing(r)}>수정</button>
                            <button className="btn-danger" onClick={() => remove(r.id)}>삭제</button>
                          </Fragment>}
                        </td>
                      </tr>
                    );
                  }
                  // 일반 OSSD 행
                  const groupCellStyle = { background: '#faf7f3', verticalAlign: 'top' };
                  return (
                    <tr key={r.id} className="row-hover" style={rowBorderStyle}>
                      {isFirst && <td className="table-td" rowSpan={span} style={groupCellStyle}><Badge value={r.grade}/></td>}
                      {isFirst && <td className="table-td text-sm" rowSpan={span} style={groupCellStyle}>{school?.name || '—'}</td>}
                      {isFirst && <td className="table-td" rowSpan={span} style={groupCellStyle}><Badge value={sys}/></td>}
                      {isFirst && <td className="table-td text-xs text-gray-600" rowSpan={span} style={groupCellStyle}>
                        <div>{r.startDate}</div><div className="text-gray-400">~</div><div>{r.endDate}</div>
                      </td>}
                      <td className="table-td font-mono text-xs">{subject?.code || '—'}</td>
                      <td className="table-td text-sm">{subject?.name || '—'}</td>
                      <td className="table-td text-sm">{r.midterm1 || <span className="text-gray-300">—</span>}</td>
                      <td className="table-td text-sm">{isYear ? (r.midterm2 || <span className="text-gray-300">—</span>) : <span className="text-gray-200 text-xs">N/A</span>}</td>
                      <td className="table-td text-sm">{r.final || <span className="text-gray-300">—</span>}</td>
                      <td className="table-td text-sm">{r.late || <span className="text-gray-300">—</span>}</td>
                      <td className="table-td text-sm">{r.absent || <span className="text-gray-300">—</span>}</td>
                      <td className="table-td">
                        {r.required ? <input type="checkbox" checked readOnly className="accent-gray-800"/> : <input type="checkbox" readOnly className="accent-gray-300"/>}
                      </td>
                      <td className="table-td text-sm">{r.credits || '—'}</td>
                      <td className="table-td"><Badge value={r.selection}/></td>
                      <td className="table-td text-xs text-gray-600">{r.memo || '—'}</td>
                      <td className="table-td text-right whitespace-nowrap">
                        {canEdit && <Fragment>
                          <button className="btn-ghost" onClick={() => setEditing(r)}>수정</button>
                          <button className="btn-danger" onClick={() => remove(r.id)}>삭제</button>
                        </Fragment>}
                      </td>
                    </tr>
                  );
                });
              })()}
            </tbody>
          </table>
        </div>
      </div>
    </Section>
  );
};

// D. EC 관리
// 레거시 type → 신규 category 매핑
const EC_TYPE_TO_CATEGORY = {
  '클럽': '학교클럽',
  '리더십': '학교클럽',
  '봉사활동': '봉사활동',
  '대회': '대회 및 수상',
  '인턴십': '특별 프로그램',
  '캠프': '특별 프로그램',
  '포트폴리오': '개별 특성화 활동',
  '기타': '개별 특성화 활동'
};

const ECEditor = ({ ec, ecMasters=[], onSave, onCancel }) => {
  const [draft, setDraft] = useState(ec);
  const set = (k, v) => setDraft({ ...draft, [k]: v });
  const cat = draft.category || EC_TYPE_TO_CATEGORY[draft.type] || '';
  const contactRequired = EC_CONTACT_REQUIRED.includes(cat);
  const star = (txt) => contactRequired ? `${txt} *` : txt;

  // 🌟 마스터에서 선택 시 자동 채움
  const selectMaster = (masterId) => {
    if (!masterId) { setDraft({...draft, ecMasterId: ''}); return; }
    const m = ecMasters.find(x => x.id === masterId);
    if (!m) return;
    setDraft({
      ...draft,
      ecMasterId: m.id,
      category: m.category || draft.category,
      activityName: m.name || draft.activityName,
      organizationName: m.organizationName || draft.organizationName,
      frequency: m.frequency || draft.frequency,
      contactName: m.contactName || draft.contactName,
      contactEmail: m.contactEmail || draft.contactEmail,
      contactPhone: m.contactPhone || draft.contactPhone,
      admissionsValue: m.admissionsValue || draft.admissionsValue,
      description: draft.description || m.description || ''
    });
  };

  const validate = () => {
    if (!cat) return 'EC 카테고리를 선택해주세요.';
    if (!draft.activityName?.trim()) return '활동명을 입력해주세요.';
    if (contactRequired) {
      if (!draft.organizationName?.trim()) return `[${cat}] 주최기관은 필수입니다.`;
      if (!draft.contactName?.trim()) return `[${cat}] 담당자 이름은 필수입니다.`;
      if (!draft.contactEmail?.trim()) return `[${cat}] 담당자 이메일은 필수입니다.`;
      // 봉사활동은 이메일만 받는 기관이 많아 연락처는 선택. 학교클럽은 기존대로 필수
      if (cat !== '봉사활동' && !draft.contactPhone?.trim()) return `[${cat}] 담당자 연락처는 필수입니다.`;
    }
    return null;
  };
  const handleSave = () => {
    const err = validate();
    if (err) { alert(err); return; }
    onSave({ ...draft, category: cat });
  };

  return (
    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
      {/* 🌟 EC 마스터 카탈로그에서 선택 (선택 사항) */}
      <Field label="🌟 EC 카탈로그에서 선택 (선택 사항 — 자동 채움)" span={3}>
        <RefSelect
          value={draft.ecMasterId || ''}
          onChange={selectMaster}
          options={ecMasters.filter(m => m.status !== '검토 중 (후보)').map(m => ({
            id: m.id,
            label: `[${m.category}] ${m.name}${m.organizationName ? ` — ${m.organizationName}` : ''}`
          }))}
          placeholder="BUPP가 큐레이션한 활동에서 선택 (또는 직접 입력)"
        />
        {draft.ecMasterId && (() => {
          const m = ecMasters.find(x => x.id === draft.ecMasterId);
          return m ? (
            <div className="text-xs mt-1.5 p-2 rounded" style={{background:'#ddedea', color:'#0f7b6c', border:'1px solid #0f7b6c'}}>
              ✓ <strong>{m.name}</strong> 연결됨 · 활동 정보가 자동으로 채워졌습니다. 학생 본인 정보(시작일·시간·포지션 등)만 입력하세요.
            </div>
          ) : null;
        })()}
      </Field>

      {/* 카테고리 선택 (최상위) */}
      <Field label="EC 카테고리 *" span={3}>
        <Select value={cat} onChange={(v) => set('category', v)} options={EC_CATEGORIES} placeholder="카테고리 선택"/>
        {contactRequired && (
          <div className="text-xs text-orange-600 mt-1">
            ⚠ {cat}은(는) 주최기관 + 담당자(이름·이메일{cat === '봉사활동' ? '' : '·연락처'})가 필수입니다.
            {cat === '봉사활동' && <span className="text-gray-500 ml-1">· 연락처는 선택 (이메일만 받는 기관 케이스)</span>}
          </div>
        )}
      </Field>

      {/* 공통 기본 정보 — 대회는 시작/종료일 없이 대회 일정 한 필드만 */}
      <Field label="활동명 *"><TextInput value={draft.activityName} onChange={(v) => set('activityName', v)}/></Field>
      {cat !== '대회 및 수상' && (
        <Fragment>
          <Field label="시작일"><TextInput type="date" value={draft.startDate} onChange={(v) => set('startDate', v)}/></Field>
          <Field label="종료일"><TextInput type="date" value={draft.endDate} onChange={(v) => set('endDate', v)}/></Field>
        </Fragment>
      )}
      <Field label="진행 상태"><Select value={draft.status} onChange={(v) => set('status', v)} options={EC_STATUSES}/></Field>
      <Field label="대입 활용 가능성"><Select value={draft.admissionsValue} onChange={(v) => set('admissionsValue', v)} options={EC_VALUES}/></Field>

      {/* === 카테고리별 분기 === */}

      {cat === '봉사활동' && (
        <Fragment>
          <Field label={star('주최기관')}><TextInput value={draft.organizationName} onChange={(v) => set('organizationName', v)} placeholder="예) Toronto Food Bank"/></Field>
          <Field label="총 봉사 시간"><TextInput value={draft.totalHours} onChange={(v) => set('totalHours', v)} placeholder="예) 40"/></Field>

        </Fragment>

          <Field label={star('Supervisor 이메일')}><TextInput type="email" value={draft.contactEmail} onChange={(v) => set('contactEmail', v)}/></Field>
          <Field label={star('Supervisor 연락처')}><TextInput value={draft.contactPhone} onChange={(v) => set('contactPhone', v)} placeholder="전화/이메일/기타"/></Field>
          <div className="col-span-3 text-xs p-3 rounded" style={{background:'#faf3e3', color:'#760305', border:'1px solid #e8c97a'}}>
            💡 같은 클럽을 여러 학년 이어간다면 학년마다 새 EC 항목으로 추가하세요. 시스템이 같은 활동명을 자동으로 묶어 진급 흐름을 표시합니다.
          </div>
        </Fragment>
      )}

      {cat === '대회 및 수상' && (
        <Fragment>
          <Field label="대회명 / 주최기관"><TextInput value={draft.organizationName} onChange={(v) => set('organizationName', v)} placeholder="예) FIRST FRC at McMaster"/></Field>
          <Field label="대회 일정"><TextInput value={draft.frequency} onChange={(v) => set('frequency', v)} placeholder="예) March 13-14, 2026"/></Field>
          <Field label="🏆 수상 여부">
            <div className="pt-2"><Toggle value={!!draft.awardWon} onChange={(v) => set('awardWon', v)} label={draft.awardWon ? '수상' : '참여만'}/></div>
          </Field>
          <Field label={draft.awardWon ? '🏆 수상 결과' : '활동 결과 (선택)'} span={3}>
            <TextArea
              value={draft.awardDescription}
              onChange={(v) => set('awardDescription', v)}
              placeholder={draft.awardWon
                ? '예) Excellence in Engineering Award & Finals Silver Medal / Top 25% / Advanced to Semifinals'
                : '예) Reached Quarterfinals / Top 30 진출 / 본선 참가 등 (수상 X)'}
              rows={2}
            />
          </Field>
        </Fragment>
      )}

      {cat === '특별 프로그램' && (
        <Fragment>
          <Field label="주최기관"><TextInput value={draft.organizationName} onChange={(v) => set('organizationName', v)} placeholder="예) UofT International Programs Office"/></Field>
          <Field label="담당자 이름"><TextInput value={draft.contactName} onChange={(v) => set('contactName', v)} placeholder="예) Nicola Carozza / Assistant Director"/></Field>
          <Field label="담당자 이메일"><TextInput type="email" value={draft.contactEmail} onChange={(v) => set('contactEmail', v)}/></Field>
          <Field label="담당자 연락처"><TextInput value={draft.contactPhone} onChange={(v) => set('contactPhone', v)} placeholder="전화/메모"/></Field>
        </Fragment>
      )}

      {cat === '개별 특성화 활동' && (
        <Fragment>
          <Field label="활동 분야 / 형태"><TextInput value={draft.organizationName} onChange={(v) => set('organizationName', v)} placeholder="예) 개인 포트폴리오, 자기주도 프로젝트"/></Field>
          <Field label="총 시간 / 분량"><TextInput value={draft.totalHours} onChange={(v) => set('totalHours', v)}/></Field>
          <Field label="외부 연락처 (선택)" span={3}>
            <div className="grid grid-cols-3 gap-2">
              <TextInput value={draft.contactName} onChange={(v) => set('contactName', v)} placeholder="이름"/>
              <TextInput type="email" value={draft.contactEmail} onChange={(v) => set('contactEmail', v)} placeholder="이메일"/>

      <div className="col-span-3 flex justify-end gap-2">
