    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
    color: var(--text-soft);
    cursor: pointer;
    transition: all .15s;

  .tab-btn.active { background: var(--brand-cream); color: var(--brand-red); font-weight: 600; }

  .btn-primary {
    background: var(--brand-red); color: #fff;

    font-size: 14px; font-weight: 500;

    color: var(--text-soft);

    border-bottom: 1px solid var(--border);

const calcAge = (birth) => {
  if (!birth) return '';
  const b = new Date(birth);
  if (isNaN(b)) return '';
  const today = new Date();
  let age = today.getFullYear() - b.getFullYear();
  const m = today.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < b.getDate())) age--;
  return String(age);
};

const STORE_KEY = 'bupp_students_v1';
const loadStudents = () => {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return SAMPLE_STUDENTS;
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) && parsed.length ? parsed : SAMPLE_STUDENTS;
  } catch { return SAMPLE_STUDENTS; }
};
const saveStudents = (data) => {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch {}
};

const OPTIONS_KEY = 'bupp_options_v1';
const DEFAULT_OPTIONS = {
  category: [...CATEGORIES],   // 브듀 / 외부 / 단기 + (파트너사 등 추가)
  cohort: [...BUPP_COHORTS],   // BUPP 12~18기 기본 시드
  currentSchool: []            // 사용자 지정 학교
};
const loadOptions = () => {
  try {
    const raw = localStorage.getItem(OPTIONS_KEY);
    if (!raw) return { ...DEFAULT_OPTIONS };
    const parsed = JSON.parse(raw);
    // 기존 cohort에 BUPP_COHORTS를 병합 (없으면 추가)
    const existingCohorts = parsed.cohort || [];
    const mergedCohorts = [...BUPP_COHORTS];
    existingCohorts.forEach(c => { if (!mergedCohorts.includes(c)) mergedCohorts.push(c); });
    return {
      category: parsed.category?.length ? parsed.category : [...CATEGORIES],
      cohort: mergedCohorts,
      currentSchool: parsed.currentSchool || []
    };
  } catch { return { ...DEFAULT_OPTIONS }; }

/* 사용자가 새 옵션을 직접 추가할 수 있는 콤보 셀렉트.
   options: 현재까지의 옵션 목록
   onAddCustom(value): 새 항목을 글로벌 옵션 목록에 추가
   onRemoveCustom(value): 옵션 자체 삭제 (선택값은 유지)
*/
const ComboSelect = ({ value, onChange, options, onAddCustom, onRemoveCustom, placeholder='선택', allowRemove=true }) => {
  const [open, setOpen] = useState(false);
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState('');
  const ref = useRef(null);

  useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) {
        setOpen(false); setAdding(false); setDraft('');
      }
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const commitAdd = () => {
    const v = draft.trim();
    if (!v) return;
    if (onAddCustom) onAddCustom(v);
    onChange(v);
    setDraft(''); setAdding(false); setOpen(false);
  };

  const opts = options || [];

  return (
    <div ref={ref} className="relative">
      <button
        type="button"
        className="notion-input text-left flex justify-between items-center"
        onClick={() => setOpen(!open)}
        style={{ cursor:'pointer' }}
      >
        <span className={value ? '' : 'text-gray-400'}>{value || placeholder}</span>
        <span className="text-gray-400 ml-2 text-xs">▾</span>
      </button>
      {open && (
        <div
          className="absolute z-30 mt-1 w-full bg-white rounded-md max-h-64 overflow-auto"
          style={{ boxShadow:'0 8px 24px rgba(0,0,0,.12)', border:'1px solid #ebebea' }}
        >
          {opts.length === 0 && !adding && (
            <div className="px-3 py-2 text-sm text-gray-400">등록된 항목이 없습니다</div>
          )}
          {opts.map(o => (
            <div
              key={o}
              className="px-3 py-2 text-sm cursor-pointer flex items-center justify-between group"
              style={{ background: value === o ? '#f1f1ef' : 'transparent' }}
              onMouseEnter={(e) => { if (value !== o) e.currentTarget.style.background = '#fafaf9'; }}
              onMouseLeave={(e) => { if (value !== o) e.currentTarget.style.background = 'transparent'; }}
              onClick={() => { onChange(o); setOpen(false); }}
            >
              <span>{o}{value === o && <span className="ml-2 text-blue-500">✓</span>}</span>
              {allowRemove && onRemoveCustom && (
                <button
                  className="opacity-0 group-hover:opacity-100 text-xs text-gray-400 hover:text-red-500 ml-2"
                  title="목록에서 삭제"
                  onClick={(e) => {
                    e.stopPropagation();
                    if (confirm(`"${o}" 항목을 목록에서 삭제할까요?\n(기존 학생 데이터의 선택값은 그대로 유지됩니다)`)) {
                      onRemoveCustom(o);
                    }
                  }}
                >×</button>
              )}
            </div>
          ))}
          <div className="border-t border-gray-100 sticky bottom-0 bg-white">
            {adding ? (
              <div className="p-2 flex gap-1">
                <input
                  autoFocus
                  className="notion-input"
                  placeholder="새 항목 입력 후 Enter"
                  value={draft}
                  onChange={(e) => setDraft(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === 'Enter') { e.preventDefault(); commitAdd(); }
                    else if (e.key === 'Escape') { setAdding(false); setDraft(''); }
                  }}
                />
                <button className="btn-primary" onClick={commitAdd}>추가</button>
              </div>
            ) : (
              <div
                className="px-3 py-2 text-sm cursor-pointer text-blue-600 font-medium"
                onMouseEnter={(e) => e.currentTarget.style.background = '#fafaf9'}
                onMouseLeave={(e) => e.currentTarget.style.background = '#fff'}
                onClick={() => setAdding(true)}
              >+ 새 항목 추가</div>
            )}
            {value && (
              <div
                className="px-3 py-2 text-sm cursor-pointer text-red-500 border-t border-gray-100"
                onMouseEnter={(e) => e.currentTarget.style.background = '#fff5f5'}
                onMouseLeave={(e) => e.currentTarget.style.background = '#fff'}
                onClick={() => { onChange(''); setOpen(false); }}
              >× 선택 해제</div>
            )}
          </div>
        </div>
      )}
    </div>
  );
};

/* 다중 선택 (선수과목, 제공과정 등에 사용) */
const MultiSelect = ({ value=[], onChange, options, getLabel=(o)=>o, getValue=(o)=>o, placeholder='선택' }) => {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  const toggle = (v) => {
    if (value.includes(v)) onChange(value.filter(x => x !== v));
    else onChange([...value, v]);
  };
  const labelFor = (v) => {
    const o = options.find(o => getValue(o) === v);
    return o ? getLabel(o) : v;
  };
  return (
    <div ref={ref} className="relative">
      <button
        type="button"
        className="notion-input text-left flex flex-wrap gap-1 items-center"
        style={{ minHeight:32, cursor:'pointer' }}
        onClick={() => setOpen(!open)}
      >
        {value.length === 0 ? (
          <span className="text-gray-400">{placeholder}</span>
        ) : value.map(v => (
          <span key={v} className="badge b-gray" onClick={(e) => { e.stopPropagation(); toggle(v); }} style={{ cursor:'pointer' }}>
            {labelFor(v)} <span className="ml-1 text-gray-500">×</span>
          </span>
        ))}
        <span className="ml-auto text-gray-400 text-xs">▾</span>
      </button>
      {open && (
        <div className="absolute z-30 mt-1 w-full bg-white rounded-md max-h-64 overflow-auto"
          style={{ boxShadow:'0 8px 24px rgba(0,0,0,.12)', border:'1px solid #ebebea' }}>
          {options.length === 0 && <div className="px-3 py-2 text-sm text-gray-400">옵션이 없습니다</div>}
          {options.map(o => {
            const v = getValue(o);
            const selected = value.includes(v);
            return (
              <div key={v}
                className="px-3 py-2 text-sm cursor-pointer flex items-center gap-2"
                style={{ background: selected ? '#f1f1ef' : 'transparent' }}
                onMouseEnter={(e) => { if (!selected) e.currentTarget.style.background = '#fafaf9'; }}
                onMouseLeave={(e) => { if (!selected) e.currentTarget.style.background = 'transparent'; }}
                onClick={() => toggle(v)}
              >
                <input type="checkbox" readOnly checked={selected} className="w-4 h-4 accent-gray-800" />
                <span>{getLabel(o)}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

/* ============================================================
   학생 목록 (with filters)
   ============================================================ */
const StudentList = ({ students, onOpen, onAdd, customOptions, role='admin' }) => {
  const canAdd = role === 'admin' || role === 'bu_staff';
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState({
    admissionStatus: '', category: '', cohort: '', currentSchool: '',
    officialGrade: '', actualGrade: '', program: '',
    ieltsStatus: '', accommodationType: '', ecActive: ''
  });

  const set = (k, v) => setFilters((p) => ({ ...p, [k]: v }));

  const distinct = (key, getter) => {
    const s = new Set();
    students.forEach(st => {
      const v = getter ? getter(st) : st[key];
      if (v) s.add(v);
    });
    return Array.from(s).sort();
  };

  // 사용자가 등록한 옵션 + 실제 학생 데이터에 등장한 값 → 합집합
  const mergeOpts = (key) => {
    const set = new Set([
      ...(customOptions?.[key] || []),
      ...distinct(key)
    ]);
    return Array.from(set).sort();
  };

  const categoryOpts = mergeOpts('category');
  const cohortOpts = mergeOpts('cohort');
  const schoolOpts = mergeOpts('currentSchool');
  const officialGradeOpts = distinct('officialGrade');
  const actualGradeOpts = distinct('actualGrade');

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    return students.filter(s => {
      if (q) {
        const blob = [
          s.koreanName, s.englishName, s.currentSchool, s.cohort,
          s.guardianManager, s.studentId, s.bpid
        ].filter(Boolean).join(' ').toLowerCase();
        if (!blob.includes(q)) return false;
      }
      if (filters.admissionStatus && s.admissionStatus !== filters.admissionStatus) return false;
      if (filters.category && s.category !== filters.category) return false;
      if (filters.cohort && s.cohort !== filters.cohort) return false;
      if (filters.currentSchool && s.currentSchool !== filters.currentSchool) return false;
      if (filters.officialGrade && s.officialGrade !== filters.officialGrade) return false;
      if (filters.actualGrade && s.actualGrade !== filters.actualGrade) return false;
      if (filters.program && s.program !== filters.program) return false;
      if (filters.ieltsStatus && (s.academic?.englishTest?.status || s.academic?.ieltsStatus) !== filters.ieltsStatus) return false;
      if (filters.accommodationType && s.accommodation?.type !== filters.accommodationType) return false;
      if (filters.ecActive === 'Y' && !(s.extracurriculars || []).some(e => e.status === '진행중')) return false;
      if (filters.ecActive === 'N' && (s.extracurriculars || []).some(e => e.status === '진행중')) return false;
      return true;
    });
  }, [students, search, filters]);

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">학생 관리</h1>
          <p className="text-sm text-gray-500 mt-1">전체 {students.length}명 · 필터 결과 {filtered.length}명</p>
        </div>
        <div className="flex items-center gap-2">
          <input
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder="이름, 학교, 기수로 검색..."
            className="notion-input w-72"
          />
          {canAdd && <button className="btn-primary" onClick={onAdd}>+ 새 학생 추가</button>}
        </div>
      </div>

      {/* 필터 영역 */}
      <div className="notion-card p-4 mb-4">
        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3">
          <Field label="현재상태">
            <Select value={filters.admissionStatus} onChange={(v) => set('admissionStatus', v)} options={ADMISSION_STATUSES} placeholder="전체" />
          </Field>
          <Field label="구분">
            <Select value={filters.category} onChange={(v) => set('category', v)} options={categoryOpts} placeholder="전체" />
          </Field>
          <Field label="기수">
            <Select value={filters.cohort} onChange={(v) => set('cohort', v)} options={cohortOpts} placeholder="전체" />
          </Field>
          <Field label="재학 학교">
            <Select value={filters.currentSchool} onChange={(v) => set('currentSchool', v)} options={schoolOpts} placeholder="전체" />
          </Field>
          <Field label="공식학년">
            <Select value={filters.officialGrade} onChange={(v) => set('officialGrade', v)} options={officialGradeOpts} placeholder="전체" />
          </Field>
          <Field label="실제학년">
            <Select value={filters.actualGrade} onChange={(v) => set('actualGrade', v)} options={actualGradeOpts} placeholder="전체" />
          </Field>
          <Field label="BUPP 프로그램">
            <Select value={filters.program} onChange={(v) => set('program', v)} options={BUPP_PROGRAMS} placeholder="전체" />
          </Field>
          <Field label="공인 영어 상태">
            <Select value={filters.ieltsStatus} onChange={(v) => set('ieltsStatus', v)} options={IELTS_STATUSES} placeholder="전체" />
          </Field>
          <Field label="숙소 형태">
            <Select value={filters.accommodationType} onChange={(v) => set('accommodationType', v)} options={ACCOM_TYPES} placeholder="전체" />
          </Field>
          <Field label="EC 진행 여부">
            <Select value={filters.ecActive} onChange={(v) => set('ecActive', v)} options={['Y','N']} placeholder="전체" />
          </Field>
        </div>
        {Object.values(filters).some(Boolean) && (
          <div className="mt-3 flex justify-end">
            <button className="btn-ghost" onClick={() => setFilters({
              admissionStatus:'', category:'', cohort:'', currentSchool:'',
              officialGrade:'', actualGrade:'', program:'', ieltsStatus:'',
              accommodationType:'', ecActive:''
            })}>필터 초기화</button>
          </div>
        )}
      </div>

      {/* 학생 테이블 */}
      <div className="notion-card overflow-hidden">
        <div className="overflow-auto" style={{ maxHeight: 'calc(100vh - 340px)' }}>
          <table className="w-full">
            <thead>
              <tr>
                <th className="table-th">한글 이름</th>
                <th className="table-th">영문 이름</th>
                <th className="table-th">현재상태</th>
                <th className="table-th">구분</th>
                <th className="table-th">기수</th>
                <th className="table-th">재학 학교</th>
                <th className="table-th">공식학년</th>
                <th className="table-th">실제학년</th>
                <th className="table-th">아이엘츠</th>
                <th className="table-th">숙소</th>
                <th className="table-th">EC</th>
                <th className="table-th">프로그램</th>
                <th className="table-th">담당자</th>
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr><td colSpan="13" className="text-center py-12 text-gray-400 text-sm">조건에 맞는 학생이 없습니다.</td></tr>
              ) : filtered.map(s => {
                const activeEC = (s.extracurriculars || []).filter(e => e.status === '진행중').length;
                return (
                  <tr key={s.id} className="row-hover cursor-pointer" onClick={() => onOpen(s.id)}>
                    <td className="table-td">
                      <span className="font-medium text-gray-800 hover:underline">{s.koreanName || '—'}</span>
                    </td>
                    <td className="table-td text-gray-600">{s.englishName || '—'}</td>
                    <td className="table-td"><Badge value={s.admissionStatus}/></td>
                    <td className="table-td"><Badge value={s.category}/></td>
                    <td className="table-td text-gray-600">{s.cohort || '—'}</td>
                    <td className="table-td text-gray-600">{s.currentSchool || '—'}</td>
                    <td className="table-td text-gray-600">{s.officialGrade || '—'}</td>
                    <td className="table-td text-gray-600">{s.actualGrade || '—'}</td>
                    <td className="table-td">
                      {s.academic?.englishTest?.type && <span className="badge b-gray text-xs mr-1">{s.academic.englishTest.type}</span>}
                      <Badge value={s.academic?.englishTest?.status || s.academic?.ieltsStatus}/>
                    </td>
                    <td className="table-td"><Badge value={s.accommodation?.type}/></td>
                    <td className="table-td">
                      {activeEC > 0
                        ? <span className="badge b-green">진행 {activeEC}</span>
                        : <span className="text-gray-300 text-xs">없음</span>}
                    </td>
                    <td className="table-td">
                      {s.program
                        ? <Badge value={s.program}/>
                        : <span className="text-gray-300 text-xs">—</span>}
                    </td>
                    <td className="table-td text-gray-600">{s.guardianManager || '—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

  const [sub, setSub] = useState('universities'); // universities | programs | trackGroups

  const visibleUnis = universities.filter(u => u.country === country);
  const visiblePrograms = programs.filter(p => visibleUnis.some(u => u.id === p.universityId));

  return (
    <div className="max-w-[1500px] mx-auto px-8 py-8">
      <div className="mb-6">
        <h1 className="text-2xl font-bold">🎓 대학 데이터</h1>
        <p className="text-sm text-gray-500 mt-1">국가별로 대학 · 전공 · 트랙 그룹 마스터를 관리합니다. 학생 대학지원에서 이 데이터를 참조합니다.</p>
      </div>

      {/* 국가 탭 */}
      <div className="flex gap-1 mb-4 border-b border-gray-200">
        {COUNTRIES.map(c => (
          <button key={c}
            className="px-4 py-2 text-sm border-b-2 transition-colors"
            style={{
              borderColor: country === c ? '#37352f' : 'transparent',
              fontWeight: country === c ? 600 : 400,
              color: country === c ? '#37352f' : '#787774'
            }}

          >{COUNTRY_LABEL[c]}</button>
        ))}
      </div>

      {/* 서브탭 */}
      <div className="flex gap-1 mb-4">
        {[
          { id:'universities', label:`🏛 대학 (${visibleUnis.length})` },
          { id:'programs', label:`📖 전공 (${visiblePrograms.length})` },
          { id:'trackGroups', label:`🎯 트랙 그룹 (${visibleGroups.length})` }
        ].map(t => (
          <button key={t.id}
            className={`tab-btn ${sub === t.id ? 'active':''}`}
            onClick={() => setSub(t.id)}
          >{t.label}</button>
        ))}
      </div>

      {sub === 'universities' && (
        <UniversitySubList universities={universities} country={country} onChange={onChangeUniversities}/>
      )}
      {sub === 'programs' && (
        <ProgramSubList programs={programs} universities={universities} trackGroups={trackGroups} country={country} onChange={onChangePrograms}/>
      )}
      {sub === 'trackGroups' && (
        <TrackGroupSubList trackGroups={trackGroups} country={country} onChange={onChangeTrackGroups}/>
      )}
    </div>
  );
};

// 작은 사진 갤러리 (URL 입력 + 미리보기)
const PhotoUrlGallery = ({ photos=[], onChange, maxCount=2, label='사진' }) => {
  const set = (i, v) => {
    const next = [...photos];
    next[i] = v;
    onChange(next.filter((p, idx) => p || idx < photos.length));
  };
  const remove = (i) => {
    const next = [...photos]; next.splice(i, 1); onChange(next);
  };
  const add = () => {
    if (photos.length >= maxCount) return;
    onChange([...photos, '']);
  };
  return (
    <div className="space-y-2">
      {photos.map((url, i) => (
        <div key={i} className="flex gap-2 items-center">
          <input className="notion-input text-xs" value={url} onChange={(e) => set(i, e.target.value)} placeholder={`${label} URL ${i+1}`}/>
          {url && <img src={url} alt="" style={{ width:48, height:48, objectFit:'cover', borderRadius:6, border:'1px solid var(--border)' }}/>}
          <button className="btn-danger text-xs" onClick={() => remove(i)}>×</button>
        </div>
      ))}
      {photos.length < maxCount && (
        <button className="btn-ghost text-xs" onClick={add}>+ 사진 추가 ({photos.length}/{maxCount})</button>
      )}
    </div>
  );
};

// 학교 거리 입력 다중
const SchoolDistanceList = ({ items=[], onChange, schools=[] }) => {
  const updateItem = (i, k, v) => {
    const next = [...items]; next[i] = { ...next[i], [k]: v }; onChange(next);
  };
  const add = () => onChange([...items, { school:'', distance:'' }]);
  const remove = (i) => { const next = [...items]; next.splice(i, 1); onChange(next); };
  return (
    <div className="space-y-2">
      {items.map((it, i) => (
        <div key={i} className="grid grid-cols-2 gap-2">
          <input className="notion-input text-xs" value={it.school} onChange={(e) => updateItem(i, 'school', e.target.value)} placeholder="학교명"/>
          <div className="flex gap-2">
            <input className="notion-input text-xs flex-1" value={it.distance} onChange={(e) => updateItem(i, 'distance', e.target.value)} placeholder="거리 / 통학방법"/>
            <button className="btn-danger text-xs" onClick={() => remove(i)}>×</button>
          </div>

};

// 입실 가능 날짜 대시보드 — 홈스테이 + 기숙사 방들의 availableFromDate 표시
const AvailabilityDashboard = ({ accommodations, onJump }) => {
  const [viewMode, setViewMode] = useState('calendar'); // calendar | list
  const [currentMonth, setCurrentMonth] = useState(() => {
    const d = new Date();
    return new Date(d.getFullYear(), d.getMonth(), 1);
  });

  // 홈스테이 + 기숙사 방만 집계, availableFromDate가 있는 것만
  const rooms = [];
  accommodations.forEach(a => {
    if (a.category !== '홈스테이' && a.category !== '기숙사') return;
    (a.rooms || []).forEach(r => {
      if (!r.availableFromDate) return;
      rooms.push({
        date: r.availableFromDate,
        accommodationId: a.id,
        accommodationName: a.name,
        accommodationCategory: a.category,
        accommodationSubCategory: a.subCategory || '',
        roomId: r.id,
        roomName: r.name || '(이름 없음)',
        occupied: (r.currentOccupants || []).length > 0
      });
    });
  });

  // 캘린더 뷰 계산
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth(); // 0-indexed
  const monthLabel = `${year}년 ${month + 1}월`;
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDayOfWeek = firstDay.getDay(); // 0=Sun
  const daysInMonth = lastDay.getDate();
  const monthStr = `${year}-${String(month + 1).padStart(2, '0')}`;

  // 날짜별 그룹 (캘린더용)
  const roomsByDate = {};
  rooms.forEach(r => {
    if (!roomsByDate[r.date]) roomsByDate[r.date] = [];
    roomsByDate[r.date].push(r);
  });
  const currentMonthRooms = rooms.filter(r => r.date.startsWith(monthStr));

  // 월별 그룹 (목록용)
  const roomsByMonth = {};
  rooms.forEach(r => {
    const ym = r.date.substring(0, 7);
    if (!roomsByMonth[ym]) roomsByMonth[ym] = [];
    roomsByMonth[ym].push(r);
  });
  // 각 월 내부 날짜순 정렬
  Object.keys(roomsByMonth).forEach(ym => {
    roomsByMonth[ym].sort((a, b) => a.date.localeCompare(b.date));
  });
  const sortedMonths = Object.keys(roomsByMonth).sort();

  const goMonth = (delta) => {
    const d = new Date(year, month + delta, 1);
    setCurrentMonth(d);
  };
  const goToday = () => {
    const d = new Date();
    setCurrentMonth(new Date(d.getFullYear(), d.getMonth(), 1));
  };

  const dayLabels = ['일', '월', '화', '수', '목', '금', '토'];
  const todayStr = new Date().toISOString().slice(0, 10);

  // 캘린더 셀 만들기
  const cells = [];
  for (let i = 0; i < startDayOfWeek; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    cells.push({ day: d, dateStr: ds, rooms: roomsByDate[ds] || [] });
  }
  while (cells.length % 7 !== 0) cells.push(null);

  return (
    <div className="notion-card mb-6 overflow-hidden">
      <div className="px-5 py-4 flex items-center justify-between" style={{ background:'#faf7f3', borderBottom:'1px solid var(--border)' }}>
        <div>
          <h2 className="text-lg font-bold" style={{color:'#c20206'}}>📅 입실 가능 날짜 (홈스테이 · 기숙사)</h2>
          <p className="text-xs text-gray-500 mt-1">전체 {rooms.length}개 방 — 이번 달 {currentMonthRooms.length}개</p>
        </div>
        <div className="flex gap-1">
          <button className={`tab-btn ${viewMode === 'calendar' ? 'active':''}`} onClick={() => setViewMode('calendar')}>📆 캘린더</button>
          <button className={`tab-btn ${viewMode === 'list' ? 'active':''}`} onClick={() => setViewMode('list')}>📋 월별 목록</button>
        </div>
      </div>

      {viewMode === 'calendar' && (
        <div className="p-5">
          {/* 월 네비게이션 */}
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2">
              <button className="btn-ghost" onClick={() => goMonth(-1)}>◀</button>
              <div className="font-semibold text-base px-3">{monthLabel}</div>
              <button className="btn-ghost" onClick={() => goMonth(1)}>▶</button>
            </div>
            <button className="btn-ghost text-xs" onClick={goToday}>오늘로</button>
          </div>

          {/* 요일 헤더 */}
          <div className="grid grid-cols-7 gap-1 mb-1">
            {dayLabels.map((d, i) => (
              <div key={d} className="text-xs text-center font-semibold py-1" style={{ color: i === 0 ? '#c20206' : i === 6 ? '#0b6e99' : '#4a4a4a' }}>{d}</div>
            ))}
          </div>

          {/* 날짜 셀들 */}
          <div className="grid grid-cols-7 gap-1">
            {cells.map((c, i) => (
              <div key={i} className="rounded p-2 text-xs"
                style={{
                  minHeight: 90,
                  background: !c ? 'transparent' : (c.dateStr === todayStr ? '#fbe0e0' : '#fff'),
                  border: c ? '1px solid var(--border)' : 'none',
                }}>
                {c && (
                  <Fragment>
                    <div className="text-right text-xs font-semibold mb-1" style={{ color: c.dateStr === todayStr ? '#c20206' : '#4a4a4a' }}>
                      {c.day}
                    </div>
                    {c.rooms.map((r, idx) => (
                      <div key={idx}
                        onClick={() => onJump && onJump(r.accommodationId)}
                        className="cursor-pointer p-1 mb-1 rounded text-xs leading-tight"
                        style={{
                          background: r.accommodationCategory === '홈스테이' ? '#fbe0e0' : '#ddebf1',
                          color: r.accommodationCategory === '홈스테이' ? '#760305' : '#0b6e99',
                          opacity: r.occupied ? 0.55 : 1
                        }}
                        title={`${r.accommodationName} · ${r.roomName}${r.occupied ? ' (현재 거주중)' : ''}`}
                      >
                        <div className="font-medium truncate">{r.accommodationName}</div>
                        <div className="text-xs truncate" style={{ opacity:0.8 }}>{r.roomName}{r.occupied && ' 🔒'}</div>
                      </div>
                    ))}
                  </Fragment>
                )}
              </div>
            ))}
          </div>

          {/* 범례 */}
          <div className="flex items-center gap-4 mt-3 text-xs text-gray-500">
            <div className="flex items-center gap-1"><span className="inline-block w-3 h-3 rounded" style={{background:'#fbe0e0'}}/>홈스테이</div>
            <div className="flex items-center gap-1"><span className="inline-block w-3 h-3 rounded" style={{background:'#ddebf1'}}/>기숙사</div>
            <div className="flex items-center gap-1">🔒 현재 거주중</div>
          </div>
        </div>
      )}

      {viewMode === 'list' && (
        <div className="p-5">
          {sortedMonths.length === 0 ? (
            <div className="text-sm text-gray-400 text-center py-8">입실 가능 날짜가 등록된 방이 없습니다.</div>
          ) : sortedMonths.map(ym => {
            const [y, m] = ym.split('-');
            return (
              <div key={ym} className="mb-5">
                <h4 className="font-semibold mb-2" style={{color:'#c20206'}}>{y}년 {parseInt(m)}월 ({roomsByMonth[ym].length})</h4>
                <div className="notion-card overflow-hidden">
                  <table className="w-full">
                    <thead>
                      <tr>
                        <th className="table-th" style={{ width:120 }}>날짜</th>
                        <th className="table-th">카테고리</th>
                        <th className="table-th">숙소</th>
                        <th className="table-th">방</th>
                        <th className="table-th">상태</th>
                        <th className="table-th"></th>
                      </tr>
                    </thead>
                    <tbody>
                      {roomsByMonth[ym].map((r, i) => (
                        <tr key={i} className="row-hover cursor-pointer" onClick={() => onJump && onJump(r.accommodationId)}>
                          <td className="table-td text-sm font-medium">{r.date}</td>
                          <td className="table-td">
                            <Badge value={r.accommodationCategory}/>
                            {r.accommodationSubCategory && <span className="ml-1"><Badge value={r.accommodationSubCategory}/></span>}
                          </td>
                          <td className="table-td text-sm font-medium">{r.accommodationName}</td>
                          <td className="table-td text-sm">{r.roomName}</td>
                          <td className="table-td text-sm">
                            {r.occupied
                              ? <span className="badge b-gray">🔒 거주중</span>
                              : <span className="badge b-green">✓ 가용</span>}
                          </td>
                          <td className="table-td text-right text-xs text-blue-600">→ 상세보기</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

// 숙소 데이터 페이지 (사이드바 진입점)
const AccommodationDataPage = ({ accommodations, students, schools, onChange, canViewHistory=true, onOpenPDF }) => {
  const [category, setCategory] = useState('홈스테이');
  const [search, setSearch] = useState('');
  const [openId, setOpenId] = useState(null);

  const opened = accommodations.find(a => a.id === openId);
  const filtered = accommodations.filter(a => {
    if (a.category !== category) return false;
    const q = search.trim().toLowerCase();
    if (q && !(a.name||'').toLowerCase().includes(q) && !(a.address||'').toLowerCase().includes(q)) return false;
    return true;
  });
  const add = () => {
    const blank = {
      id: uid(), category, subCategory: '', name: '새 숙소', active: true,
      photos: [], hostName: '', hostPhone: '', hostEmail: '', address: '',
      familyMembers: '', mealIncluded: '', monthlyFee: '', paymentMethod: '',
      deposit: '', laundry: '', rules: '', description: '', housematesInfo: '',
      schoolDistances: [], individualContractLink: '', buppContractLink: '',
      rateIncreasePlan: '', rateIncreaseDate: '', memo: '', rooms: []
    };
    onChange([...accommodations, blank]);
    setOpenId(blank.id);
  };
  const updateAccom = (next) => onChange(accommodations.map(a => a.id === next.id ? next : a));
  const removeAccom = (id) => {
    if (!confirm('이 숙소를 삭제하시겠습니까?')) return;
    onChange(accommodations.filter(a => a.id !== id));
    setOpenId(null);
  };

  if (opened) {
    return (
      <div className="max-w-[1400px] mx-auto px-8 py-6">
        <AccommodationDetail accom={opened} students={students} schools={schools}
          onChange={updateAccom} onClose={() => setOpenId(null)}
          canViewHistory={canViewHistory} onOpenPDF={onOpenPDF}/>
      </div>
    );
  }

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">🏠 숙소 데이터</h1>
          <p className="text-sm text-gray-500 mt-1">전체 {accommodations.length}개 · {category} {filtered.length}개</p>
        </div>
        <div className="flex items-center gap-2">
          <input className="notion-input w-72" placeholder="이름·주소 검색..." value={search} onChange={(e) => setSearch(e.target.value)}/>
          <button className="btn-primary" onClick={add}>+ 새 {category} 추가</button>
        </div>
      </div>

      {/* 입실 가능 날짜 대시보드 */}
      <AvailabilityDashboard accommodations={accommodations} onJump={(id) => setOpenId(id)}/>

      {/* 카테고리 탭 */}
      <div className="flex gap-1 mb-4 border-b" style={{borderColor:'var(--border)'}}>
        {ACCOM_CATEGORIES_V2.map(c => (
          <button key={c}
            className="px-4 py-2 text-sm border-b-2 transition-colors"
            style={{
              borderColor: category === c ? '#c20206' : 'transparent',
              fontWeight: category === c ? 600 : 400,
              color: category === c ? '#c20206' : '#4a4a4a'
            }}
            onClick={() => setCategory(c)}
          >{c}</button>
        ))}
      </div>

      {/* 숙소 카드 그리드 */}
      {filtered.length === 0 ? (
        <div className="notion-card p-12 text-center text-gray-400 text-sm">등록된 {category}이(가) 없습니다.</div>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          {filtered.map(a => {
            const totalRooms = (a.rooms||[]).length;
            const occupied = (a.rooms||[]).reduce((sum, r) => sum + (r.currentOccupants||[]).length, 0);
            const buppOccupied = (a.rooms||[]).reduce((sum, r) => sum + (r.currentOccupants||[]).filter(o => !o.unknownStudent && o.studentId).length, 0);
            return (
              <div key={a.id} className="notion-card overflow-hidden cursor-pointer hover:shadow-md transition" onClick={() => setOpenId(a.id)}>
                {a.photos?.[0] && (
                  <div style={{ height:140, background:`url(${a.photos[0]}) center/cover`, borderBottom:'1px solid var(--border)' }}/>
                )}
                <div className="p-4">
                  <div className="flex items-start justify-between gap-2">
                    <div className="flex-1">
                      <div className="font-semibold">{a.name}</div>
                      {a.subCategory && <div className="mt-1"><Badge value={a.subCategory}/></div>}
                      {a.address && <div className="text-xs text-gray-500 mt-1">📍 {a.address}</div>}
                    </div>
                    <button className="btn-danger text-xs" onClick={(e) => { e.stopPropagation(); removeAccom(a.id); }}>삭제</button>
                  </div>
                  <div className="grid grid-cols-3 gap-2 mt-3 text-center text-xs">
                    <div className="p-2 rounded" style={{background:'#faf7f3'}}>
                      <div className="text-gray-500">방</div>
                      <div className="font-bold">{totalRooms}</div>
                    </div>
                    <div className="p-2 rounded" style={{background:'#faf7f3'}}>
                      <div className="text-gray-500">거주</div>
                      <div className="font-bold">{occupied}</div>
                    </div>
                    <div className="p-2 rounded" style={{background:'#fbe0e0'}}>
                      <div style={{color:'#760305'}}>BUPP</div>
                      <div className="font-bold" style={{color:'#c20206'}}>{buppOccupied}</div>
                    </div>
                  </div>
                  {(() => {
                    const fees = (a.rooms||[]).map(r => r.monthlyFee).filter(Boolean);
                    if (fees.length === 0) return null;
                    const unique = Array.from(new Set(fees));
                    return <div className="mt-3 text-sm" style={{color:'#c20206'}}>💰 {unique.join(' / ')}</div>;
                  })()}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

const CurrentUserSwitcher = ({ members, currentUserId, onChange }) => {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  const me = members.find(m => m.id === currentUserId) || members[0];
  if (!me) return null;
  const activeMembers = members.filter(m => m.active);
  // 역할별 그룹
  const byRole = {};
  ROLES.forEach(r => byRole[r] = activeMembers.filter(m => m.role === r));
  return (
    <div ref={ref} className="relative">
      <button
        type="button"
        className="flex items-center gap-2 px-3 py-1.5 rounded-md hover:bg-gray-100"
        style={{ border:'1px solid #ebebea' }}
        onClick={() => setOpen(!open)}
      >
        <div className="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold"
          style={{ background:'#ebebea', color:'#37352f' }}>
          {me.name.slice(0,1)}
        </div>
        <div className="text-left text-sm leading-tight">
          <div className="font-medium">{me.name}</div>
          <div className="text-xs text-gray-500">{ROLE_LABEL[me.role]}</div>
        </div>
        <span className="text-gray-400 text-xs ml-1">▾</span>
      </button>
      {open && (
        <div className="absolute right-0 z-30 mt-1 w-72 bg-white rounded-md max-h-96 overflow-auto"
          style={{ boxShadow:'0 8px 24px rgba(0,0,0,.12)', border:'1px solid #ebebea' }}>
          <div className="px-3 py-2 text-xs border-b" style={{ background:'#fdf3d3', color:'#a67800', borderColor:'var(--border)' }}>
            🔒 시뮬레이션 모드 — 실제 로그인 아님. 역할별 화면을 미리보기 합니다.
          </div>
          {ROLES.map(r => byRole[r].length > 0 && (
            <div key={r}>
              <div className="px-3 py-1.5 text-xs font-semibold text-gray-500 bg-gray-50 sticky top-0">
                <Badge value={ROLE_LABEL[r]}/>
              </div>
              {byRole[r].map(m => (
                <div key={m.id}
                  className="px-3 py-2 text-sm cursor-pointer flex items-center justify-between"
                  style={{ background: m.id === currentUserId ? '#f1f1ef' : 'transparent' }}
                  onMouseEnter={(e) => { if (m.id !== currentUserId) e.currentTarget.style.background='#fafaf9'; }}
                  onMouseLeave={(e) => { if (m.id !== currentUserId) e.currentTarget.style.background='transparent'; }}
                  onClick={() => { onChange(m.id); setOpen(false); }}
                >
                  <div>
                    <div className="font-medium">{m.name}</div>
                    <div className="text-xs text-gray-500">{m.email}</div>

};

const MemberList = ({ members, students, onChange }) => {
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState({ role:'', active:'' });
  const [editing, setEditing] = useState(null);
  const filtered = members.filter(m => {
    const q = search.trim().toLowerCase();
    if (q && !(m.name||'').toLowerCase().includes(q) && !(m.email||'').toLowerCase().includes(q)) return false;
    if (filters.role && m.role !== filters.role) return false;
    if (filters.active === 'Y' && !m.active) return false;
    if (filters.active === 'N' && m.active) return false;
    return true;
  });
  const upsert = (d) => {
    if (!d.name?.trim()) { alert('이름을 입력해주세요.'); return; }
    if (!d.role) { alert('역할을 선택해주세요.'); return; }
    const next = d.id ? members.map(m => m.id === d.id ? d : m) : [...members, { ...d, id: uid() }];
    onChange(next);
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 멤버를 삭제하시겠습니까?')) return;
    onChange(members.filter(m => m.id !== id));

/* ============================================================
   기수 대시보드 — 데드라인 우선순위 일정 + 학생별 토글
   ============================================================ */
const CohortDashboard = ({ students, members, universities, programs, trackGroups, subjects, schools, onUpdateStudent }) => {
  // 사용 가능한 기수 목록
  const allCohorts = Array.from(new Set(students.map(s => s.cohort).filter(Boolean))).sort();
  const [cohort, setCohort] = useState(allCohorts[0] || '');
  const [country, setCountry] = useState('CA');
  const [expandedStudent, setExpandedStudent] = useState(null);

  // 첨삭 선생님 = active 관리자/브듀쌤
  const reviewers = members.filter(m => m.active && (m.role === 'admin' || m.role === 'bu_staff'));

  // 기수 학생 전체
  const cohortStudents = students.filter(s => s.cohort === cohort);

  // 모든 지원 레코드 (학생 정보 첨부)
  const allApps = cohortStudents.flatMap(s =>
    (s.universityApplications || [])
      .filter(app => (app.countryGroup || 'CA') === country)
      .map(app => ({ ...app, _studentId: s.id, _studentName: s.koreanName }))
  );

  // 데드라인 = program.supplementaryDeadline
  const getDeadline = (app) => programs.find(p => p.id === app.programId)?.supplementaryDeadline || '';

  // 데드라인별 그룹
  const grouped = {};
  allApps.forEach(app => {
    const d = getDeadline(app) || '미지정';
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(app);
  });
  const sortedDates = Object.keys(grouped).sort((a, b) => {
    if (a === '미지정') return 1;
    if (b === '미지정') return -1;
    return a.localeCompare(b);
  });

  // 학생 application 업데이트 (체크박스·review 인라인 편집용)
  const patchApp = (studentId, appId, patch) => {
    const stu = students.find(s => s.id === studentId);
    if (!stu) return;
    const apps = (stu.universityApplications || []).map(a => a.id === appId ? { ...a, ...patch } : a);
    onUpdateStudent({ ...stu, universityApplications: apps });
  };
  const setReview = (studentId, appId, reviewerId, note) => {
    const stu = students.find(s => s.id === studentId);
    if (!stu) return;
    const apps = (stu.universityApplications || []).map(a => {
      if (a.id !== appId) return a;
      return { ...a, reviews: { ...(a.reviews || {}), [reviewerId]: note } };
    });
    onUpdateStudent({ ...stu, universityApplications: apps });
  };

  // 학생별 요약 통계
  const studentStats = (s) => {
    const apps = (s.universityApplications || []).filter(app => (app.countryGroup || 'CA') === country);
    return {
      total: apps.length,
      submitted: apps.filter(a => a.submissionDate).length,
      accepted: apps.filter(a => a.status === '합격').length,
      finalChoice: apps.filter(a => a.finalChoice).length,
      completed: apps.filter(a => a.completed).length
    };
  };

  return (
    <div className="max-w-[1700px] mx-auto px-8 py-6">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">📅 기수 대시보드</h1>
          <p className="text-sm text-gray-500 mt-1">데드라인 우선순위 일정 + 학생별 지원 현황을 한 페이지에서 관리합니다.</p>
        </div>
      </div>

      {/* 기수·국가 선택 */}
      <div className="notion-card p-4 mb-4">
        <div className="grid grid-cols-2 gap-4">
          <Field label="기수">
            <Select value={cohort} onChange={setCohort} options={allCohorts} placeholder="기수 선택"/>
          </Field>
          <Field label="국가 그룹">
            <RefSelect value={country} onChange={setCountry} options={COUNTRIES.map(c => ({ id:c, label:COUNTRY_LABEL[c] }))} placeholder="국가 선택"/>
          </Field>
        </div>
        {cohort && (
          <div className="mt-3 text-sm text-gray-600">
            <strong>{cohort}</strong> · {COUNTRY_LABEL[country]} ·
            학생 <strong>{cohortStudents.length}명</strong> ·
            지원 <strong>{allApps.length}건</strong> ·
            데드라인 <strong>{sortedDates.length}개</strong>
          </div>
        )}
      </div>

      {!cohort && (
        <div className="notion-card p-8 text-center text-gray-400 text-sm">기수를 선택해주세요.</div>
      )}

      {cohort && cohortStudents.length === 0 && (
        <div className="notion-card p-8 text-center text-gray-400 text-sm">
          {cohort} 기수에 등록된 학생이 없습니다. 학생 상세 → 기본정보에서 "기수"를 설정해주세요.
        </div>
      )}

      {cohort && cohortStudents.length > 0 && (
        <Fragment>
          {/* 데드라인 우선순위 일정 */}
          <Section title="🎯 데드라인 우선순위 일정" defaultOpen={true} count={allApps.length}>
            {allApps.length === 0 ? (
              <div className="text-sm text-gray-400 p-4">이 기수의 {COUNTRY_LABEL[country]} 지원 데이터가 없습니다.</div>
            ) : sortedDates.map(date => {
              const apps = grouped[date];
              const completedCount = apps.filter(a => a.completed).length;
              return (
                <div key={date} className="mb-4">
                  <div className="flex items-center gap-2 mb-2">
                    <h4 className="font-semibold">
                      📌 {date === '미지정' ? '데드라인 미지정' : date.replace(/-/g, '년 ').replace(/년 (\d+)년 (\d+)$/, '년 $1월 $2일')}
                    </h4>
                    <span className="badge b-gray text-xs">{apps.length}건</span>
                    {completedCount > 0 && <span className="badge b-green text-xs">완료 {completedCount}</span>}
                  </div>
                  <div className="notion-card overflow-hidden">
                    <div className="overflow-auto">
                      <table className="w-full">
                        <thead><tr>
                          <th className="table-th" style={{width:50}}>완료</th>
                          <th className="table-th">학생</th>
                          <th className="table-th">대학</th>
                          <th className="table-th">전공</th>
                          <th className="table-th">추가서류</th>
                          <th className="table-th">데드라인</th>
                          {reviewers.map(r => (
                            <th key={r.id} className="table-th" style={{minWidth:160}}>{r.name}</th>
                          ))}
                        </tr></thead>
                        <tbody>
                          {apps.map(app => {
                            const uni = universities.find(u => u.id === app.universityId);
                            const prog = programs.find(p => p.id === app.programId);
                            return (
                              <tr key={app.id} className="row-hover" style={app.completed ? { background:'#fafaf9', opacity:0.7 } : {}}>
                                <td className="table-td text-center">
                                  <input type="checkbox"
                                    checked={!!app.completed}
                                    onChange={(e) => patchApp(app._studentId, app.id, { completed: e.target.checked })}
                                    className="w-4 h-4 accent-blue-600 cursor-pointer"
                                  />
                                </td>
                                <td className="table-td text-sm font-medium">{app._studentName}</td>
                                <td className="table-td text-sm">{uni?.shortName || uni?.name || '—'}</td>
                                <td className="table-td text-sm" style={{maxWidth:260}}>{prog?.name || '—'}</td>
                                <td className="table-td text-xs text-gray-600">{prog?.supplementaryType || '—'}</td>
                                <td className="table-td text-xs">{prog?.supplementaryDeadline || '—'}</td>
                                {reviewers.map(r => (
                                  <td key={r.id} className="table-td">
                                    <input
                                      className="notion-input text-xs"
                                      style={{ padding:'4px 6px', fontSize:12 }}
                                      value={(app.reviews && app.reviews[r.id]) || ''}
                                      onChange={(e) => setReview(app._studentId, app.id, r.id, e.target.value)}
                                      placeholder="첨삭 메모"
                                    />
                                  </td>
                                ))}
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              );
            })}
          </Section>

          {/* 학생별 토글 */}
          <Section title="👥 학생별 지원 현황" defaultOpen={true} count={cohortStudents.length}>
            <div className="space-y-2">
              {cohortStudents.map(s => {
                const stats = studentStats(s);
                const isOpen = expandedStudent === s.id;
                const studentApps = (s.universityApplications || []).filter(app => (app.countryGroup || 'CA') === country);
                return (
                  <div key={s.id} className="notion-card overflow-hidden">
                    <div
                      className="px-4 py-3 cursor-pointer flex items-center justify-between hover:bg-gray-50"
                      onClick={() => setExpandedStudent(isOpen ? null : s.id)}
                      style={{ borderBottom: isOpen ? '1px solid #ebebea' : 'none' }}
                    >
                      <div className="flex items-center gap-3">
                        <span style={{ display:'inline-block', transition:'transform .15s', transform: isOpen ? 'rotate(90deg)' : 'rotate(0)' }}>▶</span>
                        <span className="font-semibold">{s.koreanName}</span>
                        <span className="text-xs text-gray-400">{s.englishName}</span>
                        <Badge value={s.currentSchool}/>
                      </div>
                      <div className="flex items-center gap-2 text-xs">
                        <span className="badge b-gray">지원 {stats.total}</span>
                        {stats.submitted > 0 && <span className="badge b-blue">제출 {stats.submitted}</span>}
                        {stats.accepted > 0 && <span className="badge b-green">합격 {stats.accepted}</span>}
                        {stats.finalChoice > 0 && <span className="badge b-purple">최종 {stats.finalChoice}</span>}
                      </div>
                    </div>
                    {isOpen && (
                      <div className="p-4 bg-gray-50">
                        {studentApps.length === 0 ? (
                          <div className="text-sm text-gray-400 text-center py-4">이 국가 그룹에 등록된 지원 데이터가 없습니다.</div>
                        ) : (
                          <div className="notion-card overflow-hidden bg-white">
                            <div className="overflow-auto">
                              <table className="w-full text-sm">
                                <thead><tr>
                                  <th className="table-th" style={{width:50}}>#</th>
                                  <th className="table-th">최종</th>
                                  <th className="table-th">대학</th>
                                  <th className="table-th">전공</th>
                                  <th className="table-th">상태</th>
                                  <th className="table-th">장학금</th>
                                  <th className="table-th">추가서류</th>
                                  <th className="table-th">제출</th>
                                  <th className="table-th">데드라인</th>
                                </tr></thead>
                                <tbody>
                                  {[...studentApps].sort((a, b) => (parseInt(a.rank)||999) - (parseInt(b.rank)||999)).map(app => {
                                    const uni = universities.find(u => u.id === app.universityId);
                                    const prog = programs.find(p => p.id === app.programId);
                                    return (
                                      <tr key={app.id} className="row-hover" style={app.finalChoice ? { background:'#f5f1fa' } : {}}>
                                        <td className="table-td text-center text-gray-500 text-xs">{app.rank || '—'}</td>
                                        <td className="table-td">{app.finalChoice ? <span className="badge b-purple">✓</span> : <span className="text-gray-300 text-xs">—</span>}</td>
                                        <td className="table-td text-sm">{uni?.shortName || uni?.name || '—'}</td>
                                        <td className="table-td text-sm" style={{maxWidth:240}}>{prog?.name || '—'}</td>
                                        <td className="table-td"><Badge value={app.status}/></td>
                                        <td className="table-td text-xs text-gray-600">{app.scholarship || '—'}</td>
                                        <td className="table-td text-xs text-gray-600" style={{maxWidth:180}}>{prog?.supplementaryType || '—'}</td>
                                        <td className="table-td text-xs">
                                          {app.submissionDate
                                            ? <span className="badge b-green">{app.submissionDate}</span>
                                            : <span className="text-gray-300">—</span>}
                                        </td>
                                        <td className="table-td text-xs">{prog?.supplementaryDeadline || '—'}</td>
                                      </tr>
                                    );
                                  })}
                                </tbody>
                              </table>
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </Section>
        </Fragment>
      )}
    </div>
  );
};

/* ============================================================
   학교 관리 페이지
   ============================================================ */
const SchoolList = ({ schools, onChange }) => {
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState({ type:'', semester:'', province:'' });
  const [editing, setEditing] = useState(null);

  const distinct = (k) => Array.from(new Set(schools.map(s => s[k]).filter(Boolean))).sort();
  const typeOpts = distinct('type');

  const filtered = schools.filter(s => {
    const q = search.trim().toLowerCase();
    if (q && !(s.name||'').toLowerCase().includes(q) && !(s.type||'').toLowerCase().includes(q)) return false;
    if (filters.type && s.type !== filters.type) return false;
    if (filters.semester && s.semesterSystem !== filters.semester) return false;
    if (filters.province && s.province !== filters.province) return false;
    return true;
  });

  const upsert = (d) => {
    if (!d.name?.trim()) { alert('학교명을 입력해주세요.'); return; }
    const next = d.id ? schools.map(s => s.id === d.id ? d : s) : [...schools, { ...d, id: uid() }];
    onChange(next);
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 학교를 삭제하시겠습니까? (학생 데이터의 학교 참조는 ID로 유지됩니다)')) return;
    onChange(schools.filter(s => s.id !== id));
  };

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">학교 관리</h1>
          <p className="text-sm text-gray-500 mt-1">전체 {schools.length}개교 · 필터 결과 {filtered.length}개교</p>
        </div>
        <div className="flex items-center gap-2">
          <input className="notion-input w-72" placeholder="학교명·종류로 검색..." value={search} onChange={(e) => setSearch(e.target.value)} />
          <button className="btn-primary" onClick={() => setEditing({ id:'', name:'', type:'', semesterSystem:'', province:'ON', offerings:[], memo:'' })}>+ 새 학교 추가</button>
        </div>
      </div>

      <div className="notion-card p-4 mb-4">
        <div className="grid grid-cols-3 gap-3">
          <Field label="학교종류"><Select value={filters.type} onChange={(v) => setFilters({...filters, type:v})} options={typeOpts.length ? typeOpts : SCHOOL_TYPES} placeholder="전체"/></Field>
          <Field label="학기 시스템"><Select value={filters.semester} onChange={(v) => setFilters({...filters, semester:v})} options={SEMESTER_SYSTEMS} placeholder="전체"/></Field>
          <Field label="교육과정"><Select value={filters.province} onChange={(v) => setFilters({...filters, province:v})} options={PROVINCES} placeholder="전체"/></Field>
        </div>
      </div>

      {editing && (
        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold mb-4">{editing.id ? '학교 수정' : '새 학교 추가'}</h3>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
            <Field label="학교명 *"><TextInput value={editing.name} onChange={(v) => setEditing({...editing, name:v})}/></Field>
            <Field label="학교종류"><Select value={editing.type} onChange={(v) => setEditing({...editing, type:v})} options={SCHOOL_TYPES}/></Field>
            <Field label="학기 시스템"><Select value={editing.semesterSystem} onChange={(v) => setEditing({...editing, semesterSystem:v})} options={SEMESTER_SYSTEMS}/></Field>
            <Field label="교육과정"><Select value={editing.province} onChange={(v) => setEditing({...editing, province:v})} options={PROVINCES}/></Field>
            <Field label="제공 과정" span={2}>
              <MultiSelect value={editing.offerings} onChange={(v) => setEditing({...editing, offerings:v})} options={SCHOOL_OFFERINGS} placeholder="AP / IB / 정규 등"/>
            </Field>
            <Field label="메모" span={3}><TextArea value={editing.memo} onChange={(v) => setEditing({...editing, memo:v})}/></Field>
            <div className="col-span-3 flex justify-end gap-2">
              <button className="btn-ghost" onClick={() => setEditing(null)}>취소</button>
              <button className="btn-primary" onClick={() => upsert(editing)}>저장</button>
            </div>
          </div>
        </div>
      )}

      <div className="notion-card overflow-hidden">
        <div className="overflow-auto" style={{ maxHeight: 'calc(100vh - 320px)' }}>
          <table className="w-full">
            <thead><tr>
              <th className="table-th">학교명</th>
              <th className="table-th">학교종류</th>
              <th className="table-th">학기 시스템</th>
              <th className="table-th">교육과정</th>
              <th className="table-th">제공 과정</th>
              <th className="table-th">메모</th>
              <th className="table-th"></th>
            </tr></thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr><td colSpan="7" className="text-center py-12 text-gray-400 text-sm">조건에 맞는 학교가 없습니다.</td></tr>
              ) : filtered.map(s => (
                <tr key={s.id} className="row-hover">
                  <td className="table-td font-medium">{s.name}</td>
                  <td className="table-td"><Badge value={s.type}/></td>
                  <td className="table-td"><Badge value={s.semesterSystem}/></td>
                  <td className="table-td"><Badge value={s.province}/></td>
                  <td className="table-td">
                    <div className="flex flex-wrap gap-1">
                      {(s.offerings||[]).map(o => <Badge key={o} value={o}/>)}
                    </div>
                  </td>
                  <td className="table-td text-gray-600 text-xs">{s.memo || '—'}</td>
                  <td className="table-td text-right whitespace-nowrap">
                    <button className="btn-ghost" onClick={() => setEditing(s)}>수정</button>
                    <button className="btn-danger" onClick={() => remove(s.id)}>삭제</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

/* ============================================================
   과목 관리 페이지
   ============================================================ */
const SubjectList = ({ subjects, schools, onChange }) => {
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState({ grade:'', province:'', school:'' });
  const [editing, setEditing] = useState(null);

  const filtered = subjects.filter(s => {
    const q = search.trim().toLowerCase();
    if (q && !(s.code||'').toLowerCase().includes(q) && !(s.name||'').toLowerCase().includes(q)) return false;
    if (filters.grade && s.grade !== filters.grade) return false;
    if (filters.province && s.province !== filters.province) return false;
    if (filters.school && !(s.schoolIds||[]).includes(filters.school)) return false;
    return true;
  });

  const subjectLabel = (sub) => `${sub.code} — ${sub.name} (G${sub.grade})`;

  const upsert = (d) => {
    if (!d.code?.trim() || !d.name?.trim()) { alert('과목코드와 과목명을 입력해주세요.'); return; }
    const next = d.id ? subjects.map(s => s.id === d.id ? d : s) : [...subjects, { ...d, id: uid() }];
    onChange(next);
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 과목을 삭제하시겠습니까?')) return;
    onChange(subjects.filter(s => s.id !== id));
  };

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">과목 관리</h1>
          <p className="text-sm text-gray-500 mt-1">전체 {subjects.length}개 · 필터 결과 {filtered.length}개</p>
        </div>
        <div className="flex items-center gap-2">
          <input className="notion-input w-72" placeholder="코드·과목명 검색..." value={search} onChange={(e) => setSearch(e.target.value)} />
          <button className="btn-primary" onClick={() => setEditing({ id:'', code:'', name:'', grade:'', credits:1, province:'ON', schoolIds:[], prerequisiteIds:[], materialsLink:'', memo:'' })}>+ 새 과목 추가</button>
        </div>
      </div>

      <div className="notion-card p-4 mb-4">
        <div className="grid grid-cols-3 gap-3">
          <Field label="학년"><Select value={filters.grade} onChange={(v) => setFilters({...filters, grade:v})} options={GRADE_LEVELS} placeholder="전체"/></Field>
          <Field label="교육과정"><Select value={filters.province} onChange={(v) => setFilters({...filters, province:v})} options={PROVINCES} placeholder="전체"/></Field>
          <Field label="제공 학교"><RefSelect value={filters.school} onChange={(v) => setFilters({...filters, school:v})} options={schools.map(s => ({ id: s.id, label: s.name }))} placeholder="전체"/></Field>
        </div>
      </div>

      {editing && (
        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold mb-4">{editing.id ? '과목 수정' : '새 과목 추가'}</h3>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
            <Field label="과목코드 *"><TextInput value={editing.code} onChange={(v) => setEditing({...editing, code:v})} placeholder="MPM2D"/></Field>
            <Field label="과목명 *" span={2}><TextInput value={editing.name} onChange={(v) => setEditing({...editing, name:v})}/></Field>
            <Field label="학년"><Select value={editing.grade} onChange={(v) => setEditing({...editing, grade:v})} options={GRADE_LEVELS}/></Field>
            <Field label="학점"><TextInput type="number" value={editing.credits} onChange={(v) => setEditing({...editing, credits:parseFloat(v)||0})}/></Field>
            <Field label="교육과정"><Select value={editing.province} onChange={(v) => setEditing({...editing, province:v})} options={PROVINCES}/></Field>
            <Field label="제공 학교" span={3}>
              <MultiSelect
                value={editing.schoolIds || []}
                onChange={(v) => setEditing({...editing, schoolIds:v})}
                options={schools}
                getLabel={(o) => o.name}
                getValue={(o) => o.id}
                placeholder="이 과목을 제공하는 학교들"
              />
            </Field>
            <Field label="선수과목" span={3}>
              <MultiSelect
                value={editing.prerequisiteIds || []}
                onChange={(v) => setEditing({...editing, prerequisiteIds:v})}
                options={subjects.filter(s => s.id !== editing.id)}
                getLabel={subjectLabel}
                getValue={(o) => o.id}
                placeholder="선수과목 선택 (없으면 비워두기)"
              />
            </Field>
            <Field label="자료 / 영상 링크" span={3}>
              <TextInput value={editing.materialsLink} onChange={(v) => setEditing({...editing, materialsLink:v})} placeholder="https://... (수업영상·교과설명 자료)"/>
            </Field>
            <Field label="메모" span={3}><TextArea value={editing.memo} onChange={(v) => setEditing({...editing, memo:v})}/></Field>
            <div className="col-span-3 flex justify-end gap-2">
              <button className="btn-ghost" onClick={() => setEditing(null)}>취소</button>
              <button className="btn-primary" onClick={() => upsert(editing)}>저장</button>
            </div>
          </div>
        </div>
      )}

      <div className="notion-card overflow-hidden">
        <div className="overflow-auto" style={{ maxHeight: 'calc(100vh - 320px)' }}>
          <table className="w-full">
            <thead><tr>
              <th className="table-th">과목코드</th>
              <th className="table-th">과목명</th>
              <th className="table-th">학년</th>
              <th className="table-th">학점</th>
              <th className="table-th">교육과정</th>

// C. 학업 메타 — 공인영어점수(IELTS/TOEFL/Duolingo) + OSSLT + 학교 메타
// 테스트별 영역 라벨 + 점수 범위
const ENGLISH_TEST_TYPES = ['IELTS', 'TOEFL', 'Duolingo'];
const ENGLISH_TEST_LABELS = {
  IELTS:    { listening:'Listening (L)', reading:'Reading (R)', writing:'Writing (W)', speaking:'Speaking (S)', overall:'Overall (0~9)', range:'각 영역 0~9' },
  TOEFL:    { listening:'Listening', reading:'Reading', writing:'Writing', speaking:'Speaking', overall:'Total (0~120)', range:'각 영역 0~30' },
  Duolingo: { listening:'Comprehension', reading:'Literacy', writing:'Production', speaking:'Conversation', overall:'Overall (10~160)', range:'각 영역 10~160' }
};
const ENGLISH_TEST_MAX = {
  IELTS:    { overall: 9,   section: 9 },
  TOEFL:    { overall: 120, section: 30 },
  Duolingo: { overall: 160, section: 160 }
};

// 영어 점수 트렌드 차트 (멀티 라인 SVG)
const EnglishTestTrendChart = ({ history }) => {
  const sorted = [...(history || [])].sort((a, b) => (a.testDate||'').localeCompare(b.testDate||''));
  if (sorted.length === 0) {
    return <div className="text-sm text-gray-400 text-center py-8">아직 응시 기록이 없습니다. 아래 이력 표에서 + 새 기록 추가로 시작하세요.</div>;
  }

  const allSameType = new Set(sorted.map(h => h.type).filter(Boolean)).size === 1;
  const onlyType = sorted[0].type;
  const W = 720, H = 280;
  const pad = { top: 16, right: 100, bottom: 50, left: 50 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;

  const xScale = (i) => sorted.length === 1
    ? pad.left + chartW / 2
    : pad.left + (i / (sorted.length - 1)) * chartW;

  // 모든 점수를 %로 정규화 (다른 시험 종류 혼합 가능)
  const normalize = (v, type, isSection) => {
    const max = (ENGLISH_TEST_MAX[type] || ENGLISH_TEST_MAX.IELTS)[isSection ? 'section' : 'overall'];
    const n = parseFloat(v);
    if (isNaN(n) || !max) return null;
    return Math.max(0, Math.min(100, (n / max) * 100));
  };
  const yScale = (pct) => pad.top + chartH - (pct / 100) * chartH;

  const metrics = [
    { key:'overall',   label:'Overall',   color:'#c20206', section:false, width:3 },
    { key:'listening', label:'Listening', color:'#0b6e99', section:true,  width:1.5 },
    { key:'reading',   label:'Reading',   color:'#0f7b6c', section:true,  width:1.5 },
    { key:'writing',   label:'Writing',   color:'#cb912f', section:true,  width:1.5 },
    { key:'speaking',  label:'Speaking',  color:'#6940a5', section:true,  width:1.5 }
  ];

  return (
    <div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMinYMin meet" style={{ maxWidth:'100%', height:'auto' }}>
        {/* Y-axis grid */}
        {[0, 25, 50, 75, 100].map(pct => (
          <g key={pct}>
            <line x1={pad.left} x2={pad.left + chartW} y1={yScale(pct)} y2={yScale(pct)} stroke="#e8e0d5" strokeDasharray="3,3"/>
            <text x={pad.left - 8} y={yScale(pct) + 4} textAnchor="end" fontSize="10" fill="#787774">{pct}%</text>
          </g>
        ))}

        {/* X-axis dates + type */}
        {sorted.map((p, i) => (
          <g key={i}>
            <line x1={xScale(i)} x2={xScale(i)} y1={pad.top} y2={pad.top + chartH} stroke="#f5f5f5"/>
            <text x={xScale(i)} y={H - pad.bottom + 16} textAnchor="middle" fontSize="10" fill="#4a4a4a">{p.testDate || '-'}</text>
            <text x={xScale(i)} y={H - pad.bottom + 30} textAnchor="middle" fontSize="9" fill="#787774">{p.type}</text>
          </g>
        ))}

        {/* Lines per metric */}
        {metrics.map(m => {
          const points = sorted.map((p, i) => {
            const pct = normalize(p[m.key], p.type, m.section);
            return pct == null ? null : { x: xScale(i), y: yScale(pct), value: p[m.key], i };
          });
          const valid = points.filter(Boolean);
          if (valid.length === 0) return null;
          // path with breaks where data missing
          let d = '';
          let started = false;
          points.forEach(pt => {
            if (pt) {
              d += (started ? ' L' : 'M') + ` ${pt.x} ${pt.y}`;
              started = true;
            } else {
              started = false;
            }
          });
          return (
            <g key={m.key}>
              <path d={d} fill="none" stroke={m.color} strokeWidth={m.width} strokeLinejoin="round"/>
              {valid.map(pt => (
                <g key={pt.i}>
                  <circle cx={pt.x} cy={pt.y} r={m.key === 'overall' ? 4 : 3} fill={m.color}>
                    <title>{m.label}: {pt.value}</title>
                  </circle>
                  {m.key === 'overall' && (
                    <text x={pt.x} y={pt.y - 8} textAnchor="middle" fontSize="11" fontWeight="700" fill={m.color}>{pt.value}</text>
                  )}
                </g>
              ))}
            </g>
          );
        })}

        {/* 범례 (우측) */}
        {metrics.map((m, i) => (
          <g key={m.key}>
            <line x1={W - pad.right + 10} x2={W - pad.right + 30} y1={pad.top + 8 + i * 18} y2={pad.top + 8 + i * 18} stroke={m.color} strokeWidth={m.width}/>
            <text x={W - pad.right + 36} y={pad.top + 11 + i * 18} fontSize="11" fill={m.color} fontWeight={m.key === 'overall' ? 700 : 500}>{m.label}</text>
          </g>
        ))}
      </svg>
      <div className="text-xs text-gray-500 mt-2">
        📊 모든 점수는 %로 정규화 표시. {allSameType
          ? `현재 ${onlyType} 시험만 기록됨 (Overall ${ENGLISH_TEST_MAX[onlyType]?.overall} 기준)`
          : '여러 종류 시험이 혼합되어 있습니다.'} · 점에 마우스를 올리면 실제 점수 표시.
      </div>
    </div>
  );
};

const EnglishTestHistoryTable = ({ history, onChange }) => {
  const [editing, setEditing] = useState(null);

    if (!rec.type) { alert('시험 종류를 선택해주세요.'); return; }
    const next = rec.id ? (history || []).map(h => h.id === rec.id ? rec : h)

    onChange(next);
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 응시 기록을 삭제할까요?')) return;
    onChange((history || []).filter(h => h.id !== id));

  const sorted = [...(history || [])].sort((a, b) => (b.testDate||'').localeCompare(a.testDate||''));

  const blank = { id:'', type:'IELTS', testDate:'', overall:'', listening:'', reading:'', writing:'', speaking:'', memo:'' };

            <Field label="Overall"><TextInput value={editing.overall} onChange={(v) => setEditing({...editing, overall:v})}/></Field>
            <Field label={(ENGLISH_TEST_LABELS[editing.type] || ENGLISH_TEST_LABELS.IELTS).listening}><TextInput value={editing.listening} onChange={(v) => setEditing({...editing, listening:v})}/></Field>

            <Field label={(ENGLISH_TEST_LABELS[editing.type] || ENGLISH_TEST_LABELS.IELTS).writing}><TextInput value={editing.writing} onChange={(v) => setEditing({...editing, writing:v})}/></Field>

            <Field label="메모" span={4}><TextInput value={editing.memo} onChange={(v) => setEditing({...editing, memo:v})}/></Field>
            <div className="col-span-4 flex justify-end gap-2">
              <button className="btn-ghost text-xs" onClick={() => setEditing(null)}>취소</button>
              <button className="btn-primary text-xs" onClick={() => upsert(editing)}>저장</button>
            </div>
          </div>
        </div>
      )}

      <div className="notion-card overflow-hidden">
        <table className="w-full text-sm">
          <thead><tr>
            <th className="table-th">응시일</th>
            <th className="table-th">종류</th>
            <th className="table-th">Overall</th>
            <th className="table-th">L</th>
            <th className="table-th">R</th>
            <th className="table-th">W</th>
            <th className="table-th">S</th>
            <th className="table-th">메모</th>
            <th className="table-th"></th>
          </tr></thead>
          <tbody>
            {sorted.length === 0 ? (
              <tr><td colSpan="9" className="text-center py-6 text-gray-400 text-xs">기록 없음</td></tr>
            ) : sorted.map(h => (
              <tr key={h.id} className="row-hover">

                <td className="table-td">{h.listening || '—'}</td>

const TabAcademic = ({ s, update }) => {
  const a = s.academic || {};
  const et = a.englishTest || {};
  const history = a.englishTestHistory || [];
  const setAcademic = (k, v) => update({ academic: { ...a, [k]: v } });
  const setTest = (k, v) => update({ academic: { ...a, englishTest: { ...et, [k]: v } } });
  const setHistory = (next) => {
    // 이력 변경 시 최신 기록을 englishTest snapshot으로 자동 반영
    const sorted = [...next].sort((a, b) => (b.testDate||'').localeCompare(a.testDate||''));
    const latest = sorted[0];
    update({
      academic: {
        ...a,
        englishTestHistory: next,
        englishTest: latest
          ? { ...et, type: latest.type, overall: latest.overall, listening: latest.listening, reading: latest.reading, writing: latest.writing, speaking: latest.speaking, testDate: latest.testDate }
          : et
      }
    });
  };

  // 최신 기록 요약
  const latestHistory = [...history].sort((a, b) => (b.testDate||'').localeCompare(a.testDate||''))[0];

  return (
    <Section title="C. 학업 메타">
      {/* 공인영어점수 */}
      <div className="notion-card p-4 mb-4" style={{ background:'#faf7f3' }}>

        {/* 현재 상태 (요약) */}
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
          <Field label="준비 상태"><Select value={et.status} onChange={(v) => setTest('status', v)} options={IELTS_STATUSES}/></Field>
          <Field label="다음 응시 예정일"><TextInput type="date" value={et.testDate} onChange={(v) => setTest('testDate', v)}/></Field>
          <Field label="현재 시험 종류" span={2}>
            {latestHistory ? (
              <div className="pt-2 text-sm">
                <Badge value={latestHistory.type}/>
                <span className="ml-2" style={{color:'#c20206', fontWeight:700}}>Overall {latestHistory.overall || '—'}</span>
                <span className="ml-2 text-xs text-gray-500">(최근 응시 {latestHistory.testDate || '—'})</span>
