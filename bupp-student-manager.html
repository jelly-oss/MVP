<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* BreakEDU 디자인 토큰 — Design Handoff 기준 */
  :root {
    /* 브랜드 */
    --red:#c20206; --maroon:#760305; --gold:#F0B429; --charcoal:#202731;
    --gray:#4a4a4a; --taupe:#cabaab; --cream:#e8e0d5; --light:#f5f5f5; --white:#fff;
    /* 표면 (warm neutral) */
    --paper:#f7f5f1; --ink:#202731; --muted:#6E6A63; --faint:#A89F92;
    --line:#E7E1D7; --line-soft:#EFEAE2;
    /* 상태 색 */
    --good:#2F8A63; --good-bg:#E8F2EC;
    --warn:#B07A12; --warn-bg:#FBF1D8;
    --alert:#c20206; --alert-bg:#FBEAEA;
    --gold-bg:#FDF3D6;
    /* 형태 */
    --radius:14px;
    --shadow:0 1px 2px rgba(32,39,49,.05),0 6px 20px rgba(32,39,49,.05);
    --shadow-sm:0 1px 2px rgba(32,39,49,.06);

    /* ────── 레거시 별칭 (기존 코드 호환) ────── */
    --brand-red: var(--red);
    --brand-red-dark: var(--maroon);
    --brand-gold: var(--gold);
    --brand-navy: var(--charcoal);
    --brand-tan: var(--taupe);
    --brand-cream: var(--cream);
    --brand-gray: var(--gray);
    --brand-bg: var(--light);
    --bg: var(--white);
    --bg-soft: var(--paper);
    --border: var(--line);
    --border-soft: var(--line-soft);
    --text: var(--ink);
    --text-soft: var(--muted);
    --accent: var(--red);
  }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Pretendard', 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "tnum";
    font-size: 14px;
  }
  /* 따뜻한 톤 스크롤바 */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--brand-tan); border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: #b8a795; }
  ::-webkit-scrollbar-track { background: transparent; }
  .notion-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .notion-input {
    background: var(--bg-soft);
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 14px;
    color: var(--text);
    width: 100%;
    transition: all .15s ease;
  }
  .notion-input:focus {
    background: #fff;
    border-color: var(--accent);
    outline: none;
    box-shadow: 0 0 0 2px rgba(194,2,6,.12);
  }
  .field-label {
    font-size: 12px;
    color: var(--text-soft);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .row-hover:hover { background: #faf7f3; }
  .badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 4px;
    font-size: 12px; font-weight: 500;
    line-height: 18px;
    white-space: nowrap;
  }
  /* 브랜드 팔레트 기반 배지 — 빨강·골드·네이비·베이지의 톤 변주 */
  .b-gray   { background:#f5f5f5; color:#4a4a4a; }
  .b-brown  { background:#cabaab; color:#202731; }
  .b-orange { background:#F0B429; color:#202731; }
  .b-yellow { background:#fdf3d3; color:#a67800; }
  .b-green  { background:#e8e0d5; color:#202731; }
  .b-blue   { background:#202731; color:#F0B429; }
  .b-purple { background:#760305; color:#F0B429; }
  .b-pink   { background:#fbe0e0; color:#c20206; }
  .b-red    { background:#c20206; color:#ffffff; }

  .tab-btn {
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
    color: var(--text-soft);
    cursor: pointer;
    transition: all .15s;
  }
  .tab-btn:hover { background: var(--brand-cream); color: var(--text); }
  .tab-btn.active { background: var(--brand-cream); color: var(--brand-red); font-weight: 600; }

  .btn-primary {
    background: var(--brand-red); color: #fff;
    padding: 7px 14px; border-radius: 6px;
    font-size: 14px; font-weight: 500;
    transition: all .15s;
    border: 1px solid var(--brand-red);
  }
  .btn-primary:hover { background: var(--brand-red-dark); border-color: var(--brand-red-dark); }
  .btn-primary:disabled {
    background: var(--brand-tan); border-color: var(--brand-tan);
    cursor: not-allowed; opacity: .7;
  }
  .btn-ghost {
    color: var(--text-soft);
    padding: 6px 10px; border-radius: 6px;
    font-size: 14px; transition: all .15s;
  }
  .btn-ghost:hover { background: var(--brand-cream); color: var(--text); }
  .btn-danger {
    color: var(--brand-red); padding: 6px 10px; border-radius: 6px; font-size:14px;
    font-weight: 500;
  }
  .btn-danger:hover { background: #fbe0e0; color: var(--brand-red-dark); }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    user-select: none;
  }
  .section-header:hover { background: #faf7f3; }
  .section-header h3 { font-size: 15px; font-weight: 600; color: var(--text); }
  .section-body { padding: 18px; }

  .chev { transition: transform .15s; color: var(--brand-red); }
  .chev.open { transform: rotate(90deg); }

  .table-th {
    text-align: left; font-size: 12px; font-weight: 600;
    color: var(--text); padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--brand-cream);
    position: sticky; top: 0;
  }
  .table-td {
    padding: 10px 12px; font-size: 14px;
    border-bottom: 1px solid var(--border-soft);
    vertical-align: middle;
  }

  .modal-backdrop {
    position: fixed; inset:0; background:rgba(32,39,49,.5);
    display:flex; align-items:center; justify-content:center; z-index:50;
  }
  .modal-card {
    background:#fff; border-radius:12px;
    width: min(720px, 92vw); max-height: 88vh; overflow:auto;
    box-shadow: 0 20px 50px rgba(32,39,49,.25);
  }

  /* 사이드바 — 다크 네이비 (#202731) + 골드 강조 (#F0B429) */
  .app-sidebar {
    background: #202731;
    color: #e8e0d5;
  }
  .sidebar-section-label {
    color: #8a8e94; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase;
    padding: 0 10px; margin-top: 14px; margin-bottom: 4px; font-weight: 600;
  }
  .sidebar-item {
    display:flex; align-items:center; gap:10px;
    padding: 7px 10px; border-radius:6px;
    font-size: 14px; color: #e8e0d5;
    cursor: pointer;
    position: relative;
    transition: all .15s;
  }
  .sidebar-item .nav-icon { color: #cabaab; flex-shrink: 0; transition: color .15s; }
  .sidebar-item:hover { background: rgba(240, 180, 41, 0.08); color: #ffffff; }
  .sidebar-item:hover .nav-icon { color: #F0B429; }
  .sidebar-item.active {
    background: rgba(240, 180, 41, 0.15); color: #F0B429; font-weight: 600;
  }
  .sidebar-item.active .nav-icon { color: #F0B429; }
  .sidebar-item.active::before {
    content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
    width: 3px; border-radius: 0 2px 2px 0; background: #F0B429;
  }
  .sidebar-item.opacity-50 { opacity: 0.4; }
  .sidebar-item.opacity-50 .nav-icon { color: #6a6e75; }

  /* 상단 헤더 — 따뜻한 베이지 보더 */
  .app-header {
    background: #fff;
    border-bottom: 1px solid var(--border);
  }
  .brand-title { color: var(--brand-red); font-weight: 700; letter-spacing: -0.01em; }

  /* ────────── Design Handoff: 새 컴포넌트 ────────── */
  /* 프로필 헤더 (다크 그라데이션) */
  .hd-profile {
    background: linear-gradient(135deg, #262E3C 0%, var(--charcoal) 100%);
    border-radius: 18px;
    padding: 24px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    color: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .hd-profile::after {
    content: ""; position: absolute; right: -40px; top: -40px; width: 200px; height: 200px;
    border-radius: 50%; background: radial-gradient(circle, rgba(240,180,41,.10), transparent 70%);
  }
  .hd-pava {
    width: 74px; height: 74px; border-radius: 50%; background: var(--gold); color: var(--charcoal);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 800; flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(240,180,41,.3);
  }
  .hd-pava.sq { border-radius: 16px; font-size: 20px; }
  .hd-pmain { flex: 1; min-width: 0; z-index: 1; }
  .hd-pname { display: flex; align-items: center; gap: 11px; flex-wrap: wrap; }
  .hd-pname h1 { font-size: 24px; font-weight: 800; letter-spacing: -.5px; margin: 0; }
  .hd-pname .en { font-size: 15px; color: #AEB3BD; font-weight: 500; }
  .hd-chip { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
  .hd-chip.live { color: #8FE0BC; background: rgba(47,138,99,.22); }
  .hd-chip.tier { color: #fff; background: var(--red); }
  .hd-chip.edu  { color: var(--charcoal); background: var(--gold); }
  .hd-sdot { width: 6px; height: 6px; border-radius: 50%; background: #8FE0BC; display: inline-block; margin-right: 5px; vertical-align: middle; }
  .hd-pmeta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 12px; font-size: 12.5px; color: #B4B9C2; font-weight: 500; }
  .hd-pmeta b { color: #E6E8EC; font-weight: 600; }

  /* 탭 — 흰 컨테이너 + 차콜 활성 */
  .hd-tabs {
    display: flex; gap: 3px;
    background: var(--white); border: 1px solid var(--line); border-radius: 12px;
    padding: 5px; box-shadow: var(--shadow-sm);
    margin: 18px 0 4px;
    overflow-x: auto;
  }
  .hd-tab {
    font-size: 13px; font-weight: 600; color: var(--muted);
    padding: 9px 15px; border-radius: 8px;
    white-space: nowrap; cursor: pointer;
    transition: .14s;
    background: transparent; border: none;
  }
  .hd-tab:hover { color: var(--ink); background: var(--light); }
  .hd-tab.on { color: #fff; background: var(--charcoal); }

  /* 섹션 eyebrow */
  .hd-eyebrow { display: flex; align-items: center; gap: 9px; margin: 28px 2px 14px; }
  .hd-eyebrow .bar { width: 3px; height: 15px; border-radius: 2px; background: var(--gold); }
  .hd-eyebrow h2 { font-size: 15px; font-weight: 700; color: var(--charcoal); letter-spacing: -.2px; margin: 0; }
  .hd-eyebrow .note { font-size: 11.5px; color: var(--faint); font-weight: 500; }

  /* 카드 (Pillar) */
  .hd-card {
    background: var(--white); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow-sm); padding: 20px;
  }
  .hd-pillars { display: grid; grid-template-columns: 1.25fr 1fr 1fr; gap: 14px; }
  .hd-plabel { font-size: 12.5px; font-weight: 600; color: var(--muted); margin-bottom: 14px; }
  .hd-val { font-size: 34px; font-weight: 800; color: var(--charcoal); letter-spacing: -1px; line-height: 1; }
  .hd-den { font-size: 16px; font-weight: 600; color: var(--faint); margin-left: 3px; }
  .hd-track { height: 8px; border-radius: 6px; background: #EDE8DF; margin-top: 14px; overflow: hidden; }
  .hd-fill { height: 100%; border-radius: 6px; }
  .hd-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11.5px; font-weight: 700;
    padding: 4px 9px; border-radius: 20px;
    margin-top: 11px;
  }
  .hd-pill.good { color: var(--good); background: var(--good-bg); }
  .hd-pill.warn { color: var(--warn); background: var(--warn-bg); }
  .hd-meta { font-size: 12px; color: var(--muted); margin-top: 9px; font-weight: 500; }
  .hd-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

  /* Mini (보조 지표) */
  .hd-minis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 14px; }
  .hd-mini {
    background: var(--white); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow-sm); padding: 17px 19px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .hd-mini .lbl { font-size: 12.5px; font-weight: 600; color: var(--muted); }
  .hd-mini .num { font-size: 26px; font-weight: 800; color: var(--charcoal); letter-spacing: -.5px; }
  .hd-mini .num.empty { font-size: 13.5px; font-weight: 600; color: var(--faint); }

  /* 표 (커미션·인보이스) */
  .hd-tablecard {
    background: var(--white); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow-sm); overflow: hidden;
  }
  .hd-tablecard table { width: 100%; border-collapse: collapse; }
  .hd-tablecard thead th {
    font-size: 11.5px; font-weight: 700; color: var(--faint); text-align: left;
    padding: 13px 18px; background: #FBFAF7; border-bottom: 1px solid var(--line);
  }
  .hd-tablecard thead th.r, .hd-tablecard tbody td.r { text-align: right; }
  .hd-tablecard tbody td {
    font-size: 13px; color: var(--gray); padding: 14px 18px;
    border-bottom: 1px solid var(--line-soft); font-weight: 500;
  }
  .hd-tablecard tbody tr:last-child td { border-bottom: none; }
  .hd-tablecard tbody tr:hover { background: #FBFAF7; }
  .hd-st {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11.5px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px;
  }
  .hd-st-paid  { color: var(--good); background: var(--good-bg); }
  .hd-st-sched { color: var(--warn); background: var(--warn-bg); }
  .hd-st-wait  { color: var(--muted); background: var(--light); }
  .hd-st-alert { color: var(--alert); background: var(--alert-bg); }

  /* PDF 인쇄용 */
  @media print {
    body * { visibility: hidden !important; }
    #pdf-print-area, #pdf-print-area * { visibility: visible !important; }
    #pdf-print-area { position: absolute; left: 0; top: 0; width: 100%; }
    .no-print { display: none !important; }
    @page { margin: 1.5cm; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
/** @jsxRuntime classic */
/** @jsx React.createElement */
/** @jsxFrag React.Fragment */
const { useState, useEffect, useMemo, useRef, Fragment } = React;

/* ============================================================
   유틸리티 & 상수
   ============================================================ */
const uid = () => Math.random().toString(36).slice(2, 10);

const ADMISSION_STATUSES = ['신규', '재학중', '졸업', '종료', '취소'];
const CATEGORIES = ['브듀', '외부', '단기'];
const IELTS_STATUSES = ['시험예정', '준비중', '점수 있음', '해당없음'];

const EC_TYPES = ['클럽', '봉사활동', '대회', '리더십', '인턴십', '캠프', '포트폴리오', '기타']; // 레거시
// EC 5대 카테고리 — 카테고리별로 필수 필드가 다름
const EC_CATEGORIES = ['봉사활동', '학교클럽', '대회 및 수상', '특별 프로그램', '개별 특성화 활동'];
const EC_STATUSES = ['예정', '진행중', '완료', '중단'];
const EC_VALUES = ['높음', '보통', '낮음'];
// 봉사·클럽은 주최기관/담당자 정보 필수

// 신청 접수 — 등록 프로그램 (BUPP_PROGRAMS와 동일, 별칭으로 유지)

const APPLICATION_STATUSES = ['pending', 'approved', 'invoiced', 'paid', 'rejected'];
const APPLICATION_STATUS_LABEL = {
  pending: '접수 대기', approved: '승인됨', invoiced: '인보이스 발행', paid: '납부 완료', rejected: '반려'
};
const FUTURE_SCHOOL_TYPES = ['University', 'College'];

// 학부모용 리포트 유형 (정기/비정기 6종)
const REPORT_TYPES = [
  '정기 — 월간', '정기 — 분기', '정기 — 학기말',

const calcAge = (birth) => {
  if (!birth) return '';
  const b = new Date(birth);
  if (isNaN(b)) return '';
  const today = new Date();
  let age = today.getFullYear() - b.getFullYear();
  const m = today.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < b.getDate())) age--;
  return String(age);
};

// 공식학년 — 만나이 기반 자동 계산 (캐나다 표준)
// 만 14 → Grade 9, 만 15 → Grade 10, 만 16 → Grade 11, 만 17 → Grade 12
// 만 13 이하 → 중학교 / 만 18 이상 → 졸업
const calcOfficialGrade = (birth) => {
  const ageStr = calcAge(birth);
  if (!ageStr) return '';
  const age = parseInt(ageStr);
  if (isNaN(age)) return '';
  if (age <= 13) return 'Pre-Grade 9';
  if (age === 14) return 'Grade 9';
  if (age === 15) return 'Grade 10';
  if (age === 16) return 'Grade 11';
  if (age === 17) return 'Grade 12';
  if (age >= 18) return 'Post-Grade 12';
  return '';
};

const OPTIONS_KEY = 'bupp_options_v1';
const DEFAULT_OPTIONS = {
  category: [...CATEGORIES],   // 브듀 / 외부 / 단기 + (파트너사 등 추가)
  cohort: [...BUPP_COHORTS],   // BUPP 12~18기 기본 시드
  currentSchool: []            // 사용자 지정 학교
};
const loadOptions = () => {
  try {
    const raw = localStorage.getItem(OPTIONS_KEY);
    if (!raw) return { ...DEFAULT_OPTIONS };
    const parsed = JSON.parse(raw);
    // 기존 cohort에 BUPP_COHORTS를 병합 (없으면 추가)
    const existingCohorts = parsed.cohort || [];
    const mergedCohorts = [...BUPP_COHORTS];
    existingCohorts.forEach(c => { if (!mergedCohorts.includes(c)) mergedCohorts.push(c); });
    return {
      category: parsed.category?.length ? parsed.category : [...CATEGORIES],
      cohort: mergedCohorts,
      currentSchool: parsed.currentSchool || []
    };
  } catch { return { ...DEFAULT_OPTIONS }; }
};
const saveOptions = (data) => {
  try { localStorage.setItem(OPTIONS_KEY, JSON.stringify(data)); } catch {}
};

// 다음 분기 정산일 (1·4·7·10월 15일) 자동 계산
const QUARTER_PAYOUT_MONTHS = [1, 4, 7, 10];
const getNextSettlementDate = (paidDateStr) => {
  if (!paidDateStr) return '';
  const d = new Date(paidDateStr);
  if (isNaN(d)) return '';
  const y = d.getFullYear();
  const m = d.getMonth() + 1; // 1-12
  const day = d.getDate();
  // 다음 분기 15일 찾기
  for (const qm of QUARTER_PAYOUT_MONTHS) {
    if (qm > m || (qm === m && day < 15)) {
      return `${y}-${String(qm).padStart(2,'0')}-15`;
    }
  }
  // 그 해 다 지나면 다음 해 1월 15일
  return `${y + 1}-01-15`;
};

// 커미션 상태 자동 판정
// wait      : 학생 미입금 (invoice.status !== 'paid')
// paid      : 파트너 지급 완료 (commissionPaidAt 있음)
// overdue   : 입금됐고 예정일 지났는데 미지급
// scheduled : 입금됐고 정산 예정
const getCommissionStatus = (invoice, today = new Date().toISOString().slice(0,10)) => {
  const studentPaid = invoice.status === 'paid' || (invoice.paidAt && invoice.paidAt !== '');
  const partnerPaid = !!invoice.commissionPaidAt;
  if (partnerPaid) return 'paid';
  if (!studentPaid) return 'wait';
  const scheduled = getNextSettlementDate(invoice.paidAt || invoice.paymentConfirmedAt);
  if (scheduled && scheduled < today) return 'overdue';
  return 'scheduled';
};

/* 사용자가 새 옵션을 직접 추가할 수 있는 콤보 셀렉트.
   options: 현재까지의 옵션 목록
   onAddCustom(value): 새 항목을 글로벌 옵션 목록에 추가
   onRemoveCustom(value): 옵션 자체 삭제 (선택값은 유지)
*/
const ComboSelect = ({ value, onChange, options, onAddCustom, onRemoveCustom, placeholder='선택', allowRemove=true }) => {
  const [open, setOpen] = useState(false);
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState('');
  const ref = useRef(null);

  useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) {
        setOpen(false); setAdding(false); setDraft('');
      }
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const commitAdd = () => {
    const v = draft.trim();
    if (!v) return;
    if (onAddCustom) onAddCustom(v);
    onChange(v);
    setDraft(''); setAdding(false); setOpen(false);
  };

  const opts = options || [];

  return (
    <div ref={ref} className="relative">
      <button
        type="button"
        className="notion-input text-left flex justify-between items-center"
        onClick={() => setOpen(!open)}
        style={{ cursor:'pointer' }}
      >
        <span className={value ? '' : 'text-gray-400'}>{value || placeholder}</span>
        <span className="text-gray-400 ml-2 text-xs">▾</span>
      </button>
      {open && (
        <div
          className="absolute z-30 mt-1 w-full bg-white rounded-md max-h-64 overflow-auto"
          style={{ boxShadow:'0 8px 24px rgba(0,0,0,.12)', border:'1px solid #ebebea' }}
        >
          {opts.length === 0 && !adding && (
            <div className="px-3 py-2 text-sm text-gray-400">등록된 항목이 없습니다</div>
          )}
          {opts.map(o => (
            <div
              key={o}
              className="px-3 py-2 text-sm cursor-pointer flex items-center justify-between group"
              style={{ background: value === o ? '#f1f1ef' : 'transparent' }}
              onMouseEnter={(e) => { if (value !== o) e.currentTarget.style.background = '#fafaf9'; }}
              onMouseLeave={(e) => { if (value !== o) e.currentTarget.style.background = 'transparent'; }}
              onClick={() => { onChange(o); setOpen(false); }}
            >
              <span>{o}{value === o && <span className="ml-2 text-blue-500">✓</span>}</span>
              {allowRemove && onRemoveCustom && (
                <button
                  className="opacity-0 group-hover:opacity-100 text-xs text-gray-400 hover:text-red-500 ml-2"
                  title="목록에서 삭제"
                  onClick={(e) => {
                    e.stopPropagation();
                    if (confirm(`"${o}" 항목을 목록에서 삭제할까요?\n(기존 학생 데이터의 선택값은 그대로 유지됩니다)`)) {
                      onRemoveCustom(o);
                    }
                  }}
                >×</button>
              )}
            </div>
          ))}
          <div className="border-t border-gray-100 sticky bottom-0 bg-white">
            {adding ? (
              <div className="p-2 flex gap-1">
                <input
                  autoFocus
                  className="notion-input"
                  placeholder="새 항목 입력 후 Enter"
                  value={draft}
                  onChange={(e) => setDraft(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === 'Enter') { e.preventDefault(); commitAdd(); }
                    else if (e.key === 'Escape') { setAdding(false); setDraft(''); }
                  }}
                />
                <button className="btn-primary" onClick={commitAdd}>추가</button>
              </div>
            ) : (
              <div
                className="px-3 py-2 text-sm cursor-pointer text-blue-600 font-medium"
                onMouseEnter={(e) => e.currentTarget.style.background = '#fafaf9'}
                onMouseLeave={(e) => e.currentTarget.style.background = '#fff'}
                onClick={() => setAdding(true)}
              >+ 새 항목 추가</div>
            )}
            {value && (
              <div
                className="px-3 py-2 text-sm cursor-pointer text-red-500 border-t border-gray-100"
                onMouseEnter={(e) => e.currentTarget.style.background = '#fff5f5'}
                onMouseLeave={(e) => e.currentTarget.style.background = '#fff'}
                onClick={() => { onChange(''); setOpen(false); }}
              >× 선택 해제</div>
            )}
          </div>
        </div>
      )}
    </div>
  );
};

const Section = ({ title, count, defaultOpen=true, children, right }) => {

      <div className="section-header" onClick={() => setOpen(!open)}>
        <div className="flex items-center gap-2">
          <svg className={`chev ${open ? 'open':''}`} width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M4 2l4 4-4 4" stroke="#787774" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>

          {count != null && <span className="text-xs text-gray-400">· {count}</span>}

const Modal = ({ open, onClose, title, children, footer }) => {
  if (!open) return null;
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-card" onClick={(e) => e.stopPropagation()}>
        <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
          <h3 className="text-base font-semibold">{title}</h3>
          <button onClick={onClose} className="btn-ghost">✕</button>
        </div>
        <div className="px-6 py-5">{children}</div>
        {footer && <div className="px-6 py-3 border-t border-gray-100 flex justify-end gap-2 bg-gray-50">{footer}</div>}
      </div>
    </div>
  );
};

/* 다중 선택 (선수과목, 제공과정 등에 사용) */
const MultiSelect = ({ value=[], onChange, options, getLabel=(o)=>o, getValue=(o)=>o, placeholder='선택' }) => {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  const toggle = (v) => {
    if (value.includes(v)) onChange(value.filter(x => x !== v));
    else onChange([...value, v]);
  };
  const labelFor = (v) => {
    const o = options.find(o => getValue(o) === v);
    return o ? getLabel(o) : v;
  };
  return (
    <div ref={ref} className="relative">
      <button
        type="button"
        className="notion-input text-left flex flex-wrap gap-1 items-center"
        style={{ minHeight:32, cursor:'pointer' }}
        onClick={() => setOpen(!open)}
      >
        {value.length === 0 ? (
          <span className="text-gray-400">{placeholder}</span>
        ) : value.map(v => (
          <span key={v} className="badge b-gray" onClick={(e) => { e.stopPropagation(); toggle(v); }} style={{ cursor:'pointer' }}>
            {labelFor(v)} <span className="ml-1 text-gray-500">×</span>
          </span>
        ))}
        <span className="ml-auto text-gray-400 text-xs">▾</span>
      </button>
      {open && (
        <div className="absolute z-30 mt-1 w-full bg-white rounded-md max-h-64 overflow-auto"
          style={{ boxShadow:'0 8px 24px rgba(0,0,0,.12)', border:'1px solid #ebebea' }}>
          {options.length === 0 && <div className="px-3 py-2 text-sm text-gray-400">옵션이 없습니다</div>}
          {options.map(o => {
            const v = getValue(o);
            const selected = value.includes(v);
            return (
              <div key={v}
                className="px-3 py-2 text-sm cursor-pointer flex items-center gap-2"
                style={{ background: selected ? '#f1f1ef' : 'transparent' }}
                onMouseEnter={(e) => { if (!selected) e.currentTarget.style.background = '#fafaf9'; }}
                onMouseLeave={(e) => { if (!selected) e.currentTarget.style.background = 'transparent'; }}
                onClick={() => toggle(v)}
              >
                <input type="checkbox" readOnly checked={selected} className="w-4 h-4 accent-gray-800" />
                <span>{getLabel(o)}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

      list:       <Fragment><path d="M4 6h16M4 12h16M4 18h16" strokeWidth="1.8" strokeLinecap="round"/><circle cx="2" cy="6" r="1" /><circle cx="2" cy="12" r="1" /><circle cx="2" cy="18" r="1" /></Fragment>,
      chat:       <Fragment><path d="M3 5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2H10l-5 4v-4H5a2 2 0 01-2-2V5z" fill="none" strokeWidth="1.6" strokeLinejoin="round"/></Fragment>
  };
  return (
    <svg className="nav-icon" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
      {paths[name] || <circle cx="12" cy="12" r="4" fill="currentColor"/>}
    </svg>
  );
};

// 다중 선택 칩 필터 — 라벨 + 클릭 가능한 옵션 칩들
const ChipFilter = ({ label, options=[], selected=[], onToggle }) => (
  <div>
    <div className="text-xs font-semibold text-gray-600 mb-1.5">
      {label} {selected.length > 0 && <span className="ml-1 text-gray-400">({selected.length} 선택)</span>}
    </div>
    <div className="flex flex-wrap gap-1.5">
      {options.length === 0 && <span className="text-xs text-gray-400">옵션 없음</span>}
      {options.map(opt => {
        const isOn = selected.includes(opt);
        return (
          <button
            key={opt}
            onClick={() => onToggle(opt)}
            className="text-xs px-2.5 py-1 rounded transition-colors"
            style={isOn
              ? { background:'#c20206', color:'#fff', border:'1px solid #c20206' }
              : { background:'#fff', color:'#202731', border:'1px solid #cabaab' }
            }
          >{opt}</button>
        );
      })}
    </div>
  </div>
);

const StudentList = ({ students, onOpen, onAdd, customOptions, role='admin' }) => {
  const canAdd = role === 'admin' || role === 'bu_staff';
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState({
    admissionStatus: [], category: [], cohort: [], program: [],   // 다중
    currentSchool: '', officialGrade: '', actualGrade: '',         // 단일
    ieltsStatus: '', accommodationType: '', ecActive: ''           // 단일
  });

  const set = (k, v) => setFilters((p) => ({ ...p, [k]: v }));
  const toggle = (k, opt) => setFilters((p) => {
    const arr = p[k] || [];
    return { ...p, [k]: arr.includes(opt) ? arr.filter(x => x !== opt) : [...arr, opt] };
  });
  const hasActiveFilter = () => {
    return Object.entries(filters).some(([k, v]) => Array.isArray(v) ? v.length > 0 : Boolean(v));
  };

  const distinct = (key, getter) => {
    const s = new Set();
    students.forEach(st => {
      const v = getter ? getter(st) : st[key];
      if (v) s.add(v);
    });
    return Array.from(s).sort();
  };

  // 사용자가 등록한 옵션 + 실제 학생 데이터에 등장한 값 → 합집합
  const mergeOpts = (key) => {
    const set = new Set([
      ...(customOptions?.[key] || []),
      ...distinct(key)
    ]);
    return Array.from(set).sort();
  };

  const categoryOpts = mergeOpts('category');
  const cohortOpts = mergeOpts('cohort');
  const schoolOpts = mergeOpts('currentSchool');
  const officialGradeOpts = distinct('officialGrade');
  const actualGradeOpts = distinct('actualGrade');

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    return students.filter(s => {
      if (q) {
        const blob = [
          s.koreanName, s.englishName, s.currentSchool, s.cohort,
          s.guardianManager, s.studentId, s.bpid
        ].filter(Boolean).join(' ').toLowerCase();
        if (!blob.includes(q)) return false;
      }
      if (filters.admissionStatus.length > 0 && !filters.admissionStatus.includes(s.admissionStatus)) return false;
      if (filters.category.length > 0 && !filters.category.includes(s.category)) return false;
      if (filters.cohort.length > 0 && !filters.cohort.includes(s.cohort)) return false;
      if (filters.currentSchool && s.currentSchool !== filters.currentSchool) return false;
      if (filters.officialGrade && s.officialGrade !== filters.officialGrade) return false;
      if (filters.actualGrade && s.actualGrade !== filters.actualGrade) return false;
      if (filters.program.length > 0 && !filters.program.includes(s.program)) return false;
      if (filters.ieltsStatus && (s.academic?.englishTest?.status || s.academic?.ieltsStatus) !== filters.ieltsStatus) return false;
      if (filters.accommodationType && s.accommodation?.type !== filters.accommodationType) return false;
      if (filters.ecActive === 'Y' && !(s.extracurriculars || []).some(e => e.status === '진행중')) return false;
      if (filters.ecActive === 'N' && (s.extracurriculars || []).some(e => e.status === '진행중')) return false;
      return true;
    });
  }, [students, search, filters]);

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">학생 관리</h1>
          <p className="text-sm text-gray-500 mt-1">전체 {students.length}명 · 필터 결과 {filtered.length}명</p>
        </div>
        <div className="flex items-center gap-2">
          <input
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder="이름, 학교, 기수로 검색..."
            className="notion-input w-72"
          />
          {canAdd && (
            <div className="text-xs text-gray-500 px-3 py-2 rounded" style={{background:'#faf3e3', border:'1px solid #e8c97a'}}>
              💡 새 학생은 <strong>📝 신청 접수</strong>에서 신청서를 작성하면 자동 등록됩니다.
            </div>
          )}
        </div>
      </div>

      {/* 필터 영역 */}
      <div className="notion-card p-4 mb-4">
        {/* 다중 선택 (칩) — 현재상태 · 기수 · BUPP 프로그램 */}
        <div className="space-y-3 mb-3">
          <ChipFilter label="현재상태" options={ADMISSION_STATUSES} selected={filters.admissionStatus} onToggle={(v) => toggle('admissionStatus', v)}/>
          <ChipFilter label="기수" options={cohortOpts} selected={filters.cohort} onToggle={(v) => toggle('cohort', v)}/>
          <ChipFilter label="BUPP 프로그램" options={BUPP_PROGRAMS} selected={filters.program} onToggle={(v) => toggle('program', v)}/>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 pt-3" style={{borderTop:'1px solid var(--border)'}}>
          <Field label="재학 학교">
            <Select value={filters.currentSchool} onChange={(v) => set('currentSchool', v)} options={schoolOpts} placeholder="전체" />
          </Field>
          <Field label="공식학년">
            <Select value={filters.officialGrade} onChange={(v) => set('officialGrade', v)} options={officialGradeOpts} placeholder="전체" />
          </Field>
          <Field label="실제학년">
            <Select value={filters.actualGrade} onChange={(v) => set('actualGrade', v)} options={actualGradeOpts} placeholder="전체" />
          </Field>
          <Field label="공인 영어 상태">
            <Select value={filters.ieltsStatus} onChange={(v) => set('ieltsStatus', v)} options={IELTS_STATUSES} placeholder="전체" />
          </Field>
          <Field label="숙소 형태">
            <Select value={filters.accommodationType} onChange={(v) => set('accommodationType', v)} options={ACCOM_TYPES} placeholder="전체" />
          </Field>
          <Field label="EC 진행 여부">
            <Select value={filters.ecActive} onChange={(v) => set('ecActive', v)} options={['Y','N']} placeholder="전체" />
          </Field>
        </div>
        {hasActiveFilter() && (
          <div className="mt-3 flex justify-end">
            <button className="btn-ghost" onClick={() => setFilters({
              admissionStatus:[], category:[], cohort:[], program:[],
              currentSchool:'', officialGrade:'', actualGrade:'', ieltsStatus:'',
              accommodationType:'', ecActive:''
            })}>필터 초기화</button>
          </div>
        )}
      </div>

      {/* 학생 테이블 */}
      <div className="notion-card overflow-hidden">
        <div className="overflow-auto" style={{ maxHeight: 'calc(100vh - 340px)' }}>
          <table className="w-full">
            <thead>
              <tr>
                <th className="table-th">한글 이름</th>
                <th className="table-th">영문 이름</th>
                <th className="table-th">현재상태</th>
                <th className="table-th">구분</th>
                <th className="table-th">기수</th>
                <th className="table-th">재학 학교</th>
                <th className="table-th">실제학년</th>
                <th className="table-th">아이엘츠</th>
                <th className="table-th">프로그램</th>
                <th className="table-th">담당자</th>
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr><td colSpan="10" className="text-center py-12 text-gray-400 text-sm">조건에 맞는 학생이 없습니다.</td></tr>
              ) : filtered.map(s => (
                <tr key={s.id} className="row-hover cursor-pointer" onClick={() => onOpen(s.id)}>
                  <td className="table-td">
                    <span className="font-medium text-gray-800 hover:underline">{s.koreanName || '—'}</span>
                  </td>
                  <td className="table-td text-gray-600">{s.englishName || '—'}</td>
                  <td className="table-td"><Badge value={s.admissionStatus}/></td>
                  <td className="table-td"><Badge value={s.category}/></td>
                  <td className="table-td text-gray-600">{s.cohort || '—'}</td>
                  <td className="table-td text-gray-600">{s.currentSchool || '—'}</td>
                  <td className="table-td text-gray-600">{s.actualGrade || '—'}</td>
                  <td className="table-td">
                    {s.academic?.englishTest?.type && <span className="badge b-gray text-xs mr-1">{s.academic.englishTest.type}</span>}
                    <Badge value={s.academic?.englishTest?.status || s.academic?.ieltsStatus}/>
                  </td>
                  <td className="table-td">
                    {s.program
                      ? <Badge value={s.program}/>
                      : <span className="text-gray-300 text-xs">—</span>}
                  </td>
                  <td className="table-td text-gray-600">{s.guardianManager || '—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

/* ============================================================

const UniversityDataPage = ({ universities, programs, trackGroups, onChangeUniversities, onChangePrograms, onChangeTrackGroups }) => {
  const [country, setCountry] = useState('CA');
  const [sub, setSub] = useState('universities'); // universities | programs | trackGroups

  const visibleUnis = universities.filter(u => u.country === country);
  const visiblePrograms = programs.filter(p => visibleUnis.some(u => u.id === p.universityId));
  const visibleGroups = trackGroups.filter(g => g.country === country);

  return (
    <div className="max-w-[1500px] mx-auto px-8 py-8">
      <div className="mb-6">
        <h1 className="text-2xl font-bold">🎓 대학 데이터</h1>
        <p className="text-sm text-gray-500 mt-1">국가별로 대학 · 전공 · 트랙 그룹 마스터를 관리합니다. 학생 대학지원에서 이 데이터를 참조합니다.</p>
      </div>

      {/* 국가 탭 */}
      <div className="flex gap-1 mb-4 border-b border-gray-200">
        {COUNTRIES.map(c => (
          <button key={c}
            className="px-4 py-2 text-sm border-b-2 transition-colors"
            style={{
              borderColor: country === c ? '#37352f' : 'transparent',
              fontWeight: country === c ? 600 : 400,
              color: country === c ? '#37352f' : '#787774'
            }}
            onClick={() => setCountry(c)}
          >{COUNTRY_LABEL[c]}</button>
        ))}
      </div>

      {/* 서브탭 */}
      <div className="flex gap-1 mb-4">
        {[
          { id:'universities', label:`🏛 대학 (${visibleUnis.length})` },
          { id:'programs', label:`📖 전공 (${visiblePrograms.length})` },
          { id:'trackGroups', label:`🎯 트랙 그룹 (${visibleGroups.length})` }
        ].map(t => (
          <button key={t.id}
            className={`tab-btn ${sub === t.id ? 'active':''}`}
            onClick={() => setSub(t.id)}
          >{t.label}</button>
        ))}
      </div>

      {sub === 'universities' && (
        <UniversitySubList universities={universities} country={country} onChange={onChangeUniversities}/>
      )}
      {sub === 'programs' && (
        <ProgramSubList programs={programs} universities={universities} trackGroups={trackGroups} country={country} onChange={onChangePrograms}/>
      )}
      {sub === 'trackGroups' && (
        <TrackGroupSubList trackGroups={trackGroups} country={country} onChange={onChangeTrackGroups}/>
      )}
    </div>
  );
};

// 대학 서브 리스트
const UniversitySubList = ({ universities, country, onChange }) => {
  const [search, setSearch] = useState('');
  const [editing, setEditing] = useState(null);
  const list = universities.filter(u => u.country === country);
  const filtered = list.filter(u => {
    const q = search.trim().toLowerCase();
    if (!q) return true;
    return (u.name||'').toLowerCase().includes(q) || (u.shortName||'').toLowerCase().includes(q);
  });
  const upsert = (d) => {
    if (!d.name?.trim()) { alert('대학명을 입력해주세요.'); return; }
    const next = d.id
      ? universities.map(u => u.id === d.id ? d : u)
      : [...universities, { ...d, id: uid() }];
    onChange(next);
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 대학을 삭제하시겠습니까? (연결된 전공·학생지원 데이터는 ID 참조만 깨질 수 있음)')) return;
    onChange(universities.filter(u => u.id !== id));
  };
  return (
    <>
      <div className="flex items-center justify-between mb-3">
        <input className="notion-input w-72" placeholder="대학명 검색..." value={search} onChange={(e) => setSearch(e.target.value)}/>
        <button className="btn-primary" onClick={() => setEditing({ id:'', country, region:'', name:'', shortName:'', portalName:'', portalUrl:'', ieltsCondition:'', duolingoCondition:'', englishScoreDeadline:'', memo:'' })}>+ 새 대학 추가</button>
      </div>
      {editing && (
        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold mb-4">{editing.id ? '대학 수정' : '새 대학 추가'}</h3>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
            <Field label="대학명 *" span={2}><TextInput value={editing.name} onChange={(v) => setEditing({...editing, name:v})}/></Field>
            <Field label="약칭"><TextInput value={editing.shortName} onChange={(v) => setEditing({...editing, shortName:v})}/></Field>
            <Field label="국가"><Select value={editing.country} onChange={(v) => setEditing({...editing, country:v})} options={COUNTRIES}/></Field>
            <Field label="주 / 지역"><TextInput value={editing.region} onChange={(v) => setEditing({...editing, region:v})} placeholder="ON, BC, England 등"/></Field>
            <Field label="포털명"><TextInput value={editing.portalName} onChange={(v) => setEditing({...editing, portalName:v})} placeholder="JOINid, MOSAIC 등"/></Field>
            <Field label="포털 URL" span={2}><TextInput value={editing.portalUrl} onChange={(v) => setEditing({...editing, portalUrl:v})}/></Field>
            <Field label="영어점수 데드라인"><TextInput type="date" value={editing.englishScoreDeadline} onChange={(v) => setEditing({...editing, englishScoreDeadline:v})}/></Field>
            <Field label="IELTS 조건" span={3}><TextArea value={editing.ieltsCondition} onChange={(v) => setEditing({...editing, ieltsCondition:v})} rows={2}/></Field>
            <Field label="듀오링고 조건" span={3}><TextArea value={editing.duolingoCondition} onChange={(v) => setEditing({...editing, duolingoCondition:v})} rows={2}/></Field>
            <Field label="메모" span={3}><TextArea value={editing.memo} onChange={(v) => setEditing({...editing, memo:v})}/></Field>
            <div className="col-span-3 flex justify-end gap-2">
              <button className="btn-ghost" onClick={() => setEditing(null)}>취소</button>
              <button className="btn-primary" onClick={() => upsert(editing)}>저장</button>
            </div>

      )}
      <div className="notion-card overflow-hidden">
        <div className="overflow-auto" style={{ maxHeight:'calc(100vh - 380px)' }}>

              <th className="table-th">대학명</th>
              <th className="table-th">지역</th>
              <th className="table-th">포털</th>
              <th className="table-th">IELTS</th>
              <th className="table-th">듀오링고</th>
              <th className="table-th">영어점수 데드라인</th>
              <th className="table-th"></th>
            </tr></thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr><td colSpan="7" className="text-center py-12 text-gray-400 text-sm">등록된 대학이 없습니다.</td></tr>
              ) : filtered.map(u => (
                <tr key={u.id} className="row-hover">

                    <div className="font-medium">{u.name}</div>

// 전공 서브 리스트
const ProgramSubList = ({ programs, universities, trackGroups, country, onChange }) => {
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState({ universityId:'', groupId:'' });
  const [editing, setEditing] = useState(null);
  const countryUnis = universities.filter(u => u.country === country);
  const countryUniIds = new Set(countryUnis.map(u => u.id));
  const list = programs.filter(p => countryUniIds.has(p.universityId));
  const filtered = list.filter(p => {
    const q = search.trim().toLowerCase();
    if (q && !(p.name||'').toLowerCase().includes(q) && !(p.faculty||'').toLowerCase().includes(q)) return false;
    if (filters.universityId && p.universityId !== filters.universityId) return false;
    if (filters.groupId && p.groupId !== filters.groupId) return false;
    return true;
  });
  const upsert = (d) => {
    if (!d.name?.trim() || !d.universityId) { alert('전공명과 대학을 입력해주세요.'); return; }
    const next = d.id ? programs.map(p => p.id === d.id ? d : p) : [...programs, { ...d, id: uid() }];
    onChange(next);
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 전공을 삭제하시겠습니까?')) return;
    onChange(programs.filter(p => p.id !== id));
  };
  return (
    <>
      <div className="flex items-center justify-between mb-3">
        <input className="notion-input w-72" placeholder="전공·학부 검색..." value={search} onChange={(e) => setSearch(e.target.value)}/>
        <button className="btn-primary" onClick={() => setEditing({ id:'', universityId:'', faculty:'', name:'', groupId:'', supplementaryType:'', supplementaryDeadline:'', memo:'' })}>+ 새 전공 추가</button>
      </div>
      <div className="notion-card p-3 mb-3">
        <div className="grid grid-cols-2 gap-3">
          <Field label="대학"><RefSelect value={filters.universityId} onChange={(v) => setFilters({...filters, universityId:v})} options={countryUnis.map(u => ({ id:u.id, label:u.name }))} placeholder="전체"/></Field>
          <Field label="트랙 그룹"><RefSelect value={filters.groupId} onChange={(v) => setFilters({...filters, groupId:v})} options={trackGroups.filter(g => g.country === country).map(g => ({ id:g.id, label:g.name }))} placeholder="전체"/></Field>
        </div>
      </div>
      {editing && (
        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold mb-4">{editing.id ? '전공 수정' : '새 전공 추가'}</h3>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
            <Field label="대학 *" span={2}>
              <RefSelect value={editing.universityId} onChange={(v) => setEditing({...editing, universityId:v})} options={countryUnis.map(u => ({ id:u.id, label:u.name }))} placeholder="대학 선택"/>

// 작은 사진 갤러리 (URL 입력 + 미리보기)
const PhotoUrlGallery = ({ photos=[], onChange, maxCount=2, label='사진' }) => {
  const set = (i, v) => {
    const next = [...photos];
    next[i] = v;
    onChange(next.filter((p, idx) => p || idx < photos.length));
  };
  const remove = (i) => {
    const next = [...photos]; next.splice(i, 1); onChange(next);
  };
  const add = () => {
    if (photos.length >= maxCount) return;
    onChange([...photos, '']);
  };
  return (
    <div className="space-y-2">
      {photos.map((url, i) => (
        <div key={i} className="flex gap-2 items-center">
          <input className="notion-input text-xs" value={url} onChange={(e) => set(i, e.target.value)} placeholder={`${label} URL ${i+1}`}/>
          {url && <img src={url} alt="" style={{ width:48, height:48, objectFit:'cover', borderRadius:6, border:'1px solid var(--border)' }}/>}
          <button className="btn-danger text-xs" onClick={() => remove(i)}>×</button>
        </div>
      ))}
      {photos.length < maxCount && (
        <button className="btn-ghost text-xs" onClick={add}>+ 사진 추가 ({photos.length}/{maxCount})</button>
      )}
    </div>
  );
};

// 학교 거리 입력 다중
const SchoolDistanceList = ({ items=[], onChange, schools=[] }) => {
  const updateItem = (i, k, v) => {

  const add = () => onChange([...items, { school:'', distance:'' }]);
  const remove = (i) => { const next = [...items]; next.splice(i, 1); onChange(next); };
  return (
    <div className="space-y-2">
      {items.map((it, i) => (
        <div key={i} className="grid grid-cols-2 gap-2">
          <input className="notion-input text-xs" value={it.school} onChange={(e) => updateItem(i, 'school', e.target.value)} placeholder="학교명"/>
          <div className="flex gap-2">

              <div>· <strong>숙소 이사 시</strong> 거리 + 짐의 양에 따라 차등 부과</div>
            </div>
          </div>
        </div>

            <Field label="BUPP 통합 숙소 계약서"><TextInput value={accom.buppContractLink} onChange={(v) => upd('buppContractLink', v)} placeholder="https://drive.google.com/..."/></Field>

      {/* 🔒 브듀쌤 전용 — 비용 · 인상 계획 · 운영 메모 (접기 가능, 기본 접힘) */}

            className="w-full px-4 py-3 flex items-center justify-between text-sm font-semibold"
            style={{ color:'#760305' }}
          >
            <span>🔒 브듀쌤 전용 — 비용 · 인상 계획 · 운영 메모</span>
            <span style={{ transition:'transform .15s', transform: rateIncreaseOpen ? 'rotate(90deg)':'rotate(0)' }}>▶</span>

          {rateIncreaseOpen && (
            <div className="p-4 bg-white" style={{ borderTop:'1px solid #f3c4c4' }}>
              {/* 비용 (홈스테이/숙소 월비는 방마다 따로) */}
              <div className="mb-4">
                <div className="font-semibold text-sm mb-2" style={{color:'#760305'}}>💰 비용</div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                  <Field label="디파짓"><TextInput value={accom.deposit} onChange={(v) => upd('deposit', v)} placeholder="예) CAD 500 (퇴실 시 반환)"/></Field>
                  <Field label="입금 방식"><Select value={accom.paymentMethod} onChange={(v) => upd('paymentMethod', v)} options={PAYMENT_METHODS} placeholder="선택"/></Field>
                </div>
                <div className="text-xs text-gray-500 mt-2">💡 숙소/홈스테이 비용은 방마다 다르므로 "방 관리"의 각 방 안에 입력합니다.</div>
              </div>

              {/* 인상 계획 */}
              <div className="mb-3 pt-3" style={{ borderTop:'1px solid #fbe0e0' }}>
                <div className="font-semibold text-sm mb-2" style={{color:'#760305'}}>📈 인상 계획</div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                  <Field label="인상 예정일 (보통 9월)"><TextInput type="date" value={accom.rateIncreaseDate} onChange={(v) => upd('rateIncreaseDate', v)}/></Field>
                  <Field label="인상 계획 내용" span={2}><TextArea value={accom.rateIncreasePlan} onChange={(v) => upd('rateIncreasePlan', v)} rows={2} placeholder="예) 2026년 9월부터 1,300 → 1,350"/></Field>
                  <Field label="메모" span={3}><TextArea value={accom.memo} onChange={(v) => upd('memo', v)} rows={2}/></Field>
                </div>

              <div className="text-xs mt-3 p-3 rounded" style={{color:'#760305', background:'#faf3e3', border:'1px solid #e8c97a'}}>
                💡 <strong>BUPP 운영 정책</strong><br/>
                · 9월 학기 맞춤 인상 조율<br/>
                · 5월 — 다음 학년도 연장 결정<br/>

      {/* 방 관리 */}
      {!isMinimal && (
        <div className="notion-card p-4 mb-4 bg-white">
