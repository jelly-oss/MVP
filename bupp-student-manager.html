// 카테고리 정규화 헬퍼
const getECCategory = (e) => e.category || EC_TYPE_TO_CATEGORY[e.type] || '';

const TabEC = ({ s, update, ecMasters=[], role='admin' }) => {
  const [editing, setEditing] = useState(null);
  const [filters, setFilters] = useState({ category:'', status:'' });
  // 권한: 추가·수정은 학생도 가능, 삭제는 브듀쌤 이상만
  const canDelete = role === 'admin' || role === 'bu_staff';
  const isStudent = role === 'student';

  const list = (s.extracurriculars || []).map(e => ({ ...e, category: getECCategory(e) }));

  const filtered = list.filter(e => {
    if (filters.category && e.category !== filters.category) return false;
    if (filters.status && e.status !== filters.status) return false;
    return true;
  });

  const upsert = (draft) => {
    const next = draft.id
      ? list.map(e => e.id === draft.id ? draft : e)
      : [...list, { ...draft, id: uid() }];
    update({ extracurriculars: next });
    setEditing(null);
  };
  const remove = (id) => {
    if (!canDelete) return;
    if (!confirm('정말 삭제하시겠습니까?')) return;
    update({ extracurriculars: list.filter(e => e.id !== id) });
  };
  const requestDelete = (e) => {
    // 학생용 — 활동에 'deletionRequested' 플래그를 달아 브듀쌤이 검토 후 처리
    const reason = prompt(`"${e.activityName}" 삭제 요청 사유를 적어주세요 (선택):`, '');
    if (reason === null) return;
    const next = list.map(x => x.id === e.id ? { ...x, deletionRequested: true, deletionRequestedAt: new Date().toISOString().slice(0,10), deletionReason: reason } : x);
    update({ extracurriculars: next });
    alert('삭제 요청이 접수됐어요. 브듀쌤이 확인 후 처리합니다.');
  };

  // 카테고리별 카운트 요약
  const countByCategory = EC_CATEGORIES.reduce((acc, c) => {
    acc[c] = list.filter(e => e.category === c).length;
    return acc;
  }, {});

  return (
    <Section
      title="EC 관리"
      count={list.length}
      right={
        <button className="btn-primary" onClick={() => setEditing({
          id:'', ecMasterId:'', category:'', activityName:'', organizationName:'',
          startDate:'', endDate:'', totalHours:'', recognizedHours:'',
          status:'예정', position:'', frequency:'',
          contactName:'', contactEmail:'', contactPhone:'',
          awardDescription:'', awardWon:false,
          description:'', growthPoint:'',
          admissionsValue:'', proofLink:'', teacherMemo:''
        })}>+ EC 추가</button>
      }
    >
      {/* 권한 안내 */}
      <div className="text-xs p-3 rounded mb-4" style={{background:'#faf3e3', color:'#760305', border:'1px solid #e8c97a'}}>
        💡 EC 추가 · 수정은 <strong>학생이 직접</strong> 할 수 있습니다. 단, 삭제는 브듀쌤이 검토하므로 학생은 <strong>"삭제 요청"</strong> 버튼을 이용해주세요.
      </div>
      {/* 카테고리별 요약 카드 — 봉사: 시간 / 학교클럽: 진급한 활동 / 대회: 수상 건수 */}
      {(() => {
        const volTotalHours = list
          .filter(e => e.category === '봉사활동')
          .reduce((sum, e) => sum + (parseFloat(e.totalHours) || 0), 0);
        // 같은 활동명 + 같은 기관으로 2년 이상 이어진 클럽 = 진급 흐름이 있는 클럽
        const clubGroups = {};
        list.filter(e => e.category === '학교클럽').forEach(e => {
          const key = `${(e.activityName||'').trim().toLowerCase()}|${(e.organizationName||'').trim().toLowerCase()}`;
          if (!key.replace(/\|/g, '')) return;
          clubGroups[key] = (clubGroups[key] || 0) + 1;
        });
        const clubsWithProgression = Object.values(clubGroups).filter(n => n >= 2).length;
        const awardedCompCount = list.filter(e => e.category === '대회 및 수상' && e.awardWon).length;
        return (
          <div className="grid grid-cols-5 gap-2 mb-4">
            {EC_CATEGORIES.map(c => (
              <div key={c} className="notion-card p-3 text-center cursor-pointer"
                onClick={() => setFilters({ ...filters, category: filters.category === c ? '' : c })}
                style={{ background: filters.category === c ? '#ebebea' : '#fff' }}
              >
                <div className="text-xs text-gray-500">{c}</div>
                <div className="text-xl font-bold mt-1">
                  {countByCategory[c]}
                  {c === '봉사활동' && volTotalHours > 0 && (
                    <span className="text-sm font-semibold ml-1" style={{color:'#0f7b6c'}}>({volTotalHours}h)</span>
                  )}
                </div>
                {c === '봉사활동' && countByCategory[c] > 0 && (
                  <div className="text-xs mt-1" style={{color: volTotalHours >= 40 ? '#0f7b6c' : '#a47007'}}>
                    {volTotalHours >= 40 ? '✓ 졸업 조건 충족' : `40h 중 ${volTotalHours}h`}
                  </div>
                )}
                {c === '학교클럽' && countByCategory[c] > 0 && (
                  <div className="text-xs mt-1" style={{color: clubsWithProgression > 0 ? '#760305' : '#787774'}}>
                    {clubsWithProgression > 0 ? `📈 진급 ${clubsWithProgression}건` : '진급 이력 없음'}
                  </div>
                )}
                {c === '대회 및 수상' && countByCategory[c] > 0 && (
                  <div className="text-xs mt-1 text-gray-500">
                    참여 {countByCategory[c]} · 🏆 수상 {awardedCompCount}
                  </div>
                )}
              </div>
            ))}
          </div>
        );
      })()}

      {/* 필터 */}
      <div className="flex flex-wrap gap-3 mb-4">
        <div className="w-48"><Field label="카테고리"><Select value={filters.category} onChange={(v) => setFilters({...filters, category:v})} options={EC_CATEGORIES} placeholder="전체"/></Field></div>
        <div className="w-40"><Field label="상태"><Select value={filters.status} onChange={(v) => setFilters({...filters, status:v})} options={EC_STATUSES} placeholder="전체"/></Field></div>
      </div>

      {/* 편집 폼 */}
      {editing && (
        <div className="notion-card p-4 mb-4 bg-gray-50">
          <ECEditor ec={editing} ecMasters={ecMasters} onSave={upsert} onCancel={() => setEditing(null)} />
        </div>
      )}

      {/* 리스트 */}
      <div className="notion-card overflow-hidden">
        <div className="overflow-auto">
          <table className="w-full">
            <thead>
              <tr>
                <th className="table-th">카테고리</th>
                <th className="table-th">활동명</th>
                <th className="table-th">기관/포지션</th>
                <th className="table-th">담당자</th>
                <th className="table-th">기간</th>
                <th className="table-th">시간/결과</th>
                <th className="table-th">상태</th>
                <th className="table-th">대입활용</th>
                <th className="table-th"></th>
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr><td colSpan="9" className="text-center py-8 text-gray-400 text-sm">등록된 EC가 없습니다.</td></tr>
              ) : filtered.map(e => {
                const isVol = e.category === '봉사활동';
                const isClub = e.category === '학교클럽';
                const isComp = e.category === '대회 및 수상';
                // 같은 활동명을 가진 다른 EC 엔트리가 있는지 확인 (학교클럽 진급 흐름)
                const clubKey = isClub ? `${(e.activityName||'').trim().toLowerCase()}|${(e.organizationName||'').trim().toLowerCase()}` : '';
                const sameClubEntries = isClub
                  ? list
                      .filter(x => x.category === '학교클럽' && `${(x.activityName||'').trim().toLowerCase()}|${(x.organizationName||'').trim().toLowerCase()}` === clubKey)
                      .sort((a, b) => (a.startDate || '').localeCompare(b.startDate || ''))
                  : [];
                const isMultiYearClub = sameClubEntries.length >= 2;
                // 시간/결과 컬럼: 봉사면 시간, 대회면 수상 결과(또는 참여), 기타면 시간
                let middleVal;
                if (isComp) {
                  middleVal = (
                    <Fragment>
                      <span className="badge text-xs" style={e.awardWon
                        ? { background:'#faf3e3', color:'#a47007', border:'1px solid #e8c97a' }
                        : { background:'#f1f1ef', color:'#787774', border:'1px solid #e3e2e0' }}>
                        {e.awardWon ? '🏆 수상' : '참여'}
                      </span>
                      {e.awardDescription && <div className="text-xs text-gray-600 mt-1">{e.awardDescription}</div>}
                    </Fragment>
                  );
                } else {
                  middleVal = e.totalHours
                    ? (isVol && e.recognizedHours ? `${e.totalHours}h (인정 ${e.recognizedHours}h)` : `${e.totalHours}h`)
                    : '—';
                }
                return (
                  <tr key={e.id} className="row-hover">
                    <td className="table-td"><Badge value={e.category}/></td>
                    <td className="table-td font-medium">{e.activityName}</td>
                    <td className="table-td text-gray-600 text-sm">
                      <div>{e.organizationName || '—'}</div>
                      {(isClub && e.position) && <div className="text-xs text-gray-400 mt-0.5">{e.position}</div>}
                      {isMultiYearClub && (
                        <div className="text-xs mt-1 flex flex-wrap items-center gap-1" style={{color:'#760305'}} title={`같은 클럽 ${sameClubEntries.length}년차 활동`}>
                          📈 진급 흐름:
                          {sameClubEntries.map((entry, i, arr) => {
                            const isCurrent = entry.id === e.id;
                            return (
                              <Fragment key={entry.id}>
                                <span className="badge b-cream" style={{
                                  padding:'1px 6px', fontSize:10,
                                  fontWeight: isCurrent ? 700 : 400,
                                  outline: isCurrent ? '1.5px solid #c20206' : 'none'
                                }}>
                                  {entry.position || '(미입력)'}
                                  {entry.startDate && <span className="text-gray-500 ml-1">({entry.startDate.slice(0,4)})</span>}
                                </span>
                                {i < arr.length - 1 && <span style={{color:'#cb912f'}}>→</span>}
                              </Fragment>
                            );
                          })}
                        </div>
                      )}
                    </td>
                    <td className="table-td text-gray-600 text-xs">
                      {e.contactName ? (
                        <>
                          <div>{e.contactName}</div>
                          {e.contactEmail && <div className="text-blue-600">{e.contactEmail}</div>}
                          {e.contactPhone && <div>{e.contactPhone}</div>}
                        </>
                      ) : <span className="text-gray-300">—</span>}
                    </td>
                    <td className="table-td text-gray-600 text-xs">
                      {isComp
                        ? (e.frequency || '—')
                        : ((e.startDate || e.endDate) ? `${e.startDate || '?'} ~ ${e.endDate || '진행'}` : (e.frequency || '—'))}
                    </td>
                    <td className="table-td text-gray-600 text-xs" style={{maxWidth:200}}>{middleVal}</td>
                    <td className="table-td"><Badge value={e.status}/></td>
                    <td className="table-td"><Badge value={e.admissionsValue}/></td>
                    <td className="table-td text-right whitespace-nowrap">
                      <button className="btn-ghost" onClick={() => setEditing(e)}>수정</button>
                      {canDelete ? (
                        <button className="btn-danger" onClick={() => remove(e.id)}>삭제</button>
                      ) : (
                        <button
                          className="btn-ghost text-xs"
                          style={e.deletionRequested ? {color:'#a47007'} : {color:'#c20206'}}
                          onClick={() => !e.deletionRequested && requestDelete(e)}
                          disabled={e.deletionRequested}
                        >{e.deletionRequested ? '⏳ 요청 대기' : '🗑 삭제 요청'}</button>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </Section>
  );
};

// 숙소 마스터 참조 패널 (TabAccommodation 상단에 표시)
// 캐스케이드 선택: 카테고리 → 서브카테고리 → 숙소 → 방
// '가족과 거주'는 마스터 없이 직접 입력
const AccommodationLinkPanel = ({ s, update, accommodations }) => {
  const acc = s.accommodation || {};
  const linkedAccom = accommodations.find(a => a.id === acc.accommodationId);
  const linkedRoom = linkedAccom?.rooms?.find(r => r.id === acc.roomId);

  // 사용자 선택 (linkedAccom이 있으면 그 값에서 derive, 없으면 acc 자체에 저장)
  const currentCategory = acc.category || linkedAccom?.category || '';
  const currentSubCategory = acc.subCategory || linkedAccom?.subCategory || '';
  const isFamily = currentCategory === '가족과 거주';

  const set = (k, v) => update({ accommodation: { ...acc, [k]: v } });

  // 카테고리 변경 — 하위 선택 모두 리셋
  const changeCategory = (newCat) => {
    update({ accommodation: { ...acc, category: newCat, subCategory: '', accommodationId: '', roomId: '' } });
  };
  // 서브카테고리 변경 — 숙소·방 리셋
  const changeSubCategory = (newSub) => {
    update({ accommodation: { ...acc, subCategory: newSub, accommodationId: '', roomId: '' } });
  };
  // 숙소 선택 — 자동으로 category/subCategory 동기화
  const pickAccommodation = (id) => {
    const found = accommodations.find(a => a.id === id);
    if (found) {
      update({ accommodation: { ...acc, accommodationId: id, category: found.category, subCategory: found.subCategory || '', roomId: '' } });
    } else {
      set('accommodationId', '');
    }
  };

  const subOpts = ACCOM_SUBCATEGORIES[currentCategory] || [];
  // 필터된 숙소 리스트
  const filteredAccoms = accommodations.filter(a => {
    if (currentCategory && a.category !== currentCategory) return false;
    if (currentSubCategory && a.subCategory !== currentSubCategory) return false;
    return true;
  });

  return (
    <div className="notion-card p-4 mb-4" style={{ background:'#faf7f3', borderColor:'var(--brand-red)' }}>
      <div className="font-semibold mb-3" style={{color:'#c20206'}}>🔗 숙소 데이터 연결</div>

      {/* Step 1: 카테고리 */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
        <Field label="① 카테고리 *">
          <Select value={currentCategory} onChange={changeCategory} options={ACCOM_CATEGORIES_V2} placeholder="카테고리 선택"/>
        </Field>

        {/* Step 2: 서브카테고리 (있을 때만) */}
        {subOpts.length > 0 && !isFamily && (
          <Field label="② 세부 유형">
            <Select value={currentSubCategory} onChange={changeSubCategory} options={subOpts} placeholder="세부 유형 선택"/>
          </Field>
        )}

        {/* Step 3: 숙소 선택 (가족 아닐 때) */}
        {!isFamily && currentCategory && (
          <Field label="③ 숙소 선택">
            <RefSelect
              value={acc.accommodationId}
              onChange={pickAccommodation}
              options={filteredAccoms.map(a => ({ id:a.id, label:`${a.name}${a.subCategory ? ' · ' + a.subCategory : ''}` }))}
              placeholder={filteredAccoms.length === 0 ? '등록된 숙소 없음' : `숙소 선택 (${filteredAccoms.length}개)`}
            />
          </Field>
        )}

        {/* Step 4: 방 선택 (숙소 선택 후) */}
        {!isFamily && linkedAccom && (
          <Field label="④ 방 선택">
            <RefSelect
              value={acc.roomId}
              onChange={(v) => set('roomId', v)}
              options={(linkedAccom.rooms || []).map(r => ({ id:r.id, label:r.name || '(이름 없음)' }))}
              placeholder={(linkedAccom.rooms||[]).length === 0 ? '등록된 방 없음' : '방 선택'}
            />
          </Field>
        )}
      </div>

      {/* 가족과 거주: 직접 입력 */}
      {isFamily && (
        <div className="notion-card p-4 mb-3 bg-white">
          <div className="font-semibold text-sm mb-3" style={{color:'#760305'}}>👨‍👩‍👧 가족과 거주 (직접 입력)</div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            <Field label="누구와 거주 *">
              <TextInput value={acc.familyMember} onChange={(v) => set('familyMember', v)} placeholder="예) 부모, 어머니, 이모, 친척"/>
            </Field>
            <Field label="가족 연락처">
              <TextInput value={acc.familyContact} onChange={(v) => set('familyContact', v)} placeholder="전화/이메일"/>
            </Field>
            <Field label="주소" span={2}>
              <TextInput value={acc.address} onChange={(v) => set('address', v)}/>
            </Field>
          </div>
        </div>
      )}

      {/* 공통 거주 정보 */}
      <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
        <Field label="현재 상태"><Select value={acc.status} onChange={(v) => set('status', v)} options={ACCOM_STATUSES}/></Field>
        <Field label="입주일"><TextInput type="date" value={acc.moveInDate} onChange={(v) => set('moveInDate', v)}/></Field>
        <Field label="퇴실 예정일"><TextInput type="date" value={acc.expectedMoveOutDate} onChange={(v) => set('expectedMoveOutDate', v)}/></Field>
        <Field label="실제 퇴실일"><TextInput type="date" value={acc.actualMoveOutDate} onChange={(v) => set('actualMoveOutDate', v)}/></Field>
        <Field label="통학 방법"><TextInput value={acc.commuteMethod} onChange={(v) => set('commuteMethod', v)}/></Field>
        <Field label="학교까지 소요시간"><TextInput value={acc.commuteTime} onChange={(v) => set('commuteTime', v)}/></Field>
        <Field label="메모" span={3}><TextArea value={acc.memo} onChange={(v) => set('memo', v)} rows={2}/></Field>
      </div>

      {/* 마스터 정보 미리보기 (가족 아닐 때만) */}
      {!isFamily && linkedAccom && (
        <div className="mt-4 notion-card p-3 bg-white">
          <div className="font-semibold text-sm mb-2" style={{color:'#760305'}}>📋 마스터 정보 (읽기 전용)</div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
            <div><strong>이름/호스트:</strong> {linkedAccom.name}</div>
            <div><strong>카테고리:</strong> <Badge value={linkedAccom.category}/></div>
            {linkedAccom.subCategory && <div><strong>세부 유형:</strong> <Badge value={linkedAccom.subCategory}/></div>}
            {linkedAccom.address && <div className="col-span-2"><strong>주소:</strong> {linkedAccom.address}</div>}
            {linkedAccom.hostPhone && <div><strong>호스트 전화:</strong> {linkedAccom.hostPhone}</div>}
            {linkedAccom.hostEmail && <div><strong>호스트 이메일:</strong> {linkedAccom.hostEmail}</div>}
            {linkedAccom.mealIncluded && <div><strong>식사:</strong> {linkedAccom.mealIncluded}</div>}
            {linkedRoom?.monthlyFee && <div><strong>방 비용:</strong> {linkedRoom.monthlyFee}</div>}
            {linkedAccom.paymentMethod && <div><strong>입금방식:</strong> {linkedAccom.paymentMethod}</div>}
            {linkedRoom && <div className="col-span-2"><strong>방:</strong> {linkedRoom.name} {linkedRoom.features && `— ${linkedRoom.features}`}</div>}
          </div>
          {(linkedAccom.individualContractLink || linkedAccom.buppContractLink) && (
            <div className="mt-2 flex gap-3 text-xs">
              {linkedAccom.individualContractLink && <a href={linkedAccom.individualContractLink} target="_blank" rel="noopener" className="text-blue-600 hover:underline">📄 개별 계약서</a>}
              {linkedAccom.buppContractLink && <a href={linkedAccom.buppContractLink} target="_blank" rel="noopener" className="text-blue-600 hover:underline">📄 BUPP 통합 계약서</a>}
            </div>
          )}
          <div className="text-xs text-gray-500 mt-2">💡 위 정보는 "🏠 숙소 데이터" 메뉴에서 편집할 수 있습니다.</div>
        </div>
      )}
    </div>
  );
};

// E. 숙소
// 출입국 정보 — 공항 라이드 서비스 트래킹
const RIDE_TYPES = ['무료서비스', '유료', '셀프 (학생/가족)'];
const FEE_STATUSES = ['청구함', '입금됨', '면제'];
const DEPARTURE_PURPOSES = ['여름 귀국', '크리스마스 귀국', '봄방학', '개인 일정', '학교 견학', '기타'];

// 자주 쓰는 항공편 프리셋 — 클릭 시 항공편/시간/터미널 자동 채움
const FLIGHT_PRESETS_ARRIVAL = [
  { label: 'KE 77 · 09:55 · T3 (대한항공)',  flightNumber: 'KE 77', time: '09:55', terminal: 'T3' },
  { label: 'AC 62 · 19:30 · T1 (에어캐나다)', flightNumber: 'AC 62',  time: '19:30', terminal: 'T1' }
];
const FLIGHT_PRESETS_DEPARTURE = [
  { label: 'KE 78 · 12:55 · T3 (대한항공)',   flightNumber: 'KE 78', time: '12:55', terminal: 'T3' },
  { label: 'AC 61 · 13:50 · T1 (에어캐나다)', flightNumber: 'AC 61', time: '13:50', terminal: 'T1' }
];

const TabAccommodation = ({ s, update, accommodations=[], role = 'admin' }) => {
  const acc = s.accommodation || {};
  const [editing, setEditing] = useState(false);
  const [historyDraft, setHistoryDraft] = useState(null);
  const [travelDraft, setTravelDraft] = useState(null); // { type:'arrival'|'departure', record }
  const [showArrivalPDF, setShowArrivalPDF] = useState(false);
  const canEdit = role !== 'student'; // 학생은 숙소 read-only
  const canPrintPDF = role === 'admin' || role === 'bu_staff';

  const addHistory = () => setHistoryDraft({
    id:'', previousType:'', previousAddress:'', previousHostOrDormName:'',
    startDate:'', endDate:'', changeReason:'', feeCharged:'', memo:''
  });
  const saveHistory = (h) => {
    const list = s.accommodationHistory || [];
    const next = h.id ? list.map(x => x.id === h.id ? h : x) : [...list, { ...h, id: uid() }];
    update({ accommodationHistory: next });
    setHistoryDraft(null);
  };
  const delHistory = (id) => {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    update({ accommodationHistory: (s.accommodationHistory||[]).filter(x => x.id !== id) });
  };

  // ✈️ 출입국 정보 헬퍼
  const travel = s.travelInfo || { arrivals: [], departures: [] };
  const arrivals = travel.arrivals || [];
  const departures = travel.departures || [];

  const newArrivalDraft = () => ({
    id:'', date:'', flightNumber:'', arrivalTime:'', terminal:'',
    pickupPerson:'', pickupContact:'',
    rideType:'무료서비스', rideFee:'', feeStatus:'', memo:''
  });
  const newDepartureDraft = () => ({
    id:'', date:'', flightNumber:'', departureTime:'', terminal:'',
    dropoffPerson:'', dropoffContact:'',
    rideType:'무료서비스', rideFee:'', feeStatus:'',
    purpose:'여름 귀국', memo:''
  });

  const saveTravelEntry = () => {
    if (!travelDraft) return;
    const { type, record } = travelDraft;
    const key = type === 'arrival' ? 'arrivals' : 'departures';
    const list = travel[key] || [];
    const next = record.id ? list.map(x => x.id === record.id ? record : x) : [...list, { ...record, id: uid() }];
    update({ travelInfo: { ...travel, [key]: next } });
    setTravelDraft(null);
  };
  const deleteTravelEntry = (type, id) => {
    if (!confirm('이 출입국 기록을 삭제할까요?')) return;
    const key = type === 'arrival' ? 'arrivals' : 'departures';
    update({ travelInfo: { ...travel, [key]: (travel[key]||[]).filter(x => x.id !== id) } });
  };

  // 라이드 서비스 가치 집계
  const allTravel = [...arrivals, ...departures];
  const freeRides = allTravel.filter(t => t.rideType === '무료서비스');
  const paidRides = allTravel.filter(t => t.rideType === '유료');
  const totalFreeValue = freeRides.reduce((sum, t) => sum + (parseFloat(t.rideFee) || 0), 0);
  const totalPaidAmount = paidRides.reduce((sum, t) => sum + (parseFloat(t.rideFee) || 0), 0);
  const unpaidCount = paidRides.filter(t => t.feeStatus !== '입금됨' && t.feeStatus !== '면제').length;
  const todayStr = new Date().toISOString().slice(0,10);
  const nextDeparture = departures
    .filter(d => d.date && d.date >= todayStr)
    .sort((a,b) => a.date.localeCompare(b.date))[0];
  const nextArrival = arrivals
    .filter(a => a.date && a.date >= todayStr)
    .sort((a,b) => a.date.localeCompare(b.date))[0];

  const linkedAccom = accommodations.find(a => a.id === acc.accommodationId);
  const linkedRoom = linkedAccom?.rooms?.find(r => r.id === acc.roomId);
  const isFamily = (acc.category || linkedAccom?.category) === '가족과 거주';
  const hasPlacement = isFamily || linkedAccom;

  // 라이드 배지 색 매핑
  const rideBadgeStyle = (rt) => {
    if (rt === '무료서비스') return { bg: 'var(--good-bg)', color: 'var(--good)' };
    if (rt === '유료') return { bg: 'var(--warn-bg)', color: 'var(--warn)' };
    return { bg: 'var(--line-soft)', color: 'var(--muted)' };
  };

  return (
    <>
      {/* ✈️ 출입국 정보 — 공항 라이드 서비스 트래킹 */}
      <Section
        title="✈️ 출입국 정보 & 공항 라이드"
        defaultOpen={true}
        right={(
          <div className="flex gap-2">
            {canPrintPDF && (
              <button className="btn-primary" onClick={() => setShowArrivalPDF(true)} title="신입생 배정서 PDF — 도착·홈스테이·픽업 정보 포함">📄 배정서 인쇄</button>
            )}
            {canEdit && <button className="btn-ghost" onClick={() => setTravelDraft({ type:'arrival', record: newArrivalDraft() })}>+ 도착 추가</button>}
            {canEdit && <button className="btn-ghost" onClick={() => setTravelDraft({ type:'departure', record: newDepartureDraft() })}>+ 출국 추가</button>}
          </div>
        )}
      >
        {/* 라이드 서비스 가치 집계 카드 */}
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
          <div className="notion-card p-3 text-center">
            <div className="text-xs text-gray-500">🎁 무료 서비스 가치</div>
            <div className="text-xl font-bold mt-1" style={{ color:'var(--good)' }}>${totalFreeValue}</div>
            <div className="text-xs text-gray-400 mt-1">{freeRides.length}회</div>
          </div>
          <div className="notion-card p-3 text-center">
            <div className="text-xs text-gray-500">💵 유료 라이드</div>
            <div className="text-xl font-bold mt-1">${totalPaidAmount}</div>
            <div className="text-xs text-gray-400 mt-1">
              {paidRides.length}회
              {unpaidCount > 0 && <span className="ml-1" style={{ color:'var(--alert)' }}>· 미입금 {unpaidCount}건</span>}
            </div>
          </div>
          <div className="notion-card p-3 text-center" style={{ background: nextArrival ? '#f0f9f4' : '#fafafa' }}>
            <div className="text-xs text-gray-500">🛬 다음 도착</div>
            <div className="text-base font-bold mt-1">{nextArrival?.date || '—'}</div>
            <div className="text-xs text-gray-500">{nextArrival ? `${nextArrival.flightNumber || ''} ${nextArrival.arrivalTime || ''}` : '예정 없음'}</div>
          </div>
          <div className="notion-card p-3 text-center" style={{ background: nextDeparture ? '#fbf5eb' : '#fafafa' }}>
            <div className="text-xs text-gray-500">🛫 다음 출국</div>
            <div className="text-base font-bold mt-1">{nextDeparture?.date || '—'}</div>
            <div className="text-xs text-gray-500">{nextDeparture ? `${nextDeparture.flightNumber || ''} ${nextDeparture.purpose || ''}` : '예정 없음'}</div>
          </div>
        </div>

        {/* 도착 이력 표 */}
        <div className="mb-4">
          <h4 className="font-semibold text-sm mb-2" style={{ color:'#0b6e99' }}>🛬 도착 (Arrivals · {arrivals.length}건)</h4>
          {arrivals.length === 0 ? (
            <div className="notion-card p-4 text-center text-gray-400 text-xs">도착 기록 없음</div>
          ) : (
            <div className="notion-card overflow-hidden">
              <table className="w-full text-sm">
                <thead><tr style={{ background:'var(--line-soft)' }}>
                  <th className="table-th">날짜</th>
                  <th className="table-th">항공편</th>
                  <th className="table-th">시간</th>
                  <th className="table-th">터미널</th>
                  <th className="table-th">픽업 담당자</th>
                  <th className="table-th">라이드</th>
                  <th className="table-th">비용</th>
                  <th className="table-th"></th>
                </tr></thead>
                <tbody>
                  {[...arrivals].sort((a,b) => (b.date||'').localeCompare(a.date||'')).map(t => {
                    const rs = rideBadgeStyle(t.rideType);
                    return (
                      <tr key={t.id} className="row-hover" style={{ borderTop:'1px solid var(--line-soft)' }}>
                        <td className="table-td font-medium">{t.date || '—'}</td>
                        <td className="table-td font-mono text-xs">{t.flightNumber || '—'}</td>
                        <td className="table-td text-xs">{t.arrivalTime || '—'}</td>
                        <td className="table-td text-xs">{t.terminal || '—'}</td>
                        <td className="table-td text-xs">
                          {t.pickupPerson || '—'}
                          {t.pickupContact && <div className="text-gray-500">{t.pickupContact}</div>}
                        </td>
                        <td className="table-td">
                          <span className="hd-pill" style={{ background: rs.bg, color: rs.color }}>{t.rideType || '—'}</span>
                        </td>
                        <td className="table-td text-xs">
                          {t.rideFee ? `$${t.rideFee}` : '—'}
                          {t.feeStatus && <div className="text-gray-500">{t.feeStatus}</div>}
                        </td>
                        <td className="table-td text-right whitespace-nowrap">
                          {canEdit && <Fragment>
                            <button className="btn-ghost text-xs" onClick={() => setTravelDraft({ type:'arrival', record: t })}>수정</button>
                            <button className="btn-danger text-xs" onClick={() => deleteTravelEntry('arrival', t.id)}>삭제</button>
                          </Fragment>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>

        {/* 출국 이력 표 */}
        <div>
          <h4 className="font-semibold text-sm mb-2" style={{ color:'#a47007' }}>🛫 출국 (Departures · {departures.length}건)</h4>
          {departures.length === 0 ? (
            <div className="notion-card p-4 text-center text-gray-400 text-xs">출국 기록 없음</div>
          ) : (
            <div className="notion-card overflow-hidden">
              <table className="w-full text-sm">
                <thead><tr style={{ background:'var(--line-soft)' }}>
                  <th className="table-th">날짜</th>
                  <th className="table-th">목적</th>
                  <th className="table-th">항공편</th>
                  <th className="table-th">시간</th>
                  <th className="table-th">터미널</th>
                  <th className="table-th">드롭오프 담당자</th>
                  <th className="table-th">라이드</th>
                  <th className="table-th">비용</th>
                  <th className="table-th"></th>
                </tr></thead>
                <tbody>
                  {[...departures].sort((a,b) => (b.date||'').localeCompare(a.date||'')).map(t => {
                    const rs = rideBadgeStyle(t.rideType);
                    return (
                      <tr key={t.id} className="row-hover" style={{ borderTop:'1px solid var(--line-soft)' }}>
                        <td className="table-td font-medium">{t.date || '—'}</td>
                        <td className="table-td text-xs"><Badge value={t.purpose || '—'}/></td>
                        <td className="table-td font-mono text-xs">{t.flightNumber || '—'}</td>
                        <td className="table-td text-xs">{t.departureTime || '—'}</td>
                        <td className="table-td text-xs">{t.terminal || '—'}</td>
                        <td className="table-td text-xs">
                          {t.dropoffPerson || '—'}
                          {t.dropoffContact && <div className="text-gray-500">{t.dropoffContact}</div>}
                        </td>
                        <td className="table-td">
                          <span className="hd-pill" style={{ background: rs.bg, color: rs.color }}>{t.rideType || '—'}</span>
                        </td>
                        <td className="table-td text-xs">
                          {t.rideFee ? `$${t.rideFee}` : '—'}
                          {t.feeStatus && <div className="text-gray-500">{t.feeStatus}</div>}
                        </td>
                        <td className="table-td text-right whitespace-nowrap">
                          {canEdit && <Fragment>
                            <button className="btn-ghost text-xs" onClick={() => setTravelDraft({ type:'departure', record: t })}>수정</button>
                            <button className="btn-danger text-xs" onClick={() => deleteTravelEntry('departure', t.id)}>삭제</button>
                          </Fragment>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </Section>

      {/* 📝 약관 / 일정 */}
      <Section title="📝 약관 & 일정" defaultOpen={true}>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <Field label="📄 학부모 서명 문서 (구글 문서)">
            {canEdit ? (
              <div className="flex gap-2 items-start">
                <TextInput value={s.parentSignatureLink || ''} onChange={(v) => update({ parentSignatureLink: v })} placeholder="https://docs.google.com/..."/>
                {s.parentSignatureLink && (
                  <a href={s.parentSignatureLink} target="_blank" rel="noopener" className="btn-ghost whitespace-nowrap" style={{ height:34 }}>📄 열기</a>
                )}
              </div>
            ) : (
              s.parentSignatureLink
                ? <a href={s.parentSignatureLink} target="_blank" rel="noopener" className="notion-input flex items-center" style={{ background:'#fff', color:'var(--red)', height:34, padding:'4px 10px' }}>📄 서명 문서 열기</a>
                : <div className="notion-input flex items-center text-gray-400" style={{ background:'#faf7f3', height:34, padding:'4px 10px' }}>등록된 문서 없음</div>
            )}
            <div className="text-xs text-gray-500 mt-1">숙소 약관 / 책임 동의서 등 학부모 서명 문서 링크</div>
          </Field>
          <Field label="🏠 다음 홈스테이 이동 예정일">
            {canEdit ? (
              <TextInput type="date" value={acc.moveScheduledDate || ''} onChange={(v) => update({ accommodation: { ...acc, moveScheduledDate: v } })}/>
            ) : (
              <div className="notion-input flex items-center" style={{ background:'#faf7f3', color:'#202731', height:34, padding:'4px 10px' }}>
                {acc.moveScheduledDate || <span className="text-gray-400">예정 없음</span>}
              </div>
            )}
            <div className="text-xs text-gray-500 mt-1">현재 숙소 → 다음 숙소로 이사 예정 (확정된 일자)</div>
          </Field>
        </div>
      </Section>

      {/* 1. 숙소 변경 이력 — 상단 */}
      <Section
        title="🔄 숙소 변경 이력"
        count={(s.accommodationHistory || []).length}
        defaultOpen={true}
        right={canEdit && <button className="btn-primary" onClick={addHistory}>+ 이력 추가</button>}
      >
        {historyDraft && (
          <div className="notion-card p-4 mb-4 bg-gray-50">
            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
              <Field label="이전 숙소 형태"><Select value={historyDraft.previousType} onChange={(v) => setHistoryDraft({...historyDraft, previousType:v})} options={ACCOM_CATEGORIES_V2}/></Field>
              <Field label="이전 호스트/기숙사명"><TextInput value={historyDraft.previousHostOrDormName} onChange={(v) => setHistoryDraft({...historyDraft, previousHostOrDormName:v})}/></Field>
              <Field label="비용 청구 여부"><TextInput value={historyDraft.feeCharged} onChange={(v) => setHistoryDraft({...historyDraft, feeCharged:v})}/></Field>
              <Field label="시작일"><TextInput type="date" value={historyDraft.startDate} onChange={(v) => setHistoryDraft({...historyDraft, startDate:v})}/></Field>
              <Field label="종료일"><TextInput type="date" value={historyDraft.endDate} onChange={(v) => setHistoryDraft({...historyDraft, endDate:v})}/></Field>
              <Field label="이전 주소" span={3}><TextInput value={historyDraft.previousAddress} onChange={(v) => setHistoryDraft({...historyDraft, previousAddress:v})}/></Field>
              <Field label="변경 사유" span={3}><TextArea value={historyDraft.changeReason} onChange={(v) => setHistoryDraft({...historyDraft, changeReason:v})}/></Field>
              <Field label="메모" span={3}><TextArea value={historyDraft.memo} onChange={(v) => setHistoryDraft({...historyDraft, memo:v})}/></Field>
              <div className="col-span-3 flex justify-end gap-2">
                <button className="btn-ghost" onClick={() => setHistoryDraft(null)}>취소</button>
                <button className="btn-primary" onClick={() => saveHistory(historyDraft)}>저장</button>

            </div>
          </div>
        )}
        <div className="notion-card overflow-hidden">
          <table className="w-full">
            <thead>
              <tr>
                <th className="table-th">이전 형태</th>
                <th className="table-th">호스트/기숙사명</th>
                <th className="table-th">주소</th>
                <th className="table-th">기간</th>
                <th className="table-th">사유</th>
                <th className="table-th"></th>
              </tr>
            </thead>
            <tbody>
              {(s.accommodationHistory||[]).length === 0 ? (
                <tr><td colSpan="6" className="text-center py-6 text-gray-400 text-sm">변경 이력 없음</td></tr>
              ) : (s.accommodationHistory || []).map(h => (
                <tr key={h.id} className="row-hover">
                  <td className="table-td"><Badge value={h.previousType}/></td>
                  <td className="table-td">{h.previousHostOrDormName}</td>
                  <td className="table-td text-gray-600 text-xs">{h.previousAddress}</td>
                  <td className="table-td text-xs text-gray-600">{h.startDate} ~ {h.endDate}</td>
                  <td className="table-td text-gray-600">{h.changeReason}</td>
                  <td className="table-td text-right">
                    {canEdit && <Fragment>
                      <button className="btn-ghost" onClick={() => setHistoryDraft(h)}>수정</button>

          </table>
        </div>
      </Section>

      {/* 2. 현재 배치 — 간단 요약 */}
      <Section
        title="🏠 현재 배치"
        defaultOpen={true}
        right={canEdit && !editing && (
          <button className="btn-ghost" onClick={() => setEditing(true)}>{hasPlacement ? '변경' : '+ 숙소 배치'}</button>

      >
        {editing ? (
          <Fragment>
            <AccommodationLinkPanel s={s} update={update} accommodations={accommodations}/>
            <div className="flex justify-end mt-2">
              <button className="btn-primary" onClick={() => setEditing(false)}>완료</button>
            </div>
          </Fragment>
        ) : !hasPlacement ? (
          <div className="text-sm text-gray-400 p-6 text-center">
            현재 배치된 숙소가 없습니다.
            {canEdit && <Fragment><br/><button className="btn-primary mt-3" onClick={() => setEditing(true)}>+ 숙소 배치</button></Fragment>}

        ) : isFamily ? (
          <div className="notion-card p-5" style={{ background:'#faf7f3' }}>
            <div className="flex items-center gap-2 mb-3">
              <Badge value="가족과 거주"/>
              <span className="font-semibold text-lg">{acc.familyMember || '(누구와 거주 미입력)'}</span>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
              {acc.address && <div className="col-span-2"><strong className="text-gray-500">주소</strong><div>{acc.address}</div></div>}
              {acc.familyContact && <div><strong className="text-gray-500">연락처</strong><div>{acc.familyContact}</div></div>}
              <div><strong className="text-gray-500">상태</strong><div><Badge value={acc.status}/></div></div>
              {acc.moveInDate && <div><strong className="text-gray-500">입주일</strong><div>{acc.moveInDate}</div></div>}
              {acc.expectedMoveOutDate && <div><strong className="text-gray-500">퇴실 예정</strong><div>{acc.expectedMoveOutDate}</div></div>}
              {acc.actualMoveOutDate && <div><strong className="text-gray-500">실제 퇴실</strong><div>{acc.actualMoveOutDate}</div></div>}
            </div>
            {acc.memo && <div className="text-xs text-gray-500 mt-3 pt-3 border-t">📝 {acc.memo}</div>}
          </div>
        ) : (
          <div className="notion-card p-5" style={{ background:'#faf7f3' }}>
            <div className="flex items-start justify-between gap-4 mb-4">
              <div>
                <div className="flex items-center gap-2 flex-wrap mb-2">
                  <Badge value={linkedAccom.category}/>
                  {linkedAccom.subCategory && <Badge value={linkedAccom.subCategory}/>}
                  <Badge value={acc.status}/>
                </div>
                <div className="font-semibold text-lg">{linkedAccom.name}</div>
                {linkedRoom && <div className="text-sm text-gray-600 mt-1">방: <strong>{linkedRoom.name}</strong></div>}
              </div>
              {linkedAccom.photos?.[0] && (
                <img src={linkedAccom.photos[0]} alt="" style={{ width:120, height:80, objectFit:'cover', borderRadius:8, border:'1px solid var(--border)' }}/>
              )}
            </div>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
              {linkedAccom.address && <div className="col-span-2"><strong className="text-gray-500">주소</strong><div>{linkedAccom.address}</div></div>}
              {linkedAccom.hostName && <div><strong className="text-gray-500">호스트</strong><div>{linkedAccom.hostName}</div></div>}
              {linkedAccom.hostPhone && <div><strong className="text-gray-500">전화</strong><div>{linkedAccom.hostPhone}</div></div>}
              {acc.moveInDate && <div><strong className="text-gray-500">입주일</strong><div>{acc.moveInDate}</div></div>}
              {acc.expectedMoveOutDate && <div><strong className="text-gray-500">퇴실 예정</strong><div>{acc.expectedMoveOutDate}</div></div>}
              {acc.actualMoveOutDate && <div><strong className="text-gray-500">실제 퇴실</strong><div>{acc.actualMoveOutDate}</div></div>}
              {acc.commuteMethod && <div><strong className="text-gray-500">통학</strong><div>{acc.commuteMethod}{acc.commuteTime && ` · ${acc.commuteTime}`}</div></div>}
            </div>
            {acc.memo && <div className="text-xs text-gray-500 mt-3 pt-3 border-t">📝 {acc.memo}</div>}
            <div className="text-xs text-gray-400 mt-3 pt-2 border-t">💡 숙소 자체 상세 정보는 "🏠 숙소 데이터" 메뉴에서 확인·편집할 수 있습니다.</div>
          </div>
        )}
      </Section>

      {/* ✈️ 출입국 추가/수정 모달 */}
      {travelDraft && (
        <div className="modal-backdrop" onClick={() => setTravelDraft(null)}>
          <div className="modal-card" onClick={(e) => e.stopPropagation()} style={{ width:'min(640px, 95vw)' }}>
            <h3 className="font-semibold mb-1">
              {travelDraft.type === 'arrival' ? '🛬 도착 (Arrival) ' : '🛫 출국 (Departure) '}
              {travelDraft.record.id ? '수정' : '추가'}
            </h3>
            <p className="text-xs mb-3" style={{ color:'var(--muted)' }}>
              공항 라이드 서비스 트래킹 — 무료/유료 구분 기록
            </p>
            {/* ⚡ 자주 쓰는 항공편 프리셋 — 클릭 시 항공편/시간/터미널 자동 채움 */}
            <div className="mb-3">
              <div className="text-xs text-gray-500 mb-1">⚡ 자주 쓰는 항공편 (클릭 시 자동 채움)</div>
              <div className="flex flex-wrap gap-2">
                {(travelDraft.type === 'arrival' ? FLIGHT_PRESETS_ARRIVAL : FLIGHT_PRESETS_DEPARTURE).map(p => (
                  <button key={p.label} type="button" className="btn-ghost text-xs"
                    onClick={() => setTravelDraft({...travelDraft, record:{
                      ...travelDraft.record,
                      flightNumber: p.flightNumber,
                      terminal: p.terminal,
                      [travelDraft.type === 'arrival' ? 'arrivalTime' : 'departureTime']: p.time
                    }})}>
                    {p.label}
                  </button>
                ))}
              </div>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
              <Field label="날짜 *"><TextInput type="date" value={travelDraft.record.date} onChange={(v) => setTravelDraft({...travelDraft, record:{...travelDraft.record, date:v}})}/></Field>
              <Field label="항공편"><TextInput value={travelDraft.record.flightNumber} onChange={(v) => setTravelDraft({...travelDraft, record:{...travelDraft.record, flightNumber:v}})} placeholder="직접 입력 가능"/></Field>
              <Field label={travelDraft.type === 'arrival' ? '도착 시간' : '출국 시간'}>
                <TextInput type="time" value={travelDraft.type === 'arrival' ? travelDraft.record.arrivalTime : travelDraft.record.departureTime}
                  onChange={(v) => setTravelDraft({...travelDraft, record:{...travelDraft.record, [travelDraft.type==='arrival'?'arrivalTime':'departureTime']:v}})}/>
              </Field>
              <Field label="터미널"><TextInput value={travelDraft.record.terminal} onChange={(v) => setTravelDraft({...travelDraft, record:{...travelDraft.record, terminal:v}})} placeholder="T1, T3"/></Field>
              {travelDraft.type === 'departure' && (
                <Field label="목적 *">
                  <Select value={travelDraft.record.purpose} onChange={(v) => setTravelDraft({...travelDraft, record:{...travelDraft.record, purpose:v}})} options={DEPARTURE_PURPOSES}/>
                </Field>
              )}
              <Field label={travelDraft.type === 'arrival' ? '픽업 담당자' : '드롭오프 담당자'}>
                <TextInput value={travelDraft.type === 'arrival' ? travelDraft.record.pickupPerson : travelDraft.record.dropoffPerson}
                  onChange={(v) => setTravelDraft({...travelDraft, record:{...travelDraft.record, [travelDraft.type==='arrival'?'pickupPerson':'dropoffPerson']:v}})}
                  placeholder="브듀쌤 / 호스트 / 외부 등"/>
              </Field>
              <Field label="담당자 연락처">
                <TextInput value={travelDraft.type === 'arrival' ? travelDraft.record.pickupContact : travelDraft.record.dropoffContact}
                  onChange={(v) => setTravelDraft({...travelDraft, record:{...travelDraft.record, [travelDraft.type==='arrival'?'pickupContact':'dropoffContact']:v}})}/>
              </Field>
              <Field label="라이드 유형 *">
                <Select value={travelDraft.record.rideType} onChange={(v) => setTravelDraft({...travelDraft, record:{...travelDraft.record, rideType:v}})} options={RIDE_TYPES}/>
              </Field>
              <Field label="비용 ($)">
                <TextInput type="number" value={travelDraft.record.rideFee} onChange={(v) => setTravelDraft({...travelDraft, record:{...travelDraft.record, rideFee:v}})} placeholder={travelDraft.record.rideType === '무료서비스' ? '서비스 가치 (참고)' : '청구 금액'}/>
              </Field>
              <Field label="비용 상태">
                <Select value={travelDraft.record.feeStatus} onChange={(v) => setTravelDraft({...travelDraft, record:{...travelDraft.record, feeStatus:v}})} options={FEE_STATUSES} placeholder="—"/>
              </Field>
              <Field label="메모" span={3}>
                <TextArea value={travelDraft.record.memo} onChange={(v) => setTravelDraft({...travelDraft, record:{...travelDraft.record, memo:v}})} rows={2} placeholder="특이사항"/>
              </Field>
            </div>
            <div className="flex justify-end gap-2 mt-4">
              <button className="btn-ghost" onClick={() => setTravelDraft(null)}>취소</button>
              <button className="btn-primary" onClick={saveTravelEntry} disabled={!travelDraft.record.date}>저장</button>
            </div>
          </div>
        </div>
      )}

      {/* 📄 신입생 배정서 PDF 모달 */}
      {showArrivalPDF && (
        <StudentArrivalPDF
          student={s}
          linkedAccom={linkedAccom}
          onClose={() => setShowArrivalPDF(false)}
        />
      )}
    </>
  );
};

// F. 대학지원
// Top 6 패널 — OSSD 온타리오 대학 지원용
const Top6Panel = ({ s, update, schools, subjects }) => {
  const records = s.academicRecords || [];
  // 12학년 과목만 추출
  const grade12 = records.filter(r => r.grade === '12');
  // 점수 계산 우선순위: 확정(final) > 미드텀2 > 미드텀1 > 목표
  const effectiveScore = (r) => {
    const vals = [r.final, r.midterm2, r.midterm1, r.targetScore];
    for (const v of vals) {
      const n = parseFloat(v);
      if (!isNaN(n)) return n;
    }
    return null;
  };
  // 확정 점수만 (final 또는 미드텀 중 가장 최근)
  const confirmedScore = (r) => {
    const vals = [r.final, r.midterm2, r.midterm1];
    for (const v of vals) {
      const n = parseFloat(v);
      if (!isNaN(n)) return n;
    }
    return null;
  };

  const toggleTop6 = (id) => {
    const next = records.map(r => r.id === id ? { ...r, top6: !r.top6 } : r);
    update({ academicRecords: next });
  };
  const updateField = (id, k, v) => {
    const next = records.map(r => r.id === id ? { ...r, [k]: v } : r);
    update({ academicRecords: next });
  };

  const top6List = grade12.filter(r => r.top6);
  const top6Count = top6List.length;
  const top6Scores = top6List.map(effectiveScore).filter(n => n !== null);
  const top6Avg = top6Scores.length ? (top6Scores.reduce((a,b) => a+b, 0) / top6Scores.length).toFixed(2) : null;
  // 확정 점수만 평균
  const confirmedScores = top6List.map(confirmedScore).filter(n => n !== null);
  const confirmedAvg = confirmedScores.length ? (confirmedScores.reduce((a,b) => a+b, 0) / confirmedScores.length).toFixed(2) : null;

  // 🎯 컬럼별 평균 (Top 6 선택 과목 한정)
  const avgOf = (field) => {
    const vals = top6List.map(r => parseFloat(r[field])).filter(n => !isNaN(n));
    return { avg: vals.length ? (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(2) : null, count: vals.length };
  };
  const targetAvg = avgOf('targetScore');
  const m1Avg = avgOf('midterm1');
  const m2Avg = avgOf('midterm2');
  const finalAvg = avgOf('final');

  // 12학년 과목이 없으면 안내
  if (grade12.length === 0) {
    return (
      <Section title="🎯 Top 6 (온타리오 대학 지원용)" defaultOpen={true}>
        <div className="text-sm text-gray-500 p-4 text-center bg-gray-50 rounded">
          대입로드맵에 등록된 12학년(Grade 12) 과목이 없습니다.<br/>
          먼저 "📚 대입로드맵" 탭에서 12학년 과목을 추가해주세요.
        </div>
      </Section>
    );
  }

  // 상태 메시지
  let statusBadge;
  if (top6Count === 6) statusBadge = <span className="badge b-green">✓ Top 6 완성</span>;
  else if (top6Count < 6) statusBadge = <span className="badge b-yellow">{top6Count}/6 선택</span>;
  else statusBadge = <span className="badge b-red">⚠ {top6Count}개 선택 (Ontario OSSD는 6개)</span>;

  return (
    <Section
      title="🎯 Top 6 (온타리오 대학 지원용)"
      defaultOpen={true}
      right={statusBadge}
    >
      <div className="text-xs text-gray-500 mb-3">
        12학년(Grade 12) 수강·예정 과목 전체를 모아 보여줍니다.
        필수과목 + 성적이 높은 과목 총 <strong>6개</strong>를 체크하면, 체크된 과목만으로 평균이 계산됩니다.
        확정 점수가 없으면 미드텀, 그것도 없으면 목표 점수가 사용됩니다.
      </div>

      {/* 요약 카드 — 선택 과목 + 컬럼별 평균 4종 */}
      <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4">
        <div className="notion-card p-3 text-center">
          <div className="text-xs text-gray-500">선택 과목</div>
          <div className="text-2xl font-bold mt-1" style={{color:'#202731'}}>{top6Count}<span className="text-sm text-gray-400">/6</span></div>
          <div className="text-xs text-gray-400 mt-1">Top 6 체크</div>
        </div>
        <div className="notion-card p-3 text-center" style={{ background:'#faf7f3' }}>
          <div className="text-xs" style={{color:'#787774'}}>🎯 목표 평균</div>
          <div className="text-2xl font-bold mt-1" style={{color:'#cb912f'}}>{targetAvg.avg ?? '—'}</div>
          <div className="text-xs" style={{color:'#787774'}}>{targetAvg.count}/{top6Count} 입력</div>
        </div>
        <div className="notion-card p-3 text-center" style={{ background:'#ddebf1' }}>
          <div className="text-xs" style={{color:'#0b6e99'}}>📊 M1 평균</div>
          <div className="text-2xl font-bold mt-1" style={{color:'#0b6e99'}}>{m1Avg.avg ?? '—'}</div>
          <div className="text-xs" style={{color:'#0b6e99'}}>{m1Avg.count}/{top6Count} 입력</div>
        </div>
        <div className="notion-card p-3 text-center" style={{ background:'#ddebf1' }}>
          <div className="text-xs" style={{color:'#0b6e99'}}>📊 M2 평균</div>
          <div className="text-2xl font-bold mt-1" style={{color:'#0b6e99'}}>{m2Avg.avg ?? '—'}</div>
          <div className="text-xs" style={{color:'#0b6e99'}}>{m2Avg.count}/{top6Count} 입력 · 1년제만</div>
        </div>
        <div className="notion-card p-3 text-center" style={{ background:'#ddedea' }}>
          <div className="text-xs" style={{color:'#0f7b6c'}}>🏆 Final 평균</div>
          <div className="text-2xl font-bold mt-1" style={{color:'#0f7b6c'}}>{finalAvg.avg ?? '—'}</div>
          <div className="text-xs" style={{color:'#0f7b6c'}}>{finalAvg.count}/{top6Count} 입력</div>
        </div>
      </div>
      <div className="text-xs text-gray-500 mb-4 p-2 rounded" style={{background:'#faf3e3', border:'1px solid #e8c97a'}}>
        💡 <strong>목표</strong>는 입학 사정 시 가산 참고용, <strong>M1·M2</strong>는 조건부 합격(conditional offer) 평가용, <strong>Final</strong>은 최종 확정(unconditional offer) 기준입니다. 1년제 과목은 M1과 M2가 둘 다 존재합니다.
      </div>

      <div className="notion-card overflow-hidden">
        <div className="overflow-auto">
          <table className="w-full">
            <thead><tr>
              <th className="table-th" style={{width:60}}>Top 6</th>
              <th className="table-th">학교</th>
              <th className="table-th">코드</th>
              <th className="table-th">과목명</th>
              <th className="table-th">필수</th>
              <th className="table-th">목표</th>
              <th className="table-th">M1</th>
              <th className="table-th">M2</th>
              <th className="table-th">Final</th>
              <th className="table-th">수업형태</th>
              <th className="table-th">유효점수</th>
            </tr></thead>
            <tbody>
              {grade12.map(r => {
                const school = schools.find(x => x.id === r.schoolId);
                const subject = subjects.find(x => x.id === r.subjectId);
                const eff = effectiveScore(r);
                return (
                  <tr key={r.id} className="row-hover" style={r.top6 ? { background:'#fffbe6' } : {}}>
                    <td className="table-td text-center">
                      <input
                        type="checkbox"
                        checked={!!r.top6}
                        onChange={() => toggleTop6(r.id)}
                        className="w-5 h-5 accent-yellow-600 cursor-pointer"
                      />
                    </td>
                    <td className="table-td text-sm">{school?.name || '—'}</td>
                    <td className="table-td font-mono text-xs">{subject?.code || '—'}</td>
                    <td className="table-td text-sm">{subject?.name || '—'}</td>
                    <td className="table-td">{r.required ? <span className="badge b-blue">필수</span> : <span className="text-gray-300 text-xs">—</span>}</td>
                    <td className="table-td">
                      <input
                        className="notion-input"
                        style={{ width:60, padding:'4px 6px', fontSize:13 }}
                        value={r.targetScore || ''}
                        onChange={(e) => updateField(r.id, 'targetScore', e.target.value)}
                        placeholder="—"
                      />
                    </td>
                    <td className="table-td text-sm">{r.midterm1 || <span className="text-gray-300">—</span>}</td>
                    <td className="table-td text-sm">{r.midterm2 || <span className="text-gray-300">—</span>}</td>
                    <td className="table-td text-sm font-semibold">{r.final || <span className="text-gray-300">—</span>}</td>
                    <td className="table-td"><Badge value={r.selection}/></td>
                    <td className="table-td text-sm font-medium">
                      {eff !== null ? (
                        <span style={{ color: r.final ? '#0f7b6c' : (r.midterm1 || r.midterm2) ? '#0b6e99' : '#cb912f' }}>
                          {eff}
                          <span className="ml-1 text-xs text-gray-400">
                            {r.final ? '확정' : (r.midterm1 || r.midterm2) ? '미드텀' : '목표'}
                          </span>
                        </span>
                      ) : <span className="text-gray-300">—</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </Section>
  );
};

// 대학 지원 에디터 (확장형) — 대학·전공 선택 시 마스터에서 자동 채움
const UniAppEditor = ({ app, universities, programs, trackGroups, onSave, onCancel, defaultCountry='CA' }) => {
  const [draft, setDraft] = useState(() => ({
    countryGroup: defaultCountry, universityId:'', programId:'',
    rank:'', finalChoice:false,
    status:'관심', scholarship:'',
    portalId:'', portalPassword:'', studentNumber:'',
    supplementaryTask:'', workActions:'',
    draftGuideDate:'', draftDeadline:'', reviewFinalDate:'', submissionDate:'',
    officialDocDeadline:'', englishScoreSendDate:'', englishScoreDeadlineOverride:'',
    ieltsConditionOverride:'', duolingoConditionOverride:'',
    memo:'',
    ...app
  }));
  const set = (k, v) => setDraft({ ...draft, [k]: v });

  const cntryUnis = universities.filter(u => u.country === draft.countryGroup);
  const uniPrograms = programs.filter(p => p.universityId === draft.universityId);
  const uni = universities.find(u => u.id === draft.universityId);
  const program = programs.find(p => p.id === draft.programId);
  const group = trackGroups.find(g => g.id === program?.groupId);

  // 자동 채움: officialDocDeadline은 program.supplementaryDeadline 기본
  const effectiveOfficialDeadline = draft.officialDocDeadline || program?.supplementaryDeadline || '';
  const effectiveEnglishDeadline = draft.englishScoreDeadlineOverride || uni?.englishScoreDeadline || '';
  const effectiveIelts = draft.ieltsConditionOverride || uni?.ieltsCondition || '';
  const effectiveDuolingo = draft.duolingoConditionOverride || uni?.duolingoCondition || '';

  return (
    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
      <Field label="국가 그룹">
        <RefSelect value={draft.countryGroup} onChange={(v) => setDraft({...draft, countryGroup:v, universityId:'', programId:''})} options={COUNTRIES.map(c => ({ id:c, label:COUNTRY_LABEL[c] }))} placeholder="국가 선택"/>
      </Field>
      <Field label="대학 *" span={2}>
        <RefSelect value={draft.universityId} onChange={(v) => setDraft({...draft, universityId:v, programId:''})} options={cntryUnis.map(u => ({ id:u.id, label:`${u.name}${u.shortName ? ` (${u.shortName})` : ''}` }))} placeholder="대학 선택"/>
      </Field>
      <Field label="전공 *">
        <RefSelect value={draft.programId} onChange={(v) => set('programId', v)} options={uniPrograms.map(p => ({ id:p.id, label:p.name }))} placeholder={uni ? '전공 선택' : '대학을 먼저 선택'}/>
      </Field>

      {/* 자동 채움 정보 표시 */}
      {uni && (
        <Field label="자동 채움 정보 (마스터)" span={4}>
          <div className="notion-card p-3 text-xs space-y-1" style={{ background:'#e8e0d5', borderColor:'#cabaab' }}>
            <div className="flex gap-2 flex-wrap items-center">
              <Badge value={uni.portalName}/>
              {uni.portalUrl && <span className="text-blue-600">{uni.portalUrl}</span>}
            </div>
            <div><strong>IELTS:</strong> {effectiveIelts || '—'}</div>
            <div><strong>듀오링고:</strong> {effectiveDuolingo || '—'}</div>
            <div><strong>영어점수 데드라인:</strong> {effectiveEnglishDeadline || '—'}</div>
            {program && (
              <div><strong>추가서류:</strong> {program.supplementaryType || '—'} {program.supplementaryDeadline && `(${program.supplementaryDeadline})`}</div>
            )}
            {group && (
              <div className="flex gap-2 flex-wrap items-center">
                <strong>트랙:</strong> <Badge value={group.name}/>
                {(group.requiredSubjects||[]).map(c => <span key={c} className="badge b-purple font-mono text-xs">{c}</span>)}
              </div>
            )}
          </div>
        </Field>
      )}

      <Field label="순위"><TextInput type="number" value={draft.rank} onChange={(v) => set('rank', v)}/></Field>
      <Field label="지원 상태"><Select value={draft.status} onChange={(v) => set('status', v)} options={UNI_STATUSES}/></Field>
      <Field label="최종 선택">
        <div className="pt-2"><Toggle value={draft.finalChoice} onChange={(v) => set('finalChoice', v)} label="최종 선택 학교"/></div>
      </Field>
      <Field label="장학금"><TextInput value={draft.scholarship} onChange={(v) => set('scholarship', v)} placeholder="예) $15,000"/></Field>

      <Field label="포털 ID"><TextInput value={draft.portalId} onChange={(v) => set('portalId', v)}/></Field>
      <Field label="포털 비번"><TextInput value={draft.portalPassword} onChange={(v) => set('portalPassword', v)}/></Field>
      <Field label="학생번호"><TextInput value={draft.studentNumber} onChange={(v) => set('studentNumber', v)}/></Field>
      <Field label="영어점수 전자발송일"><TextInput type="date" value={draft.englishScoreSendDate} onChange={(v) => set('englishScoreSendDate', v)}/></Field>

      <Field label="Draft 가이드 발송일"><TextInput type="date" value={draft.draftGuideDate} onChange={(v) => set('draftGuideDate', v)}/></Field>
      <Field label="Draft 데드라인"><TextInput type="date" value={draft.draftDeadline} onChange={(v) => set('draftDeadline', v)}/></Field>
      <Field label="첨삭 최종일"><TextInput type="date" value={draft.reviewFinalDate} onChange={(v) => set('reviewFinalDate', v)}/></Field>
      <Field label="제출 완료일"><TextInput type="date" value={draft.submissionDate} onChange={(v) => set('submissionDate', v)}/></Field>

      <Field label="추가서류 작업" span={2}><TextInput value={draft.supplementaryTask} onChange={(v) => set('supplementaryTask', v)} placeholder="예) BBA Schulich 비지니스 추가서류"/></Field>

      <Field label="수행 작업 (URL/메모)" span={2}><TextInput value={draft.workActions} onChange={(v) => set('workActions', v)} placeholder="https://drive.google.com/..."/></Field>
      <Field label="메모" span={4}><TextArea value={draft.memo} onChange={(v) => set('memo', v)}/></Field>

      <div className="col-span-4 flex justify-end gap-2">
        <button className="btn-ghost" onClick={onCancel}>취소</button>
        <button className="btn-primary" onClick={() => {
          if (!draft.universityId) { alert('대학을 선택해주세요.'); return; }
          if (!draft.programId) { alert('전공을 선택해주세요.'); return; }
          onSave(draft);
        }}>저장</button>
      </div>
    </div>
  );
};

const TabUni = ({ s, update, schools, subjects, universities, programs, trackGroups }) => {
  const list = s.universityApplications || [];
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(null); // 국가 코드
  const [expandedId, setExpandedId] = useState(null);

  // 학생이 들은 OSSD 과목 코드 (대입로드맵에서 추출)
  const studentSubjects = new Set(
    (s.academicRecords || [])
      .map(r => subjects.find(sub => sub.id === r.subjectId)?.code)
      .filter(Boolean)
  );
  const missingRequired = (app) => {
    const prog = programs.find(p => p.id === app.programId);
    if (!prog?.groupId) return [];
    const group = trackGroups.find(g => g.id === prog.groupId);
    if (!group) return [];
    return (group.requiredSubjects || []).filter(code => !studentSubjects.has(code));
  };

  const upsert = (d) => {
    const next = d.id ? list.map(x => x.id === d.id ? d : x) : [...list, { ...d, id: uid() }];
    update({ universityApplications: next });
    setEditing(null);
    setAdding(null);
  };
  const remove = (id) => {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    update({ universityApplications: list.filter(x => x.id !== id) });
  };

  // 국가 그룹별 분류 (기본 CA)
  const byCountry = {};
  COUNTRIES.forEach(c => { byCountry[c] = list.filter(app => (app.countryGroup || 'CA') === c); });

  // 정렬: 순위 → 대학명
  const sortApps = (apps) => [...apps].sort((a, b) => {
    const ra = parseInt(a.rank) || 999;
    const rb = parseInt(b.rank) || 999;
    if (ra !== rb) return ra - rb;
    const ua = universities.find(u => u.id === a.universityId)?.name || '';
    const ub = universities.find(u => u.id === b.universityId)?.name || '';
    return ua.localeCompare(ub);
  });

  return (
    <Fragment>
    <Top6Panel s={s} update={update} schools={schools} subjects={subjects}/>

    {/* 국가별 섹션 */}
    {COUNTRIES.map(c => {
      const apps = sortApps(byCountry[c]);
      if (apps.length === 0) return null;
      const totalCount = apps.length;
      const finalCount = apps.filter(a => a.finalChoice).length;
      const acceptedCount = apps.filter(a => a.status === '합격').length;
      return (
        <Section
          key={c}
          title={`${COUNTRY_LABEL[c]} 대학 지원 (${totalCount})`}
          defaultOpen={true}
          right={
            <div className="flex items-center gap-2">
              {finalCount > 0 && <span className="badge b-purple">최종 선택 {finalCount}</span>}
              {acceptedCount > 0 && <span className="badge b-green">합격 {acceptedCount}</span>}
              <button className="btn-primary" onClick={() => setAdding(c)}>+ {COUNTRY_LABEL[c]} 추가</button>
            </div>
          }
        >
          <div className="notion-card overflow-hidden">
            <div className="overflow-auto">
              <table className="w-full">
                <thead><tr>
                  <th className="table-th" style={{width:32}}></th>
                  <th className="table-th" style={{width:50}}>#</th>
                  <th className="table-th">최종</th>
                  <th className="table-th">대학</th>
                  <th className="table-th">전공</th>
                  <th className="table-th">트랙</th>
                  <th className="table-th">상태</th>
                  <th className="table-th">장학금</th>
                  <th className="table-th">포털</th>
                  <th className="table-th">학생번호</th>
                  <th className="table-th">추가서류</th>
                  <th className="table-th">Draft</th>
                  <th className="table-th">제출</th>
                  <th className="table-th">필수과목</th>
                  <th className="table-th"></th>
                </tr></thead>
                <tbody>
                  {apps.map(app => {
                    const uni = universities.find(u => u.id === app.universityId);
                    const prog = programs.find(p => p.id === app.programId);
                    const group = trackGroups.find(g => g.id === prog?.groupId);
                    const missing = missingRequired(app);
                    const isExpanded = expandedId === app.id;
                    return (
                      <Fragment key={app.id}>
                      <tr className="row-hover" style={app.finalChoice ? { background:'#f5f1fa' } : {}}>
                        <td className="table-td text-center" style={{cursor:'pointer'}} onClick={() => setExpandedId(isExpanded ? null : app.id)}>
                          <span style={{ display:'inline-block', transition:'transform .15s', transform: isExpanded ? 'rotate(90deg)' : 'rotate(0)' }}>▶</span>
                        </td>
                        <td className="table-td text-center text-gray-500 text-sm">{app.rank || '—'}</td>

        <h3 className="font-semibold mb-4">{editing ? '대학 지원 수정' : `${COUNTRY_LABEL[adding]} — 새 대학 지원 추가`}</h3>
        <UniAppEditor
          app={editing || {}}
          defaultCountry={adding || 'CA'}
          universities={universities}
          programs={programs}
          trackGroups={trackGroups}
          onSave={upsert}
          onCancel={() => { setEditing(null); setAdding(null); }}
        />
      </div>
    )}
    </Fragment>
  );
};

// 2. 도넛 차트 (SVG)
const Donut = ({ percent, size=70, stroke=8, color='#c20206', emptyColor='#e8e0d5', label, subLabel }) => {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (Math.min(100, Math.max(0, percent)) / 100) * c;
  return (
    <div className="flex flex-col items-center">
      <div className="relative" style={{ width:size, height:size }}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={emptyColor} strokeWidth={stroke}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
            strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round"
            transform={`rotate(-90 ${size/2} ${size/2})`}/>
        </svg>
        <div className="absolute inset-0 flex flex-col items-center justify-center">
          <div style={{ fontSize:14, fontWeight:700, color }}>{Math.round(percent)}%</div>
          {subLabel && <div style={{ fontSize:9, color:'#787774' }}>{subLabel}</div>}
        </div>
      </div>
      {label && <div className="text-xs mt-1 text-gray-600">{label}</div>}
    </div>
  );
};

// 4. D-day 칩
const DDayChip = ({ date, label }) => {
  if (!date) return null;
  const target = new Date(date);
  const today = new Date();
  today.setHours(0,0,0,0);
  target.setHours(0,0,0,0);
  const diffDays = Math.round((target - today) / 86400000);
  if (isNaN(diffDays)) return null;
  let color, bg, text;
  if (diffDays < 0) { color='#787774'; bg='#f5f5f5'; text=`${Math.abs(diffDays)}일 경과`; }
  else if (diffDays === 0) { color='#fff'; bg='#c20206'; text='D-DAY'; }
  else if (diffDays <= 14) { color='#fff'; bg='#c20206'; text=`D-${diffDays}`; }
  else if (diffDays <= 30) { color='#fff'; bg='#cb912f'; text=`D-${diffDays}`; }
  else { color='#fff'; bg='#202731'; text=`D-${diffDays}`; }
  return (
    <div className="flex items-center gap-2 px-3 py-2 rounded-lg" style={{ background:'#fff', border:'1px solid #e8e0d5' }}>
      <span style={{ background:bg, color, fontWeight:700, fontSize:11, padding:'3px 8px', borderRadius:4 }}>{text}</span>
      <div className="flex flex-col">
        <span style={{ color:'#202731', fontSize:12, fontWeight:500 }}>{label}</span>
        <span style={{ color:'#787774', fontSize:10 }}>{date}</span>
      </div>
    </div>
  );
};

// 5. 스파크라인 (이전 리포트 대비 변화)
const TrendIndicator = ({ values, current, label, format=v => v }) => {
  const allValues = [...values, current].filter(v => v !== null && v !== undefined && !isNaN(v));
  if (allValues.length < 2) {
    return (
      <div className="text-xs flex items-center gap-2">
        <span style={{color:'#4a4a4a'}}>{label}:</span>
        <span style={{color:'#c20206', fontWeight:700}}>{current != null ? format(current) : '—'}</span>
        <span style={{color:'#787774', fontSize:10}}>(첫 측정)</span>
      </div>
    );
  }
  const prev = allValues[allValues.length - 2];
  const diff = current - prev;
  const arrow = diff > 0 ? '↗' : diff < 0 ? '↘' : '→';
  const arrowColor = diff > 0 ? '#0f7b6c' : diff < 0 ? '#c20206' : '#787774';
  const min = Math.min(...allValues);
  const max = Math.max(...allValues);
  const range = max - min || 1;
  const points = allValues.map((v, i) => {
    const x = (i / Math.max(1, allValues.length - 1)) * 80;
    const y = 18 - ((v - min) / range) * 14;
    return `${x},${y}`;
  }).join(' ');
  return (
    <div className="flex items-center gap-2">
      <svg width={80} height={20} viewBox="0 0 80 20">
        <polyline points={points} fill="none" stroke="#c20206" strokeWidth="1.5"/>
        {allValues.map((v, i) => {
          const x = (i / Math.max(1, allValues.length - 1)) * 80;
          const y = 18 - ((v - min) / range) * 14;
          return <circle key={i} cx={x} cy={y} r="2" fill={i === allValues.length - 1 ? '#c20206' : '#cabaab'}/>;
        })}
      </svg>
      <div className="text-xs">
        <div><span style={{color:'#4a4a4a'}}>{label}:</span> <span style={{color:'#c20206', fontWeight:700}}>{format(current)}</span></div>
        <div style={{color: arrowColor, fontSize:10}}>{arrow} {format(prev)} → {format(current)} ({diff > 0 ? '+' : ''}{format(diff)})</div>
      </div>
    </div>
  );
};
