// 대입로드맵 (학업/성적)
// 학년 레이블 (ESL은 그대로, 9~12는 G 접두)
const gradeLabel = (g) => !g ? '' : (g === 'ESL' ? 'ESL' : `G${g}`);

// 일괄 등록기 — 학교/학기/기간 공통, 과목은 여러 개 일괄 추가
const BulkRoadmapEditor = ({ schools, subjects, onSave, onCancel }) => {
  const [shared, setShared] = useState({
    grade: '', schoolId: '', semesterSystem: '',
    startDate: '', endDate: '',
    selection: '정규수업', province: 'ON'
  });
  const blankRow = () => ({
    subjectId: '', credits: '', required: false,
    targetScore: '', midterm1: '', midterm2: '', final: '',
    late: '', absent: '', top6: false, memo: ''
  });
  // 학기시스템에 따른 기본 행 수
  const defaultRowCount = (sys) => sys?.startsWith('Year') ? 8 : sys?.startsWith('Semester') ? 4 : sys?.startsWith('Quarter') ? 2 : 4;
  const [rows, setRows] = useState([blankRow()]);

  const school = schools.find(s => s.id === shared.schoolId);
  const sys = shared.semesterSystem || school?.semesterSystem || '';
  const isYear = sys.startsWith('Year');

  // 주(province) 기반 과목 필터 + 이미 사용된 과목은 비활성화
  const subjectOpts = subjects.filter(s => !shared.province || s.province === shared.province);

  const updateRow = (idx, patch) => setRows(rows.map((r, i) => i === idx ? { ...r, ...patch } : r));
  const addRow = () => {
    if (rows.length >= 10) { alert('한 번에 최대 10개까지 추가 가능합니다.'); return; }
    setRows([...rows, blankRow()]);
  };
  const removeRow = (idx) => {
    if (rows.length === 1) return;
    setRows(rows.filter((_, i) => i !== idx));
  };

  // 학교 선택 시 자동으로 학기시스템 기준 권장 행 수 채움
  const onPickSchool = (v) => {
    const sc = schools.find(s => s.id === v);
    const newSys = sc?.semesterSystem || '';
    setShared({ ...shared, schoolId: v, semesterSystem: '' });
    if (rows.length === 1 && !rows[0].subjectId) {
      const n = defaultRowCount(newSys);
      setRows(Array.from({ length: n }, () => blankRow()));
    }
  };

  const pickSubject = (idx, subId) => {
    const sub = subjects.find(s => s.id === subId);
    updateRow(idx, {
      subjectId: subId,
      credits: rows[idx].credits || (sub ? sub.credits : '')
    });
  };

  const validCount = rows.filter(r => r.subjectId).length;

  const handleSave = () => {
    if (!shared.schoolId) { alert('학교를 선택해주세요.'); return; }
    const valid = rows.filter(r => r.subjectId);
    if (valid.length === 0) { alert('과목을 1개 이상 선택해주세요.'); return; }
    const records = valid.map(r => ({
      id: uid(),
      grade: shared.grade,
      schoolId: shared.schoolId,
      semesterSystem: shared.semesterSystem,
      startDate: shared.startDate,
      endDate: shared.endDate,
      selection: shared.selection,
      ...r
    }));
    onSave(records);
  };

  return (
    <div>
      {/* 공통 헤더 */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5 pb-5 border-b border-gray-200">
        <Field label="학년"><Select value={shared.grade} onChange={(v) => setShared({...shared, grade:v})} options={GRADE_LEVELS}/></Field>
        <Field label="학교" span={2}>
          <RefSelect
            value={shared.schoolId}
            onChange={onPickSchool}
            options={schools.map(s => ({ id: s.id, label: `${s.name} · ${s.type || ''}` }))}
            placeholder="학교 선택"
          />
          {school && (
            <div className="text-xs text-gray-500 mt-1">
              <Badge value={school.semesterSystem}/>
              <span className="ml-2">권장 {defaultRowCount(school.semesterSystem)}과목</span>
            </div>
          )}
        </Field>
        <Field label="학기 시스템 (override)">
          <Select value={shared.semesterSystem} onChange={(v) => setShared({...shared, semesterSystem:v})} options={SEMESTER_SYSTEMS} placeholder="학교 기준 자동"/>
        </Field>

        <Field label="시작일"><TextInput type="date" value={shared.startDate} onChange={(v) => setShared({...shared, startDate:v})}/></Field>
        <Field label="종료일"><TextInput type="date" value={shared.endDate} onChange={(v) => setShared({...shared, endDate:v})}/></Field>
        <Field label="수업 형태"><Select value={shared.selection} onChange={(v) => setShared({...shared, selection:v})} options={COURSE_SELECTIONS}/></Field>
        <Field label="교육과정 (과목 필터)">
          <Select value={shared.province} onChange={(v) => setShared({...shared, province:v})} options={PROVINCES} placeholder="전체"/>
        </Field>
      </div>

      {/* 과목 행들 */}
      <div className="mb-3 flex items-center justify-between">
        <h4 className="font-semibold text-sm">과목 ({validCount}/{rows.length} · 최대 10)</h4>
        <div className="flex items-center gap-2">
          <span className="text-xs text-gray-500">{subjectOpts.length}개 과목 풀</span>
          <button className="btn-ghost" onClick={addRow} disabled={rows.length >= 10}>+ 행 추가</button>
        </div>
      </div>

      <div className="space-y-2">
        {rows.map((row, idx) => {
          const sub = subjects.find(s => s.id === row.subjectId);
          return (
            <div key={idx} className="notion-card p-3" style={{ background:'#fafaf9' }}>
              <div className="flex items-center gap-2 mb-2">
                <span className="font-semibold text-sm text-gray-500">#{idx+1}</span>
                {sub && <span className="badge b-gray font-mono">{sub.code}</span>}
                {sub && <span className="text-sm text-gray-600">{sub.name}</span>}
                {rows.length > 1 && (
                  <button className="btn-danger ml-auto text-xs" onClick={() => removeRow(idx)}>행 삭제</button>
                )}
              </div>
              <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2">
                <div className="col-span-2 lg:col-span-3">
                  <div className="field-label">과목</div>
                  <RefSelect
                    value={row.subjectId}
                    onChange={(v) => pickSubject(idx, v)}
                    options={subjectOpts.map(s => ({ id: s.id, label: `${s.code} — ${s.name}${s.grade ? ` (${gradeLabel(s.grade)})` : ''}` }))}
                    placeholder={`${subjectOpts.length}개 과목 중 선택`}
                  />
                </div>
                <div>
                  <div className="field-label">학점</div>
                  <TextInput type="number" value={row.credits} onChange={(v) => updateRow(idx, {credits: parseFloat(v)||0})}/>
                </div>
                <div>
                  <div className="field-label">필수</div>
                  <div className="pt-2"><Toggle value={row.required} onChange={(v) => updateRow(idx, {required:v})} label=""/></div>
                </div>
                <div>
                  <div className="field-label">목표 점수</div>
                  <TextInput value={row.targetScore} onChange={(v) => updateRow(idx, {targetScore:v})}/>
                </div>
                <div>
                  <div className="field-label">미드텀 1</div>
                  <TextInput value={row.midterm1} onChange={(v) => updateRow(idx, {midterm1:v})}/>
                </div>
                {isYear ? (
                  <div>
                    <div className="field-label">미드텀 2</div>
                    <TextInput value={row.midterm2} onChange={(v) => updateRow(idx, {midterm2:v})}/>
                  </div>
                ) : null}
                <div>
                  <div className="field-label">파이널</div>
                  <TextInput value={row.final} onChange={(v) => updateRow(idx, {final:v})}/>
                </div>
                <div>
                  <div className="field-label">지각</div>
                  <TextInput type="number" value={row.late} onChange={(v) => updateRow(idx, {late:v})}/>
                </div>
                <div>
                  <div className="field-label">결석</div>
                  <TextInput type="number" value={row.absent} onChange={(v) => updateRow(idx, {absent:v})}/>
                </div>
                <div className={isYear ? "col-span-2 lg:col-span-4" : "col-span-2 lg:col-span-5"}>
                  <div className="field-label">메모</div>
                  <TextInput value={row.memo} onChange={(v) => updateRow(idx, {memo:v})}/>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      <div className="flex justify-end gap-2 mt-5">
        <button className="btn-ghost" onClick={onCancel}>취소</button>
        <button className="btn-primary" onClick={handleSave} disabled={validCount === 0}>
          {validCount > 0 ? `${validCount}개 일괄 저장` : '과목을 선택하세요'}
        </button>
      </div>
    </div>
  );
};

// PLE (Prior Learning Equivalency) 에디터 — OSSD 외부 이수분 학점 인정
// 일반적 예: 한국 중3 마침 = 8학점
const PLE_PRESETS = [
  { label: '한국 중3 마침', region: '한국', credits: 8, memo: '중3 마침' },
  { label: '한국 고1 마침', region: '한국', credits: 12, memo: '고1 마침' },
  { label: '한국 고2 마침', region: '한국', credits: 16, memo: '고2 마침' },
  { label: '미국 Grade 9', region: '미국', credits: 8, memo: 'Grade 9 완료' },
  { label: 'BC Grade 10', region: 'BC', credits: 16, memo: 'BC Grade 10 완료' },
  { label: '기타 (직접 입력)', region: '', credits: '', memo: '' }
];

const PLEEditor = ({ rec, onSave, onCancel }) => {
  const [draft, setDraft] = useState(() => ({
    isPLE: true,
    pleRegion: '',
    credits: '',
    memo: '',
    grade: 'PLE',
    selection: '대체수업',
    startDate: '',
    endDate: '',
    midterm1: '', midterm2: '', final: '',
    late: '', absent: '',
    required: false,
    schoolId: '', subjectId: '', semesterSystem: '',
    top6: false, targetScore: '',
    ...rec
  }));
  const set = (k, v) => setDraft({ ...draft, [k]: v });
  const applyPreset = (label) => {
    const p = PLE_PRESETS.find(x => x.label === label);
    if (!p) return;
    setDraft({ ...draft, pleRegion: p.region, credits: p.credits, memo: p.memo });
  };
  const handleSave = () => {
    if (!draft.pleRegion?.trim()) { alert('지역(출처)을 입력해주세요.'); return; }
    if (!draft.credits) { alert('인정 학점을 입력해주세요.'); return; }
    onSave(draft);
  };
  return (
    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
      <Field label="빠른 시작 (선택)" span={3}>
        <Select value="" onChange={applyPreset} options={PLE_PRESETS.map(p => p.label)} placeholder="자주 쓰는 PLE 선택 시 아래 필드 자동 채움"/>
      </Field>
      <Field label="지역 / 출처 *">
        <TextInput value={draft.pleRegion} onChange={(v) => set('pleRegion', v)} placeholder="예) 한국, 미국, BC"/>
      </Field>
      <Field label="인정 학점 *">
        <TextInput type="number" value={draft.credits} onChange={(v) => set('credits', parseFloat(v) || '')} placeholder="예) 8"/>
      </Field>
      <Field label="인정 일자 (선택)">
        <TextInput type="date" value={draft.startDate} onChange={(v) => set('startDate', v)}/>
      </Field>
      <Field label="설명 / 인정 사유" span={3}>
        <TextArea value={draft.memo} onChange={(v) => set('memo', v)} placeholder="예) 중3 마침, Grade 9 완료, 학교 발급 transcript 제출" rows={2}/>
      </Field>
      <div className="col-span-3 flex justify-end gap-2">
        <button className="btn-ghost" onClick={onCancel}>취소</button>
        <button className="btn-primary" onClick={handleSave}>저장</button>
      </div>
    </div>
  );
};

const TabRoadmap = ({ s, update, schools, subjects }) => {
  const list = s.academicRecords || [];
  const [editing, setEditing] = useState(null);   // 단일 수정
  const [bulkAdding, setBulkAdding] = useState(false); // 일괄 등록
  const [pleAdding, setPleAdding] = useState(false);   // PLE 추가
  const [pleEditing, setPleEditing] = useState(null);  // PLE 수정
  const [filters, setFilters] = useState({ schoolId:'', grade:'', selection:'' });

  const filtered = list.filter(r => {
    if (filters.schoolId && r.schoolId !== filters.schoolId) return false;
    if (filters.grade && r.grade !== filters.grade) return false;
    if (filters.selection && r.selection !== filters.selection) return false;
    return true;
  });

  const upsert = (d) => {
    const next = list.map(r => r.id === d.id ? d : r);
    update({ academicRecords: next });
    setEditing(null);
  };
  const bulkSave = (records) => {
    update({ academicRecords: [...list, ...records] });
    setBulkAdding(false);
  };
  const pleSave = (d) => {
    if (d.id) {
      update({ academicRecords: list.map(r => r.id === d.id ? d : r) });
    } else {
      update({ academicRecords: [...list, { ...d, id: uid() }] });
    }
    setPleAdding(false); setPleEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 항목을 삭제하시겠습니까?')) return;
    update({ academicRecords: list.filter(r => r.id !== id) });
  };

  // 정렬: PLE → 시작일 오름차순(과거→미래). 동일 기간이면 종료일·학교 순.
  // PLE 행들은 시간보다 앞이라 startDate 비어있어도 맨 위에.
  const FAR_FUTURE = '9999-12-31';
  const FAR_PAST = '0000-01-01';
  const sorted = [...filtered].sort((a, b) => {
    const sa = a.isPLE ? (a.startDate || FAR_PAST) : (a.startDate || FAR_FUTURE);
    const sb = b.isPLE ? (b.startDate || FAR_PAST) : (b.startDate || FAR_FUTURE);
    if (sa !== sb) return sa.localeCompare(sb);
    const ea = a.endDate || FAR_FUTURE;
    const eb = b.endDate || FAR_FUTURE;
    if (ea !== eb) return ea.localeCompare(eb);
    return (a.schoolId || '').localeCompare(b.schoolId || '');
  });

  const totalCredits = list.reduce((sum, r) => sum + (parseFloat(r.credits) || 0), 0);

  return (
    <Section
      title="대입로드맵 (학업/성적)"
      count={list.length}
      right={
        <div className="flex items-center gap-2">
          <button className="btn-ghost" onClick={() => setPleAdding(true)}>📜 PLE 인정 학점</button>
          <button className="btn-primary" onClick={() => setBulkAdding(true)}>+ 과목 일괄 추가</button>
        </div>
      }
    >
      {/* 요약 */}
      <div className="grid grid-cols-2 gap-4 mb-4">
        <div className="notion-card p-3 text-center">
          <div className="text-xs text-gray-500">총 수강 과목</div>
          <div className="text-2xl font-bold mt-1">{list.length}</div>
        </div>
        <div className="notion-card p-3 text-center">
          <div className="text-xs text-gray-500">누적 학점</div>
          <div className="text-2xl font-bold mt-1">{totalCredits}</div>
        </div>
      </div>

      {/* 필터 */}
      <div className="flex flex-wrap gap-3 mb-4">
        <div className="w-56"><Field label="학교"><RefSelect value={filters.schoolId} onChange={(v) => setFilters({...filters, schoolId:v})} options={schools.map(s => ({ id: s.id, label: s.name }))} placeholder="전체"/></Field></div>
        <div className="w-32"><Field label="학년"><Select value={filters.grade} onChange={(v) => setFilters({...filters, grade:v})} options={GRADE_LEVELS} placeholder="전체"/></Field></div>
        <div className="w-44"><Field label="수업 형태"><Select value={filters.selection} onChange={(v) => setFilters({...filters, selection:v})} options={COURSE_SELECTIONS} placeholder="전체"/></Field></div>
      </div>

      {bulkAdding && (
        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold text-base mb-4">과목 일괄 등록 — 학교/학기/기간을 한번만 입력</h3>
          <BulkRoadmapEditor schools={schools} subjects={subjects} onSave={bulkSave} onCancel={() => setBulkAdding(false)}/>
        </div>
      )}

      {(pleAdding || pleEditing) && (
        <div className="notion-card p-5 mb-4" style={{ background:'#faf3e3', borderColor:'#e8c97a' }}>
          <h3 className="font-semibold text-base mb-2" style={{color:'#a67800'}}>📜 PLE 인정 학점 {pleEditing ? '수정' : '추가'}</h3>
          <div className="text-xs text-gray-600 mb-4">OSSD 외부 이수분 (한국 중3, 미국 Grade 9 등)을 온타리오 학점으로 인정받은 기록입니다. 학교·과목 선택 없이 학점만 등록됩니다.</div>
          <PLEEditor rec={pleEditing || {}} onSave={pleSave} onCancel={() => { setPleAdding(false); setPleEditing(null); }}/>
        </div>
      )}

      {editing && (
        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold text-base mb-4">과목 수정</h3>
          <RoadmapEditor rec={editing} schools={schools} subjects={subjects} onSave={upsert} onCancel={() => setEditing(null)}/>
        </div>
      )}

      <div className="notion-card overflow-hidden">
        <div className="overflow-auto">
          <table className="w-full">
            <thead><tr>
              <th className="table-th">학년</th>
              <th className="table-th">학교</th>
              <th className="table-th">학기</th>
              <th className="table-th">기간</th>
              <th className="table-th">코드</th>
              <th className="table-th">과목명</th>
              <th className="table-th">M1</th>
              <th className="table-th">M2</th>
              <th className="table-th">Final</th>
              <th className="table-th">지각</th>
              <th className="table-th">결석</th>
              <th className="table-th">필수</th>
              <th className="table-th">학점</th>
              <th className="table-th">수업형태</th>
              <th className="table-th">기타</th>
              <th className="table-th"></th>
            </tr></thead>
            <tbody>
              {sorted.length === 0 ? (
                <tr><td colSpan="16" className="text-center py-8 text-gray-400 text-sm">등록된 수강 기록이 없습니다.</td></tr>
              ) : (() => {
                // 그룹핑: PLE는 행 단위 독립, 일반 행은 학교+학기+학년+기간으로 묶어 rowSpan
                const groupKey = (x) => x.isPLE
                  ? `PLE|${x.id}`  // PLE는 매 행 독립
                  : `${x.schoolId}|${x.semesterSystem || ''}|${x.grade || ''}|${x.startDate || ''}|${x.endDate || ''}`;
                const groupSpans = {};
                const firstIndexOfGroup = {};
                sorted.forEach((x, i) => {
                  const k = groupKey(x);
                  if (firstIndexOfGroup[k] === undefined) firstIndexOfGroup[k] = i;
                  groupSpans[k] = (groupSpans[k] || 0) + 1;
                });
                return sorted.map((r, i) => {
                  const school = schools.find(s => s.id === r.schoolId);
                  const subject = subjects.find(s => s.id === r.subjectId);
                  const sys = r.semesterSystem || school?.semesterSystem || '';
                  const isYear = sys.startsWith('Year');
                  const k = groupKey(r);
                  const isFirst = firstIndexOfGroup[k] === i;
                  const span = groupSpans[k];
                  const rowBorderStyle = isFirst && i !== 0 ? { borderTop: '2px solid var(--border)' } : {};
                  // PLE 행: 골드 톤 배경
                  if (r.isPLE) {
                    return (
                      <tr key={r.id} className="row-hover" style={{ ...rowBorderStyle, background:'#faf3e3' }}>
                        <td className="table-td" style={{verticalAlign:'top'}}><span className="badge b-orange">📜 PLE</span></td>
                        <td className="table-td text-sm font-medium" colSpan="3" style={{verticalAlign:'top'}}>
                          <div style={{color:'#760305', fontWeight:600}}>지역: {r.pleRegion || '—'}</div>
                          {r.startDate && <div className="text-xs mt-0.5" style={{color:'#4a4a4a'}}>인정일: {r.startDate}</div>}
                        </td>
                        <td className="table-td font-mono text-xs" style={{color:'#a67800'}}>PLE</td>
                        <td className="table-td text-sm font-medium" style={{color:'#760305'}}>PLE 학점 인정</td>
                        <td className="table-td text-xs italic" colSpan="5" style={{color:'#8a7a55'}}>OSSD 외부 이수분 — 평가 항목 해당 없음</td>
                        <td className="table-td">
                          <input type="checkbox" readOnly className="accent-gray-300"/>
                        </td>
                        <td className="table-td text-base font-bold" style={{color:'#c20206'}}>{r.credits || '—'}</td>
                        <td className="table-td"><Badge value={r.selection}/></td>
                        <td className="table-td text-xs" style={{color:'#202731'}}>{r.memo || '—'}</td>
                        <td className="table-td text-right whitespace-nowrap">
                          <button className="btn-ghost" onClick={() => setPleEditing(r)}>수정</button>
                          <button className="btn-danger" onClick={() => remove(r.id)}>삭제</button>
                        </td>
                      </tr>
                    );
                  }
                  // 일반 OSSD 행
                  const groupCellStyle = { background: '#faf7f3', verticalAlign: 'top' };
                  return (
                    <tr key={r.id} className="row-hover" style={rowBorderStyle}>
                      {isFirst && <td className="table-td" rowSpan={span} style={groupCellStyle}><Badge value={r.grade}/></td>}
                      {isFirst && <td className="table-td text-sm" rowSpan={span} style={groupCellStyle}>{school?.name || '—'}</td>}
                      {isFirst && <td className="table-td" rowSpan={span} style={groupCellStyle}><Badge value={sys}/></td>}
                      {isFirst && <td className="table-td text-xs text-gray-600" rowSpan={span} style={groupCellStyle}>
                        <div>{r.startDate}</div><div className="text-gray-400">~</div><div>{r.endDate}</div>
                      </td>}
                      <td className="table-td font-mono text-xs">{subject?.code || '—'}</td>
                      <td className="table-td text-sm">{subject?.name || '—'}</td>
                      <td className="table-td text-sm">{r.midterm1 || <span className="text-gray-300">—</span>}</td>
                      <td className="table-td text-sm">{isYear ? (r.midterm2 || <span className="text-gray-300">—</span>) : <span className="text-gray-200 text-xs">N/A</span>}</td>
                      <td className="table-td text-sm">{r.final || <span className="text-gray-300">—</span>}</td>
                      <td className="table-td text-sm">{r.late || <span className="text-gray-300">—</span>}</td>
                      <td className="table-td text-sm">{r.absent || <span className="text-gray-300">—</span>}</td>
                      <td className="table-td">
                        {r.required ? <input type="checkbox" checked readOnly className="accent-gray-800"/> : <input type="checkbox" readOnly className="accent-gray-300"/>}
                      </td>
                      <td className="table-td text-sm">{r.credits || '—'}</td>
                      <td className="table-td"><Badge value={r.selection}/></td>
                      <td className="table-td text-xs text-gray-600">{r.memo || '—'}</td>
                      <td className="table-td text-right whitespace-nowrap">
                        <button className="btn-ghost" onClick={() => setEditing(r)}>수정</button>
                        <button className="btn-danger" onClick={() => remove(r.id)}>삭제</button>
                      </td>
                    </tr>
                  );
                });
              })()}
            </tbody>
          </table>
        </div>
      </div>
    </Section>
  );
};

// D. EC 관리
// 레거시 type → 신규 category 매핑
const EC_TYPE_TO_CATEGORY = {
  '클럽': '학교클럽',
  '리더십': '학교클럽',
  '봉사활동': '봉사활동',
  '대회': '대회 및 수상',
  '인턴십': '특별 프로그램',
  '캠프': '특별 프로그램',
  '포트폴리오': '개별 특성화 활동',
  '기타': '개별 특성화 활동'
};

const ECEditor = ({ ec, onSave, onCancel }) => {
  const [draft, setDraft] = useState(ec);
  const set = (k, v) => setDraft({ ...draft, [k]: v });
  const cat = draft.category || EC_TYPE_TO_CATEGORY[draft.type] || '';
  const contactRequired = EC_CONTACT_REQUIRED.includes(cat);
  const star = (txt) => contactRequired ? `${txt} *` : txt;

  const validate = () => {
    if (!cat) return 'EC 카테고리를 선택해주세요.';
    if (!draft.activityName?.trim()) return '활동명을 입력해주세요.';
    if (contactRequired) {
      if (!draft.organizationName?.trim()) return `[${cat}] 주최기관은 필수입니다.`;
      if (!draft.contactName?.trim()) return `[${cat}] 담당자 이름은 필수입니다.`;
      if (!draft.contactEmail?.trim()) return `[${cat}] 담당자 이메일은 필수입니다.`;
      if (!draft.contactPhone?.trim()) return `[${cat}] 담당자 연락처는 필수입니다.`;
    }
    return null;
  };
  const handleSave = () => {
    const err = validate();
    if (err) { alert(err); return; }
    onSave({ ...draft, category: cat });
  };

  return (
    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
      {/* 카테고리 선택 (최상위) */}
      <Field label="EC 카테고리 *" span={3}>
        <Select value={cat} onChange={(v) => set('category', v)} options={EC_CATEGORIES} placeholder="카테고리 선택"/>
        {contactRequired && (
          <div className="text-xs text-orange-600 mt-1">⚠ {cat}은(는) 주최기관 + 담당자(이름·이메일·연락처)가 필수입니다.</div>
        )}
      </Field>

      {/* 공통 기본 정보 */}
      <Field label="활동명 *"><TextInput value={draft.activityName} onChange={(v) => set('activityName', v)}/></Field>
      <Field label="시작일"><TextInput type="date" value={draft.startDate} onChange={(v) => set('startDate', v)}/></Field>
      <Field label="종료일"><TextInput type="date" value={draft.endDate} onChange={(v) => set('endDate', v)}/></Field>
      <Field label="진행 상태"><Select value={draft.status} onChange={(v) => set('status', v)} options={EC_STATUSES}/></Field>
      <Field label="대입 활용 가능성"><Select value={draft.admissionsValue} onChange={(v) => set('admissionsValue', v)} options={EC_VALUES}/></Field>

      {/* === 카테고리별 분기 === */}

      {cat === '봉사활동' && (
        <Fragment>
          <Field label={star('주최기관')}><TextInput value={draft.organizationName} onChange={(v) => set('organizationName', v)} placeholder="예) Toronto Food Bank"/></Field>
          <Field label="총 봉사 시간"><TextInput value={draft.totalHours} onChange={(v) => set('totalHours', v)} placeholder="예) 40"/></Field>
          <Field label="한국 봉사 인정 시간"><TextInput value={draft.recognizedHours} onChange={(v) => set('recognizedHours', v)} placeholder="해당 시 입력"/></Field>
          <Field label={star('담당자 이름')}><TextInput value={draft.contactName} onChange={(v) => set('contactName', v)}/></Field>
          <Field label={star('담당자 이메일')}><TextInput type="email" value={draft.contactEmail} onChange={(v) => set('contactEmail', v)}/></Field>
          <Field label={star('담당자 연락처')}><TextInput value={draft.contactPhone} onChange={(v) => set('contactPhone', v)} placeholder="전화/이메일/기타"/></Field>
        </Fragment>
      )}

      {cat === '학교클럽' && (
        <Fragment>
          <Field label={star('주최기관 / 학교')}><TextInput value={draft.organizationName} onChange={(v) => set('organizationName', v)} placeholder="예) Northview Heights S.S."/></Field>
          <Field label="포지션 / 역할"><TextInput value={draft.position} onChange={(v) => set('position', v)} placeholder="예) vice-president, club member"/></Field>
          <Field label="활동 빈도"><TextInput value={draft.frequency} onChange={(v) => set('frequency', v)} placeholder="예) Weekly on Tuesday at lunch"/></Field>
          <Field label={star('Supervisor 이름')}><TextInput value={draft.contactName} onChange={(v) => set('contactName', v)}/></Field>
          <Field label={star('Supervisor 이메일')}><TextInput type="email" value={draft.contactEmail} onChange={(v) => set('contactEmail', v)}/></Field>
          <Field label={star('Supervisor 연락처')}><TextInput value={draft.contactPhone} onChange={(v) => set('contactPhone', v)} placeholder="전화/이메일/기타"/></Field>
        </Fragment>
      )}

      {cat === '대회 및 수상' && (
        <Fragment>
          <Field label="대회명 / 주최기관"><TextInput value={draft.organizationName} onChange={(v) => set('organizationName', v)} placeholder="예) FIRST FRC at McMaster"/></Field>
          <Field label="대회 일정"><TextInput value={draft.frequency} onChange={(v) => set('frequency', v)} placeholder="예) March 13-14, 2026"/></Field>
          <Field label="수상 결과" span={3}>
            <TextArea value={draft.awardDescription} onChange={(v) => set('awardDescription', v)} placeholder="예) Excellence in Engineering Award & Finals Silver Medal / Top 25% / Advanced to Semifinals" rows={2}/>
          </Field>
        </Fragment>
      )}

      {cat === '특별 프로그램' && (
        <Fragment>
          <Field label="주최기관"><TextInput value={draft.organizationName} onChange={(v) => set('organizationName', v)} placeholder="예) UofT International Programs Office"/></Field>
          <Field label="담당자 이름"><TextInput value={draft.contactName} onChange={(v) => set('contactName', v)} placeholder="예) Nicola Carozza / Assistant Director"/></Field>
          <Field label="담당자 이메일"><TextInput type="email" value={draft.contactEmail} onChange={(v) => set('contactEmail', v)}/></Field>
          <Field label="담당자 연락처"><TextInput value={draft.contactPhone} onChange={(v) => set('contactPhone', v)} placeholder="전화/메모"/></Field>
        </Fragment>
      )}

      {cat === '개별 특성화 활동' && (
        <Fragment>
          <Field label="활동 분야 / 형태"><TextInput value={draft.organizationName} onChange={(v) => set('organizationName', v)} placeholder="예) 개인 포트폴리오, 자기주도 프로젝트"/></Field>
          <Field label="총 시간 / 분량"><TextInput value={draft.totalHours} onChange={(v) => set('totalHours', v)}/></Field>
          <Field label="외부 연락처 (선택)" span={3}>
            <div className="grid grid-cols-3 gap-2">
              <TextInput value={draft.contactName} onChange={(v) => set('contactName', v)} placeholder="이름"/>
              <TextInput type="email" value={draft.contactEmail} onChange={(v) => set('contactEmail', v)} placeholder="이메일"/>
              <TextInput value={draft.contactPhone} onChange={(v) => set('contactPhone', v)} placeholder="전화"/>
            </div>
          </Field>
        </Fragment>
      )}

      {/* 공통 후반 — 설명, 성장 포인트, 파일/메모 */}
      <Field label="활동 내용 / 세부 설명" span={3}><TextArea value={draft.description} onChange={(v) => set('description', v)}/></Field>
      <Field label="배운 점 / 성장 포인트" span={3}><TextArea value={draft.growthPoint} onChange={(v) => set('growthPoint', v)}/></Field>
      <Field label="증빙자료 / 파일 링크" span={3}><TextInput value={draft.proofLink} onChange={(v) => set('proofLink', v)} placeholder="https://... (포트폴리오·인증서·사진 등)"/></Field>
      <Field label="담당 선생님 / 코치 메모" span={3}><TextArea value={draft.teacherMemo} onChange={(v) => set('teacherMemo', v)}/></Field>

      <div className="col-span-3 flex justify-end gap-2">
        <button className="btn-ghost" onClick={onCancel}>취소</button>
        <button className="btn-primary" onClick={handleSave}>저장</button>
      </div>
    </div>
  );
};

// 카테고리 정규화 헬퍼
const getECCategory = (e) => e.category || EC_TYPE_TO_CATEGORY[e.type] || '';

const TabEC = ({ s, update }) => {
  const [editing, setEditing] = useState(null);
  const [filters, setFilters] = useState({ category:'', status:'' });

  const list = (s.extracurriculars || []).map(e => ({ ...e, category: getECCategory(e) }));

  const filtered = list.filter(e => {
    if (filters.category && e.category !== filters.category) return false;
    if (filters.status && e.status !== filters.status) return false;
    return true;
  });

  const upsert = (draft) => {
    const next = draft.id
      ? list.map(e => e.id === draft.id ? draft : e)
      : [...list, { ...draft, id: uid() }];
    update({ extracurriculars: next });
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    update({ extracurriculars: list.filter(e => e.id !== id) });
  };

  // 카테고리별 카운트 요약
  const countByCategory = EC_CATEGORIES.reduce((acc, c) => {
    acc[c] = list.filter(e => e.category === c).length;
    return acc;
  }, {});

  return (
    <Section
      title="D. EC 관리"
      count={list.length}
      right={
        <button className="btn-primary" onClick={() => setEditing({
          id:'', category:'', activityName:'', organizationName:'',
          startDate:'', endDate:'', totalHours:'', recognizedHours:'',
          status:'예정', position:'', frequency:'',
          contactName:'', contactEmail:'', contactPhone:'',
          awardDescription:'',
          description:'', growthPoint:'',
          admissionsValue:'', proofLink:'', teacherMemo:''
        })}>+ EC 추가</button>
      }
    >
      {/* 카테고리별 요약 카드 */}
      <div className="grid grid-cols-5 gap-2 mb-4">
        {EC_CATEGORIES.map(c => (
          <div key={c} className="notion-card p-3 text-center cursor-pointer"
            onClick={() => setFilters({ ...filters, category: filters.category === c ? '' : c })}
            style={{ background: filters.category === c ? '#ebebea' : '#fff' }}
          >
            <div className="text-xs text-gray-500">{c}</div>
            <div className="text-xl font-bold mt-1">{countByCategory[c]}</div>
          </div>
        ))}
      </div>

      {/* 필터 */}
      <div className="flex flex-wrap gap-3 mb-4">
        <div className="w-48"><Field label="카테고리"><Select value={filters.category} onChange={(v) => setFilters({...filters, category:v})} options={EC_CATEGORIES} placeholder="전체"/></Field></div>
        <div className="w-40"><Field label="상태"><Select value={filters.status} onChange={(v) => setFilters({...filters, status:v})} options={EC_STATUSES} placeholder="전체"/></Field></div>
      </div>

      {/* 편집 폼 */}
      {editing && (
        <div className="notion-card p-4 mb-4 bg-gray-50">
          <ECEditor ec={editing} onSave={upsert} onCancel={() => setEditing(null)} />
        </div>
      )}

      {/* 리스트 */}
      <div className="notion-card overflow-hidden">
        <div className="overflow-auto">
          <table className="w-full">
            <thead>
              <tr>
                <th className="table-th">카테고리</th>
                <th className="table-th">활동명</th>
                <th className="table-th">기관/포지션</th>
                <th className="table-th">담당자</th>
                <th className="table-th">기간</th>
                <th className="table-th">시간/결과</th>
                <th className="table-th">상태</th>
                <th className="table-th">대입활용</th>
                <th className="table-th"></th>
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr><td colSpan="9" className="text-center py-8 text-gray-400 text-sm">등록된 EC가 없습니다.</td></tr>
              ) : filtered.map(e => {
                const isVol = e.category === '봉사활동';
                const isClub = e.category === '학교클럽';
                const isComp = e.category === '대회 및 수상';
                // 시간/결과 컬럼: 봉사면 시간, 대회면 수상 결과, 기타면 시간
                const middleVal = isComp
                  ? (e.awardDescription || '—')
                  : (e.totalHours
                      ? (isVol && e.recognizedHours ? `${e.totalHours}h (인정 ${e.recognizedHours}h)` : `${e.totalHours}h`)
                      : '—');
                return (
                  <tr key={e.id} className="row-hover">
                    <td className="table-td"><Badge value={e.category}/></td>
                    <td className="table-td font-medium">{e.activityName}</td>
                    <td className="table-td text-gray-600 text-sm">
                      <div>{e.organizationName || '—'}</div>
                      {(isClub && e.position) && <div className="text-xs text-gray-400 mt-0.5">{e.position}</div>}
                    </td>
                    <td className="table-td text-gray-600 text-xs">
                      {e.contactName ? (
                        <>
                          <div>{e.contactName}</div>
                          {e.contactEmail && <div className="text-blue-600">{e.contactEmail}</div>}
                          {e.contactPhone && <div>{e.contactPhone}</div>}
                        </>
                      ) : <span className="text-gray-300">—</span>}
                    </td>
                    <td className="table-td text-gray-600 text-xs">
                      {(e.startDate || e.endDate) ? `${e.startDate || '?'} ~ ${e.endDate || '진행'}` : (e.frequency || '—')}
                    </td>
                    <td className="table-td text-gray-600 text-xs" style={{maxWidth:200}}>{middleVal}</td>
                    <td className="table-td"><Badge value={e.status}/></td>
                    <td className="table-td"><Badge value={e.admissionsValue}/></td>
                    <td className="table-td text-right whitespace-nowrap">
                      <button className="btn-ghost" onClick={() => setEditing(e)}>수정</button>
                      <button className="btn-danger" onClick={() => remove(e.id)}>삭제</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </Section>
  );
};

// 숙소 마스터 참조 패널 (TabAccommodation 상단에 표시)
// 캐스케이드 선택: 카테고리 → 서브카테고리 → 숙소 → 방
// '가족과 거주'는 마스터 없이 직접 입력
const AccommodationLinkPanel = ({ s, update, accommodations }) => {
  const acc = s.accommodation || {};
  const linkedAccom = accommodations.find(a => a.id === acc.accommodationId);
  const linkedRoom = linkedAccom?.rooms?.find(r => r.id === acc.roomId);

  // 사용자 선택 (linkedAccom이 있으면 그 값에서 derive, 없으면 acc 자체에 저장)
  const currentCategory = acc.category || linkedAccom?.category || '';
  const currentSubCategory = acc.subCategory || linkedAccom?.subCategory || '';
  const isFamily = currentCategory === '가족과 거주';

  const set = (k, v) => update({ accommodation: { ...acc, [k]: v } });

  // 카테고리 변경 — 하위 선택 모두 리셋
  const changeCategory = (newCat) => {
    update({ accommodation: { ...acc, category: newCat, subCategory: '', accommodationId: '', roomId: '' } });
  };
  // 서브카테고리 변경 — 숙소·방 리셋
  const changeSubCategory = (newSub) => {
    update({ accommodation: { ...acc, subCategory: newSub, accommodationId: '', roomId: '' } });
  };
  // 숙소 선택 — 자동으로 category/subCategory 동기화
  const pickAccommodation = (id) => {
    const found = accommodations.find(a => a.id === id);
    if (found) {
      update({ accommodation: { ...acc, accommodationId: id, category: found.category, subCategory: found.subCategory || '', roomId: '' } });
    } else {
      set('accommodationId', '');
    }
  };

  const subOpts = ACCOM_SUBCATEGORIES[currentCategory] || [];
  // 필터된 숙소 리스트
  const filteredAccoms = accommodations.filter(a => {
    if (currentCategory && a.category !== currentCategory) return false;
    if (currentSubCategory && a.subCategory !== currentSubCategory) return false;
    return true;
  });

  return (
    <div className="notion-card p-4 mb-4" style={{ background:'#faf7f3', borderColor:'var(--brand-red)' }}>
      <div className="font-semibold mb-3" style={{color:'#c20206'}}>🔗 숙소 데이터 연결</div>

      {/* Step 1: 카테고리 */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
        <Field label="① 카테고리 *">
          <Select value={currentCategory} onChange={changeCategory} options={ACCOM_CATEGORIES_V2} placeholder="카테고리 선택"/>
        </Field>

        {/* Step 2: 서브카테고리 (있을 때만) */}
        {subOpts.length > 0 && !isFamily && (
          <Field label="② 세부 유형">
            <Select value={currentSubCategory} onChange={changeSubCategory} options={subOpts} placeholder="세부 유형 선택"/>
          </Field>
        )}

        {/* Step 3: 숙소 선택 (가족 아닐 때) */}
        {!isFamily && currentCategory && (
          <Field label="③ 숙소 선택">
            <RefSelect
              value={acc.accommodationId}
              onChange={pickAccommodation}
              options={filteredAccoms.map(a => ({ id:a.id, label:`${a.name}${a.subCategory ? ' · ' + a.subCategory : ''}` }))}
              placeholder={filteredAccoms.length === 0 ? '등록된 숙소 없음' : `숙소 선택 (${filteredAccoms.length}개)`}
            />
          </Field>
        )}

        {/* Step 4: 방 선택 (숙소 선택 후) */}
        {!isFamily && linkedAccom && (
          <Field label="④ 방 선택">
            <RefSelect
              value={acc.roomId}
              onChange={(v) => set('roomId', v)}
              options={(linkedAccom.rooms || []).map(r => ({ id:r.id, label:r.name || '(이름 없음)' }))}
              placeholder={(linkedAccom.rooms||[]).length === 0 ? '등록된 방 없음' : '방 선택'}
            />
          </Field>
        )}
      </div>

      {/* 가족과 거주: 직접 입력 */}
      {isFamily && (
        <div className="notion-card p-4 mb-3 bg-white">
          <div className="font-semibold text-sm mb-3" style={{color:'#760305'}}>👨‍👩‍👧 가족과 거주 (직접 입력)</div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            <Field label="누구와 거주 *">
              <TextInput value={acc.familyMember} onChange={(v) => set('familyMember', v)} placeholder="예) 부모, 어머니, 이모, 친척"/>
            </Field>
            <Field label="가족 연락처">
              <TextInput value={acc.familyContact} onChange={(v) => set('familyContact', v)} placeholder="전화/이메일"/>
            </Field>
            <Field label="주소" span={2}>
              <TextInput value={acc.address} onChange={(v) => set('address', v)}/>
            </Field>
          </div>
        </div>
      )}

      {/* 공통 거주 정보 */}
      <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
        <Field label="현재 상태"><Select value={acc.status} onChange={(v) => set('status', v)} options={ACCOM_STATUSES}/></Field>
        <Field label="입주일"><TextInput type="date" value={acc.moveInDate} onChange={(v) => set('moveInDate', v)}/></Field>
        <Field label="퇴실 예정일"><TextInput type="date" value={acc.expectedMoveOutDate} onChange={(v) => set('expectedMoveOutDate', v)}/></Field>
        <Field label="실제 퇴실일"><TextInput type="date" value={acc.actualMoveOutDate} onChange={(v) => set('actualMoveOutDate', v)}/></Field>
        <Field label="통학 방법"><TextInput value={acc.commuteMethod} onChange={(v) => set('commuteMethod', v)}/></Field>
        <Field label="학교까지 소요시간"><TextInput value={acc.commuteTime} onChange={(v) => set('commuteTime', v)}/></Field>
        <Field label="메모" span={3}><TextArea value={acc.memo} onChange={(v) => set('memo', v)} rows={2}/></Field>
      </div>

      {/* 마스터 정보 미리보기 (가족 아닐 때만) */}
      {!isFamily && linkedAccom && (
        <div className="mt-4 notion-card p-3 bg-white">
          <div className="font-semibold text-sm mb-2" style={{color:'#760305'}}>📋 마스터 정보 (읽기 전용)</div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
            <div><strong>이름/호스트:</strong> {linkedAccom.name}</div>
            <div><strong>카테고리:</strong> <Badge value={linkedAccom.category}/></div>
            {linkedAccom.subCategory && <div><strong>세부 유형:</strong> <Badge value={linkedAccom.subCategory}/></div>}
            {linkedAccom.address && <div className="col-span-2"><strong>주소:</strong> {linkedAccom.address}</div>}
            {linkedAccom.hostPhone && <div><strong>호스트 전화:</strong> {linkedAccom.hostPhone}</div>}
            {linkedAccom.hostEmail && <div><strong>호스트 이메일:</strong> {linkedAccom.hostEmail}</div>}
            {linkedAccom.mealIncluded && <div><strong>식사:</strong> {linkedAccom.mealIncluded}</div>}
            {linkedRoom?.monthlyFee && <div><strong>방 비용:</strong> {linkedRoom.monthlyFee}</div>}
            {linkedAccom.paymentMethod && <div><strong>입금방식:</strong> {linkedAccom.paymentMethod}</div>}
            {linkedRoom && <div className="col-span-2"><strong>방:</strong> {linkedRoom.name} {linkedRoom.features && `— ${linkedRoom.features}`}</div>}
          </div>
          {(linkedAccom.individualContractLink || linkedAccom.buppContractLink) && (
            <div className="mt-2 flex gap-3 text-xs">
              {linkedAccom.individualContractLink && <a href={linkedAccom.individualContractLink} target="_blank" rel="noopener" className="text-blue-600 hover:underline">📄 개별 계약서</a>}
              {linkedAccom.buppContractLink && <a href={linkedAccom.buppContractLink} target="_blank" rel="noopener" className="text-blue-600 hover:underline">📄 BUPP 통합 계약서</a>}
            </div>
          )}
          <div className="text-xs text-gray-500 mt-2">💡 위 정보는 "🏠 숙소 데이터" 메뉴에서 편집할 수 있습니다.</div>
        </div>
      )}
    </div>
  );
};

// F. 대학지원
// Top 6 패널 — OSSD 온타리오 대학 지원용
const Top6Panel = ({ s, update, schools, subjects }) => {
  const records = s.academicRecords || [];
  // 12학년 과목만 추출
  const grade12 = records.filter(r => r.grade === '12');
  // 점수 계산 우선순위: 확정(final) > 미드텀2 > 미드텀1 > 목표
  const effectiveScore = (r) => {
    const vals = [r.final, r.midterm2, r.midterm1, r.targetScore];
    for (const v of vals) {
      const n = parseFloat(v);
      if (!isNaN(n)) return n;
    }
    return null;
  };
  // 확정 점수만 (final 또는 미드텀 중 가장 최근)
  const confirmedScore = (r) => {
    const vals = [r.final, r.midterm2, r.midterm1];
    for (const v of vals) {
      const n = parseFloat(v);
      if (!isNaN(n)) return n;
    }
    return null;
  };

  const toggleTop6 = (id) => {
    const next = records.map(r => r.id === id ? { ...r, top6: !r.top6 } : r);
    update({ academicRecords: next });
  };
  const updateField = (id, k, v) => {
    const next = records.map(r => r.id === id ? { ...r, [k]: v } : r);
    update({ academicRecords: next });
  };

  const top6List = grade12.filter(r => r.top6);
  const top6Count = top6List.length;
  const top6Scores = top6List.map(effectiveScore).filter(n => n !== null);
  const top6Avg = top6Scores.length ? (top6Scores.reduce((a,b) => a+b, 0) / top6Scores.length).toFixed(2) : null;
  // 확정 점수만 평균
  const confirmedScores = top6List.map(confirmedScore).filter(n => n !== null);
  const confirmedAvg = confirmedScores.length ? (confirmedScores.reduce((a,b) => a+b, 0) / confirmedScores.length).toFixed(2) : null;

  // 12학년 과목이 없으면 안내
  if (grade12.length === 0) {
    return (
      <Section title="🎯 Top 6 (온타리오 대학 지원용)" defaultOpen={true}>
        <div className="text-sm text-gray-500 p-4 text-center bg-gray-50 rounded">

      {/* 요약 카드 */}

        <div className="notion-card p-3 text-center">
          <div className="text-xs text-gray-500">선택 과목</div>
          <div className="text-2xl font-bold mt-1">{top6Count}<span className="text-sm text-gray-400">/6</span></div>
        </div>
        <div className="notion-card p-3 text-center" style={{ background:'#e8e0d5' }}>

          <div className="text-xs" style={{color:'#4a4a4a'}}>확정 우선, 미드텀·목표 보완</div>

        <div className="notion-card p-3 text-center" style={{ background:'#202731' }}>
          <div className="text-xs" style={{color:'#cabaab'}}>확정 평균만</div>
          <div className="text-2xl font-bold mt-1" style={{color:'#F0B429'}}>{confirmedAvg ?? '—'}</div>
          <div className="text-xs" style={{color:'#cabaab'}}>조건부 합격 대응용</div>

      <div className="notion-card overflow-hidden">
        <div className="overflow-auto">
          <table className="w-full">
            <thead><tr>
              <th className="table-th" style={{width:60}}>Top 6</th>
              <th className="table-th">학교</th>
              <th className="table-th">코드</th>
              <th className="table-th">과목명</th>
              <th className="table-th">필수</th>
              <th className="table-th">목표</th>
              <th className="table-th">M1</th>
              <th className="table-th">M2</th>
              <th className="table-th">Final</th>
              <th className="table-th">수업형태</th>
              <th className="table-th">유효점수</th>
            </tr></thead>
            <tbody>
              {grade12.map(r => {
                const school = schools.find(x => x.id === r.schoolId);
                const subject = subjects.find(x => x.id === r.subjectId);
                const eff = effectiveScore(r);
                return (
                  <tr key={r.id} className="row-hover" style={r.top6 ? { background:'#fffbe6' } : {}}>
                    <td className="table-td text-center">
                      <input

                        checked={!!r.top6}
                        onChange={() => toggleTop6(r.id)}
                        className="w-5 h-5 accent-yellow-600 cursor-pointer"
                      />
                    </td>
                    <td className="table-td text-sm">{school?.name || '—'}</td>
                    <td className="table-td font-mono text-xs">{subject?.code || '—'}</td>
                    <td className="table-td text-sm">{subject?.name || '—'}</td>
                    <td className="table-td">{r.required ? <span className="badge b-blue">필수</span> : <span className="text-gray-300 text-xs">—</span>}</td>
                    <td className="table-td">
                      <input
                        className="notion-input"
                        style={{ width:60, padding:'4px 6px', fontSize:13 }}
                        value={r.targetScore || ''}

                      />
                    </td>
                    <td className="table-td text-sm">{r.midterm1 || <span className="text-gray-300">—</span>}</td>
                    <td className="table-td text-sm">{r.midterm2 || <span className="text-gray-300">—</span>}</td>
                    <td className="table-td text-sm font-semibold">{r.final || <span className="text-gray-300">—</span>}</td>
                    <td className="table-td"><Badge value={r.selection}/></td>
                    <td className="table-td text-sm font-medium">
                      {eff !== null ? (
                        <span style={{ color: r.final ? '#0f7b6c' : (r.midterm1 || r.midterm2) ? '#0b6e99' : '#cb912f' }}>
                          {eff}
                          <span className="ml-1 text-xs text-gray-400">
                            {r.final ? '확정' : (r.midterm1 || r.midterm2) ? '미드텀' : '목표'}
                          </span>
                        </span>
                      ) : <span className="text-gray-300">—</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </Section>
  );
};

// 대학 지원 에디터 (확장형) — 대학·전공 선택 시 마스터에서 자동 채움
const UniAppEditor = ({ app, universities, programs, trackGroups, onSave, onCancel, defaultCountry='CA' }) => {
  const [draft, setDraft] = useState(() => ({
    countryGroup: defaultCountry, universityId:'', programId:'',
    rank:'', finalChoice:false,
    status:'관심', scholarship:'',
    portalId:'', portalPassword:'', studentNumber:'',
    supplementaryTask:'', workActions:'',
    draftGuideDate:'', draftDeadline:'', reviewFinalDate:'', submissionDate:'',
    officialDocDeadline:'', englishScoreSendDate:'', englishScoreDeadlineOverride:'',
    ieltsConditionOverride:'', duolingoConditionOverride:'',
    memo:'',
    ...app
  }));
  const set = (k, v) => setDraft({ ...draft, [k]: v });

  const cntryUnis = universities.filter(u => u.country === draft.countryGroup);
  const uniPrograms = programs.filter(p => p.universityId === draft.universityId);
  const uni = universities.find(u => u.id === draft.universityId);
  const program = programs.find(p => p.id === draft.programId);
  const group = trackGroups.find(g => g.id === program?.groupId);

  // 자동 채움: officialDocDeadline은 program.supplementaryDeadline 기본
  const effectiveOfficialDeadline = draft.officialDocDeadline || program?.supplementaryDeadline || '';
  const effectiveEnglishDeadline = draft.englishScoreDeadlineOverride || uni?.englishScoreDeadline || '';
  const effectiveIelts = draft.ieltsConditionOverride || uni?.ieltsCondition || '';
  const effectiveDuolingo = draft.duolingoConditionOverride || uni?.duolingoCondition || '';

  return (
    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
      <Field label="국가 그룹">
        <RefSelect value={draft.countryGroup} onChange={(v) => setDraft({...draft, countryGroup:v, universityId:'', programId:''})} options={COUNTRIES.map(c => ({ id:c, label:COUNTRY_LABEL[c] }))} placeholder="국가 선택"/>
      </Field>
      <Field label="대학 *" span={2}>
        <RefSelect value={draft.universityId} onChange={(v) => setDraft({...draft, universityId:v, programId:''})} options={cntryUnis.map(u => ({ id:u.id, label:`${u.name}${u.shortName ? ` (${u.shortName})` : ''}` }))} placeholder="대학 선택"/>
      </Field>
      <Field label="전공 *">
        <RefSelect value={draft.programId} onChange={(v) => set('programId', v)} options={uniPrograms.map(p => ({ id:p.id, label:p.name }))} placeholder={uni ? '전공 선택' : '대학을 먼저 선택'}/>
      </Field>

      {/* 자동 채움 정보 표시 */}
      {uni && (
        <Field label="자동 채움 정보 (마스터)" span={4}>
          <div className="notion-card p-3 text-xs space-y-1" style={{ background:'#e8e0d5', borderColor:'#cabaab' }}>
            <div className="flex gap-2 flex-wrap items-center">
              <Badge value={uni.portalName}/>
              {uni.portalUrl && <span className="text-blue-600">{uni.portalUrl}</span>}
            </div>
            <div><strong>IELTS:</strong> {effectiveIelts || '—'}</div>
            <div><strong>듀오링고:</strong> {effectiveDuolingo || '—'}</div>
            <div><strong>영어점수 데드라인:</strong> {effectiveEnglishDeadline || '—'}</div>
            {program && (
              <div><strong>추가서류:</strong> {program.supplementaryType || '—'} {program.supplementaryDeadline && `(${program.supplementaryDeadline})`}</div>
            )}
            {group && (
              <div className="flex gap-2 flex-wrap items-center">
                <strong>트랙:</strong> <Badge value={group.name}/>
                {(group.requiredSubjects||[]).map(c => <span key={c} className="badge b-purple font-mono text-xs">{c}</span>)}
              </div>
            )}
          </div>
        </Field>
      )}

      <Field label="순위"><TextInput type="number" value={draft.rank} onChange={(v) => set('rank', v)}/></Field>
      <Field label="지원 상태"><Select value={draft.status} onChange={(v) => set('status', v)} options={UNI_STATUSES}/></Field>
      <Field label="최종 선택">
        <div className="pt-2"><Toggle value={draft.finalChoice} onChange={(v) => set('finalChoice', v)} label="최종 선택 학교"/></div>
      </Field>
      <Field label="장학금"><TextInput value={draft.scholarship} onChange={(v) => set('scholarship', v)} placeholder="예) $15,000"/></Field>

      <Field label="포털 ID"><TextInput value={draft.portalId} onChange={(v) => set('portalId', v)}/></Field>
      <Field label="포털 비번"><TextInput value={draft.portalPassword} onChange={(v) => set('portalPassword', v)}/></Field>
      <Field label="학생번호"><TextInput value={draft.studentNumber} onChange={(v) => set('studentNumber', v)}/></Field>
      <Field label="영어점수 전자발송일"><TextInput type="date" value={draft.englishScoreSendDate} onChange={(v) => set('englishScoreSendDate', v)}/></Field>

      <Field label="Draft 가이드 발송일"><TextInput type="date" value={draft.draftGuideDate} onChange={(v) => set('draftGuideDate', v)}/></Field>
      <Field label="Draft 데드라인"><TextInput type="date" value={draft.draftDeadline} onChange={(v) => set('draftDeadline', v)}/></Field>
      <Field label="첨삭 최종일"><TextInput type="date" value={draft.reviewFinalDate} onChange={(v) => set('reviewFinalDate', v)}/></Field>
      <Field label="제출 완료일"><TextInput type="date" value={draft.submissionDate} onChange={(v) => set('submissionDate', v)}/></Field>

      <Field label="추가서류 작업" span={2}><TextInput value={draft.supplementaryTask} onChange={(v) => set('supplementaryTask', v)} placeholder="예) BBA Schulich 비지니스 추가서류"/></Field>

      <Field label="수행 작업 (URL/메모)" span={2}><TextInput value={draft.workActions} onChange={(v) => set('workActions', v)} placeholder="https://drive.google.com/..."/></Field>
      <Field label="메모" span={4}><TextArea value={draft.memo} onChange={(v) => set('memo', v)}/></Field>

      <div className="col-span-4 flex justify-end gap-2">
        <button className="btn-ghost" onClick={onCancel}>취소</button>
        <button className="btn-primary" onClick={() => {
          if (!draft.universityId) { alert('대학을 선택해주세요.'); return; }
          if (!draft.programId) { alert('전공을 선택해주세요.'); return; }
          onSave(draft);
        }}>저장</button>
      </div>
    </div>
  );
};

const TabUni = ({ s, update, schools, subjects, universities, programs, trackGroups }) => {
  const list = s.universityApplications || [];
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(null); // 국가 코드
  const [expandedId, setExpandedId] = useState(null);

  // 학생이 들은 OSSD 과목 코드 (대입로드맵에서 추출)
  const studentSubjects = new Set(
    (s.academicRecords || [])
      .map(r => subjects.find(sub => sub.id === r.subjectId)?.code)
      .filter(Boolean)
  );
  const missingRequired = (app) => {
    const prog = programs.find(p => p.id === app.programId);
    if (!prog?.groupId) return [];
    const group = trackGroups.find(g => g.id === prog.groupId);
    if (!group) return [];
    return (group.requiredSubjects || []).filter(code => !studentSubjects.has(code));
  };

  const upsert = (d) => {
    const next = d.id ? list.map(x => x.id === d.id ? d : x) : [...list, { ...d, id: uid() }];
    update({ universityApplications: next });
    setEditing(null);
    setAdding(null);
  };
  const remove = (id) => {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    update({ universityApplications: list.filter(x => x.id !== id) });
  };

  // 국가 그룹별 분류 (기본 CA)
  const byCountry = {};
  COUNTRIES.forEach(c => { byCountry[c] = list.filter(app => (app.countryGroup || 'CA') === c); });

  // 정렬: 순위 → 대학명
  const sortApps = (apps) => [...apps].sort((a, b) => {
    const ra = parseInt(a.rank) || 999;
    const rb = parseInt(b.rank) || 999;
    if (ra !== rb) return ra - rb;
    const ua = universities.find(u => u.id === a.universityId)?.name || '';
    const ub = universities.find(u => u.id === b.universityId)?.name || '';
    return ua.localeCompare(ub);
  });

  return (
    <Fragment>
    <Top6Panel s={s} update={update} schools={schools} subjects={subjects}/>

    {/* 국가별 섹션 */}
    {COUNTRIES.map(c => {
      const apps = sortApps(byCountry[c]);
      if (apps.length === 0) return null;
      const totalCount = apps.length;
      const finalCount = apps.filter(a => a.finalChoice).length;
      const acceptedCount = apps.filter(a => a.status === '합격').length;
      return (
        <Section
          key={c}
          title={`${COUNTRY_LABEL[c]} 대학 지원 (${totalCount})`}
          defaultOpen={true}
          right={
            <div className="flex items-center gap-2">
              {finalCount > 0 && <span className="badge b-purple">최종 선택 {finalCount}</span>}
              {acceptedCount > 0 && <span className="badge b-green">합격 {acceptedCount}</span>}
              <button className="btn-primary" onClick={() => setAdding(c)}>+ {COUNTRY_LABEL[c]} 추가</button>
            </div>
          }
        >
          <div className="notion-card overflow-hidden">
            <div className="overflow-auto">
              <table className="w-full">
                <thead><tr>
                  <th className="table-th" style={{width:32}}></th>
                  <th className="table-th" style={{width:50}}>#</th>
                  <th className="table-th">최종</th>
                  <th className="table-th">대학</th>
                  <th className="table-th">전공</th>
                  <th className="table-th">트랙</th>
                  <th className="table-th">상태</th>
                  <th className="table-th">장학금</th>
                  <th className="table-th">포털</th>
                  <th className="table-th">학생번호</th>
                  <th className="table-th">추가서류</th>
                  <th className="table-th">Draft</th>
                  <th className="table-th">제출</th>
                  <th className="table-th">필수과목</th>
                  <th className="table-th"></th>
                </tr></thead>
                <tbody>
                  {apps.map(app => {
                    const uni = universities.find(u => u.id === app.universityId);
                    const prog = programs.find(p => p.id === app.programId);
                    const group = trackGroups.find(g => g.id === prog?.groupId);
                    const missing = missingRequired(app);
                    const isExpanded = expandedId === app.id;
                    return (
                      <Fragment key={app.id}>
                      <tr className="row-hover" style={app.finalChoice ? { background:'#f5f1fa' } : {}}>
                        <td className="table-td text-center" style={{cursor:'pointer'}} onClick={() => setExpandedId(isExpanded ? null : app.id)}>
                          <span style={{ display:'inline-block', transition:'transform .15s', transform: isExpanded ? 'rotate(90deg)' : 'rotate(0)' }}>▶</span>
                        </td>
                        <td className="table-td text-center text-gray-500 text-sm">{app.rank || '—'}</td>
                        <td className="table-td">{app.finalChoice ? <span className="badge b-purple">✓</span> : <span className="text-gray-300 text-xs">—</span>}</td>
                        <td className="table-td">

                        </td>
                        <td className="table-td text-sm" style={{maxWidth:250}}>{prog?.name || '—'}</td>
                        <td className="table-td">{group ? <Badge value={group.name}/> : <span className="text-gray-300 text-xs">—</span>}</td>

                        <td className="table-td text-xs text-gray-600">{app.scholarship || '—'}</td>
                        <td className="table-td text-xs">

                            ? <span className="badge b-green">{app.submissionDate}</span>

                        </td>
                        <td className="table-td">
                          {!prog?.groupId
                            ? <span className="text-gray-300 text-xs">—</span>

                              ? <span className="badge b-green">✓ 모두 수강</span>
                              : (

                                <div className="text-xs mb-1"><strong>IELTS:</strong> {uni?.ieltsCondition || '—'}</div>

const ProgressBar = ({ value, max, color='#c20206', height=8, showLabel=true, label }) => {
  const pct = max > 0 ? Math.min(100, Math.max(0, (value / max) * 100)) : 0;

    <div>
      {showLabel && (
        <div className="flex justify-between text-xs mb-1">

      )}
      <div style={{ background:'#e8e0d5', borderRadius: height, height, overflow:'hidden' }}>
        <div style={{ background:color, height:'100%', width: pct + '%', transition:'width .3s' }}/>
      </div>
    </div>
  );
};

// 2. 도넛 차트 (SVG)
const Donut = ({ percent, size=70, stroke=8, color='#c20206', emptyColor='#e8e0d5', label, subLabel }) => {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (Math.min(100, Math.max(0, percent)) / 100) * c;
  return (
    <div className="flex flex-col items-center">
      <div className="relative" style={{ width:size, height:size }}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={emptyColor} strokeWidth={stroke}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
            strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round"
            transform={`rotate(-90 ${size/2} ${size/2})`}/>
        </svg>
        <div className="absolute inset-0 flex flex-col items-center justify-center">
          <div style={{ fontSize:14, fontWeight:700, color }}>{Math.round(percent)}%</div>
          {subLabel && <div style={{ fontSize:9, color:'#787774' }}>{subLabel}</div>}
        </div>
      </div>
      {label && <div className="text-xs mt-1 text-gray-600">{label}</div>}
    </div>
  );
};

// 4. D-day 칩
const DDayChip = ({ date, label }) => {
  if (!date) return null;
  const target = new Date(date);
  const today = new Date();
  today.setHours(0,0,0,0);
  target.setHours(0,0,0,0);
  const diffDays = Math.round((target - today) / 86400000);
  if (isNaN(diffDays)) return null;
  let color, bg, text;
  if (diffDays < 0) { color='#787774'; bg='#f5f5f5'; text=`${Math.abs(diffDays)}일 경과`; }
  else if (diffDays === 0) { color='#fff'; bg='#c20206'; text='D-DAY'; }
  else if (diffDays <= 14) { color='#fff'; bg='#c20206'; text=`D-${diffDays}`; }
  else if (diffDays <= 30) { color='#fff'; bg='#cb912f'; text=`D-${diffDays}`; }
  else { color='#fff'; bg='#0b6e99'; text=`D-${diffDays}`; }
  return (
    <div className="flex items-center gap-2 px-3 py-2 rounded-lg" style={{ background:'#fff', border:'1px solid #e8e0d5' }}>
      <span style={{ background:bg, color, fontWeight:700, fontSize:11, padding:'3px 8px', borderRadius:4 }}>{text}</span>
      <div className="flex flex-col">
        <span style={{ color:'#202731', fontSize:12, fontWeight:500 }}>{label}</span>
        <span style={{ color:'#787774', fontSize:10 }}>{date}</span>
      </div>
    </div>
  );
};

// 5. 스파크라인 (이전 리포트 대비 변화)
const TrendIndicator = ({ values, current, label, format=v => v }) => {
  const allValues = [...values, current].filter(v => v !== null && v !== undefined && !isNaN(v));
  if (allValues.length < 2) {
    return (
      <div className="text-xs flex items-center gap-2">
        <span style={{color:'#4a4a4a'}}>{label}:</span>
        <span style={{color:'#c20206', fontWeight:700}}>{current != null ? format(current) : '—'}</span>
        <span style={{color:'#787774', fontSize:10}}>(첫 측정)</span>
      </div>
    );
  }
  const prev = allValues[allValues.length - 2];
  const diff = current - prev;
  const arrow = diff > 0 ? '↗' : diff < 0 ? '↘' : '→';
  const arrowColor = diff > 0 ? '#0f7b6c' : diff < 0 ? '#c20206' : '#787774';
  const min = Math.min(...allValues);
  const max = Math.max(...allValues);
  const range = max - min || 1;
  const points = allValues.map((v, i) => {
    const x = (i / Math.max(1, allValues.length - 1)) * 80;
    const y = 18 - ((v - min) / range) * 14;
    return `${x},${y}`;
  }).join(' ');
  return (
    <div className="flex items-center gap-2">
      <svg width={80} height={20} viewBox="0 0 80 20">
        <polyline points={points} fill="none" stroke="#c20206" strokeWidth="1.5"/>
        {allValues.map((v, i) => {
          const x = (i / Math.max(1, allValues.length - 1)) * 80;
          const y = 18 - ((v - min) / range) * 14;
          return <circle key={i} cx={x} cy={y} r="2" fill={i === allValues.length - 1 ? '#c20206' : '#cabaab'}/>;
        })}
      </svg>
      <div className="text-xs">
        <div><span style={{color:'#4a4a4a'}}>{label}:</span> <span style={{color:'#c20206', fontWeight:700}}>{format(current)}</span></div>
        <div style={{color: arrowColor, fontSize:10}}>{arrow} {format(prev)} → {format(current)} ({diff > 0 ? '+' : ''}{format(diff)})</div>
      </div>
    </div>
  );
};

// 학생 데이터에서 자동 요약 추출
const buildReportAutoSummary = (student, schools, subjects, universities, programs) => {
  const recs = student.academicRecords || [];
  // 진행 중인 과목 (status 없음 시 final 비어있고 endDate 미래 또는 비어있음 → 진행중으로 간주)
  const today = new Date().toISOString().slice(0,10);
  const inProgress = recs.filter(r => !r.isPLE && (!r.final || (r.endDate && r.endDate >= today)));
  const inProgressNames = inProgress.map(r => {
    const sub = subjects.find(x => x.id === r.subjectId);
    return sub ? `${sub.code} (${sub.name})` : '';
  }).filter(Boolean);

  // 누적 학점
  const totalCredits = recs.reduce((sum, r) => sum + (parseFloat(r.credits) || 0), 0);

  // Top 6 평균
  const top6 = recs.filter(r => r.grade === '12' && r.top6);
  const top6Scores = top6.map(r => {
    const vals = [r.final, r.midterm2, r.midterm1, r.targetScore];
    for (const v of vals) { const n = parseFloat(v); if (!isNaN(n)) return n; }
    return null;
  }).filter(n => n !== null);
  const top6Avg = top6Scores.length ? (top6Scores.reduce((a,b) => a+b, 0) / top6Scores.length).toFixed(2) : null;

  // 출석 — 최근 행들의 지각/결석 합산
  const recentLate = recs.reduce((sum, r) => sum + (parseInt(r.late) || 0), 0);
  const recentAbsent = recs.reduce((sum, r) => sum + (parseInt(r.absent) || 0), 0);

  // 대학 지원 진행 중
  const apps = student.universityApplications || [];
  const activeApps = apps.filter(a => a.status === '지원완료' || a.status === '지원예정' || a.status === '대기');
  const accepted = apps.filter(a => a.status === '합격');
  const finalChoice = apps.find(a => a.finalChoice);

  // 진행 중인 EC
  const ecActive = (student.extracurriculars || []).filter(e => e.status === '진행중');

  // 출석률 추정 (지각 0.5 + 결석 1, 학생당 50개 max로 추정)
  const attendanceIssues = (recentLate * 0.5) + recentAbsent;
  const attendanceRate = Math.max(0, Math.min(100, 100 - (attendanceIssues * 2)));

  // EC 카테고리별 카운트
  const ecCounts = { '봉사활동':0, '학교클럽':0, '대회 및 수상':0, '특별 프로그램':0, '개별 특성화 활동':0 };
  let volunteerHours = 0;
  (student.extracurriculars||[]).forEach(e => {
    const cat = e.category || (typeof EC_TYPE_TO_CATEGORY !== 'undefined' ? EC_TYPE_TO_CATEGORY[e.type] : '');
    if (cat && ecCounts[cat] !== undefined) ecCounts[cat]++;
    if (cat === '봉사활동') volunteerHours += parseFloat(e.totalHours) || 0;
  });

  // 출결 — 학교 학기시스템에 따라 학기/학년/쿼터별로 그룹화
  const attendanceGroups = [];
  recs.forEach(r => {
    if (r.isPLE) return;
    const school = schools.find(s => s.id === r.schoolId);
    const sys = r.semesterSystem || school?.semesterSystem || '';
    let periodKey, periodLabel, sysLabel;
    const startYear = (r.startDate || '').substring(0, 4);
    const startMonth = parseInt((r.startDate || '').substring(5, 7)) || 0;
    if (sys.startsWith('Year')) {
      // 학년제 — 학년 + 학년도(9월 시작)
      const yearStart = startMonth >= 9 ? startYear : (parseInt(startYear) - 1).toString();
      periodKey = `${r.schoolId}-Y-G${r.grade}-${yearStart}`;
      periodLabel = `${r.grade}학년`;
      sysLabel = '학년';
    } else if (sys.startsWith('Semester')) {
      // 학기제 — Sem1(9~1월)/Sem2(2~6월)/Summer(7~8월)
      let seasonLabel;
      if (startMonth >= 8 && startMonth <= 12) seasonLabel = 'Sem1';
      else if (startMonth >= 1 && startMonth <= 6) seasonLabel = 'Sem2';
      else seasonLabel = 'Summer';
      periodKey = `${r.schoolId}-S-${startYear}-${seasonLabel}`;
      periodLabel = `${startYear} ${seasonLabel}`;
      sysLabel = '학기';
    } else if (sys.startsWith('Quarter')) {
      const q = Math.floor((startMonth - 1) / 3) + 1;
      periodKey = `${r.schoolId}-Q-${startYear}-Q${q}`;
      periodLabel = `${startYear} Q${q}`;
      sysLabel = '쿼터';
    } else {
      periodKey = `${r.schoolId}-X-${(r.startDate || '').substring(0,7)}`;
      periodLabel = (r.startDate || '').substring(0,7) || '미지정';
      sysLabel = '기간';
    }
    let g = attendanceGroups.find(gg => gg.key === periodKey);
    if (!g) {
      g = {
        key: periodKey, label: periodLabel, sysLabel,
        schoolName: school?.shortName || school?.name || '미지정',
        startDate: r.startDate || '',
        late: 0, absent: 0
      };
      attendanceGroups.push(g);
    }
    g.late += parseInt(r.late) || 0;
    g.absent += parseInt(r.absent) || 0;
  });
  // 시간순 정렬 + 추이 계산
  attendanceGroups.sort((a, b) => (a.startDate || '').localeCompare(b.startDate || ''));
  attendanceGroups.forEach((g, i) => {
    if (i === 0) { g.trend = 'first'; return; }
    const prev = attendanceGroups[i-1];
    const prevTotal = prev.late + prev.absent;
    const currTotal = g.late + g.absent;
    if (currTotal < prevTotal) g.trend = 'better';
    else if (currTotal === prevTotal) g.trend = 'same';
    else g.trend = 'worse';
  });

  // 대학 지원 funnel
  const funnelStages = [
    { label:'관심', count: apps.filter(a => a.status === '관심').length, color:'#cabaab' },
    { label:'지원예정', count: apps.filter(a => a.status === '지원예정').length, color:'#cb912f' },
    { label:'지원완료', count: apps.filter(a => a.status === '지원완료').length, color:'#0b6e99' },
    { label:'합격', count: apps.filter(a => a.status === '합격').length, color:'#0f7b6c' },
    { label:'최종', count: apps.filter(a => a.finalChoice).length, color:'#c20206' }
  ];

  // D-day 마일스톤 — 다음 5개 (today는 함수 상단에서 이미 선언됨)
  const milestoneSet = new Set();
  const milestones = [];
  apps.forEach(a => {
    const prog = programs.find(p => p.id === a.programId);
    const uni = universities.find(u => u.id === a.universityId);
    const uniName = uni?.shortName || uni?.name || '';
    if (prog?.supplementaryDeadline) {
      const key = `${prog.supplementaryDeadline}|${uniName}|sup`;
      if (!milestoneSet.has(key)) {
        milestoneSet.add(key);
        milestones.push({ date: prog.supplementaryDeadline, label: `${uniName} ${prog.supplementaryType || '추가서류'} 마감` });
      }
    }
    if (uni?.englishScoreDeadline) {
      const key = `${uni.englishScoreDeadline}|${uniName}|eng`;
      if (!milestoneSet.has(key)) {
        milestoneSet.add(key);
        milestones.push({ date: uni.englishScoreDeadline, label: `${uniName} 영어점수 마감` });
      }
    }
    if (a.draftDeadline) milestones.push({ date: a.draftDeadline, label: `${uniName} Draft 마감` });
  });
  // 학생 학업 메타에 있는 데드라인 추가
  if (student.passportExpiryDate) milestones.push({ date: student.passportExpiryDate, label: '여권 만료' });
  if (student.visaExpiryDate) milestones.push({ date: student.visaExpiryDate, label: '비자 만료' });
  if (student.insuranceEndDate) milestones.push({ date: student.insuranceEndDate, label: '보험 만료' });
  const sortedMilestones = milestones
    .filter(m => m.date >= today)
    .sort((a, b) => a.date.localeCompare(b.date))
    .slice(0, 5);

  // 이전 리포트들의 Top 6 평균 추적 (current report에 저장된 snapshot이 있다면)
  const reports = (student.reports || []).slice().sort((a,b) => (a.date||'').localeCompare(b.date||''));
  const top6History = reports.map(r => r._top6AvgSnapshot).filter(v => v !== undefined && v !== null && !isNaN(v));

  return {
    inProgressCount: inProgress.length,
    inProgressNames,
    totalCredits,
    top6Avg,
    top6Count: top6.length,
    recentLate, recentAbsent,
    activeAppsCount: activeApps.length,
    acceptedCount: accepted.length,
    finalChoice: finalChoice ? (universities.find(u => u.id === finalChoice.universityId)?.shortName || universities.find(u => u.id === finalChoice.universityId)?.name) : null,
    ecActive: ecActive.map(e => e.activityName),
    attendanceRate, ecCounts, funnelStages,
    milestones: sortedMilestones,
    top6History,
    volunteerHours,
    attendanceGroups
  };
};

      {/* 대학 지원 깔때기 + EC 카테고리 분포 */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-2">
        {(summary.activeAppsCount > 0 || summary.acceptedCount > 0) && (

          <div className="text-xs font-semibold mb-2" style={{color:'#760305'}}>🌟 EC 카테고리 분포</div>

        </div>
      </div>

      {/* 꼬리표 */}
      <div className="text-xs text-gray-600 pt-3" style={{ borderTop:'1px solid #cabaab' }}>
        {summary.inProgressNames.length > 0 && <div className="mb-1">📚 진행 중: {summary.inProgressNames.slice(0,5).join(', ')}{summary.inProgressNames.length > 5 && ` 외 ${summary.inProgressNames.length - 5}`}</div>}
        {summary.ecActive.length > 0 && <div className="mb-1">🌟 진행 중 EC: {summary.ecActive.join(', ')}</div>}
        {summary.finalChoice && <div>🎓 최종 선택: <strong style={{color:'#c20206'}}>{summary.finalChoice}</strong></div>}
      </div>
    </div>
  );
};

const TabReport = ({ s, update, schools, subjects, universities=[], programs=[], invoices=[], currentUserName='', canEdit=true }) => {
  // 해당 학생의 인보이스 (linkedStudentId 기준, 최신순)
  const studentInvoices = invoices
    .filter(i => i.linkedStudentId === s.id)
    .sort((a, b) => (b.issueDate||'').localeCompare(a.issueDate||''));
  const latestPaid = studentInvoices.find(i => i.status === 'paid');
  const latestPending = studentInvoices.find(i => i.status === 'sent');
  const list = s.reports || [];
  const [editing, setEditing] = useState(null); // null | object
  const summary = buildReportAutoSummary(s, schools, subjects, universities, programs);

  const upsert = (d) => {
    // 저장 시점의 Top 6 평균을 스냅샷으로 남김 → 트렌드 차트용
    const withSnapshot = { ...d, _top6AvgSnapshot: summary.top6Avg != null ? parseFloat(summary.top6Avg) : null };
    const next = d.id
      ? list.map(r => r.id === d.id ? withSnapshot : r)
      : [...list, { ...withSnapshot, id: uid() }];
    update({ reports: next });
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 리포트를 삭제하시겠습니까?')) return;
    update({ reports: list.filter(r => r.id !== id) });
  };

  // 최신순 정렬
  const sorted = [...list].sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  return (
    <Section
      title="📝 리포트 (학부모 공유)"

        {/* Row 2: D-day 마일스톤 */}

          </div>
        </div>

        {/* 진행 과목/EC 텍스트 요약 (꼬리표) */}
        <div className="text-xs text-gray-600 pt-3" style={{ borderTop:'1px solid #cabaab' }}>
          {summary.inProgressNames.length > 0 && <div className="mb-1">📚 진행 중: {summary.inProgressNames.slice(0,5).join(', ')}{summary.inProgressNames.length > 5 && ` 외 ${summary.inProgressNames.length - 5}`}</div>}

        </div>
      </div>

      {/* 편집 폼 */}
      {editing && (
        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold text-base mb-4">{editing.id ? '리포트 수정' : '새 리포트 작성'}</h3>
          <ReportEditor rep={editing} students={[s]} schools={schools} subjects={subjects} universities={universities} programs={programs}
            currentUserName={currentUserName}
            onSave={upsert} onCancel={() => setEditing(null)}/>

      {sorted.length === 0 ? (
