  );
};

// 입실 가능 날짜 대시보드 — 홈스테이 + 기숙사 방들의 availableFromDate 표시
const AvailabilityDashboard = ({ accommodations, onJump, students = [] }) => {
  const [viewMode, setViewMode] = useState('calendar'); // calendar | list | checkout
  const [currentMonth, setCurrentMonth] = useState(() => {
    const d = new Date();
    return new Date(d.getFullYear(), d.getMonth(), 1);
  });

  // 홈스테이 + 기숙사 방만 집계, availableFromDate가 있는 것만
  const rooms = [];
  accommodations.forEach(a => {
    if (a.category !== '홈스테이' && a.category !== '기숙사') return;
    (a.rooms || []).forEach(r => {
      if (!r.availableFromDate) return;
      rooms.push({
        date: r.availableFromDate,
        accommodationId: a.id,
        accommodationName: a.name,
        accommodationCategory: a.category,
        accommodationSubCategory: a.subCategory || '',
        roomId: r.id,
        roomName: r.name || '(이름 없음)',
        occupied: (r.currentOccupants || []).length > 0
      });
    });
  });

  // 🚪 퇴실 예정 — 현재 거주자 중 expectedMoveOutDate가 있는 사람들
  const checkouts = [];
  accommodations.forEach(a => {
    if (a.category !== '홈스테이' && a.category !== '기숙사') return;
    (a.rooms || []).forEach(r => {
      (r.currentOccupants || []).forEach(occ => {
        if (!occ.expectedMoveOutDate) return;
        const stu = students.find(s => s.id === occ.studentId);
        checkouts.push({
          date: occ.expectedMoveOutDate,
          moveInDate: occ.moveInDate || '',
          accommodationId: a.id,
          accommodationName: a.name,
          accommodationCategory: a.category,
          accommodationSubCategory: a.subCategory || '',
          roomName: r.name || '(이름 없음)',
          isBupp: !occ.unknownStudent && !!occ.studentId,
          occupantName: occ.unknownStudent ? (occ.unknownStudentName || '외부 학생') : (stu?.koreanName || '—')
        });
      });
    });
  });
  checkouts.sort((a, b) => a.date.localeCompare(b.date));
  const todayStr2 = new Date().toISOString().slice(0, 10);
  const upcomingCheckouts = checkouts.filter(c => c.date >= todayStr2);
  const pastCheckouts = checkouts.filter(c => c.date < todayStr2);

  // 캘린더 뷰 계산
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth(); // 0-indexed
  const monthLabel = `${year}년 ${month + 1}월`;
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDayOfWeek = firstDay.getDay(); // 0=Sun
  const daysInMonth = lastDay.getDate();
  const monthStr = `${year}-${String(month + 1).padStart(2, '0')}`;

  // 날짜별 그룹 (캘린더용)
  const roomsByDate = {};
  rooms.forEach(r => {
    if (!roomsByDate[r.date]) roomsByDate[r.date] = [];
    roomsByDate[r.date].push(r);
  });
  const currentMonthRooms = rooms.filter(r => r.date.startsWith(monthStr));

  // 월별 그룹 (목록용)
  const roomsByMonth = {};
  rooms.forEach(r => {
    const ym = r.date.substring(0, 7);
    if (!roomsByMonth[ym]) roomsByMonth[ym] = [];
    roomsByMonth[ym].push(r);
  });
  // 각 월 내부 날짜순 정렬
  Object.keys(roomsByMonth).forEach(ym => {
    roomsByMonth[ym].sort((a, b) => a.date.localeCompare(b.date));
  });
  const sortedMonths = Object.keys(roomsByMonth).sort();

  const goMonth = (delta) => {
    const d = new Date(year, month + delta, 1);
    setCurrentMonth(d);
  };
  const goToday = () => {
    const d = new Date();
    setCurrentMonth(new Date(d.getFullYear(), d.getMonth(), 1));
  };

  const dayLabels = ['일', '월', '화', '수', '목', '금', '토'];
  const todayStr = new Date().toISOString().slice(0, 10);

  // 캘린더 셀 만들기
  const cells = [];
  for (let i = 0; i < startDayOfWeek; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    cells.push({ day: d, dateStr: ds, rooms: roomsByDate[ds] || [] });
  }
  while (cells.length % 7 !== 0) cells.push(null);

  return (
    <div className="notion-card mb-6 overflow-hidden">
      <div className="px-5 py-4 flex items-center justify-between" style={{ background:'#faf7f3', borderBottom:'1px solid var(--border)' }}>
        <div>
          <h2 className="text-lg font-bold" style={{color:'#c20206'}}>📅 입실 가능 날짜 (홈스테이 · 기숙사)</h2>
          <p className="text-xs text-gray-500 mt-1">전체 {rooms.length}개 방 — 이번 달 {currentMonthRooms.length}개</p>
        </div>
        <div className="flex gap-1">
          <button className={`tab-btn ${viewMode === 'calendar' ? 'active':''}`} onClick={() => setViewMode('calendar')}>📆 캘린더</button>
          <button className={`tab-btn ${viewMode === 'list' ? 'active':''}`} onClick={() => setViewMode('list')}>📋 월별 목록</button>
          <button className={`tab-btn ${viewMode === 'checkout' ? 'active':''}`} onClick={() => setViewMode('checkout')}>🚪 퇴실 예정 ({upcomingCheckouts.length})</button>
        </div>
      </div>

      {viewMode === 'calendar' && (
        <div className="p-5">
          {/* 월 네비게이션 */}
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2">
              <button className="btn-ghost" onClick={() => goMonth(-1)}>◀</button>
              <div className="font-semibold text-base px-3">{monthLabel}</div>
              <button className="btn-ghost" onClick={() => goMonth(1)}>▶</button>
            </div>
            <button className="btn-ghost text-xs" onClick={goToday}>오늘로</button>
          </div>

          {/* 요일 헤더 */}
          <div className="grid grid-cols-7 gap-1 mb-1">
            {dayLabels.map((d, i) => (
              <div key={d} className="text-xs text-center font-semibold py-1" style={{ color: i === 0 ? '#c20206' : i === 6 ? '#0b6e99' : '#4a4a4a' }}>{d}</div>
            ))}
          </div>

          {/* 날짜 셀들 */}
          <div className="grid grid-cols-7 gap-1">
            {cells.map((c, i) => (
              <div key={i} className="rounded p-2 text-xs"
                style={{
                  minHeight: 90,
                  background: !c ? 'transparent' : (c.dateStr === todayStr ? '#fbe0e0' : '#fff'),
                  border: c ? '1px solid var(--border)' : 'none',
                }}>
                {c && (
                  <Fragment>
                    <div className="text-right text-xs font-semibold mb-1" style={{ color: c.dateStr === todayStr ? '#c20206' : '#4a4a4a' }}>
                      {c.day}
                    </div>
                    {c.rooms.map((r, idx) => (
                      <div key={idx}
                        onClick={() => onJump && onJump(r.accommodationId)}
                        className="cursor-pointer p-1 mb-1 rounded text-xs leading-tight"
                        style={{
                          background: r.accommodationCategory === '홈스테이' ? '#fbe0e0' : '#ddebf1',
                          color: r.accommodationCategory === '홈스테이' ? '#760305' : '#0b6e99',
                          opacity: r.occupied ? 0.55 : 1
                        }}
                        title={`${r.accommodationName} · ${r.roomName}${r.occupied ? ' (현재 거주중)' : ''}`}
                      >
                        <div className="font-medium truncate">{r.accommodationName}</div>
                        <div className="text-xs truncate" style={{ opacity:0.8 }}>{r.roomName}{r.occupied && ' 🔒'}</div>
                      </div>
                    ))}
                  </Fragment>
                )}
              </div>
            ))}
          </div>

          {/* 범례 */}
          <div className="flex items-center gap-4 mt-3 text-xs text-gray-500">
            <div className="flex items-center gap-1"><span className="inline-block w-3 h-3 rounded" style={{background:'#fbe0e0'}}/>홈스테이</div>
            <div className="flex items-center gap-1"><span className="inline-block w-3 h-3 rounded" style={{background:'#ddebf1'}}/>기숙사</div>
            <div className="flex items-center gap-1">🔒 현재 거주중</div>
          </div>
        </div>
      )}

      {viewMode === 'checkout' && (
        <div className="p-5">
          {checkouts.length === 0 ? (
            <div className="text-sm text-gray-400 text-center py-8">퇴실 예정일이 등록된 거주자가 없습니다.</div>
          ) : (
            <Fragment>
              {/* 예정 (오늘 이후) */}
              <div className="mb-5">
                <h4 className="font-semibold mb-2" style={{color:'#c20206'}}>예정 ({upcomingCheckouts.length})</h4>
                <div className="notion-card overflow-hidden">
                  {upcomingCheckouts.length === 0 ? (
                    <div className="text-sm text-gray-400 text-center py-6">예정된 퇴실이 없습니다.</div>
                  ) : (
                    <table className="w-full">
                      <thead>
                        <tr>
                          <th className="table-th" style={{ width:120 }}>퇴실예정일</th>
                          <th className="table-th" style={{ width:90 }}>D-day</th>
                          <th className="table-th">거주자</th>
                          <th className="table-th">카테고리</th>
                          <th className="table-th">숙소</th>
                          <th className="table-th">방</th>
                          <th className="table-th">입실일</th>
                          <th className="table-th"></th>
                        </tr>
                      </thead>
                      <tbody>
                        {upcomingCheckouts.map((c, i) => {
                          const days = Math.ceil((new Date(c.date) - new Date(todayStr2)) / 86400000);
                          const isUrgent = days <= 30;
                          return (
                            <tr key={i} className="row-hover cursor-pointer" onClick={() => onJump && onJump(c.accommodationId)}>
                              <td className="table-td text-sm font-medium">{c.date}</td>
                              <td className="table-td text-sm" style={{ color: isUrgent ? '#c20206' : '#4a4a4a', fontWeight: isUrgent ? 600 : 400 }}>D-{days}</td>
                              <td className="table-td text-sm">
                                {c.occupantName}
                                {c.isBupp && <span className="ml-1"><Badge value="BUPP"/></span>}
                              </td>
                              <td className="table-td">
                                <Badge value={c.accommodationCategory}/>
                                {c.accommodationSubCategory && <span className="ml-1"><Badge value={c.accommodationSubCategory}/></span>}
                              </td>
                              <td className="table-td text-sm font-medium">{c.accommodationName}</td>
                              <td className="table-td text-sm">{c.roomName}</td>
                              <td className="table-td text-xs text-gray-500">{c.moveInDate || '—'}</td>
                              <td className="table-td text-right text-xs text-blue-600">→ 상세보기</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  )}
                </div>
              </div>
              {/* 지난 항목 (참고) */}
              {pastCheckouts.length > 0 && (
                <div>
                  <h4 className="font-semibold mb-2 text-gray-500">지난 퇴실예정 ({pastCheckouts.length})</h4>
                  <div className="notion-card overflow-hidden" style={{ opacity: 0.65 }}>
                    <table className="w-full">
                      <thead>
                        <tr>
                          <th className="table-th" style={{ width:120 }}>퇴실예정일</th>
                          <th className="table-th">거주자</th>
                          <th className="table-th">숙소</th>
                          <th className="table-th">방</th>
                        </tr>
                      </thead>
                      <tbody>
                        {pastCheckouts.slice(-10).reverse().map((c, i) => (
                          <tr key={i} className="row-hover cursor-pointer" onClick={() => onJump && onJump(c.accommodationId)}>
                            <td className="table-td text-sm">{c.date}</td>
                            <td className="table-td text-sm">{c.occupantName}{c.isBupp && <span className="ml-1"><Badge value="BUPP"/></span>}</td>
                            <td className="table-td text-sm">{c.accommodationName}</td>
                            <td className="table-td text-sm">{c.roomName}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </Fragment>
          )}
        </div>
      )}

      {viewMode === 'list' && (
        <div className="p-5">
          {sortedMonths.length === 0 ? (
            <div className="text-sm text-gray-400 text-center py-8">입실 가능 날짜가 등록된 방이 없습니다.</div>
          ) : sortedMonths.map(ym => {
            const [y, m] = ym.split('-');
            return (
              <div key={ym} className="mb-5">
                <h4 className="font-semibold mb-2" style={{color:'#c20206'}}>{y}년 {parseInt(m)}월 ({roomsByMonth[ym].length})</h4>
                <div className="notion-card overflow-hidden">
                  <table className="w-full">
                    <thead>
                      <tr>
                        <th className="table-th" style={{ width:120 }}>날짜</th>
                        <th className="table-th">카테고리</th>
                        <th className="table-th">숙소</th>
                        <th className="table-th">방</th>
                        <th className="table-th">상태</th>
                        <th className="table-th"></th>
                      </tr>
                    </thead>
                    <tbody>
                      {roomsByMonth[ym].map((r, i) => (
                        <tr key={i} className="row-hover cursor-pointer" onClick={() => onJump && onJump(r.accommodationId)}>
                          <td className="table-td text-sm font-medium">{r.date}</td>
                          <td className="table-td">
                            <Badge value={r.accommodationCategory}/>
                            {r.accommodationSubCategory && <span className="ml-1"><Badge value={r.accommodationSubCategory}/></span>}
                          </td>
                          <td className="table-td text-sm font-medium">{r.accommodationName}</td>
                          <td className="table-td text-sm">{r.roomName}</td>
                          <td className="table-td text-sm">
                            {r.occupied
                              ? <span className="badge b-gray">🔒 거주중</span>
                              : <span className="badge b-green">✓ 가용</span>}
                          </td>
                          <td className="table-td text-right text-xs text-blue-600">→ 상세보기</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

// 숙소 데이터 페이지 (사이드바 진입점)
const AccommodationDataPage = ({ accommodations, students, schools, onChange, canViewHistory=true, onOpenPDF }) => {
  const [category, setCategory] = useState('홈스테이');
  const [search, setSearch] = useState('');
  const [openId, setOpenId] = useState(null);

  const opened = accommodations.find(a => a.id === openId);
  const filtered = accommodations.filter(a => {
    if (a.category !== category) return false;
    const q = search.trim().toLowerCase();
    if (q && !(a.name||'').toLowerCase().includes(q) && !(a.address||'').toLowerCase().includes(q)) return false;
    return true;
  });
  const add = () => {
    const blank = {
      id: uid(), category, subCategory: '', name: '새 숙소', active: true,
      photos: [], hostName: '', hostPhone: '', hostEmail: '', hostNationality: '', address: '',
      familyMembers: '', mealIncluded: '', monthlyFee: '', paymentMethod: '',
      deposit: '', laundry: '', rules: '', description: '', housematesInfo: '',
      schoolDistances: [], individualContractLink: '', buppContractLink: '',
      rateIncreasePlan: '', rateIncreaseDate: '', memo: '', rooms: []
    };
    onChange([...accommodations, blank]);
    setOpenId(blank.id);
  };
  const updateAccom = (next) => onChange(accommodations.map(a => a.id === next.id ? next : a));
  const removeAccom = (id) => {
    if (!confirm('이 숙소를 삭제하시겠습니까?')) return;
    onChange(accommodations.filter(a => a.id !== id));
    setOpenId(null);
  };

  if (opened) {
    return (
      <div className="max-w-[1400px] mx-auto px-8 py-6">
        <AccommodationDetail accom={opened} students={students} schools={schools}
          onChange={updateAccom} onClose={() => setOpenId(null)}
          canViewHistory={canViewHistory} onOpenPDF={onOpenPDF}/>
      </div>
    );
  }

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">🏠 숙소 데이터</h1>
          <p className="text-sm text-gray-500 mt-1">전체 {accommodations.length}개 · {category} {filtered.length}개</p>
        </div>
        <div className="flex items-center gap-2">
          <input className="notion-input w-72" placeholder="이름·주소 검색..." value={search} onChange={(e) => setSearch(e.target.value)}/>
          <button className="btn-primary" onClick={add}>+ 새 {category} 추가</button>
        </div>
      </div>

      {/* 입실 가능 날짜 대시보드 */}
      <AvailabilityDashboard accommodations={accommodations} students={students} onJump={(id) => setOpenId(id)}/>

      {/* 카테고리 탭 */}
      <div className="flex gap-1 mb-4 border-b" style={{borderColor:'var(--border)'}}>
        {ACCOM_CATEGORIES_V2.map(c => (
          <button key={c}
            className="px-4 py-2 text-sm border-b-2 transition-colors"
            style={{
              borderColor: category === c ? '#c20206' : 'transparent',
              fontWeight: category === c ? 600 : 400,
              color: category === c ? '#c20206' : '#4a4a4a'
            }}
            onClick={() => setCategory(c)}
          >{c}</button>
        ))}
      </div>

      {/* 숙소 카드 그리드 */}
      {filtered.length === 0 ? (
        <div className="notion-card p-12 text-center text-gray-400 text-sm">등록된 {category}이(가) 없습니다.</div>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          {filtered.map(a => {
            const totalRooms = (a.rooms||[]).length;
            const occupied = (a.rooms||[]).reduce((sum, r) => sum + (r.currentOccupants||[]).length, 0);
            const buppOccupied = (a.rooms||[]).reduce((sum, r) => sum + (r.currentOccupants||[]).filter(o => !o.unknownStudent && o.studentId).length, 0);
            return (
              <div key={a.id} className="notion-card overflow-hidden cursor-pointer hover:shadow-md transition" onClick={() => setOpenId(a.id)}>
                {a.photos?.[0] && (
                  <div style={{ height:140, background:`url(${a.photos[0]}) center/cover`, borderBottom:'1px solid var(--border)' }}/>
                )}
                <div className="p-4">
                  <div className="flex items-start justify-between gap-2">
                    <div className="flex-1">
                      <div className="font-semibold">{a.name}</div>
                      {a.subCategory && <div className="mt-1"><Badge value={a.subCategory}/></div>}
                      {a.address && <div className="text-xs text-gray-500 mt-1">📍 {a.address}</div>}
                    </div>
                    <button className="btn-danger text-xs" onClick={(e) => { e.stopPropagation(); removeAccom(a.id); }}>삭제</button>
                  </div>
                  <div className="grid grid-cols-3 gap-2 mt-3 text-center text-xs">
                    <div className="p-2 rounded" style={{background:'#faf7f3'}}>
                      <div className="text-gray-500">방</div>
                      <div className="font-bold">{totalRooms}</div>
                    </div>
                    <div className="p-2 rounded" style={{background:'#faf7f3'}}>
                      <div className="text-gray-500">거주</div>
                      <div className="font-bold">{occupied}</div>
                    </div>
                    <div className="p-2 rounded" style={{background:'#fbe0e0'}}>
                      <div style={{color:'#760305'}}>BUPP</div>
                      <div className="font-bold" style={{color:'#c20206'}}>{buppOccupied}</div>
                    </div>
                  </div>
                  {(() => {
                    const fees = (a.rooms||[]).map(r => r.monthlyFee).filter(Boolean);
                    if (fees.length === 0) return null;
                    const unique = Array.from(new Set(fees));
                    return <div className="mt-3 text-sm" style={{color:'#c20206'}}>💰 {unique.join(' / ')}</div>;
                  })()}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

/* ============================================================
   🚐 라이드 스케줄 통합 페이지 — 모든 학생의 출입국 일정 한 곳 관리
   사이드바 메뉴 (브듀쌤+ 만 접근), 학생 숙소 탭의 travelInfo와 양방향 동기화
   ============================================================ */

// 구글 캘린더 추가 URL 생성 — OAuth 없이 클릭 한 번으로 이벤트 미리채움
const toGoogleCalendarUrl = (event, studentName) => {
  if (!event.date) return null;
  const isArrival = event.type === 'arrival';
  const timeStr = (isArrival ? event.arrivalTime : event.departureTime) || '12:00';
  const [hh, mm] = timeStr.split(':').map(x => parseInt(x, 10) || 0);
  const start = new Date(event.date + 'T00:00:00');
  start.setHours(hh, mm, 0, 0);
  const end = new Date(start.getTime() + 60 * 60 * 1000); // +1시간
  const fmtUTC = (d) => d.toISOString().replace(/[-:]/g, '').replace(/\.\d+/, '');
  const title = isArrival
    ? `🛬 픽업: ${studentName} ${event.flightNumber || ''}`.trim()
    : `🛫 드롭오프: ${studentName} ${event.flightNumber || ''}`.trim();
  const details = [
    `학생: ${studentName}`,
    `유형: ${isArrival ? '도착 (Arrival)' : `출국 (Departure${event.purpose ? ' · ' + event.purpose : ''})`}`,
    `항공편: ${event.flightNumber || '—'}`,
    `시간: ${timeStr}`,
    `터미널: ${event.terminal || '—'}`,
    `담당: ${(isArrival ? event.pickupPerson : event.dropoffPerson) || '—'} ${(isArrival ? event.pickupContact : event.dropoffContact) || ''}`.trim(),
    `라이드: ${event.rideType || '—'}${event.rideFee ? ` ($${event.rideFee})` : ''}`,
    event.memo ? `메모: ${event.memo}` : ''
  ].filter(Boolean).join('\n');
  const location = `Toronto Pearson Airport${event.terminal ? ` · Terminal ${event.terminal}` : ''}`;
  const params = new URLSearchParams({
    text: title,
    dates: `${fmtUTC(start)}/${fmtUTC(end)}`,
    details: details,
    location: location
  });
  return `https://calendar.google.com/calendar/r/eventedit?${params.toString()}`;
};

const RideSchedulePage = ({ students, onUpdateStudent }) => {
  const [viewMode, setViewMode] = useState('list'); // list | calendar
  const [currentMonth, setCurrentMonth] = useState(() => {
    const d = new Date();
    return new Date(d.getFullYear(), d.getMonth(), 1);
  });
  const [filter, setFilter] = useState({ kind: 'all', rideType: '', search: '' });
  const [editing, setEditing] = useState(null); // { studentId, type, record }

  // 모든 학생의 travelInfo 이벤트를 flatten
  const allEvents = React.useMemo(() => {
    const events = [];
    students.forEach(s => {
      (s.travelInfo?.arrivals || []).forEach(t => events.push({
        ...t, studentId: s.id, studentName: s.koreanName || s.englishName || '이름없음', type: 'arrival', time: t.arrivalTime
      }));
      (s.travelInfo?.departures || []).forEach(t => events.push({
        ...t, studentId: s.id, studentName: s.koreanName || s.englishName || '이름없음', type: 'departure', time: t.departureTime
      }));
    });
    return events.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  }, [students]);

  const filtered = allEvents.filter(e => {
    if (filter.kind === 'arrival' && e.type !== 'arrival') return false;
    if (filter.kind === 'departure' && e.type !== 'departure') return false;
    if (filter.rideType && e.rideType !== filter.rideType) return false;
    if (filter.search) {
      const q = filter.search.toLowerCase();
      const hit = (e.studentName || '').toLowerCase().includes(q)
               || (e.flightNumber || '').toLowerCase().includes(q);
      if (!hit) return false;
    }
    return true;
  });

  // 통계
  const todayStr = new Date().toISOString().slice(0, 10);
  const upcoming = allEvents.filter(e => e.date >= todayStr);
  const upcomingThisMonth = upcoming.filter(e => {
    const ym = `${currentMonth.getFullYear()}-${String(currentMonth.getMonth()+1).padStart(2,'0')}`;
    return (e.date || '').startsWith(ym);
  });
  const totalFreeValue = allEvents.filter(e => e.rideType === '무료서비스')
    .reduce((sum, e) => sum + (parseFloat(e.rideFee) || 0), 0);
  const unpaidCount = allEvents.filter(e => e.rideType === '유료' && e.feeStatus !== '입금됨' && e.feeStatus !== '면제').length;

  // 캘린더 뷰 계산
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const monthLabel = `${year}년 ${month + 1}월`;
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDayOfWeek = firstDay.getDay();
  const daysInMonth = lastDay.getDate();
  const monthStr = `${year}-${String(month + 1).padStart(2, '0')}`;
  const monthEvents = filtered.filter(e => (e.date || '').startsWith(monthStr));
  const eventsByDate = {};
  monthEvents.forEach(e => {
    if (!eventsByDate[e.date]) eventsByDate[e.date] = [];
    eventsByDate[e.date].push(e);
  });
  const cells = [];
  for (let i = 0; i < startDayOfWeek; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${monthStr}-${String(d).padStart(2, '0')}`;
    cells.push({ day: d, dateStr: ds, events: eventsByDate[ds] || [] });
  }
  while (cells.length % 7 !== 0) cells.push(null);
  const dayLabels = ['일','월','화','수','목','금','토'];
  const goMonth = (delta) => setCurrentMonth(new Date(year, month + delta, 1));
  const goToday = () => { const d = new Date(); setCurrentMonth(new Date(d.getFullYear(), d.getMonth(), 1)); };

  // 추가/수정 저장
  const saveEditing = () => {
    if (!editing || !editing.studentId) { alert('학생을 선택해주세요.'); return; }
    if (!editing.record.date) { alert('날짜를 입력해주세요.'); return; }
    const student = students.find(s => s.id === editing.studentId);
    if (!student) return;
    const travel = student.travelInfo || { arrivals: [], departures: [] };
    const key = editing.type === 'arrival' ? 'arrivals' : 'departures';
    const list = travel[key] || [];
    const next = editing.record.id
      ? list.map(x => x.id === editing.record.id ? editing.record : x)
      : [...list, { ...editing.record, id: uid() }];
    onUpdateStudent({ ...student, travelInfo: { ...travel, [key]: next } });
    setEditing(null);
  };
  const deleteEvent = (event) => {
    if (!confirm('이 일정을 삭제할까요?')) return;
    const student = students.find(s => s.id === event.studentId);
    if (!student) return;
    const travel = student.travelInfo || { arrivals: [], departures: [] };
    const key = event.type === 'arrival' ? 'arrivals' : 'departures';
    onUpdateStudent({ ...student, travelInfo: { ...travel, [key]: (travel[key] || []).filter(x => x.id !== event.id) } });
  };

  const startNew = (type) => {
    const base = { id:'', date:'', flightNumber:'', terminal:'', rideType:'무료서비스', rideFee:'', feeStatus:'', memo:'' };
    if (type === 'arrival') setEditing({ studentId:'', type:'arrival', record: { ...base, arrivalTime:'', pickupPerson:'', pickupContact:'' } });
    else setEditing({ studentId:'', type:'departure', record: { ...base, departureTime:'', dropoffPerson:'', dropoffContact:'', purpose:'여름 귀국' } });
  };
  const startEdit = (event) => {
    const { studentId, studentName, type, time, ...record } = event;
    setEditing({ studentId, type, record });
  };

  const rideBadgeStyle = (rt) => {
    if (rt === '무료서비스') return { bg:'var(--good-bg)', color:'var(--good)' };
    if (rt === '유료') return { bg:'var(--warn-bg)', color:'var(--warn)' };
    return { bg:'var(--line-soft)', color:'var(--muted)' };
  };

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">🚐 라이드 스케줄</h1>
          <p className="text-sm text-gray-500 mt-1">
            전체 {allEvents.length}건 · 다가오는 {upcoming.length}건 · 이번 달 {upcomingThisMonth.length}건 · 브듀쌤 이상만 접근
          </p>
        </div>
        <div className="flex items-center gap-2">
          <button className="btn-ghost" onClick={() => startNew('arrival')}>+ 도착 추가</button>
          <button className="btn-primary" onClick={() => startNew('departure')}>+ 출국 추가</button>
        </div>
      </div>

      {/* 통계 카드 */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
        <div className="notion-card p-3 text-center">
          <div className="text-xs text-gray-500">🛬 다가오는 도착</div>
          <div className="text-xl font-bold mt-1" style={{ color:'#0b6e99' }}>{upcoming.filter(e => e.type === 'arrival').length}건</div>
        </div>
        <div className="notion-card p-3 text-center">
          <div className="text-xs text-gray-500">🛫 다가오는 출국</div>
          <div className="text-xl font-bold mt-1" style={{ color:'#a47007' }}>{upcoming.filter(e => e.type === 'departure').length}건</div>
        </div>
        <div className="notion-card p-3 text-center">
          <div className="text-xs text-gray-500">🎁 무료 서비스 가치 (전체)</div>
          <div className="text-xl font-bold mt-1" style={{ color:'var(--good)' }}>${totalFreeValue}</div>
        </div>
        <div className="notion-card p-3 text-center">
          <div className="text-xs text-gray-500">💵 미입금 유료 건수</div>
          <div className="text-xl font-bold mt-1" style={{ color: unpaidCount > 0 ? 'var(--alert)' : '#4a4a4a' }}>{unpaidCount}건</div>
        </div>
      </div>

      {/* 필터 + 뷰 토글 */}
      <div className="notion-card p-3 mb-4 flex flex-wrap gap-3 items-end">
        <div className="w-40">
          <div className="field-label">유형</div>
          <Select value={filter.kind} onChange={(v) => setFilter({...filter, kind:v})} options={['all','arrival','departure']}/>
        </div>
        <div className="w-44">
          <div className="field-label">라이드</div>
          <Select value={filter.rideType} onChange={(v) => setFilter({...filter, rideType:v})} options={RIDE_TYPES} placeholder="전체"/>
        </div>
        <div className="flex-1 min-w-[200px]">
          <div className="field-label">검색</div>
          <input className="notion-input w-full" placeholder="학생명·항공편..." value={filter.search} onChange={(e) => setFilter({...filter, search:e.target.value})}/>
        </div>
        <div className="flex gap-1">
          <button className={`tab-btn ${viewMode === 'list' ? 'active':''}`} onClick={() => setViewMode('list')}>📋 리스트</button>
          <button className={`tab-btn ${viewMode === 'calendar' ? 'active':''}`} onClick={() => setViewMode('calendar')}>📆 캘린더</button>
        </div>
      </div>

      {/* 캘린더 뷰 */}
      {viewMode === 'calendar' && (
        <div className="notion-card overflow-hidden">
          <div className="px-5 py-4 flex items-center justify-between" style={{ background:'#faf7f3', borderBottom:'1px solid var(--border)' }}>
            <div className="flex items-center gap-2">
              <button className="btn-ghost" onClick={() => goMonth(-1)}>◀</button>
              <div className="font-semibold text-base px-3">{monthLabel}</div>
              <button className="btn-ghost" onClick={() => goMonth(1)}>▶</button>
            </div>
            <button className="btn-ghost text-xs" onClick={goToday}>오늘로</button>
          </div>
          <div className="p-4">
            <div className="grid grid-cols-7 gap-1 mb-1">
              {dayLabels.map((d, i) => (
                <div key={d} className="text-xs text-center font-semibold py-1" style={{ color: i === 0 ? '#c20206' : i === 6 ? '#0b6e99' : '#4a4a4a' }}>{d}</div>
              ))}
            </div>
            <div className="grid grid-cols-7 gap-1">
              {cells.map((c, i) => (
                <div key={i} className="rounded p-2 text-xs"
                  style={{
                    minHeight: 100,
                    background: !c ? 'transparent' : (c.dateStr === todayStr ? '#fbe0e0' : '#fff'),
                    border: c ? '1px solid var(--border)' : 'none'
                  }}>
                  {c && (
                    <Fragment>
                      <div className="text-right text-xs font-semibold mb-1" style={{ color: c.dateStr === todayStr ? '#c20206' : '#4a4a4a' }}>{c.day}</div>
                      {c.events.map((e, idx) => (
                        <div key={idx}
                          onClick={() => startEdit(e)}
                          className="cursor-pointer p-1 mb-1 rounded text-xs leading-tight"
                          style={{
                            background: e.type === 'arrival' ? '#e4f1f7' : '#fbf1d8',
                            color: e.type === 'arrival' ? '#0b6e99' : '#a47007'
                          }}
                          title={`${e.type === 'arrival' ? '🛬 도착' : '🛫 출국'} · ${e.studentName} · ${e.flightNumber || ''} ${e.time || ''}`}>
                          <div className="font-medium truncate">{e.type === 'arrival' ? '🛬' : '🛫'} {e.studentName}</div>
                          <div className="truncate" style={{ opacity:0.85 }}>{e.flightNumber || ''} {e.time || ''}</div>
                        </div>
                      ))}
                    </Fragment>
                  )}
                </div>
              ))}
            </div>
            <div className="flex items-center gap-4 mt-3 text-xs text-gray-500">
              <div className="flex items-center gap-1"><span className="inline-block w-3 h-3 rounded" style={{background:'#e4f1f7'}}/>도착</div>
              <div className="flex items-center gap-1"><span className="inline-block w-3 h-3 rounded" style={{background:'#fbf1d8'}}/>출국</div>
              <div className="text-gray-400">셀 클릭 → 일정 수정</div>
            </div>
          </div>
        </div>
      )}

      {/* 리스트 뷰 */}
      {viewMode === 'list' && (
        <div className="notion-card overflow-hidden">
          {filtered.length === 0 ? (
            <div className="text-center py-12 text-gray-400 text-sm">조건에 맞는 일정이 없습니다.</div>
          ) : (
            <table className="w-full text-sm">
              <thead><tr style={{ background:'var(--line-soft)' }}>
                <th className="table-th">날짜</th>
                <th className="table-th">유형</th>
                <th className="table-th">학생</th>
                <th className="table-th">항공편</th>
                <th className="table-th">시간</th>
                <th className="table-th">터미널</th>
                <th className="table-th">담당자</th>
                <th className="table-th">라이드</th>
                <th className="table-th">비용</th>
                <th className="table-th">목적</th>
                <th className="table-th text-right">액션</th>
              </tr></thead>
              <tbody>
                {filtered.map(e => {
                  const rs = rideBadgeStyle(e.rideType);
                  const isPast = e.date < todayStr;
                  const calUrl = toGoogleCalendarUrl(e, e.studentName);
                  return (
                    <tr key={`${e.type}-${e.id}`} className="row-hover" style={{ borderTop:'1px solid var(--line-soft)', opacity: isPast ? 0.6 : 1 }}>
                      <td className="table-td font-medium">{e.date || '—'}</td>
                      <td className="table-td">
                        {e.type === 'arrival'
                          ? <span className="hd-pill" style={{ background:'#e4f1f7', color:'#0b6e99' }}>🛬 도착</span>
                          : <span className="hd-pill" style={{ background:'#fbf1d8', color:'#a47007' }}>🛫 출국</span>}
                      </td>
                      <td className="table-td font-medium">{e.studentName}</td>
                      <td className="table-td font-mono text-xs">{e.flightNumber || '—'}</td>
                      <td className="table-td text-xs">{e.time || '—'}</td>
                      <td className="table-td text-xs">{e.terminal || '—'}</td>
                      <td className="table-td text-xs">
                        {(e.type === 'arrival' ? e.pickupPerson : e.dropoffPerson) || '—'}
                        {(e.type === 'arrival' ? e.pickupContact : e.dropoffContact) && (
                          <div className="text-gray-500">{e.type === 'arrival' ? e.pickupContact : e.dropoffContact}</div>
                        )}
                      </td>
                      <td className="table-td">
                        <span className="hd-pill" style={{ background: rs.bg, color: rs.color }}>{e.rideType || '—'}</span>
                      </td>
                      <td className="table-td text-xs">
                        {e.rideFee ? `$${e.rideFee}` : '—'}
                        {e.feeStatus && <div className="text-gray-500">{e.feeStatus}</div>}

                      <td className="table-td text-xs">{e.type === 'departure' ? (e.purpose || '—') : '—'}</td>

                <Select value={editing.record.feeStatus} onChange={(v) => setEditing({...editing, record:{...editing.record, feeStatus:v}})} options={FEE_STATUSES} placeholder="—"/>

          </div>

      )}
    </div>
  );
};

const CurrentUserSwitcher = ({ members, currentUserId, onChange }) => {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  const me = members.find(m => m.id === currentUserId) || members[0];
  if (!me) return null;
  const activeMembers = members.filter(m => m.active);
  // 역할별 그룹
  const byRole = {};
  ROLES.forEach(r => byRole[r] = activeMembers.filter(m => m.role === r));
  return (
    <div ref={ref} className="relative">
      <button
        type="button"
        className="flex items-center gap-2 px-3 py-1.5 rounded-md hover:bg-gray-100"
        style={{ border:'1px solid #ebebea' }}
        onClick={() => setOpen(!open)}
      >
        <div className="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold"
          style={{ background:'#ebebea', color:'#37352f' }}>
          {me.name.slice(0,1)}
        </div>
        <div className="text-left text-sm leading-tight">
          <div className="font-medium">{me.name}</div>
          <div className="text-xs text-gray-500">{ROLE_LABEL[me.role]}</div>
        </div>
        <span className="text-gray-400 text-xs ml-1">▾</span>

/* ============================================================
   멤버 관리 페이지
   ============================================================ */
const MemberList = ({ members, students, onChange }) => {
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState({ role:'', active:'' });
  const [editing, setEditing] = useState(null);
  const filtered = members.filter(m => {
    const q = search.trim().toLowerCase();
    if (q && !(m.name||'').toLowerCase().includes(q) && !(m.email||'').toLowerCase().includes(q)) return false;
    if (filters.role && m.role !== filters.role) return false;
    if (filters.active === 'Y' && !m.active) return false;
    if (filters.active === 'N' && m.active) return false;
    return true;
  });
  const upsert = (d) => {
    if (!d.name?.trim()) { alert('이름을 입력해주세요.'); return; }
    if (!d.role) { alert('역할을 선택해주세요.'); return; }
    const next = d.id ? members.map(m => m.id === d.id ? d : m) : [...members, { ...d, id: uid() }];
    onChange(next);
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 멤버를 삭제하시겠습니까?')) return;
    onChange(members.filter(m => m.id !== id));
  };

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">멤버 관리</h1>
          <p className="text-sm text-gray-500 mt-1">전체 {members.length}명 · 필터 결과 {filtered.length}명</p>
        </div>
        <div className="flex items-center gap-2">
          <input className="notion-input w-64" placeholder="이름·이메일 검색..." value={search} onChange={(e) => setSearch(e.target.value)}/>
          <button className="btn-primary" onClick={() => setEditing({ id:'', name:'', email:'', role:'', linkedStudentIds:[], active:true, memo:'' })}>+ 새 멤버 추가</button>
        </div>
      </div>

      <div className="notion-card p-4 mb-4">
        <div className="grid grid-cols-3 gap-3">
          <Field label="역할"><Select value={filters.role} onChange={(v) => setFilters({...filters, role:v})} options={ROLES.map(r => ROLE_LABEL[r])} placeholder="전체"/></Field>
          <Field label="활성 여부"><Select value={filters.active} onChange={(v) => setFilters({...filters, active:v})} options={['Y','N']} placeholder="전체"/></Field>
        </div>
      </div>

      {editing && (
        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold mb-4">{editing.id ? '멤버 수정' : '새 멤버 추가'}</h3>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
            <Field label="이름 *"><TextInput value={editing.name} onChange={(v) => setEditing({...editing, name:v})}/></Field>
            <Field label="이메일"><TextInput value={editing.email} onChange={(v) => setEditing({...editing, email:v})} type="email"/></Field>
            <Field label="역할 *">
              <Select
                value={editing.role ? ROLE_LABEL[editing.role] : ''}
                onChange={(v) => setEditing({...editing, role: ROLES.find(r => ROLE_LABEL[r] === v) || ''})}
                options={ROLES.map(r => ROLE_LABEL[r])}
                placeholder="역할 선택"
              />
            </Field>
            <Field label="연결된 학생" span={3}>
              <MultiSelect
                value={editing.linkedStudentIds || []}
                onChange={(v) => setEditing({...editing, linkedStudentIds:v})}
                options={students}
                getLabel={(s) => `${s.koreanName} (${s.englishName || s.id})`}
                getValue={(s) => s.id}
                placeholder="학생/학부모/튜터/파트너 역할은 학생 연결 필요"
              />
              <div className="text-xs text-gray-500 mt-1">관리자·브듀쌤은 전체 학생 접근 가능 — 연결 없어도 됨</div>
            </Field>
            <Field label="활성 상태">
              <div className="pt-2"><Toggle value={editing.active} onChange={(v) => setEditing({...editing, active:v})} label="활성"/></div>
            </Field>
            <Field label="메모" span={2}><TextInput value={editing.memo} onChange={(v) => setEditing({...editing, memo:v})}/></Field>
            <div className="col-span-3 flex justify-end gap-2">
              <button className="btn-ghost" onClick={() => setEditing(null)}>취소</button>
              <button className="btn-primary" onClick={() => upsert(editing)}>저장</button>
            </div>
          </div>
        </div>
      )}

      <div className="notion-card overflow-hidden">
        <table className="w-full">
          <thead><tr>
            <th className="table-th">이름</th>
            <th className="table-th">이메일</th>
            <th className="table-th">역할</th>
            <th className="table-th">연결 학생</th>
            <th className="table-th">활성</th>
            <th className="table-th">메모</th>
            <th className="table-th"></th>
          </tr></thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan="7" className="text-center py-12 text-gray-400 text-sm">조건에 맞는 멤버가 없습니다.</td></tr>
            ) : filtered.map(m => {
              const linked = (m.linkedStudentIds || []).map(id => students.find(s => s.id === id)).filter(Boolean);
              return (
                <tr key={m.id} className="row-hover" style={{ opacity: m.active ? 1 : 0.5 }}>
                  <td className="table-td font-medium">{m.name}</td>
                  <td className="table-td text-gray-600 text-sm">{m.email || '—'}</td>
                  <td className="table-td"><Badge value={ROLE_LABEL[m.role]}/></td>
                  <td className="table-td text-sm">
                    {linked.length === 0
                      ? <span className="text-gray-300 text-xs">{STUDENT_SCOPE[m.role] === 'all' ? '전체' : '—'}</span>
                      : <div className="flex flex-wrap gap-1">{linked.map(s => <span key={s.id} className="badge b-gray">{s.koreanName}</span>)}</div>
                    }
                  </td>
                  <td className="table-td">{m.active ? <span className="badge b-green">활성</span> : <span className="badge b-gray">비활성</span>}</td>
                  <td className="table-td text-gray-600 text-xs">{m.memo || '—'}</td>
                  <td className="table-td text-right whitespace-nowrap">
                    <button className="btn-ghost" onClick={() => setEditing(m)}>수정</button>
                    <button className="btn-danger" onClick={() => remove(m.id)}>삭제</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

/* ============================================================
   기수 대시보드 — 데드라인 우선순위 일정 + 학생별 토글
   ============================================================ */
const CohortDashboard = ({ students, members, universities, programs, trackGroups, subjects, schools, onUpdateStudent }) => {
  // 사용 가능한 기수 목록
  const allCohorts = Array.from(new Set(students.map(s => s.cohort).filter(Boolean))).sort();
  const [cohort, setCohort] = useState(allCohorts[0] || '');
  const [country, setCountry] = useState('CA');
  const [expandedStudent, setExpandedStudent] = useState(null);

  // 첨삭 선생님 = active 관리자/브듀쌤
  const reviewers = members.filter(m => m.active && (m.role === 'admin' || m.role === 'bu_staff'));

  // 기수 학생 전체
  const cohortStudents = students.filter(s => s.cohort === cohort);

  // 모든 지원 레코드 (학생 정보 첨부)
  const allApps = cohortStudents.flatMap(s =>
    (s.universityApplications || [])
      .filter(app => (app.countryGroup || 'CA') === country)
      .map(app => ({ ...app, _studentId: s.id, _studentName: s.koreanName }))
  );

  // 데드라인 = program.supplementaryDeadline
  const getDeadline = (app) => programs.find(p => p.id === app.programId)?.supplementaryDeadline || '';

  // 데드라인별 그룹
  const grouped = {};
  allApps.forEach(app => {
    const d = getDeadline(app) || '미지정';
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(app);
  });
  const sortedDates = Object.keys(grouped).sort((a, b) => {
    if (a === '미지정') return 1;
    if (b === '미지정') return -1;
    return a.localeCompare(b);
  });

  // 학생 application 업데이트 (체크박스·review 인라인 편집용)
  const patchApp = (studentId, appId, patch) => {
    const stu = students.find(s => s.id === studentId);
    if (!stu) return;
    const apps = (stu.universityApplications || []).map(a => a.id === appId ? { ...a, ...patch } : a);
    onUpdateStudent({ ...stu, universityApplications: apps });
  };
  const setReview = (studentId, appId, reviewerId, note) => {
    const stu = students.find(s => s.id === studentId);
    if (!stu) return;
    const apps = (stu.universityApplications || []).map(a => {
      if (a.id !== appId) return a;
      return { ...a, reviews: { ...(a.reviews || {}), [reviewerId]: note } };
    });
    onUpdateStudent({ ...stu, universityApplications: apps });
  };

  // 학생별 요약 통계
  const studentStats = (s) => {
    const apps = (s.universityApplications || []).filter(app => (app.countryGroup || 'CA') === country);
    return {
      total: apps.length,
      submitted: apps.filter(a => a.submissionDate).length,
      accepted: apps.filter(a => a.status === '합격').length,
      finalChoice: apps.filter(a => a.finalChoice).length,
      completed: apps.filter(a => a.completed).length
    };
  };

  return (
    <div className="max-w-[1700px] mx-auto px-8 py-6">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">📅 기수 대시보드</h1>
          <p className="text-sm text-gray-500 mt-1">데드라인 우선순위 일정 + 학생별 지원 현황을 한 페이지에서 관리합니다.</p>
        </div>
      </div>

      {/* 기수·국가 선택 */}
      <div className="notion-card p-4 mb-4">
        <div className="grid grid-cols-2 gap-4">
          <Field label="기수">
            <Select value={cohort} onChange={setCohort} options={allCohorts} placeholder="기수 선택"/>
          </Field>
          <Field label="국가 그룹">
            <RefSelect value={country} onChange={setCountry} options={COUNTRIES.map(c => ({ id:c, label:COUNTRY_LABEL[c] }))} placeholder="국가 선택"/>
          </Field>
        </div>
        {cohort && (
          <div className="mt-3 text-sm text-gray-600">
            <strong>{cohort}</strong> · {COUNTRY_LABEL[country]} ·
            학생 <strong>{cohortStudents.length}명</strong> ·
            지원 <strong>{allApps.length}건</strong> ·
            데드라인 <strong>{sortedDates.length}개</strong>
          </div>
        )}
      </div>

      {!cohort && (
        <div className="notion-card p-8 text-center text-gray-400 text-sm">기수를 선택해주세요.</div>
      )}

      {cohort && cohortStudents.length === 0 && (
        <div className="notion-card p-8 text-center text-gray-400 text-sm">
          {cohort} 기수에 등록된 학생이 없습니다. 학생 상세 → 기본정보에서 "기수"를 설정해주세요.
        </div>
      )}

      {cohort && cohortStudents.length > 0 && (
        <Fragment>
          {/* 데드라인 우선순위 일정 */}
          <Section title="🎯 데드라인 우선순위 일정" defaultOpen={true} count={allApps.length}>
            {allApps.length === 0 ? (
              <div className="text-sm text-gray-400 p-4">이 기수의 {COUNTRY_LABEL[country]} 지원 데이터가 없습니다.</div>
            ) : sortedDates.map(date => {
              const apps = grouped[date];
              const completedCount = apps.filter(a => a.completed).length;
              return (
                <div key={date} className="mb-4">
                  <div className="flex items-center gap-2 mb-2">
                    <h4 className="font-semibold">
                      📌 {date === '미지정' ? '데드라인 미지정' : date.replace(/-/g, '년 ').replace(/년 (\d+)년 (\d+)$/, '년 $1월 $2일')}
                    </h4>
                    <span className="badge b-gray text-xs">{apps.length}건</span>
                    {completedCount > 0 && <span className="badge b-green text-xs">완료 {completedCount}</span>}
                  </div>
                  <div className="notion-card overflow-hidden">
                    <div className="overflow-auto">
                      <table className="w-full">
                        <thead><tr>
                          <th className="table-th" style={{width:50}}>완료</th>
                          <th className="table-th">학생</th>
                          <th className="table-th">대학</th>
                          <th className="table-th">전공</th>
                          <th className="table-th">추가서류</th>
                          <th className="table-th">데드라인</th>
                          {reviewers.map(r => (
                            <th key={r.id} className="table-th" style={{minWidth:160}}>{r.name}</th>
                          ))}
                        </tr></thead>
                        <tbody>
                          {apps.map(app => {
                            const uni = universities.find(u => u.id === app.universityId);
                            const prog = programs.find(p => p.id === app.programId);
                            return (
                              <tr key={app.id} className="row-hover" style={app.completed ? { background:'#fafaf9', opacity:0.7 } : {}}>
                                <td className="table-td text-center">
                                  <input type="checkbox"
                                    checked={!!app.completed}
                                    onChange={(e) => patchApp(app._studentId, app.id, { completed: e.target.checked })}
                                    className="w-4 h-4 accent-blue-600 cursor-pointer"
                                  />
                                </td>
                                <td className="table-td text-sm font-medium">{app._studentName}</td>
                                <td className="table-td text-sm">{uni?.shortName || uni?.name || '—'}</td>
                                <td className="table-td text-sm" style={{maxWidth:260}}>{prog?.name || '—'}</td>
                                <td className="table-td text-xs text-gray-600">{prog?.supplementaryType || '—'}</td>
                                <td className="table-td text-xs">{prog?.supplementaryDeadline || '—'}</td>
                                {reviewers.map(r => (
                                  <td key={r.id} className="table-td">
                                    <input
                                      className="notion-input text-xs"
                                      style={{ padding:'4px 6px', fontSize:12 }}
                                      value={(app.reviews && app.reviews[r.id]) || ''}
                                      onChange={(e) => setReview(app._studentId, app.id, r.id, e.target.value)}
                                      placeholder="첨삭 메모"
                                    />
                                  </td>
                                ))}
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              );
            })}
          </Section>

          {/* 학생별 토글 */}
          <Section title="👥 학생별 지원 현황" defaultOpen={true} count={cohortStudents.length}>
            <div className="space-y-2">
              {cohortStudents.map(s => {
                const stats = studentStats(s);
                const isOpen = expandedStudent === s.id;
                const studentApps = (s.universityApplications || []).filter(app => (app.countryGroup || 'CA') === country);
                return (
                  <div key={s.id} className="notion-card overflow-hidden">
                    <div
                      className="px-4 py-3 cursor-pointer flex items-center justify-between hover:bg-gray-50"
                      onClick={() => setExpandedStudent(isOpen ? null : s.id)}
                      style={{ borderBottom: isOpen ? '1px solid #ebebea' : 'none' }}
                    >
                      <div className="flex items-center gap-3">
                        <span style={{ display:'inline-block', transition:'transform .15s', transform: isOpen ? 'rotate(90deg)' : 'rotate(0)' }}>▶</span>
                        <span className="font-semibold">{s.koreanName}</span>
                        <span className="text-xs text-gray-400">{s.englishName}</span>
                        <Badge value={s.currentSchool}/>
                      </div>
                      <div className="flex items-center gap-2 text-xs">
                        <span className="badge b-gray">지원 {stats.total}</span>
                        {stats.submitted > 0 && <span className="badge b-blue">제출 {stats.submitted}</span>}
                        {stats.accepted > 0 && <span className="badge b-green">합격 {stats.accepted}</span>}
                        {stats.finalChoice > 0 && <span className="badge b-purple">최종 {stats.finalChoice}</span>}
                      </div>
                    </div>
                    {isOpen && (
                      <div className="p-4 bg-gray-50">
                        {studentApps.length === 0 ? (
                          <div className="text-sm text-gray-400 text-center py-4">이 국가 그룹에 등록된 지원 데이터가 없습니다.</div>
                        ) : (
                          <div className="notion-card overflow-hidden bg-white">
                            <div className="overflow-auto">
                              <table className="w-full text-sm">
                                <thead><tr>
                                  <th className="table-th" style={{width:50}}>#</th>
                                  <th className="table-th">최종</th>
                                  <th className="table-th">대학</th>
                                  <th className="table-th">전공</th>
                                  <th className="table-th">상태</th>
                                  <th className="table-th">장학금</th>
                                  <th className="table-th">추가서류</th>
                                  <th className="table-th">제출</th>
                                  <th className="table-th">데드라인</th>
                                </tr></thead>
                                <tbody>
                                  {[...studentApps].sort((a, b) => (parseInt(a.rank)||999) - (parseInt(b.rank)||999)).map(app => {
                                    const uni = universities.find(u => u.id === app.universityId);
                                    const prog = programs.find(p => p.id === app.programId);
                                    return (
                                      <tr key={app.id} className="row-hover" style={app.finalChoice ? { background:'#f5f1fa' } : {}}>
                                        <td className="table-td text-center text-gray-500 text-xs">{app.rank || '—'}</td>
                                        <td className="table-td">{app.finalChoice ? <span className="badge b-purple">✓</span> : <span className="text-gray-300 text-xs">—</span>}</td>
                                        <td className="table-td text-sm">{uni?.shortName || uni?.name || '—'}</td>
                                        <td className="table-td text-sm" style={{maxWidth:240}}>{prog?.name || '—'}</td>
                                        <td className="table-td"><Badge value={app.status}/></td>
                                        <td className="table-td text-xs text-gray-600">{app.scholarship || '—'}</td>
                                        <td className="table-td text-xs text-gray-600" style={{maxWidth:180}}>{prog?.supplementaryType || '—'}</td>
                                        <td className="table-td text-xs">
                                          {app.submissionDate
                                            ? <span className="badge b-green">{app.submissionDate}</span>
                                            : <span className="text-gray-300">—</span>}
                                        </td>
                                        <td className="table-td text-xs">{prog?.supplementaryDeadline || '—'}</td>
                                      </tr>
                                    );
                                  })}
                                </tbody>
                              </table>
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </Section>
        </Fragment>
      )}
    </div>
  );
};

const SchoolList = ({ schools, onChange }) => {
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState({ type:'', semester:'', province:'' });
  const [editing, setEditing] = useState(null);

  const distinct = (k) => Array.from(new Set(schools.map(s => s[k]).filter(Boolean))).sort();
  const typeOpts = distinct('type');

  const filtered = schools.filter(s => {
    const q = search.trim().toLowerCase();
    if (q && !(s.name||'').toLowerCase().includes(q) && !(s.type||'').toLowerCase().includes(q)) return false;
    if (filters.type && s.type !== filters.type) return false;
    if (filters.semester && s.semesterSystem !== filters.semester) return false;
    if (filters.province && s.province !== filters.province) return false;
    return true;
  });

  const upsert = (d) => {
    if (!d.name?.trim()) { alert('학교명을 입력해주세요.'); return; }

  const remove = (id) => {
    if (!confirm('이 학교를 삭제하시겠습니까? (학생 데이터의 학교 참조는 ID로 유지됩니다)')) return;

    <div className="max-w-[1400px] mx-auto px-8 py-8">

        <div className="flex items-center gap-2">

      <div className="notion-card p-4 mb-4">
        <div className="grid grid-cols-3 gap-3">
          <Field label="학교종류"><Select value={filters.type} onChange={(v) => setFilters({...filters, type:v})} options={typeOpts.length ? typeOpts : SCHOOL_TYPES} placeholder="전체"/></Field>

        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold mb-4">{editing.id ? '학교 수정' : '새 학교 추가'}</h3>

            <Field label="학교명 *"><TextInput value={editing.name} onChange={(v) => setEditing({...editing, name:v})}/></Field>
            <Field label="학교종류"><Select value={editing.type} onChange={(v) => setEditing({...editing, type:v})} options={SCHOOL_TYPES}/></Field>
            <Field label="학기 시스템"><Select value={editing.semesterSystem} onChange={(v) => setEditing({...editing, semesterSystem:v})} options={SEMESTER_SYSTEMS}/></Field>
            <Field label="교육과정"><Select value={editing.province} onChange={(v) => setEditing({...editing, province:v})} options={PROVINCES}/></Field>

              <MultiSelect value={editing.offerings} onChange={(v) => setEditing({...editing, offerings:v})} options={SCHOOL_OFFERINGS} placeholder="AP / IB / 정규 등"/>
            </Field>
            <Field label="메모" span={3}><TextArea value={editing.memo} onChange={(v) => setEditing({...editing, memo:v})}/></Field>

const SubjectList = ({ subjects, schools, onChange }) => {
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState({ grade:'', province:'', school:'' });
  const [editing, setEditing] = useState(null);

  const filtered = subjects.filter(s => {
    const q = search.trim().toLowerCase();
    if (q && !(s.code||'').toLowerCase().includes(q) && !(s.name||'').toLowerCase().includes(q)) return false;
    if (filters.grade && s.grade !== filters.grade) return false;
    if (filters.province && s.province !== filters.province) return false;
    if (filters.school && !(s.schoolIds||[]).includes(filters.school)) return false;
    return true;
  });

  const subjectLabel = (sub) => `${sub.code} — ${sub.name} (G${sub.grade})`;

  const upsert = (d) => {
    if (!d.code?.trim() || !d.name?.trim()) { alert('과목코드와 과목명을 입력해주세요.'); return; }
    const next = d.id ? subjects.map(s => s.id === d.id ? d : s) : [...subjects, { ...d, id: uid() }];
    onChange(next);
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 과목을 삭제하시겠습니까?')) return;
    onChange(subjects.filter(s => s.id !== id));
  };

  // 📦 신규 시드 가져오기 — SAMPLE_SUBJECTS에서 누락된 과목만 안전하게 추가
  // 기존 과목은 절대 건드리지 않음 (delete/update 없음, append only)
  const importMissingSeeds = () => {
    const existingCodes = new Set((subjects || []).map(s => (s.code || '').toUpperCase().trim()));
    const missing = SAMPLE_SUBJECTS.filter(seed => {
      const code = (seed.code || '').toUpperCase().trim();
      return code && !existingCodes.has(code);
    });
    if (missing.length === 0) {
      alert('이미 모든 시드 과목이 등록되어 있습니다.');
      return;
    }
    // 누락된 코드 목록 미리보기 (최대 20개)
    const preview = missing.slice(0, 20).map(s => `· ${s.code} ${s.name}`).join('\n');
    const more = missing.length > 20 ? `\n... 외 ${missing.length - 20}개` : '';
    if (!confirm(`신규 시드에서 누락된 과목 ${missing.length}개를 추가합니다.\n기존 과목은 그대로 유지됩니다.\n\n${preview}${more}`)) return;
    // 새 id 부여 (기존 id 충돌 방지)
    const additions = missing.map(s => ({ ...s, id: uid() }));
    onChange([...(subjects || []), ...additions]);
    alert(`${additions.length}개 과목이 추가되었습니다.`);
  };

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">과목 관리</h1>
          <p className="text-sm text-gray-500 mt-1">전체 {subjects.length}개 · 필터 결과 {filtered.length}개 · 시드 정의 {SAMPLE_SUBJECTS.length}개</p>
        </div>
        <div className="flex items-center gap-2">
          <input className="notion-input w-72" placeholder="코드·과목명 검색..." value={search} onChange={(e) => setSearch(e.target.value)} />
          <button className="btn-ghost" onClick={importMissingSeeds} title="시드 정의에서 누락된 과목만 추가 (기존 과목 유지)">📦 신규 시드 가져오기</button>
          <button className="btn-primary" onClick={() => setEditing({ id:'', code:'', name:'', grade:'', credits:1, province:'ON', schoolIds:[], prerequisiteIds:[], materialsLink:'', memo:'' })}>+ 새 과목 추가</button>
        </div>
      </div>

      <div className="notion-card p-4 mb-4">
        <div className="grid grid-cols-3 gap-3">
          <Field label="학년"><Select value={filters.grade} onChange={(v) => setFilters({...filters, grade:v})} options={GRADE_LEVELS} placeholder="전체"/></Field>
          <Field label="교육과정"><Select value={filters.province} onChange={(v) => setFilters({...filters, province:v})} options={PROVINCES} placeholder="전체"/></Field>
          <Field label="제공 학교"><RefSelect value={filters.school} onChange={(v) => setFilters({...filters, school:v})} options={schools.map(s => ({ id: s.id, label: s.name }))} placeholder="전체"/></Field>
        </div>
      </div>

      {editing && (
        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold mb-4">{editing.id ? '과목 수정' : '새 과목 추가'}</h3>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
            <Field label="과목코드 *"><TextInput value={editing.code} onChange={(v) => setEditing({...editing, code:v})} placeholder="MPM2D"/></Field>
            <Field label="과목명 *" span={2}><TextInput value={editing.name} onChange={(v) => setEditing({...editing, name:v})}/></Field>
            <Field label="학년"><Select value={editing.grade} onChange={(v) => setEditing({...editing, grade:v})} options={GRADE_LEVELS}/></Field>
            <Field label="학점"><TextInput type="number" value={editing.credits} onChange={(v) => setEditing({...editing, credits:parseFloat(v)||0})}/></Field>
            <Field label="교육과정"><Select value={editing.province} onChange={(v) => setEditing({...editing, province:v})} options={PROVINCES}/></Field>
            <Field label="제공 학교" span={3}>
              <MultiSelect
                value={editing.schoolIds || []}
                onChange={(v) => setEditing({...editing, schoolIds:v})}
                options={schools}
                getLabel={(o) => o.name}
                getValue={(o) => o.id}
                placeholder="이 과목을 제공하는 학교들"
              />
            </Field>
            <Field label="선수과목" span={3}>
              <MultiSelect
                value={editing.prerequisiteIds || []}
                onChange={(v) => setEditing({...editing, prerequisiteIds:v})}
                options={subjects.filter(s => s.id !== editing.id)}
                getLabel={subjectLabel}
                getValue={(o) => o.id}
                placeholder="선수과목 선택 (없으면 비워두기)"
              />
            </Field>
            <Field label="자료 / 영상 링크" span={3}>
              <TextInput value={editing.materialsLink} onChange={(v) => setEditing({...editing, materialsLink:v})} placeholder="https://... (수업영상·교과설명 자료)"/>
            </Field>
            <Field label="메모" span={3}><TextArea value={editing.memo} onChange={(v) => setEditing({...editing, memo:v})}/></Field>
            <div className="col-span-3 flex justify-end gap-2">
              <button className="btn-ghost" onClick={() => setEditing(null)}>취소</button>
              <button className="btn-primary" onClick={() => upsert(editing)}>저장</button>
            </div>
          </div>
        </div>
      )}

      <div className="notion-card overflow-hidden">
        <div className="overflow-auto" style={{ maxHeight: 'calc(100vh - 320px)' }}>
          <table className="w-full">
            <thead><tr>
              <th className="table-th">과목코드</th>
              <th className="table-th">과목명</th>
              <th className="table-th">학년</th>
              <th className="table-th">학점</th>
              <th className="table-th">교육과정</th>
              <th className="table-th">선수과목</th>
              <th className="table-th">자료</th>
              <th className="table-th"></th>
            </tr></thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr><td colSpan="8" className="text-center py-12 text-gray-400 text-sm">조건에 맞는 과목이 없습니다.</td></tr>
              ) : filtered.map(sub => {
                const preLabels = (sub.prerequisiteIds || [])
                  .map(pid => subjects.find(x => x.id === pid))
                  .filter(Boolean)
                  .map(x => x.code);
                return (
                  <tr key={sub.id} className="row-hover">
                    <td className="table-td font-mono text-sm">{sub.code}</td>
                    <td className="table-td font-medium">{sub.name}</td>
                    <td className="table-td"><Badge value={sub.grade}/></td>
                    <td className="table-td text-gray-600">{sub.credits}</td>
                    <td className="table-td"><Badge value={sub.province}/></td>
                    <td className="table-td">
                      <div className="flex flex-wrap gap-1">
                        {preLabels.length === 0 ? <span className="text-gray-300 text-xs">—</span>
                          : preLabels.map(c => <span key={c} className="badge b-yellow font-mono">{c}</span>)}
                      </div>
                    </td>
                    <td className="table-td">
                      {sub.materialsLink
                        ? <a href={sub.materialsLink} target="_blank" rel="noopener" className="text-blue-600 hover:underline text-xs">🔗 링크</a>
                        : <span className="text-gray-300 text-xs">—</span>}
                    </td>
                    <td className="table-td text-right whitespace-nowrap">
                      <button className="btn-ghost" onClick={() => setEditing(sub)}>수정</button>
                      <button className="btn-danger" onClick={() => remove(sub.id)}>삭제</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

// A. 기본 정보
const TabBasic = ({ s, update, customOptions, addOption, removeOption, schools=[], subjects=[], universities=[], programs=[], role='admin' }) => {
  const categoryOpts = customOptions?.category || [];
  const cohortOpts = customOptions?.cohort || [];
  const schoolOpts = customOptions?.currentSchool || [];
  const isStudent = role === 'student';
  // 학생용 read-only 표시 — 드롭다운/입력창 대신 텍스트
  const Ro = ({ value, fallback = '—' }) => (
    <div className="notion-input flex items-center" style={{background:'#faf7f3', color:'#202731', height:34, padding:'4px 10px'}}>
      {value ? value : <span className="text-gray-400">{fallback}</span>}
    </div>
  );
  // 연락처 set 헬퍼
  const c = s.contact || {};
  const setContact = (k, v) => update({ contact: { ...c, [k]: v } });
  // 학업메타 set 헬퍼 (학교 메모용)
  const a = s.academic || {};
  const setAcademic = (k, v) => update({ academic: { ...a, [k]: v } });

  return (
    <Fragment>
    <Section title="기본 정보">
      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        <Field label="한글 이름">{isStudent ? <Ro value={s.koreanName}/> : <TextInput value={s.koreanName} onChange={(v) => update({ koreanName: v })} />}</Field>
