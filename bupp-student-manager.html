const StudentDetail = ({ student, onBack, onUpdate, onDelete, customOptions, addOption, removeOption, schools, subjects, universities=[], programs=[], trackGroups=[], accommodations=[], invoices=[], role='admin' }) => {
  const allTabs = [
    { id:'basic', label:'A. 기본 정보' },
    { id:'contact', label:'B. 연락처' },
    { id:'academic', label:'C. 학업 메타' },
    { id:'roadmap', label:'📚 대입로드맵' },
    { id:'ec', label:'D. EC 관리' },
    { id:'accom', label:'E. 숙소' },
    { id:'uni', label:'F. 대학 지원' },
    { id:'report', label:'📝 리포트' },
  ];
  const visibleTabIds = VISIBLE_TABS[role] || allTabs.map(t => t.id);
  const tabs = allTabs.filter(t => visibleTabIds.includes(t.id));
  const [tab, setTab] = useState(tabs[0]?.id || 'basic');
  // 역할이 바뀌어 현재 탭이 비활성화되면 첫 번째 가시 탭으로 fallback
  useEffect(() => { if (!visibleTabIds.includes(tab)) setTab(tabs[0]?.id || 'basic'); }, [role]);
  const canEdit = role === 'admin' || role === 'bu_staff';
  const update = (patch) => { if (canEdit) onUpdate({ ...student, ...patch }); };

  const initials = (student.koreanName || student.englishName || '?').slice(0,2);

  return (
    <div className="max-w-[1300px] mx-auto px-8 py-6">
      {/* 상단 바 */}
      <div className="flex items-center justify-between mb-6">
        <button className="btn-ghost" onClick={onBack}>← 학생 목록</button>
        {canEdit && (
          <button className="btn-danger" onClick={() => { if (confirm(`${student.koreanName} 학생 정보를 삭제하시겠습니까?`)) onDelete(student.id); }}>학생 삭제</button>
        )}
      </div>

      {/* 헤더 */}
      <div className="notion-card p-6 mb-4">
        <div className="flex items-center gap-5">
          <div className="w-16 h-16 rounded-full flex items-center justify-center font-bold text-xl"
            style={{ background:'#e8e0d5', color:'#c20206', border:'2px solid #fff', boxShadow:'0 1px 3px rgba(32,39,49,.08)' }}>
            {initials}
          </div>
          <div className="flex-1">
            <div className="flex items-center gap-2 flex-wrap">
              <h2 className="text-2xl font-bold">{student.koreanName || '이름 없음'}</h2>
              <span className="text-gray-400">{student.englishName}</span>
              <Badge value={student.admissionStatus}/>
              <Badge value={student.category}/>
              {student.program && <Badge value={student.program}/>}
            </div>
            <div className="mt-2 text-sm text-gray-500 flex flex-wrap gap-x-4 gap-y-1">
              {student.currentSchool && <span>🎓 {student.currentSchool}</span>}
              {student.officialGrade && <span>📚 {student.officialGrade}</span>}
              {student.cohort && <span>🎫 기수 {student.cohort}</span>}
              {student.accommodation?.type && <span>🏠 {student.accommodation.type}</span>}
            </div>
          </div>
        </div>
      </div>

      {/* 탭 */}
      <div className="notion-card mb-4 p-2 flex flex-wrap gap-1 sticky top-0 z-10 bg-white">
        {tabs.map(t => (
          <button
            key={t.id}
            className={`tab-btn ${tab === t.id ? 'active':''}`}
            onClick={() => setTab(t.id)}
          >{t.label}</button>
        ))}
      </div>

      {tab === 'basic' && <TabBasic s={student} update={update} customOptions={customOptions} addOption={addOption} removeOption={removeOption} schools={schools} subjects={subjects} universities={universities} programs={programs}/>}
      {tab === 'contact' && <TabContact s={student} update={update}/>}

      {tab === 'uni' && <TabUni s={student} update={update} schools={schools} subjects={subjects} universities={universities} programs={programs} trackGroups={trackGroups}/>}

  const opened = applications.find(a => a.id === openId);
  const openedInvoice = opened?.invoiceId ? invoices.find(i => i.id === opened.invoiceId) : null;

  const filtered = applications.filter(a => {
    if (filter.status && a.status !== filter.status) return false;
    const q = filter.search.trim().toLowerCase();
    if (q) {
      const blob = [a.familyName, a.givenName, a.studentNumber, a.agencyName, a.cohort, a.program].filter(Boolean).join(' ').toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });

  const save = (d) => {
    const next = d.id
      ? applications.map(a => a.id === d.id ? d : a)
      : [...applications, { ...d, id: uid() }];
    onChange(next);
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 신청서를 삭제하시겠습니까?')) return;
    onChange(applications.filter(a => a.id !== id));
    setOpenId(null);
  };

  if (editing) {
    return (
      <div className="max-w-[1100px] mx-auto px-8 py-6">
        <div className="flex items-center justify-between mb-4">
          <h1 className="text-2xl font-bold">{editing.id ? '신청서 수정' : '새 학생 등록 신청서'}</h1>
          <button className="btn-ghost" onClick={() => setEditing(null)}>취소</button>
        </div>
        <ApplicationEditor app={editing} accommodations={accommodations} members={members}
          onSave={save} onCancel={() => setEditing(null)} currentUserName={currentUserName}/>
      </div>
    );
  }

  if (opened) {
    return (
      <div className="max-w-[1300px] mx-auto px-8 py-6">
        <ApplicationDetailView app={opened} accommodations={accommodations} invoice={openedInvoice}
          onEdit={() => setEditing(opened)}
          onClose={() => setOpenId(null)}
          onCreateInvoice={(app) => onOpenInvoiceEditor(app)}
          onViewInvoice={onViewInvoice}
          canInvoice={canInvoice}/>
      </div>
    );
  }

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">📝 학생 등록 신청 접수</h1>
          <p className="text-sm text-gray-500 mt-1">전체 {applications.length}건 · 필터 결과 {filtered.length}건</p>
        </div>
        <div className="flex items-center gap-2">
          <input className="notion-input w-64" placeholder="이름·기수·프로그램 검색..." value={filter.search} onChange={(e) => setFilter({...filter, search:e.target.value})}/>
          <button className="btn-primary" onClick={() => setEditing(emptyApplication())}>+ 새 신청서 작성</button>
        </div>
      </div>

      <div className="notion-card p-4 mb-4">
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          <Field label="상태"><Select value={filter.status} onChange={(v) => setFilter({...filter, status:v})} options={APPLICATION_STATUSES.map(s => APPLICATION_STATUS_LABEL[s])} placeholder="전체"/></Field>
        </div>
      </div>

      <div className="notion-card overflow-hidden">
        <table className="w-full">
          <thead><tr>
            <th className="table-th">접수일</th>
            <th className="table-th">학생 이름</th>
            <th className="table-th">기수</th>
            <th className="table-th">프로그램</th>
            <th className="table-th">숙소</th>
            <th className="table-th">상태</th>
            <th className="table-th">담당</th>
            <th className="table-th">인보이스</th>
            <th className="table-th"></th>
          </tr></thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan="9" className="text-center py-12 text-gray-400 text-sm">조건에 맞는 신청서가 없습니다.</td></tr>
            ) : filtered.map(a => {
              const inv = invoices.find(i => i.id === a.invoiceId);
              return (
                <tr key={a.id} className="row-hover cursor-pointer" onClick={() => setOpenId(a.id)}>
                  <td className="table-td text-xs">{a.submittedAt || '—'}</td>
                  <td className="table-td">
                    <div className="font-medium">{a.familyName} {a.givenName}</div>
                    {a.studentNumber && <div className="text-xs text-gray-500">{a.studentNumber}</div>}
                  </td>
                  <td className="table-td"><Badge value={a.cohort}/></td>
                  <td className="table-td"><Badge value={a.program}/></td>
                  <td className="table-td text-xs">{a.accommodationCategory}{a.accommodationSubCategory && ` · ${a.accommodationSubCategory}`}</td>
                  <td className="table-td"><Badge value={APPLICATION_STATUS_LABEL[a.status]}/></td>
                  <td className="table-td text-sm">{a.assignedManager || <span className="text-gray-300">—</span>}</td>
                  <td className="table-td text-xs">
                    {inv ? <span className="badge b-green">{inv.invoiceNumber}</span> : <span className="text-gray-300">미발행</span>}
                  </td>
                  <td className="table-td text-right whitespace-nowrap">
                    <button className="btn-danger" onClick={(e) => { e.stopPropagation(); remove(a.id); }}>삭제</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// 인보이스 작성 페이지 — 브듀쌤+ 전용 (세금 포함 단가 / Gross-Net 구조)
const InvoiceEditor = ({ invoice, application, members, applications, students=[], partners=[], invoiceItems=[], onAddInvoiceItem, onSave, onCancel, currentUserName='' }) => {
  // Student# 자동 생성: 학생 데이터에서 우선, 없으면 BUPP-{기수}-{stu_short} 패턴
  const buildStudentNumber = (stu) => {
    if (!stu) return '';
    if (stu.studentId && stu.studentId.trim()) return stu.studentId;
    const cohortDigits = (stu.cohort || '').match(/\d+/)?.[0] || new Date().getFullYear().toString().slice(2);
    const shortId = (stu.id || '').replace(/^stu_/, '').slice(-4).toUpperCase();
    return `BUPP-${cohortDigits}-${shortId}`;
  };
  const findAppForStudent = (stu) => {
    if (!stu) return null;
    return applications.find(a => {
      const fullName = `${a.familyName || ''}${a.givenName || ''}`.replace(/\s+/g, '');
      return fullName === (stu.koreanName || '').replace(/\s+/g, '');
    }) || null;
  };

  const [draft, setDraft] = useState(() => {
    // 초기값: 기존 인보이스 → 그대로; 신청서에서 호출 → 신청서 정보로 채움; 새로 작성 → 빈 상태
    if (invoice?.id) return invoice;
    const fromApp = application;
    return {
      ...emptyInvoice(),
      applicationId: fromApp?.id || '',
      studentName: fromApp ? `${fromApp.familyName} ${fromApp.givenName}` : '',
      studentNumber: fromApp?.studentNumber || '',
      partnerCompany: fromApp?.agencyName || '',
      createdBy: currentUserName,
      invoiceNumber: `BUPP-${new Date().getFullYear()}-INV-${String(Math.floor(Math.random()*9000)+1000)}`
    };
  });
  const set = (k, v) => setDraft({ ...draft, [k]: v });

  // 현재 연결된 학생 객체 (linkedStudentId 기준)
  const selectedStudent = students.find(s => s.id === draft.linkedStudentId);

  // 학생 선택 시 — 학생 정보 + 자동 매칭 신청서 일괄 적용
  const selectStudent = (studentId) => {
    const stu = students.find(x => x.id === studentId);
    if (!stu) {
      setDraft({ ...draft, linkedStudentId: '', studentName: '', studentNumber: '', applicationId: '' });
      return;
    }
    const fullName = `${stu.koreanName}${stu.englishName ? ` (${stu.englishName})` : ''}`;
    const app = findAppForStudent(stu);
    setDraft({
      ...draft,
      linkedStudentId: stu.id,
      studentName: fullName,
      studentNumber: buildStudentNumber(stu),
      applicationId: app?.id || draft.applicationId,
      // 신청서가 매칭되면 파트너사도 자동 채움 (기존 값이 없을 때만)
      partnerCompany: !draft.partnerCompany ? (app?.agencyName || '') : draft.partnerCompany
    });
  };

  // 인라인 항목 추가 모달
  const [showItemModal, setShowItemModal] = useState(false);
  const [newItemDraft, setNewItemDraft] = useState(null);
  const [pendingRowIndex, setPendingRowIndex] = useState(null);
  const openNewItemModal = (rowIndex) => {
    setNewItemDraft({ ...emptyInvoiceItem(), defaultCurrency: draft.currency });
    setPendingRowIndex(rowIndex);
    setShowItemModal(true);
  };
  const saveNewItem = () => {
    if (!newItemDraft.name?.trim()) { alert('항목명을 입력해주세요.'); return; }
    const newItem = { ...newItemDraft, id: uid() };
    if (typeof onAddInvoiceItem === 'function') onAddInvoiceItem(newItem);
    // 해당 행에 자동 선택
    if (pendingRowIndex != null) {
      const arr = [...(draft.items || [])];
      arr[pendingRowIndex] = {
        ...arr[pendingRowIndex],
        itemId: newItem.id,
        description: newItem.defaultDescription || newItem.name,
        amount: newItem.defaultAmount
      };
      setDraft({ ...draft, items: arr });
    }
    setShowItemModal(false);
    setNewItemDraft(null);
    setPendingRowIndex(null);
  };

  // 자동 계산 — 세금 없이 단순 합산
  const grossTotal = (draft.items || []).reduce((s, it) => s + (parseFloat(it.quantity) || 0) * (parseFloat(it.amount) || 0), 0);
  const commissionRate = parseFloat(draft.commissionRate) || 0;
  const commissionAmountInput = parseFloat(draft.commissionAmountInput) || 0;
  const commissionType = draft.commissionType || 'rate';
  const commissionAmount = commissionType === 'amount'
    ? commissionAmountInput
    : grossTotal * (commissionRate / 100);
  const netTotal = grossTotal - commissionAmount;

  const updateItem = (i, k, v) => {
    const arr = [...(draft.items || [])]; arr[i] = { ...arr[i], [k]: v };
    setDraft({ ...draft, items: arr });
  };
  const addItem = () => setDraft({ ...draft, items: [...(draft.items || []), { itemId:'', description:'', quantity:1, amount:0 }] });
  const removeItem = (i) => {
    const arr = [...(draft.items || [])]; arr.splice(i, 1);
    setDraft({ ...draft, items: arr });
  };

  const handleSave = () => {
    if (!draft.invoiceNumber?.trim()) { alert('인보이스 번호를 입력해주세요.'); return; }
    if (!draft.studentName?.trim()) { alert('학생을 선택하거나 학생 이름을 직접 입력해주세요.'); return; }
    onSave({ ...draft, grossTotal, commissionAmount, netTotal });
  };

  return (
    <div className="max-w-[1000px] mx-auto px-8 py-6 space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold">{draft.id ? '인보이스 수정' : '새 인보이스 작성'}</h1>
        <button className="btn-ghost" onClick={onCancel}>취소</button>
      </div>

      <div className="notion-card p-4">
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
          <Field label="인보이스 번호 *" span={2}><TextInput value={draft.invoiceNumber} onChange={(v) => set('invoiceNumber', v)}/></Field>
          <Field label="상태"><Select value={draft.status} onChange={(v) => set('status', v)} options={['draft','sent','paid','cancelled']}/></Field>
          <Field label="통화"><Select value={draft.currency} onChange={(v) => set('currency', v)} options={['CAD','USD','KRW']}/></Field>
        </div>

        {/* 👤 학생 선택 — 통합 (학생 1번만 고르면 이름·번호·신청서 자동 채움) */}
        <Field label="👤 학생 선택 *">
          <RefSelect
            value={draft.linkedStudentId}
            onChange={selectStudent}
            options={students.map(stu => ({
              id: stu.id,
              label: `${stu.koreanName}${stu.englishName ? ` (${stu.englishName})` : ''} · 기수 ${stu.cohort || '미지정'}${stu.studentId ? ` · ${stu.studentId}` : ''}`
            }))}
            placeholder="학생 목록에서 검색·선택 — 이름·Student#·신청서가 자동 채워집니다"
          />
        </Field>

        {selectedStudent ? (
          <div className="mt-3 p-3 rounded flex items-center justify-between gap-3" style={{background:'#faf7f3', border:'1px solid #cabaab'}}>
            <div className="flex items-center gap-3 flex-1 flex-wrap">
              <div className="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm" style={{background:'#e8e0d5', color:'#c20206'}}>
                {(selectedStudent.koreanName || '?').slice(0, 1)}
              </div>
              <div>
                <div className="font-semibold">{draft.studentName}</div>
                <div className="text-xs text-gray-500 mt-0.5">
                  Student # <strong className="font-mono">{draft.studentNumber || '-'}</strong>
                  {selectedStudent.cohort && <span className="ml-2">· 기수 {selectedStudent.cohort}</span>}
                  {selectedStudent.program && <span className="ml-2">· {selectedStudent.program}</span>}
                  {draft.applicationId && <span className="ml-2" style={{color:'#0f7b6c'}}>✓ 신청서 연결됨</span>}
                </div>
              </div>
            </div>
            <button className="btn-ghost text-xs" onClick={() => selectStudent('')}>변경</button>
          </div>
        ) : (
          <div className="mt-3 p-3 rounded text-xs text-gray-500" style={{background:'#fff3d9', border:'1px solid #cb912f'}}>
            ⚠️ 학생을 선택해주세요. 학생을 선택하면 이름·Student#·신청서·납부 현황 노출이 자동으로 연결됩니다.
            <div className="mt-2 flex items-center gap-2">
              <span>학생이 없는 외부 인보이스라면:</span>
              <button className="btn-ghost text-xs" onClick={() => { const n = prompt('학생 이름을 직접 입력 (학생 마스터에는 추가되지 않음):'); if (n) setDraft({ ...draft, studentName: n, studentNumber: draft.studentNumber || `EXT-${new Date().getFullYear()}-${String(Math.floor(Math.random()*900)+100)}` }); }}>이름 직접 입력</button>
              {draft.studentName && !selectedStudent && (
                <span className="font-semibold ml-2">→ {draft.studentName} <span className="text-gray-400 ml-1">({draft.studentNumber})</span></span>
              )}
            </div>
          </div>
        )}

        <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mt-3">
          <Field label="발행일"><TextInput type="date" value={draft.issueDate} onChange={(v) => set('issueDate', v)}/></Field>
          <Field label="납부 기한"><TextInput type="date" value={draft.dueDate} onChange={(v) => set('dueDate', v)}/></Field>
          <Field label="연결된 신청서 (자동)">
            <div className="notion-input flex items-center" style={{background:'#faf7f3', color:'#787774', height:34, padding:'4px 8px'}}>
              {(() => {
                const a = applications.find(x => x.id === draft.applicationId);
                return a ? `${a.familyName} ${a.givenName} (${a.cohort || '미지정'})` : '— 자동 매칭 없음';
              })()}
            </div>
          </Field>
        </div>
      </div>

      <div className="notion-card p-4">
        <div className="flex items-center justify-between mb-3">
          <h4 className="font-semibold" style={{color:'#c20206'}}>항목 <span className="text-xs text-gray-500 ml-2">항목을 선택하면 설명·단가가 자동 채워집니다 (수정 가능)</span></h4>
          <button className="btn-ghost text-xs" onClick={addItem}>+ 항목 추가</button>
        </div>
        <table className="w-full">
          <thead>
            <tr>
              <th className="table-th" style={{width:200}}>항목 선택 (마스터)</th>
              <th className="table-th">설명</th>
              <th className="table-th" style={{width:70}}>수량</th>
              <th className="table-th" style={{width:140}}>단가 ({draft.currency})</th>
              <th className="table-th" style={{width:100}}>합계</th>
              <th className="table-th" style={{width:40}}></th>
            </tr>
          </thead>
          <tbody>
            {(draft.items || []).map((it, i) => (
              <tr key={i}>
                <td className="table-td">
                  <div className="flex items-center gap-1">
                    <div className="flex-1">
                      <RefSelect
                        value={it.itemId || ''}
                        onChange={(v) => {
                          const master = invoiceItems.find(x => x.id === v);
                          const arr = [...(draft.items || [])];
                          arr[i] = {
                            ...arr[i],
                            itemId: v,
                            description: master ? master.defaultDescription || master.name : arr[i].description,
                            amount: master ? master.defaultAmount : arr[i].amount
                          };
                          setDraft({ ...draft, items: arr });
                        }}
                        options={invoiceItems.filter(x => x.active !== false).map(x => ({ id: x.id, label: `[${x.category}] ${x.name}` }))}
                        placeholder="항목 선택"
                      />
                    </div>
                    <button
                      className="btn-ghost text-xs"
                      style={{whiteSpace:'nowrap', padding:'4px 6px'}}
                      title="새 항목을 마스터 DB에 추가"
                      onClick={() => openNewItemModal(i)}
                    >+ 새 항목</button>
                  </div>
                </td>
                <td className="table-td"><TextInput value={it.description} onChange={(v) => updateItem(i, 'description', v)}/></td>
                <td className="table-td"><TextInput type="number" value={it.quantity} onChange={(v) => updateItem(i, 'quantity', v)}/></td>
                <td className="table-td"><TextInput type="number" value={it.amount} onChange={(v) => updateItem(i, 'amount', v)}/></td>
                <td className="table-td text-right text-sm font-semibold">
                  {((parseFloat(it.quantity) || 0) * (parseFloat(it.amount) || 0)).toLocaleString()}
                </td>
                <td className="table-td">
                  {(draft.items||[]).length > 1 && <button className="btn-danger text-xs" onClick={() => removeItem(i)}>×</button>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* 파트너 커미션 — 비율(%) 또는 직접 금액 선택 */}
      <div className="notion-card p-4" style={{ background:'#faf3e3', borderColor:'#e8c97a' }}>
        <h4 className="font-semibold mb-3" style={{color:'#a67800'}}>🤝 파트너 커미션</h4>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          <Field label="파트너사" span={2}>
            <RefSelect
              value={(partners.find(p => p.name === draft.partnerCompany)?.id) || ''}
              onChange={(v) => {
                const p = partners.find(x => x.id === v);
                set('partnerCompany', p ? p.name : '');
              }}
              options={partners.filter(p => p.active !== false).map(p => ({ id: p.id, label: `${p.name}${p.country ? ` · ${p.country}` : ''}${p.contactPerson ? ` (${p.contactPerson})` : ''}` }))}
              placeholder="파트너 관리에서 선택 · 없으면 비워두기 (직접 접수)"
            />
            {draft.partnerCompany && !partners.find(p => p.name === draft.partnerCompany) && (
              <div className="text-xs mt-1" style={{color:'#a47007'}}>⚠️ "{draft.partnerCompany}"은(는) 파트너 관리 DB에 없습니다. 파트너 관리에서 먼저 등록하거나 비워두세요.</div>
            )}
          </Field>
          <Field label="커미션 방식">
            <Select value={commissionType === 'amount' ? '직접 금액' : '비율 (%)'}
              onChange={(v) => set('commissionType', v === '직접 금액' ? 'amount' : 'rate')}
              options={['비율 (%)', '직접 금액']}/>
          </Field>
          {commissionType === 'amount' ? (
            <Field label={`커미션 금액 (${draft.currency})`}>
              <TextInput type="number" value={draft.commissionAmountInput} onChange={(v) => set('commissionAmountInput', v)} placeholder="예) 5000"/>
            </Field>
          ) : (
            <Field label="커미션율 (%)">
              <TextInput type="number" value={draft.commissionRate} onChange={(v) => set('commissionRate', v)} placeholder="예) 15"/>
            </Field>
          )}
        </div>
        {commissionAmount > 0 && (
          <div className="text-xs text-gray-600 mt-2">
            💡 {commissionType === 'amount'
              ? `직접 입력 ${commissionAmount.toLocaleString()} ${draft.currency} (Gross 대비 ${grossTotal > 0 ? ((commissionAmount/grossTotal)*100).toFixed(2) : 0}%)`
              : `Gross의 ${commissionRate}% = ${commissionAmount.toFixed(2).toLocaleString()} ${draft.currency}`}
            . Net은 BUPP가 실제 수취하는 금액입니다.
          </div>
        )}
      </div>

      <div className="notion-card p-4 grid grid-cols-1 gap-3">
        <Field label="결제 안내"><TextArea value={draft.paymentInstructions} onChange={(v) => set('paymentInstructions', v)} rows={3}/></Field>
        <Field label="내부 메모"><TextInput value={draft.notes} onChange={(v) => set('notes', v)}/></Field>
      </div>

      {/* 납부 확인 — status=paid일 때 표시 */}
      {draft.status === 'paid' && (
        <div className="notion-card p-4" style={{ background:'#ddedea', borderColor:'#0f7b6c' }}>
          <h4 className="font-semibold mb-3" style={{color:'#0f7b6c'}}>✅ 납부 확인 정보 (학부모 리포트에 노출)</h4>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <Field label="입금 일자 *">
              <TextInput type="date" value={draft.paidAt} onChange={(v) => set('paidAt', v)}/>
              <div className="text-xs text-gray-500 mt-1">학부모님이 송금한 날</div>
            </Field>
            <Field label="확인 일자 *">
              <TextInput type="date" value={draft.paymentConfirmedAt} onChange={(v) => set('paymentConfirmedAt', v)} placeholder={new Date().toISOString().slice(0,10)}/>
              <div className="text-xs text-gray-500 mt-1">BUPP가 입금을 확인한 날</div>
            </Field>
            <Field label={`실 수령 금액 (${draft.currency})`}><TextInput type="number" value={draft.paidAmount} onChange={(v) => set('paidAmount', v)} placeholder={String(grossTotal)}/></Field>
            <Field label="수령 방법"><Select value={draft.paymentReceivedMethod} onChange={(v) => set('paymentReceivedMethod', v)} options={PAYMENT_METHODS}/></Field>
            <Field label="확인 담당자"><TextInput value={draft.paymentConfirmedBy} onChange={(v) => set('paymentConfirmedBy', v)} placeholder={currentUserName}/></Field>
            <Field label="납부 메모 (학부모 노출용)" span={3}>
              <TextArea value={draft.paymentMemo} onChange={(v) => set('paymentMemo', v)} rows={2} placeholder="학부모님에게 표시될 안내 (영수증 발송 일정 등)"/>
            </Field>
          </div>
          <div className="text-xs text-gray-500 mt-2">💡 위 정보는 학생 프로필의 📝 리포트 탭에 표시되어 학부모님만 확인할 수 있습니다.</div>
        </div>
      )}

      {/* 학생 인보이스 / 정산 인보이스 요약 */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div className="notion-card p-4" style={{ background:'#ddebf1', borderColor:'#0b6e99' }}>
          <div className="text-xs font-semibold mb-2" style={{color:'#0b6e99'}}>📄 학생 인보이스 — 학부모 청구액</div>
          <div className="text-3xl font-bold" style={{color:'#0b6e99'}}>{grossTotal.toLocaleString()} {draft.currency}</div>
          <div className="text-xs text-gray-600 mt-1">세금 포함 · 학부모에게 청구되는 총액</div>
        </div>
        <div className="notion-card p-4" style={{ background:'#ddedea', borderColor:'#0f7b6c' }}>
          <div className="text-xs font-semibold mb-2" style={{color:'#0f7b6c'}}>💵 정산 인보이스 — BUPP 실수령</div>
          {commissionAmount > 0 ? (
            <Fragment>
              <div className="text-xs flex justify-between mb-1"><span>Gross</span><span>{grossTotal.toLocaleString()}</span></div>
              <div className="text-xs flex justify-between mb-1" style={{color:'#a67800'}}>
                <span>− 커미션 {commissionType === 'amount' ? '(직접 금액)' : `(${commissionRate}%)`}</span>
                <span>−{commissionAmount.toFixed(2).toLocaleString()}</span>
              </div>
              <div className="text-2xl font-bold pt-2 mt-1" style={{ color:'#0f7b6c', borderTop:'1px solid #cabaab' }}>
                {netTotal.toFixed(2).toLocaleString()} {draft.currency}
              </div>
              {draft.partnerCompany && <div className="text-xs text-gray-600 mt-1">파트너: <strong>{draft.partnerCompany}</strong></div>}
            </Fragment>
          ) : (
            <Fragment>
              <div className="text-3xl font-bold" style={{color:'#0f7b6c'}}>{grossTotal.toLocaleString()} {draft.currency}</div>
              <div className="text-xs text-gray-600 mt-1">커미션 0 — Gross = Net</div>
            </Fragment>
          )}
        </div>
      </div>

      <div className="flex justify-end gap-2">
        <button className="btn-ghost" onClick={onCancel}>취소</button>
        <button className="btn-primary" onClick={handleSave}>인보이스 저장</button>
      </div>

      {/* 인라인 — 새 인보이스 항목을 마스터에 추가 */}
      {showItemModal && newItemDraft && (
        <div className="modal-backdrop" onClick={() => setShowItemModal(false)}>
          <div className="modal-card" onClick={(e) => e.stopPropagation()} style={{width:'min(640px, 95vw)'}}>
            <div className="p-5">
              <h3 className="font-semibold mb-1">📋 새 인보이스 항목 추가</h3>
              <p className="text-xs text-gray-500 mb-4">마스터 DB에 저장되어 다음 인보이스에서 재사용할 수 있습니다.</p>
              <div className="grid grid-cols-2 gap-3">
                <Field label="항목명 *" span={2}><TextInput value={newItemDraft.name} onChange={(v) => setNewItemDraft({...newItemDraft, name:v})} placeholder="예) 캠프 등록비 (1주)"/></Field>
                <Field label="카테고리"><Select value={newItemDraft.category} onChange={(v) => setNewItemDraft({...newItemDraft, category:v})} options={INVOICE_ITEM_CATEGORIES}/></Field>
                <Field label="코드 (선택)"><TextInput value={newItemDraft.code} onChange={(v) => setNewItemDraft({...newItemDraft, code:v})} placeholder="예) CAMP-1WK"/></Field>
                <Field label="기본 단가"><TextInput type="number" value={newItemDraft.defaultAmount} onChange={(v) => setNewItemDraft({...newItemDraft, defaultAmount: parseFloat(v) || 0})}/></Field>
                <Field label="통화"><Select value={newItemDraft.defaultCurrency} onChange={(v) => setNewItemDraft({...newItemDraft, defaultCurrency:v})} options={['CAD','USD','KRW']}/></Field>
                <Field label="기본 설명" span={2}><TextArea value={newItemDraft.defaultDescription} onChange={(v) => setNewItemDraft({...newItemDraft, defaultDescription:v})} rows={2} placeholder="인보이스 줄에 자동으로 입력될 설명"/></Field>
              </div>
              <div className="flex justify-end gap-2 mt-4">
                <button className="btn-ghost" onClick={() => setShowItemModal(false)}>취소</button>
                <button className="btn-primary" onClick={saveNewItem}>마스터에 저장 + 현재 줄에 적용</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// 인보이스 PDF 미리보기 모달 — Gross(고객용) / Net(파트너·내부 회계용) 토글
const InvoicePDFPreview = ({ invoice, application, onClose }) => {
  const [mode, setMode] = useState('gross'); // 'gross' | 'net'
  const print = () => window.print();
  const grossTotal = parseFloat(invoice.grossTotal) || 0;
  const commissionType = invoice.commissionType || 'rate';
  const commissionRate = parseFloat(invoice.commissionRate) || 0;
  const commissionAmount = parseFloat(invoice.commissionAmount) || 0;
  const netTotal = parseFloat(invoice.netTotal) != null && !isNaN(parseFloat(invoice.netTotal)) ? parseFloat(invoice.netTotal) : (grossTotal - commissionAmount);
  const hasCommission = commissionAmount > 0;
  const commissionLabel = commissionType === 'amount'
    ? '직접 금액'
    : `${commissionRate}%`;

  return (
    <div className="modal-backdrop" onClick={onClose} style={{ alignItems:'flex-start' }}>
      <div className="modal-card" onClick={(e) => e.stopPropagation()} style={{ width:'min(900px, 95vw)', maxHeight:'95vh' }}>
        <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-white">
          <h3 className="text-base font-semibold">🧾 인보이스 — {invoice.invoiceNumber}</h3>
          <div className="flex items-center gap-2">
            <div className="flex gap-1 mr-2">
              <button className={`tab-btn ${mode === 'gross' ? 'active':''}`} onClick={() => setMode('gross')}>📄 학생 인보이스 (학부모용)</button>
              {hasCommission && <button className={`tab-btn ${mode === 'net' ? 'active':''}`} onClick={() => setMode('net')}>💵 정산 인보이스 (내부/파트너)</button>}
            </div>
            <button className="btn-primary" onClick={print}>🖨 PDF로 인쇄</button>
            <button className="btn-ghost" onClick={onClose}>닫기</button>
          </div>
        </div>
        <div id="pdf-print-area" className="px-10 py-8" style={{ background:'#fff', color:'#202731' }}>
          <div style={{ borderBottom:`3px solid ${mode === 'net' ? '#0f7b6c' : '#c20206'}`, paddingBottom:16, marginBottom:24, display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
            <div>
              <div style={{ color: mode === 'net' ? '#0f7b6c' : '#c20206', fontWeight:700, fontSize:14 }}>BreakEDU · BUPP</div>
              <div style={{ fontSize:24, fontWeight:700, marginTop:4 }}>
                {mode === 'net' ? '정산 인보이스 (INTERNAL)' : '학생 인보이스 (INVOICE)'}
              </div>
              <div style={{ fontSize:12, color:'#4a4a4a', marginTop:4 }}>발행일 {invoice.issueDate} · 납부 기한 {invoice.dueDate || '—'}</div>
              {mode === 'net' && <div style={{ fontSize:11, color:'#4a4a4a', marginTop:2 }}>본 인보이스는 BUPP 내부·파트너 정산용입니다.</div>}
            </div>
            <div style={{ textAlign:'right' }}>
              <div style={{ fontSize:11, color:'#4a4a4a' }}>Invoice #</div>
              <div style={{ fontSize:18, fontWeight:700, color: mode === 'net' ? '#0f7b6c' : '#c20206' }}>{invoice.invoiceNumber}</div>
              <div style={{ marginTop:6 }}><Badge value={invoice.status}/></div>
            </div>
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:24, marginBottom:24 }}>
            <div>
              <div style={{ fontSize:11, color:'#4a4a4a', fontWeight:600, marginBottom:4 }}>{mode === 'net' ? '학생' : '청구 대상'}</div>
              <div style={{ fontSize:16, fontWeight:700 }}>{invoice.studentName}</div>
              {invoice.studentNumber && <div style={{ fontSize:12, color:'#4a4a4a' }}>Student #: {invoice.studentNumber}</div>}
              {application?.email && <div style={{ fontSize:12, color:'#4a4a4a' }}>{application.email}</div>}
              {application?.contactNumber && <div style={{ fontSize:12, color:'#4a4a4a' }}>{application.contactNumber}</div>}
            </div>
            <div>
              <div style={{ fontSize:11, color:'#4a4a4a', fontWeight:600, marginBottom:4 }}>{mode === 'net' ? '정산 정보' : '발행자'}</div>
              <div style={{ fontSize:14, fontWeight:600 }}>BreakEDU BUPP</div>
              <div style={{ fontSize:12, color:'#4a4a4a' }}>Toronto, Ontario, Canada</div>
              <div style={{ fontSize:12, color:'#4a4a4a' }}>담당: {invoice.createdBy || '—'}</div>
              {mode === 'net' && invoice.partnerCompany && (
                <div style={{ fontSize:12, color:'#0f7b6c', fontWeight:700, marginTop:4 }}>파트너: {invoice.partnerCompany}</div>
              )}
            </div>
          </div>

          <table style={{ width:'100%', fontSize:13, borderCollapse:'collapse', marginBottom:20 }}>
            <thead>
              <tr style={{ background:'#e8e0d5' }}>
                <th style={{ textAlign:'left', padding:'10px 12px', fontSize:11, color:'#760305' }}>설명</th>
                <th style={{ textAlign:'right', padding:'10px 12px', fontSize:11, color:'#760305', width:80 }}>수량</th>
                <th style={{ textAlign:'right', padding:'10px 12px', fontSize:11, color:'#760305', width:120 }}>단가 (세금 포함)</th>
                <th style={{ textAlign:'right', padding:'10px 12px', fontSize:11, color:'#760305', width:120 }}>합계</th>
              </tr>
            </thead>
            <tbody>
              {(invoice.items || []).map((it, i) => (
                <tr key={i} style={{ borderBottom:'1px solid #e8e0d5' }}>
                  <td style={{ padding:'10px 12px' }}>{it.description}</td>
                  <td style={{ padding:'10px 12px', textAlign:'right' }}>{it.quantity}</td>
                  <td style={{ padding:'10px 12px', textAlign:'right' }}>{(parseFloat(it.amount)||0).toLocaleString()} {invoice.currency}</td>
                  <td style={{ padding:'10px 12px', textAlign:'right', fontWeight:600 }}>{((parseFloat(it.quantity)||0)*(parseFloat(it.amount)||0)).toLocaleString()} {invoice.currency}</td>
                </tr>
              ))}
            </tbody>
          </table>

          <div style={{ display:'flex', justifyContent:'flex-end', marginBottom:24 }}>
            <table style={{ fontSize:13, minWidth:320 }}>
              <tbody>
                {mode === 'gross' ? (
                  <tr style={{ borderTop:'2px solid #c20206' }}>
                    <td style={{ padding:'10px 12px', fontWeight:700, fontSize:18, color:'#c20206' }}>합계 (학부모 청구액)</td>
                    <td style={{ padding:'10px 12px', textAlign:'right', fontWeight:700, fontSize:18, color:'#c20206' }}>{grossTotal.toLocaleString()} {invoice.currency}</td>
                  </tr>
                ) : (
                  <Fragment>
                    <tr><td style={{ padding:'4px 12px', color:'#4a4a4a' }}>학부모 청구액</td><td style={{ padding:'4px 12px', textAlign:'right' }}>{grossTotal.toLocaleString()} {invoice.currency}</td></tr>
                    <tr style={{ color:'#a67800' }}><td style={{ padding:'4px 12px' }}>− 파트너 커미션 ({commissionLabel})</td><td style={{ padding:'4px 12px', textAlign:'right' }}>−{commissionAmount.toFixed(2).toLocaleString()} {invoice.currency}</td></tr>
                    <tr style={{ borderTop:'2px solid #0f7b6c' }}>
                      <td style={{ padding:'10px 12px', fontWeight:700, fontSize:18, color:'#0f7b6c' }}>정산 인보이스 (BUPP 실수령)</td>
                      <td style={{ padding:'10px 12px', textAlign:'right', fontWeight:700, fontSize:18, color:'#0f7b6c' }}>{netTotal.toFixed(2).toLocaleString()} {invoice.currency}</td>
                    </tr>
                  </Fragment>
                )}
              </tbody>
            </table>
          </div>

          {mode === 'gross' && (
            <div style={{ padding:8, background:'#fbf3db', borderRadius:6, fontSize:11, color:'#a67800', marginBottom:12 }}>
              💡 표기 가격은 모두 세금 포함(VAT/HST included)입니다. 별도 세금이 추가되지 않습니다.
            </div>
          )}

          {invoice.paymentInstructions && mode === 'gross' && (
            <div style={{ padding:12, background:'#faf3e3', borderRadius:8, marginBottom:16 }}>
              <div style={{ fontSize:11, fontWeight:700, color:'#a67800', marginBottom:4 }}>결제 안내</div>
              <div style={{ fontSize:12, whiteSpace:'pre-wrap', color:'#760305' }}>{invoice.paymentInstructions}</div>
            </div>
          )}

          {mode === 'net' && hasCommission && (
            <div style={{ padding:12, background:'#ddedea', borderRadius:8, marginBottom:16, fontSize:12, color:'#0f7b6c' }}>
              💼 본 정산은 BUPP가 학부모로부터 학생 인보이스 금액을 수령한 후, 파트너 <strong>{invoice.partnerCompany || '—'}</strong>에게 커미션 {commissionLabel} ({commissionAmount.toFixed(2).toLocaleString()} {invoice.currency})를 지급하고 정산 인보이스 금액을 BUPP가 보유합니다.
            </div>
          )}

          {invoice.notes && (
            <div style={{ fontSize:11, color:'#4a4a4a', marginBottom:12 }}>📝 {invoice.notes}</div>
          )}

          <div style={{ marginTop:32, paddingTop:12, borderTop:'1px solid #e8e0d5', fontSize:11, color:'#787774', textAlign:'center' }}>
            BreakEDU · BUPP Student Manager — {mode === 'net' ? '본 인보이스는 내부/파트너 정산용입니다.' : '본 인보이스는 결제 확인 후 정식 영수증으로 대체됩니다.'}
          </div>
        </div>
      </div>
    </div>
  );
};

// 🤝 파트너 회사 관리 페이지 — 브듀쌤+ 전용
/* ============================================================
   📋 인보이스 항목 관리 페이지 — 재사용 가능한 청구 항목 카탈로그
   ============================================================ */
const InvoiceItemsPage = ({ items, onChange }) => {
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState({ category: '', active: '' });
  const [editing, setEditing] = useState(null);

  const filtered = items.filter(it => {
    const q = search.trim().toLowerCase();
    if (q && !(it.name||'').toLowerCase().includes(q) && !(it.code||'').toLowerCase().includes(q)) return false;
    if (filters.category && it.category !== filters.category) return false;
    if (filters.active === 'Y' && !it.active) return false;
    if (filters.active === 'N' && it.active) return false;
    return true;
  }).sort((a, b) => (a.category || '').localeCompare(b.category || '') || (a.name || '').localeCompare(b.name || ''));

  const upsert = (d) => {
    if (!d.name?.trim()) { alert('항목명을 입력해주세요.'); return; }
    const next = d.id ? items.map(x => x.id === d.id ? d : x) : [...items, { ...d, id: uid() }];
    onChange(next);
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 항목을 삭제하시겠습니까?\n(이미 작성된 인보이스의 항목명/금액은 유지되며, 향후 선택 옵션에서만 사라집니다.)')) return;
    onChange(items.filter(x => x.id !== id));
  };

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">📋 인보이스 항목 관리</h1>
          <p className="text-sm text-gray-500 mt-1">전체 {items.length}개 · 필터 결과 {filtered.length}개 · 인보이스 작성 시 드롭다운에서 선택할 수 있는 청구 항목 카탈로그</p>
        </div>
        <div className="flex items-center gap-2">
          <input className="notion-input w-72" placeholder="항목명·코드 검색..." value={search} onChange={(e) => setSearch(e.target.value)}/>
          <button className="btn-primary" onClick={() => setEditing(emptyInvoiceItem())}>+ 새 항목 추가</button>
        </div>
      </div>

      <div className="notion-card p-4 mb-4">
        <div className="grid grid-cols-3 gap-3">
          <Field label="카테고리"><Select value={filters.category} onChange={(v) => setFilters({...filters, category:v})} options={INVOICE_ITEM_CATEGORIES} placeholder="전체"/></Field>
          <Field label="활성 여부"><Select value={filters.active} onChange={(v) => setFilters({...filters, active:v})} options={['Y','N']} placeholder="전체"/></Field>
        </div>
      </div>

      {editing && (
        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold mb-4">{editing.id ? '항목 수정' : '새 항목 추가'}</h3>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <Field label="항목명 *" span={2}><TextInput value={editing.name} onChange={(v) => setEditing({...editing, name:v})} placeholder="예) 풀가디언 프로그램 (10개월)"/></Field>
            <Field label="코드"><TextInput value={editing.code} onChange={(v) => setEditing({...editing, code:v})} placeholder="예) BUPP-FULL-10M"/></Field>
            <Field label="카테고리"><Select value={editing.category} onChange={(v) => setEditing({...editing, category:v})} options={INVOICE_ITEM_CATEGORIES}/></Field>
            <Field label="기본 단가"><TextInput type="number" value={editing.defaultAmount} onChange={(v) => setEditing({...editing, defaultAmount: parseFloat(v) || 0})}/></Field>
            <Field label="통화"><Select value={editing.defaultCurrency} onChange={(v) => setEditing({...editing, defaultCurrency:v})} options={['CAD','USD','KRW']}/></Field>
            <Field label="활성 상태"><div className="pt-2"><Toggle value={editing.active} onChange={(v) => setEditing({...editing, active:v})} label="활성"/></div></Field>
            <Field label="등록일"><TextInput type="date" value={editing.createdAt} onChange={(v) => setEditing({...editing, createdAt:v})}/></Field>
            <Field label="기본 설명 (인보이스 줄에 자동 입력)" span={4}><TextArea value={editing.defaultDescription} onChange={(v) => setEditing({...editing, defaultDescription:v})} rows={2}/></Field>
            <Field label="내부 메모" span={4}><TextArea value={editing.memo} onChange={(v) => setEditing({...editing, memo:v})} rows={2}/></Field>
            <div className="col-span-4 flex justify-end gap-2">
              <button className="btn-ghost" onClick={() => setEditing(null)}>취소</button>
              <button className="btn-primary" onClick={() => upsert(editing)}>저장</button>
            </div>
          </div>
        </div>
      )}

      <div className="notion-card overflow-hidden">
        <table className="w-full">
          <thead><tr>
            <th className="table-th">카테고리</th>
            <th className="table-th">항목명</th>
            <th className="table-th">코드</th>
            <th className="table-th text-right">기본 단가</th>
            <th className="table-th">통화</th>
            <th className="table-th">활성</th>
            <th className="table-th">작업</th>
          </tr></thead>
          <tbody>
            {filtered.map(it => (
              <tr key={it.id}>
                <td className="table-td"><Badge value={it.category}/></td>
                <td className="table-td">
                  <div className="font-semibold">{it.name}</div>
                  {it.defaultDescription && <div className="text-xs text-gray-500 mt-1 truncate" style={{maxWidth:400}}>{it.defaultDescription}</div>}
                </td>
                <td className="table-td text-xs text-gray-500">{it.code || '-'}</td>
                <td className="table-td text-right font-semibold">{(it.defaultAmount || 0).toLocaleString()}</td>
                <td className="table-td">{it.defaultCurrency}</td>
                <td className="table-td">{it.active ? <span className="badge b-green">활성</span> : <span className="badge b-gray">비활성</span>}</td>
                <td className="table-td">
                  <button className="btn-ghost text-xs mr-1" onClick={() => setEditing(it)}>수정</button>
                  <button className="btn-danger text-xs" onClick={() => remove(it.id)}>삭제</button>
                </td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan={7} className="table-td text-center text-gray-400 py-8">항목이 없습니다.</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
};

/* ============================================================
   💰 회계 페이지 (Phase 1) — 수익 대시보드 + 파트너 정산 + 프로그램 수익성
   ============================================================ */
const AccountingPage = ({ invoices=[], applications=[], partners=[], students=[], members=[], programs=[], invoiceItems=[] }) => {
  const [tab, setTab] = useState('overview'); // overview | partners | programs | items
  const [periodMonths, setPeriodMonths] = useState(12);
  const [itemGroupBy, setItemGroupBy] = useState('month'); // month | item

  // 인보이스 기준점: paidAt(있으면) → issueDate
  const dateOf = (inv) => (inv.paidAt || inv.issueDate || '').slice(0, 10);
  const monthKey = (s) => (s || '').slice(0, 7);

  // 기간 필터 (최근 N개월)
  const todayD = new Date();
  const cutoff = new Date(todayD.getFullYear(), todayD.getMonth() - periodMonths + 1, 1).toISOString().slice(0, 10);
  const inPeriod = invoices.filter(i => i.status !== 'cancelled' && (dateOf(i) >= cutoff));

  // 핵심 지표
  const paidList = inPeriod.filter(i => i.status === 'paid');
  const pendingList = inPeriod.filter(i => i.status === 'sent');
  const totalGross = paidList.reduce((s, i) => s + (parseFloat(i.grossTotal) || 0), 0);
  const totalCommission = paidList.reduce((s, i) => s + (parseFloat(i.commissionAmount) || 0), 0);
  const totalNet = paidList.reduce((s, i) => s + (parseFloat(i.netTotal) || 0), 0);
  const totalReceivable = pendingList.reduce((s, i) => s + (parseFloat(i.grossTotal) || 0), 0);
  const paidCount = paidList.length;
  const pendingCount = pendingList.length;

  // 월별 매출 시계열
  const monthlyMap = {};
  for (let i = periodMonths - 1; i >= 0; i--) {
    const d = new Date(todayD.getFullYear(), todayD.getMonth() - i, 1);
    const k = d.toISOString().slice(0, 7);
    monthlyMap[k] = { month: k, gross: 0, net: 0, commission: 0, count: 0 };
  }
  paidList.forEach(inv => {
    const k = monthKey(dateOf(inv));
    if (monthlyMap[k]) {
      monthlyMap[k].gross += parseFloat(inv.grossTotal) || 0;
      monthlyMap[k].net += parseFloat(inv.netTotal) || 0;
      monthlyMap[k].commission += parseFloat(inv.commissionAmount) || 0;
      monthlyMap[k].count += 1;
    }
  });
  const monthlySeries = Object.values(monthlyMap);
  const maxMonthly = Math.max(1, ...monthlySeries.map(m => m.gross));

  // 파트너 정산 집계
  const partnerMap = {};
  inPeriod.forEach(inv => {
    const key = (inv.partnerCompany || '직접 접수').trim();
    if (!partnerMap[key]) partnerMap[key] = { name: key, gross: 0, commission: 0, net: 0, paid: 0, pending: 0, count: 0, invoices: [] };
    partnerMap[key].count += 1;
    partnerMap[key].invoices.push(inv);
    if (inv.status === 'paid') {
      partnerMap[key].gross += parseFloat(inv.grossTotal) || 0;
      partnerMap[key].commission += parseFloat(inv.commissionAmount) || 0;
      partnerMap[key].net += parseFloat(inv.netTotal) || 0;
      partnerMap[key].paid += 1;
    } else if (inv.status === 'sent') {
      partnerMap[key].pending += 1;
    }
  });
  const partnerRows = Object.values(partnerMap).sort((a, b) => b.commission - a.commission);

  // 프로그램별 수익성 — 신청서의 program 정보 기반 매칭
  const programMap = {};
  programs.forEach(p => {
    programMap[p.name || p.id] = { name: p.name || p.id, gross: 0, net: 0, commission: 0, count: 0 };
  });
  if (!programMap['기타/미분류']) programMap['기타/미분류'] = { name: '기타/미분류', gross: 0, net: 0, commission: 0, count: 0 };

  paidList.forEach(inv => {
    const app = applications.find(a => a.id === inv.applicationId);
    const stu = students.find(s => s.id === inv.linkedStudentId);
    const progName = stu?.program || app?.program || '기타/미분류';
    if (!programMap[progName]) programMap[progName] = { name: progName, gross: 0, net: 0, commission: 0, count: 0 };
    programMap[progName].gross += parseFloat(inv.grossTotal) || 0;
    programMap[progName].net += parseFloat(inv.netTotal) || 0;
    programMap[progName].commission += parseFloat(inv.commissionAmount) || 0;
    programMap[progName].count += 1;
  });
  const programRows = Object.values(programMap).filter(p => p.count > 0).sort((a, b) => b.gross - a.gross);

  // 통화 (대다수 인보이스의 통화 사용 — 단순화)
  const currency = paidList[0]?.currency || 'CAD';
  const fmt = (n) => `${(n || 0).toLocaleString(undefined, { maximumFractionDigits: 0 })} ${currency}`;
  const fmtShort = (n) => Math.abs(n) >= 1000 ? `${(n/1000).toFixed(1)}K` : String(Math.round(n));

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">💰 회계 대시보드</h1>
          <p className="text-sm text-gray-500 mt-1">최근 {periodMonths}개월 기준 · 관리자 전용 · 인보이스 데이터 기반 자동 집계</p>
        </div>
        <div className="flex items-center gap-2">
          <Select value={String(periodMonths)} onChange={(v) => setPeriodMonths(parseInt(v) || 12)} options={['3','6','12','24']} placeholder="개월"/>
          <span className="text-xs text-gray-500">개월</span>
        </div>
      </div>

      {/* 탭 */}
      <div className="notion-card mb-4 p-2 flex flex-wrap gap-1">
        <button className={`tab-btn ${tab === 'overview' ? 'active':''}`} onClick={() => setTab('overview')}>📊 수익 개요</button>
        <button className={`tab-btn ${tab === 'items' ? 'active':''}`} onClick={() => setTab('items')}>📋 항목별 매출</button>
        <button className={`tab-btn ${tab === 'partners' ? 'active':''}`} onClick={() => setTab('partners')}>🤝 파트너 정산</button>
        <button className={`tab-btn ${tab === 'programs' ? 'active':''}`} onClick={() => setTab('programs')}>🎓 프로그램 수익성</button>
      </div>

      {tab === 'overview' && (
        <Fragment>
          {/* KPI 카드 */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <div className="notion-card p-4" style={{ background:'#ddebf1', borderColor:'#0b6e99' }}>
              <div className="text-xs text-gray-500 mb-1">📄 학생 인보이스 매출</div>
              <div className="text-2xl font-bold" style={{color:'#0b6e99'}}>{fmt(totalGross)}</div>
              <div className="text-xs text-gray-500 mt-1">{paidCount}건 납부 확인</div>
            </div>
            <div className="notion-card p-4" style={{ background:'#ddedea', borderColor:'#0f7b6c' }}>
              <div className="text-xs text-gray-500 mb-1">💵 BUPP 실수령 (Net)</div>
              <div className="text-2xl font-bold" style={{color:'#0f7b6c'}}>{fmt(totalNet)}</div>
              <div className="text-xs text-gray-500 mt-1">커미션 차감 후</div>
            </div>
            <div className="notion-card p-4" style={{ background:'#faf3e3', borderColor:'#cb912f' }}>
              <div className="text-xs text-gray-500 mb-1">🤝 누적 커미션</div>
              <div className="text-2xl font-bold" style={{color:'#a47007'}}>{fmt(totalCommission)}</div>
              <div className="text-xs text-gray-500 mt-1">파트너 지급액</div>
            </div>
            <div className="notion-card p-4" style={{ background:'#fbe0e0', borderColor:'#c20206' }}>
              <div className="text-xs text-gray-500 mb-1">⏳ 미수금 (Sent)</div>
              <div className="text-2xl font-bold" style={{color:'#c20206'}}>{fmt(totalReceivable)}</div>
              <div className="text-xs text-gray-500 mt-1">{pendingCount}건 납부 대기</div>
            </div>
          </div>

          {/* 월별 매출 막대 차트 (SVG) */}
          <div className="notion-card p-4 mb-4">
            <h4 className="font-semibold mb-3" style={{color:'#760305'}}>📈 월별 매출 추이 — Gross vs Net</h4>
            {monthlySeries.every(m => m.gross === 0) ? (
              <div className="text-sm text-gray-400 py-8 text-center">해당 기간에 납부 확인된 인보이스가 없습니다.</div>
            ) : (
              <svg viewBox={`0 0 ${monthlySeries.length * 60 + 40} 200`} style={{width:'100%', height:240}}>
                {/* Y축 라인 */}
                <line x1="30" y1="20" x2="30" y2="170" stroke="#cabaab" strokeWidth="1"/>
                <line x1="30" y1="170" x2={monthlySeries.length * 60 + 30} y2="170" stroke="#cabaab" strokeWidth="1"/>
                {/* 가로 그리드 */}
                {[0.25, 0.5, 0.75, 1].map((p, i) => (
                  <g key={i}>
                    <line x1="30" y1={170 - p * 150} x2={monthlySeries.length * 60 + 30} y2={170 - p * 150} stroke="#eee" strokeDasharray="2,2"/>
                    <text x="28" y={170 - p * 150 + 3} fontSize="9" fill="#787774" textAnchor="end">{fmtShort(maxMonthly * p)}</text>
                  </g>
                ))}
                {monthlySeries.map((m, i) => {
                  const x = 30 + i * 60 + 10;
                  const grossH = (m.gross / maxMonthly) * 150;
                  const netH = (m.net / maxMonthly) * 150;
                  return (
                    <g key={m.month}>
                      <rect x={x} y={170 - grossH} width="18" height={grossH} fill="#0b6e99" opacity="0.85"/>
                      <rect x={x + 22} y={170 - netH} width="18" height={netH} fill="#0f7b6c" opacity="0.85"/>
                      <text x={x + 20} y={185} fontSize="9" fill="#202731" textAnchor="middle">{m.month.slice(2).replace('-', '/')}</text>
                      {m.gross > 0 && <text x={x + 9} y={170 - grossH - 3} fontSize="8" fill="#0b6e99" textAnchor="middle">{fmtShort(m.gross)}</text>}
                    </g>
                  );
                })}
                {/* 범례 */}
                <g transform="translate(40, 5)">
                  <rect x="0" y="0" width="10" height="10" fill="#0b6e99" opacity="0.85"/>
                  <text x="14" y="9" fontSize="10" fill="#202731">학생 인보이스 (Gross)</text>
                  <rect x="140" y="0" width="10" height="10" fill="#0f7b6c" opacity="0.85"/>
                  <text x="154" y="9" fontSize="10" fill="#202731">정산 인보이스 (Net)</text>
                </g>
              </svg>
            )}
          </div>

          {/* 최근 납부 / 미수금 목록 */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div className="notion-card p-4">
              <h4 className="font-semibold mb-3" style={{color:'#0f7b6c'}}>✅ 최근 납부 확인 (Top 10)</h4>
              {paidList.length === 0 ? (
                <div className="text-sm text-gray-400 py-4">없음</div>
              ) : (
                <table className="w-full text-xs">
                  <thead><tr><th className="table-th">학생</th><th className="table-th">발행일</th><th className="table-th">납부일</th><th className="table-th text-right">금액</th></tr></thead>
                  <tbody>
                    {paidList.slice().sort((a, b) => (b.paidAt||'').localeCompare(a.paidAt||'')).slice(0, 10).map(i => (
                      <tr key={i.id}>
                        <td className="table-td">{i.studentName}</td>
                        <td className="table-td">{i.issueDate}</td>
                        <td className="table-td">{i.paidAt || '-'}</td>
                        <td className="table-td text-right font-semibold">{fmt(i.grossTotal)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
            <div className="notion-card p-4">
              <h4 className="font-semibold mb-3" style={{color:'#c20206'}}>⏳ 미수금 — 납부 대기 (Top 10)</h4>
              {pendingList.length === 0 ? (
                <div className="text-sm text-gray-400 py-4">없음 — 전체 납부 완료 🎉</div>
              ) : (
                <table className="w-full text-xs">
                  <thead><tr><th className="table-th">학생</th><th className="table-th">발행일</th><th className="table-th">납부 기한</th><th className="table-th text-right">청구액</th></tr></thead>
                  <tbody>
                    {pendingList.slice().sort((a, b) => (a.dueDate||'').localeCompare(b.dueDate||'')).slice(0, 10).map(i => {
                      const overdue = i.dueDate && i.dueDate < todayD.toISOString().slice(0,10);
                      return (
                        <tr key={i.id} style={overdue ? { background:'#fbe0e0' } : {}}>
                          <td className="table-td">{i.studentName}</td>
                          <td className="table-td">{i.issueDate}</td>
                          <td className="table-td" style={overdue ? {color:'#c20206', fontWeight:'600'} : {}}>{i.dueDate || '-'}{overdue && ' ⚠️'}</td>
                          <td className="table-td text-right font-semibold">{fmt(i.grossTotal)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        </Fragment>
      )}

      {tab === 'partners' && (
        <div className="notion-card p-4">
          <h4 className="font-semibold mb-3" style={{color:'#760305'}}>🤝 파트너별 정산 ({partnerRows.length}개사)</h4>
          {partnerRows.length === 0 ? (
            <div className="text-sm text-gray-400 py-8 text-center">해당 기간에 인보이스가 없습니다.</div>
          ) : (
            <table className="w-full text-sm">
              <thead><tr>
                <th className="table-th">파트너사</th>
                <th className="table-th text-center">인보이스</th>
                <th className="table-th text-right">학생 인보이스 매출</th>
                <th className="table-th text-right">커미션 지급</th>
                <th className="table-th text-right">BUPP 실수령</th>
                <th className="table-th text-center">납부/대기</th>
              </tr></thead>
              <tbody>
                {partnerRows.map(p => (
                  <tr key={p.name}>
                    <td className="table-td font-semibold">{p.name}</td>
                    <td className="table-td text-center">{p.count}건</td>
                    <td className="table-td text-right" style={{color:'#0b6e99'}}>{fmt(p.gross)}</td>
                    <td className="table-td text-right" style={{color:'#a47007', fontWeight:'600'}}>{fmt(p.commission)}</td>
                    <td className="table-td text-right" style={{color:'#0f7b6c'}}>{fmt(p.net)}</td>
                    <td className="table-td text-center text-xs">
                      <span className="badge b-green">✓ {p.paid}</span>
                      {p.pending > 0 && <span className="badge b-yellow ml-1">대기 {p.pending}</span>}
                    </td>
                  </tr>
                ))}
                <tr style={{background:'#faf7f3', fontWeight:'600'}}>
                  <td className="table-td">합계</td>
                  <td className="table-td text-center">{partnerRows.reduce((s,p) => s+p.count, 0)}건</td>
                  <td className="table-td text-right" style={{color:'#0b6e99'}}>{fmt(partnerRows.reduce((s,p) => s+p.gross, 0))}</td>
                  <td className="table-td text-right" style={{color:'#a47007'}}>{fmt(partnerRows.reduce((s,p) => s+p.commission, 0))}</td>
                  <td className="table-td text-right" style={{color:'#0f7b6c'}}>{fmt(partnerRows.reduce((s,p) => s+p.net, 0))}</td>
                  <td className="table-td"></td>
                </tr>
              </tbody>
            </table>
          )}
          <div className="text-xs text-gray-500 mt-3">💡 "직접 접수"는 파트너 없이 BUPP가 직접 모집한 케이스입니다. 파트너사 칼럼은 인보이스에 기록된 파트너 회사명을 기준으로 집계됩니다.</div>
        </div>
      )}

      {tab === 'programs' && (
        <div className="notion-card p-4">
          <h4 className="font-semibold mb-3" style={{color:'#760305'}}>🎓 프로그램별 수익성 ({programRows.length}개)</h4>
          {programRows.length === 0 ? (
            <div className="text-sm text-gray-400 py-8 text-center">납부 확인된 인보이스가 없거나 프로그램 정보가 매칭되지 않습니다.</div>
          ) : (
            <Fragment>
              <table className="w-full text-sm mb-4">
                <thead><tr>
                  <th className="table-th">프로그램</th>
                  <th className="table-th text-center">건수</th>
                  <th className="table-th text-right">Gross 매출</th>
                  <th className="table-th text-right">Net 실수령</th>
                  <th className="table-th text-right">건당 평균 Net</th>
                  <th className="table-th text-right">Net 비중</th>
                </tr></thead>
                <tbody>
                  {programRows.map(p => {
                    const totalNetAll = programRows.reduce((s, x) => s + x.net, 0);
                    const share = totalNetAll > 0 ? (p.net / totalNetAll * 100) : 0;
                    return (
                      <tr key={p.name}>
                        <td className="table-td font-semibold">{p.name}</td>
                        <td className="table-td text-center">{p.count}</td>
                        <td className="table-td text-right" style={{color:'#0b6e99'}}>{fmt(p.gross)}</td>
                        <td className="table-td text-right" style={{color:'#0f7b6c', fontWeight:'600'}}>{fmt(p.net)}</td>
                        <td className="table-td text-right">{fmt(p.count > 0 ? p.net / p.count : 0)}</td>
                        <td className="table-td text-right">
                          <div className="flex items-center justify-end gap-2">
                            <div style={{width:60, height:8, background:'#eee', borderRadius:4, overflow:'hidden'}}>
                              <div style={{width:`${share}%`, height:'100%', background:'#0f7b6c'}}></div>
                            </div>
                            <span style={{minWidth:36}}>{share.toFixed(1)}%</span>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              <div className="text-xs text-gray-500">💡 프로그램은 학생 프로필(연결된 학생 우선) → 신청서 → '기타/미분류' 순으로 매칭됩니다. 학생 프로필의 BUPP 프로그램 필드와 신청서의 프로그램이 동일한 값이어야 정확히 집계됩니다.</div>
            </Fragment>
          )}
        </div>
      )}

      {tab === 'items' && (() => {
        // 인보이스 줄(items)을 풀어서 line items 배열로 변환 — 납부 확인된 것만
        const lines = [];
        paidList.forEach(inv => {
          (inv.items || []).forEach(it => {
            const master = invoiceItems.find(x => x.id === it.itemId);
            const qty = parseFloat(it.quantity) || 0;
            const amt = parseFloat(it.amount) || 0;
            lines.push({
              date: dateOf(inv),
              month: monthKey(dateOf(inv)),
              itemId: it.itemId || '_freeform',
              itemName: master?.name || (it.description ? it.description.slice(0, 30) : '(이름 없음)'),
              category: master?.category || '직접 입력',
              description: it.description,
              quantity: qty,
              amount: amt,
              lineTotal: qty * amt,
              currency: inv.currency,
              invoiceNumber: inv.invoiceNumber,
              studentName: inv.studentName
            });
          });
        });

        // 항목별 집계
        const byItem = {};
        lines.forEach(l => {
          const key = l.itemId + '|' + l.itemName;
          if (!byItem[key]) byItem[key] = { itemName: l.itemName, category: l.category, qty: 0, total: 0, count: 0, months: {} };
          byItem[key].qty += l.quantity;
          byItem[key].total += l.lineTotal;
          byItem[key].count += 1;
          byItem[key].months[l.month] = (byItem[key].months[l.month] || 0) + l.lineTotal;
        });
        const itemRows = Object.values(byItem).sort((a, b) => b.total - a.total);

        // 월별 컬럼 (period에 맞춰)
        const monthCols = monthlySeries.map(m => m.month);
        const monthTotals = {};
        monthCols.forEach(m => { monthTotals[m] = lines.filter(l => l.month === m).reduce((s, l) => s + l.lineTotal, 0); });

        return (
          <div className="space-y-4">
            <div className="notion-card p-4">
              <div className="flex items-center justify-between mb-3">
                <h4 className="font-semibold" style={{color:'#760305'}}>📋 항목별 매출 — {itemRows.length}개 항목 · 총 {lines.length}건</h4>
                <div className="flex gap-2">
                  <button className={`tab-btn ${itemGroupBy === 'month' ? 'active':''}`} onClick={() => setItemGroupBy('month')}>📅 월별 매트릭스</button>
                  <button className={`tab-btn ${itemGroupBy === 'item' ? 'active':''}`} onClick={() => setItemGroupBy('item')}>📋 항목 집계</button>
                </div>
              </div>

              {lines.length === 0 ? (
                <div className="text-sm text-gray-400 py-8 text-center">납부 확인된 인보이스 항목이 없습니다.</div>
              ) : itemGroupBy === 'item' ? (
                <table className="w-full text-sm">
                  <thead><tr>
                    <th className="table-th">항목명</th>
                    <th className="table-th">카테고리</th>
                    <th className="table-th text-center">건수</th>
                    <th className="table-th text-right">총 수량</th>
                    <th className="table-th text-right">총 매출</th>
                    <th className="table-th text-right">매출 비중</th>
                  </tr></thead>
                  <tbody>
                    {itemRows.map((r, i) => {
                      const totalAll = itemRows.reduce((s, x) => s + x.total, 0);
                      const share = totalAll > 0 ? (r.total / totalAll * 100) : 0;
                      return (
                        <tr key={i}>
                          <td className="table-td font-semibold">{r.itemName}</td>
                          <td className="table-td"><Badge value={r.category}/></td>
                          <td className="table-td text-center">{r.count}</td>
                          <td className="table-td text-right">{r.qty.toLocaleString()}</td>
                          <td className="table-td text-right font-semibold" style={{color:'#0b6e99'}}>{fmt(r.total)}</td>
                          <td className="table-td text-right">
                            <div className="flex items-center justify-end gap-2">
                              <div style={{width:60, height:8, background:'#eee', borderRadius:4, overflow:'hidden'}}>
                                <div style={{width:`${share}%`, height:'100%', background:'#0b6e99'}}></div>
                              </div>
                              <span style={{minWidth:36}}>{share.toFixed(1)}%</span>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                    <tr style={{background:'#faf7f3', fontWeight:'600'}}>
                      <td className="table-td">합계</td>
                      <td className="table-td"></td>
                      <td className="table-td text-center">{itemRows.reduce((s, x) => s + x.count, 0)}</td>
                      <td className="table-td text-right">{itemRows.reduce((s, x) => s + x.qty, 0).toLocaleString()}</td>
                      <td className="table-td text-right" style={{color:'#0b6e99'}}>{fmt(itemRows.reduce((s, x) => s + x.total, 0))}</td>
                      <td className="table-td"></td>
                    </tr>
                  </tbody>
                </table>
              ) : (
                <div className="overflow-auto">
                  <table className="w-full text-xs">
                    <thead><tr>
                      <th className="table-th sticky left-0 bg-white" style={{minWidth:180}}>항목명</th>
                      <th className="table-th">카테고리</th>
                      {monthCols.map(m => (
                        <th key={m} className="table-th text-right" style={{minWidth:80}}>{m.slice(2).replace('-', '/')}</th>
                      ))}
                      <th className="table-th text-right" style={{minWidth:100, background:'#faf7f3'}}>합계</th>
                    </tr></thead>
                    <tbody>
                      {itemRows.map((r, i) => (
                        <tr key={i}>
                          <td className="table-td font-semibold sticky left-0 bg-white">{r.itemName}</td>
                          <td className="table-td"><Badge value={r.category}/></td>
                          {monthCols.map(m => (
                            <td key={m} className="table-td text-right" style={(r.months[m]||0) > 0 ? {} : {color:'#ccc'}}>
                              {(r.months[m]||0) > 0 ? fmtShort(r.months[m]) : '-'}
                            </td>
                          ))}
                          <td className="table-td text-right font-semibold" style={{background:'#faf7f3', color:'#0b6e99'}}>{fmt(r.total)}</td>
                        </tr>
                      ))}
                      <tr style={{background:'#e8e0d5', fontWeight:'600'}}>
                        <td className="table-td sticky left-0" style={{background:'#e8e0d5'}}>월별 합계</td>
                        <td className="table-td"></td>
                        {monthCols.map(m => (
                          <td key={m} className="table-td text-right">{monthTotals[m] > 0 ? fmtShort(monthTotals[m]) : '-'}</td>
                        ))}
                        <td className="table-td text-right" style={{color:'#0b6e99'}}>{fmt(Object.values(monthTotals).reduce((s,v) => s+v, 0))}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              )}
            </div>

            {/* 카테고리별 도넛/요약 */}
            <div className="notion-card p-4">
              <h4 className="font-semibold mb-3" style={{color:'#760305'}}>🗂️ 카테고리별 매출 분포</h4>
              {(() => {
                const byCat = {};
                lines.forEach(l => { byCat[l.category] = (byCat[l.category] || 0) + l.lineTotal; });
                const catRows = Object.entries(byCat).map(([k, v]) => ({ name: k, total: v })).sort((a, b) => b.total - a.total);
                const totalAll = catRows.reduce((s, x) => s + x.total, 0);
                if (catRows.length === 0) return <div className="text-sm text-gray-400">데이터 없음</div>;
                return (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    {catRows.map(c => {
                      const share = totalAll > 0 ? (c.total / totalAll * 100) : 0;
                      return (
                        <div key={c.name} className="flex items-center gap-3 p-3 rounded" style={{background:'#faf7f3', border:'1px solid var(--border)'}}>
                          <div className="flex-1">
                            <div className="font-semibold mb-1">{c.name}</div>
                            <div style={{height:8, background:'#eee', borderRadius:4, overflow:'hidden'}}>
                              <div style={{width:`${share}%`, height:'100%', background:'#0f7b6c'}}></div>
                            </div>
                          </div>
                          <div className="text-right">
                            <div className="font-bold" style={{color:'#0f7b6c'}}>{fmt(c.total)}</div>
                            <div className="text-xs text-gray-500">{share.toFixed(1)}%</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
            </div>

            <div className="text-xs text-gray-500">💡 인보이스 줄(line item)에 연결된 마스터 항목을 기준으로 집계합니다. 항목 미선택 라인은 설명을 기준으로 임시 그룹화됩니다 — 정확한 집계를 위해 인보이스 작성 시 항목을 선택해 주세요.</div>
          </div>
        );
      })()}
    </div>
  );
};

const PartnersPage = ({ partners, onChange }) => {
  const [search, setSearch] = useState('');
  const [filters, setFilters] = useState({ active: '', country: '' });
  const [editing, setEditing] = useState(null);

  const countries = Array.from(new Set(partners.map(p => p.country).filter(Boolean))).sort();

  const filtered = partners.filter(p => {
    const q = search.trim().toLowerCase();
    if (q && !(p.name||'').toLowerCase().includes(q) && !(p.contactPerson||'').toLowerCase().includes(q) && !(p.email||'').toLowerCase().includes(q)) return false;
    if (filters.country && p.country !== filters.country) return false;
    if (filters.active === 'Y' && !p.active) return false;
    if (filters.active === 'N' && p.active) return false;
    return true;
  });

  const upsert = (d) => {
    if (!d.name?.trim()) { alert('회사명을 입력해주세요.'); return; }
    const next = d.id ? partners.map(p => p.id === d.id ? d : p) : [...partners, { ...d, id: uid() }];
    onChange(next);
    setEditing(null);
  };
  const remove = (id) => {
    if (!confirm('이 파트너 회사를 삭제하시겠습니까?\n(인보이스의 파트너 이름은 자유 텍스트라서 영향 없음)')) return;
    onChange(partners.filter(p => p.id !== id));
  };

  return (
    <div className="max-w-[1400px] mx-auto px-8 py-8">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">🤝 파트너 회사 관리</h1>
          <p className="text-sm text-gray-500 mt-1">전체 {partners.length}개 · 필터 결과 {filtered.length}개 · 브듀쌤 이상만 접근</p>
        </div>
        <div className="flex items-center gap-2">
          <input className="notion-input w-72" placeholder="회사명·담당자·이메일 검색..." value={search} onChange={(e) => setSearch(e.target.value)}/>
          <button className="btn-primary" onClick={() => setEditing(emptyPartner())}>+ 새 파트너 추가</button>
        </div>
      </div>

      <div className="notion-card p-4 mb-4">
        <div className="grid grid-cols-3 gap-3">
          <Field label="국가"><Select value={filters.country} onChange={(v) => setFilters({...filters, country:v})} options={countries} placeholder="전체"/></Field>
          <Field label="활성 여부"><Select value={filters.active} onChange={(v) => setFilters({...filters, active:v})} options={['Y','N']} placeholder="전체"/></Field>
        </div>
      </div>

      {editing && (
        <div className="notion-card p-5 mb-4 bg-gray-50">
          <h3 className="font-semibold mb-4">{editing.id ? '파트너 회사 수정' : '새 파트너 회사 추가'}</h3>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
            <Field label="회사명 *" span={2}><TextInput value={editing.name} onChange={(v) => setEditing({...editing, name:v})}/></Field>
            <Field label="국가"><TextInput value={editing.country} onChange={(v) => setEditing({...editing, country:v})} placeholder="예) South Korea, Canada"/></Field>
            <Field label="담당자"><TextInput value={editing.contactPerson} onChange={(v) => setEditing({...editing, contactPerson:v})}/></Field>
            <Field label="전화"><TextInput value={editing.phone} onChange={(v) => setEditing({...editing, phone:v})}/></Field>
            <Field label="이메일"><TextInput type="email" value={editing.email} onChange={(v) => setEditing({...editing, email:v})}/></Field>
            <Field label="주소" span={2}><TextInput value={editing.address} onChange={(v) => setEditing({...editing, address:v})}/></Field>
            <Field label="웹사이트"><TextInput value={editing.website} onChange={(v) => setEditing({...editing, website:v})} placeholder="https://..."/></Field>
            <Field label="대표자"><TextInput value={editing.representativeName} onChange={(v) => setEditing({...editing, representativeName:v})}/></Field>
            <Field label="사업자번호"><TextInput value={editing.businessNumber} onChange={(v) => setEditing({...editing, businessNumber:v})}/></Field>
            <Field label="활성 상태">
              <div className="pt-2"><Toggle value={editing.active} onChange={(v) => setEditing({...editing, active:v})} label="활성"/></div>
            </Field>
            <Field label="등록일"><TextInput type="date" value={editing.createdAt} onChange={(v) => setEditing({...editing, createdAt:v})}/></Field>
            <Field label="메모" span={3}><TextArea value={editing.memo} onChange={(v) => setEditing({...editing, memo:v})} rows={3} placeholder="정산 주기, 협약 조건, 주의 사항 등"/></Field>
            <div className="col-span-3 flex justify-end gap-2">
              <button className="btn-ghost" onClick={() => setEditing(null)}>취소</button>
              <button className="btn-primary" onClick={() => upsert(editing)}>저장</button>
            </div>
          </div>
        </div>
      )}

      <div className="notion-card overflow-hidden">
        <table className="w-full">
          <thead><tr>
            <th className="table-th">회사명</th>
            <th className="table-th">국가</th>
            <th className="table-th">담당자</th>
            <th className="table-th">연락처</th>
            <th className="table-th">활성</th>
            <th className="table-th">메모</th>
            <th className="table-th"></th>
          </tr></thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan="7" className="text-center py-12 text-gray-400 text-sm">조건에 맞는 파트너가 없습니다.</td></tr>
            ) : filtered.map(p => (
              <tr key={p.id} className="row-hover" style={{ opacity: p.active ? 1 : 0.55 }}>
                <td className="table-td">
                  <div className="font-medium">{p.name}</div>
                  {p.representativeName && <div className="text-xs text-gray-500">대표 {p.representativeName}</div>}
                  {p.website && <a href={p.website} target="_blank" rel="noopener" className="text-xs text-blue-600 hover:underline">{p.website}</a>}
                </td>
                <td className="table-td text-sm">{p.country || '—'}</td>
                <td className="table-td text-sm">{p.contactPerson || '—'}</td>
                <td className="table-td text-xs text-gray-600">
                  {p.phone && <div>{p.phone}</div>}
                  {p.email && <div className="text-blue-600">{p.email}</div>}
                </td>
                <td className="table-td">
                  {p.active ? <span className="badge b-green">활성</span> : <span className="badge b-gray">비활성</span>}
                </td>
                <td className="table-td text-xs text-gray-600" style={{maxWidth:220}}>{p.memo || '—'}</td>
                <td className="table-td text-right whitespace-nowrap">
                  <button className="btn-ghost" onClick={() => setEditing(p)}>수정</button>
                  <button className="btn-danger" onClick={() => remove(p.id)}>삭제</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

function App() {
  const [students, setStudents] = useState(() => loadStudents());
  const [customOptions, setCustomOptions] = useState(() => loadOptions());
  const [schools, setSchools] = useState(() => loadSchools());
  const [subjects, setSubjects] = useState(() => loadSubjects());
  const [members, setMembers] = useState(() => loadMembers());
  const [currentUserId, setCurrentUserId] = useState(() => loadCurrentUserId());
  const [universities, setUniversities] = useState(() => loadUniversities());
  const [programs, setPrograms] = useState(() => loadPrograms());
